<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coffee Lab Map</title>
<style>
:root{--bg:#fff4dc;--ink:#3b2518;--brown:#6b3f21;--brown2:#9b6034;--cream:#fffdf6;--orange:#ff9f1c;--yellow:#ffd166;--pink:#ff6b8a;--mint:#66d2a8;--blue:#73c7ff;--line:#f0d5ad;--shadow:#e7c78f;}
*{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,"Hiragino Sans","Yu Gothic",sans-serif;background:radial-gradient(circle at 20% 0%,#ffe3a1 0 18%,transparent 19%),radial-gradient(circle at 90% 10%,#ffd6df 0 14%,transparent 15%),var(--bg);color:var(--ink);}
header{position:relative;overflow:hidden;background:linear-gradient(135deg,#6b3f21,#a86432);color:#fff;padding:26px 18px 30px;text-align:center;border-radius:0 0 32px 32px;box-shadow:0 8px 0 rgba(88,50,24,.25)}
header:before{content:"";position:absolute;inset:-40px;background:radial-gradient(circle,#ffffff22 0 8px,transparent 9px);background-size:34px 34px;transform:rotate(-8deg)}
.hero{position:relative;z-index:1}.bean{width:74px;height:74px;margin:0 auto 8px;background:linear-gradient(145deg,#8b4d25,#4c2815);border-radius:55% 45% 55% 45%;box-shadow:inset 10px 0 0 #3c1f10,0 8px 0 #4a2714;position:relative;animation:bounce 2.4s infinite}.bean:after{content:"";position:absolute;left:35px;top:8px;width:8px;height:58px;background:#d28b58;border-radius:99px;transform:rotate(12deg)}@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
h1{margin:0;font-size:30px;letter-spacing:.5px}.sub{margin-top:8px;opacity:.92;font-weight:700}.pill{display:inline-block;background:#fff3;border:1px solid #fff7;border-radius:999px;padding:6px 12px;margin-top:10px;font-weight:800}
nav{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;padding:10px;position:sticky;top:0;background:#fff4dcee;backdrop-filter:blur(8px);z-index:5}nav button{border:0;background:#fffdf6;color:var(--ink);padding:10px 4px;border-radius:18px;font-weight:900;box-shadow:0 4px 0 var(--shadow);font-size:13px}nav button.active{background:var(--yellow)}
main{padding:14px;max-width:980px;margin:0 auto}.section{display:none}.section.active{display:block}.card{background:var(--cream);border:2px solid var(--line);border-radius:26px;padding:16px;margin-bottom:14px;box-shadow:0 7px 0 var(--shadow)}
.card h2,.card h3{margin:0 0 10px}.dash{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.stat{background:#fff;border:2px solid var(--line);border-radius:22px;padding:14px;text-align:center}.stat b{font-size:26px;display:block;color:var(--brown)}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}label{font-weight:900;font-size:13px}input,select,textarea{width:100%;padding:13px;border:2px solid #e0c09a;border-radius:16px;background:#fff;font-size:16px;margin-top:5px;color:var(--ink)}textarea{min-height:92px}.full{grid-column:1/-1}.btn{display:inline-block;text-decoration:none;border:0;background:var(--brown);color:white;padding:13px 16px;border-radius:18px;font-weight:900;font-size:16px;margin:6px 6px 6px 0;box-shadow:0 4px 0 #432514}.btn.sec{background:#168c68;box-shadow:0 4px 0 #0f6048}.btn.warn{background:var(--orange);color:var(--ink);box-shadow:0 4px 0 #c57109}.btn.danger{background:#cf3f36;box-shadow:0 4px 0 #8b241e}.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}.list-item,.term{background:#fff;border:2px solid #ead3bc;border-radius:22px;padding:14px;margin:10px 0}.list-item{position:relative}.stars{font-size:18px;letter-spacing:1px;color:#f59e0b}.badge{display:inline-block;background:var(--yellow);padding:7px 11px;margin:4px;border-radius:999px;font-weight:900}.badge.pink{background:#ffd4df}.badge.mint{background:#c9f4df}.muted{color:#7a6050;font-size:13px}.searchbar{display:grid;grid-template-columns:1fr 150px;gap:8px;margin-bottom:10px}.meter{height:16px;background:#f3dcc1;border-radius:999px;overflow:hidden;border:1px solid #e4c29d}.meter span{display:block;height:100%;background:linear-gradient(90deg,var(--orange),var(--pink));border-radius:999px}.taste-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}.taste{background:#fff8e8;border:1px dashed #daa86d;border-radius:16px;padding:10px;text-align:center}.taste b{display:block;font-size:20px}.mission{background:linear-gradient(135deg,#fff,#ffe0a6);border:2px dashed #d99131}.small{font-size:12px}.empty{text-align:center;padding:18px;color:#866b5b}.toast{position:fixed;left:50%;bottom:20px;transform:translateX(-50%);background:#3b2518;color:#fff;padding:12px 16px;border-radius:999px;font-weight:900;z-index:99;display:none}
@media(max-width:720px){nav{grid-template-columns:repeat(3,1fr)}.dash{grid-template-columns:repeat(2,1fr)}.grid,.searchbar{grid-template-columns:1fr}.taste-grid{grid-template-columns:repeat(2,1fr)}h1{font-size:26px}}
</style>
</head>
<body>
<header><div class="hero"><div class="bean"></div><h1>Coffee Lab Map</h1><div class="sub">味・店・地図・開業メモを育てるコーヒー研究アプリ</div><div class="pill">TIMEMORE C2MAX 対応</div></div></header>
<nav id="nav"><button onclick="showSec('home')">ホーム</button><button onclick="showSec('coffee')">コーヒー</button><button onclick="showSec('cafe')">カフェ</button><button onclick="showSec('map')">地図</button><button onclick="showSec('terms')">辞典</button><button onclick="showSec('analysis')">分析</button></nav>
<main>
<section id="home" class="section active"><div class="card"><h2>研究室ホーム</h2><div class="dash"><div class="stat"><b id="sCoffee">0</b>コーヒー</div><div class="stat"><b id="sCafe">0</b>カフェ</div><div class="stat"><b id="sAvg">-</b>平均★</div><div class="stat"><b id="sLevel">1</b>レベル</div></div></div><div class="card mission"><h3>今日のミッション</h3><p id="missionText"></p><button class="btn warn" onclick="newMission()">ミッション変更</button></div><div class="card"><h3>現在の称号</h3><p id="levelBox"></p><div id="badges"></div><div class="meter"><span id="levelMeter" style="width:0%"></span></div></div><div class="card"><h3>最近の記録</h3><div id="recentList"></div></div></section>
<section id="coffee" class="section"><div class="card"><h2>コーヒー記録</h2><p class="muted">ハンドドリップ目安：C2MAX 18〜24クリック。豆・焙煎・好みで調整。</p><div class="row"><button class="btn warn" onclick="quickCoffee('浅煎り',20)">浅煎り20</button><button class="btn warn" onclick="quickCoffee('中煎り',22)">中煎り22</button><button class="btn warn" onclick="quickCoffee('深煎り',24)">深煎り24</button></div><div class="grid" id="coffeeForm"></div><button class="btn" onclick="saveCoffee()">保存</button><button class="btn sec" onclick="clearCoffeeForm()">入力クリア</button></div><div class="card"><div class="searchbar"><input id="coffeeSearch" placeholder="豆・店名・産地で検索" oninput="renderCoffee()"><select id="coffeeSort" onchange="renderCoffee()"><option value="new">新しい順</option><option value="rating">評価順</option><option value="clicks">クリック数順</option></select></div><div id="coffeeList"></div></div></section>
<section id="cafe" class="section"><div class="card"><h2>カフェ記録</h2><p class="muted">将来の開業メモとして、立地・価格・客層・店員数も残すと役立ちます。</p><div class="grid" id="cafeForm"></div><button class="btn" onclick="saveCafe()">保存</button><button class="btn sec" onclick="clearCafeForm()">入力クリア</button></div><div class="card"><div class="searchbar"><input id="cafeSearch" placeholder="店名・住所・メモで検索" oninput="renderCafe()"><select id="cafeSort" onchange="renderCafe()"><option value="new">新しい順</option><option value="rating">自分評価順</option><option value="again">また行きたい順</option></select></div><div id="cafeList"></div></div></section>
<section id="map" class="section"><div class="card"><h2>カフェ地図</h2><p class="muted">登録した店をGoogleマップで開けます。状態ごとに見比べできます。</p><div class="row"><button class="btn warn" onclick="setMapFilter('all')">全部</button><button class="btn warn" onclick="setMapFilter('行った')">行った</button><button class="btn warn" onclick="setMapFilter('行きたい')">行きたい</button><button class="btn warn" onclick="setMapFilter('お気に入り')">お気に入り</button></div><div id="mapList"></div></div></section>
<section id="terms" class="section"><div class="card"><h2>用語辞典</h2><input id="termSearch" placeholder="用語・読み方を検索" oninput="renderTerms()"><div id="termList"></div></div></section>
<section id="analysis" class="section"><div class="card"><h2>味の分析</h2><div class="taste-grid" id="tasteBox"></div></div><div class="card"><h2>開業分析</h2><div id="analysisBox"></div></div><div class="card"><h2>データ管理</h2><button class="btn sec" onclick="exportData()">エクスポート</button><input type="file" id="importFile" onchange="importData(event)"></div></section>
</main><div class="toast" id="toast">保存しました</div>
<script>
const coffeeFields=[['date','日付','date'],['shop','店名','text'],['bean','豆の名前','text'],['origin','産地','text'],['roast','焙煎度','select','浅煎り,中煎り,深煎り'],['mill','ミル','text','TIMEMORE C2MAX'],['clicks','クリック数','number'],['grams','豆の量g','number'],['water','お湯の量ml','number'],['temp','お湯の温度℃','number'],['method','抽出方法','select','ハンドドリップ,ペーパードリップ,フレンチプレス,エアロプレス,モカポット,その他'],['time','抽出時間','text'],['acid','酸味★','number'],['bitter','苦味★','number'],['sweet','甘み★','number'],['aroma','香り★','number'],['body','コク★','number'],['after','後味★','number'],['rating','総合評価★','number'],['memo','メモ','textarea']];
const cafeFields=[['date','訪問日','date'],['name','店名','text'],['address','住所','text'],['google','Google評価','number'],['tabelog','食べログ評価','number'],['rating','自分の評価★','number'],['taste','味★','number'],['atmos','雰囲気★','number'],['price','価格★','number'],['service','接客★','number'],['work','作業しやすさ★','number'],['again','また行きたい度★','number'],['status','状態','select','行った,行きたい,お気に入り'],['customers','客層','text'],['seats','席数','number'],['range','価格帯','text'],['signature','看板商品','text'],['staff','店員数','number'],['stay','滞在タイプ','select','長居向き,回転重視,作業向き,テイクアウト向き,不明'],['hint','店づくりのヒント','textarea'],['improve','改善できそうな点','textarea'],['memo','メモ','textarea']];
const terms=[['焙煎','ばいせん','コーヒー豆を焼くこと。','浅煎り・中煎り・深煎りを記録する。'],['浅煎り','あさいり','火入れが浅く、酸味や香りが出やすい焙煎。','酸味が強いかを比べる。'],['中煎り','ちゅういり','酸味と苦味のバランスが取りやすい焙煎。','基準の味として使う。'],['深煎り','ふかいり','火入れが深く、苦味やコクが出やすい焙煎。','苦味やミルクとの相性を見る。'],['挽き目','ひきめ','豆を砕く細かさ。','C2MAXのクリック数で記録する。'],['抽出','ちゅうしゅつ','お湯でコーヒーの成分を取り出すこと。','時間・温度・量と一緒に残す。'],['蒸らし','むらし','最初に少量のお湯をかけて豆をふくらませる工程。','30秒など時間を書く。'],['酸味','さんみ','果物のような明るい味。','★で強さを記録する。'],['苦味','にがみ','ビターな味。','出すぎていないかを見る。'],['甘み','あまみ','砂糖とは違う自然な甘さ。','冷めた後も見る。'],['コク','こく','味の厚みや飲みごたえ。','軽いか重いかを記録する。'],['アロマ','あろま','飲む前に感じる香り。','カップに近づけた時の香り。'],['フレーバー','ふれーばー','飲んだ時の味と香りの印象。','ナッツ、チョコ、柑橘など。'],['ボディ','ぼでぃ','口当たりの重さ。','軽い・普通・重いで考える。'],['後味','あとあじ','飲み込んだあとに残る味。','苦味が残るか、すっきりするか。'],['シングルオリジン','しんぐるおりじん','1つの産地や農園の豆。','豆の個性を見る。'],['ブレンド','ぶれんど','複数の豆を混ぜたもの。','バランスを見る。'],['ハンドドリップ','はんどどりっぷ','手でお湯を注ぐ抽出方法。','注ぎ方と時間を記録する。'],['ペーパードリップ','ぺーぱーどりっぷ','紙フィルターを使う抽出方法。','すっきり感を見る。'],['フレンチプレス','ふれんちぷれす','金属フィルターで浸して抽出する方法。','ボディが出やすい。'],['エスプレッソ','えすぷれっそ','圧力で短時間抽出する濃いコーヒー。','通常のドリップとは分けて記録。'],['スペシャルティコーヒー','すぺしゃるてぃこーひー','品質や産地管理にこだわった高品質なコーヒー。','店の売りを分析する。'],['精製','せいせい','コーヒーの実から豆を取り出す方法。','味の違いの原因として見る。'],['ウォッシュド','うぉっしゅど','水洗式の精製。すっきりしやすい。','透明感を見る。'],['ナチュラル','なちゅらる','果実ごと乾燥させる精製。果実感が出やすい。','フルーティさを見る。'],['ハニー製法','はにーせいほう','果肉を少し残して乾燥させる精製。','甘みを見やすい。'],['TIMEMORE C2MAX','たいむもあ しーつーまっくす','手動のコーヒーミル。','クリック数を必ず残す。'],['クリック数','くりっくすう','ミルの挽き目調整の目安。','ハンドドリップは18〜24を目安。'],['看板商品','かんばんしょうひん','その店を覚えてもらう中心商品。','将来自分の店で何を主役にするか考える。'],['客単価','きゃくたんか','1人のお客さんが平均で使う金額。','価格設計の参考にする。']];
const missions=['浅煎りと中煎りを比べる','同じ豆でクリック数を2つ変える','カフェの看板商品を観察する','作業しやすい席の条件をメモする','冷めた後の味を記録する','店員数と席数を数える','Google評価と自分評価の差を見る'];
let data=JSON.parse(localStorage.getItem('coffeeLabMap')||'{"coffee":[],"cafes":[],"mission":0}');if(!data.coffee)data.coffee=[];if(!data.cafes)data.cafes=[];let mapFilter='all';
function save(){localStorage.setItem('coffeeLabMap',JSON.stringify(data));renderAll()}function toast(t){let e=document.getElementById('toast');e.textContent=t;e.style.display='block';setTimeout(()=>e.style.display='none',1400)}
function showSec(id){document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');[...document.querySelectorAll('nav button')].forEach(b=>b.classList.remove('active'));[...document.querySelectorAll('nav button')][['home','coffee','cafe','map','terms','analysis'].indexOf(id)].classList.add('active');renderAll()}
function makeForm(id,fields){document.getElementById(id).innerHTML=fields.map(f=>{let v=f[3]||'';if(f[2]=='select')return `<label>${f[1]}<select id="${id}_${f[0]}">${v.split(',').map(x=>`<option>${x}</option>`).join('')}</select></label>`;if(f[2]=='textarea')return `<label class="full">${f[1]}<textarea id="${id}_${f[0]}"></textarea></label>`;return `<label>${f[1]}<input id="${id}_${f[0]}" type="${f[2]}" value="${v}" ${f[0].includes('rating')||['acid','bitter','sweet','aroma','body','after','taste','atmos','price','service','work','again'].includes(f[0])?'min="1" max="5" step="1"':''}></label>`}).join('')}
function getVals(id,fields){let o={id:Date.now()};fields.forEach(f=>o[f[0]]=document.getElementById(id+'_'+f[0]).value);return o}
function setVals(id,vals){Object.keys(vals).forEach(k=>{let e=document.getElementById(id+'_'+k);if(e)e.value=vals[k]})}
function clearForm(id,fields){fields.forEach(f=>{let e=document.getElementById(id+'_'+f[0]);if(e)e.value=f[3]||''})}
function clearCoffeeForm(){clearForm('coffeeForm',coffeeFields)}function clearCafeForm(){clearForm('cafeForm',cafeFields)}
function quickCoffee(roast,clicks){setVals('coffeeForm',{roast,clicks,method:'ハンドドリップ',mill:'TIMEMORE C2MAX',grams:15,water:240,temp:90,time:'2分30秒'});toast('クイック入力しました')}
function saveCoffee(){data.coffee.unshift(getVals('coffeeForm',coffeeFields));save();toast('コーヒー記録を保存しました')}
function saveCafe(){data.cafes.unshift(getVals('cafeForm',cafeFields));save();toast('カフェ記録を保存しました')}
function stars(n){n=Math.max(0,Math.min(5,Math.round(Number(n)||0)));return '<span class="stars">'+'★'.repeat(n)+'☆'.repeat(5-n)+'</span>'}
function del(type,id){if(confirm('削除しますか？')){data[type]=data[type].filter(x=>x.id!==id);save();toast('削除しました')}}
function renderCoffee(){let q=(document.getElementById('coffeeSearch')?.value||'').toLowerCase();let sort=document.getElementById('coffeeSort')?.value||'new';let arr=data.coffee.filter(x=>(x.bean+x.shop+x.origin+x.memo).toLowerCase().includes(q));if(sort=='rating')arr.sort((a,b)=>(+b.rating||0)-(+a.rating||0));if(sort=='clicks')arr.sort((a,b)=>(+a.clicks||0)-(+b.clicks||0));document.getElementById('coffeeList').innerHTML=arr.map(x=>`<div class="list-item"><div class="row"><b>${x.bean||'豆名なし'}</b>${stars(x.rating)}<span class="badge mint">${x.roast||'焙煎未記録'}</span></div><span class="muted">${x.date||''} ${x.shop||''} / ${x.origin||''}</span><p>C2MAX ${x.clicks||'-'}クリック　${x.grams||'-'}g / ${x.water||'-'}ml / ${x.temp||'-'}℃ / ${x.time||'-'}</p><p>酸味${stars(x.acid)} 苦味${stars(x.bitter)} 甘み${stars(x.sweet)}</p><p>${x.memo||''}</p><button class="btn danger" onclick="del('coffee',${x.id})">削除</button></div>`).join('')||'<div class="empty">まだ記録がありません</div>'}
function renderCafe(){let q=(document.getElementById('cafeSearch')?.value||'').toLowerCase();let sort=document.getElementById('cafeSort')?.value||'new';let arr=data.cafes.filter(x=>(x.name+x.address+x.memo+x.hint+x.signature).toLowerCase().includes(q));if(sort=='rating')arr.sort((a,b)=>(+b.rating||0)-(+a.rating||0));if(sort=='again')arr.sort((a,b)=>(+b.again||0)-(+a.again||0));document.getElementById('cafeList').innerHTML=arr.map(x=>`<div class="list-item"><div class="row"><b>${x.name||'店名なし'}</b>${stars(x.rating)}<span class="badge pink">${x.status||'未分類'}</span></div><span class="muted">${x.address||''}</span><p>味${stars(x.taste)} 雰囲気${stars(x.atmos)} 作業${stars(x.work)} また行きたい${stars(x.again)}</p><p><b>看板商品：</b>${x.signature||'-'}　<b>価格帯：</b>${x.range||'-'}　<b>席数：</b>${x.seats||'-'}</p><p>${x.hint||x.memo||''}</p><a class="btn sec" target="_blank" href="${mapUrl(x)}">地図</a><button class="btn danger" onclick="del('cafes',${x.id})">削除</button></div>`).join('')||'<div class="empty">まだ記録がありません</div>'}
function mapUrl(x){return 'https://www.google.com/maps/search/?api=1&query='+encodeURIComponent((x.name||'')+' '+(x.address||''))}
function setMapFilter(f){mapFilter=f;renderMap()}function renderMap(){let arr=mapFilter=='all'?data.cafes:data.cafes.filter(x=>x.status==mapFilter);document.getElementById('mapList').innerHTML=arr.map(x=>`<div class="list-item"><b>${x.name||'店名なし'}</b> ${stars(x.rating)}<br><span class="badge">${x.status||'未分類'}</span><p>${x.address||''}</p><p class="muted">${x.stay||''} / ${x.customers||''}</p><a class="btn" target="_blank" href="${mapUrl(x)}">Googleマップで開く</a></div>`).join('')||'<div class="empty">該当するカフェがありません</div>'}
function renderTerms(){let q=(document.getElementById('termSearch')?.value||'').toLowerCase();document.getElementById('termList').innerHTML=terms.filter(t=>t.join('').toLowerCase().includes(q)).map(t=>`<div class="term"><b>${t[0]}</b> <span class="muted">${t[1]}</span><p>${t[2]}</p><p><b>記録での使い方：</b>${t[3]}</p></div>`).join('')}
function avg(arr,key){let a=arr.map(x=>Number(x[key])).filter(Boolean);return a.length?(a.reduce((p,c)=>p+c,0)/a.length).toFixed(1):'-'}function avgNum(arr,key){let a=arr.map(x=>Number(x[key])).filter(Boolean);return a.length?a.reduce((p,c)=>p+c,0)/a.length:0}
function mode(key){let c={};data.coffee.forEach(x=>c[x[key]]=(c[x[key]]||0)+1);return Object.entries(c).sort((a,b)=>b[1]-a[1])[0]?.[0]||'-'}
function levelInfo(){let total=data.coffee.length+data.cafes.length;let levels=[1,5,10,20,30,50,100];let level=levels.filter(x=>total>=x).pop()||1;let next=levels.find(x=>x>total)||100;let title={1:'豆ひろい',5:'ミル見習い',10:'ドリップ研究員',20:'カフェ探検家',30:'味覚研究員',50:'カフェ設計士',100:'珈琲店主候補'}[level];return{total,level,next,title,rate:Math.min(100,total/next*100)}}
function renderAnalysis(){let info=levelInfo();document.getElementById('sCoffee').textContent=data.coffee.length;document.getElementById('sCafe').textContent=data.cafes.length;document.getElementById('sAvg').textContent=avg([...data.coffee,...data.cafes],'rating');document.getElementById('sLevel').textContent=info.level;document.getElementById('levelBox').innerHTML=`Lv${info.level} ${info.title}<br>記録数 ${info.total}件 / 次の目標 ${info.next}件`;document.getElementById('levelMeter').style.width=info.rate+'%';let badges=[];if(data.coffee.length)badges.push('初ドリップ');if(data.coffee.filter(x=>x.mill?.includes('C2')).length>=10)badges.push('C2MAX使い');if(data.coffee.filter(x=>x.roast=='浅煎り').length>=5)badges.push('浅煎り研究者');if(data.coffee.filter(x=>x.roast=='深煎り').length>=5)badges.push('深煎り党');if(data.cafes.length>=10)badges.push('カフェ巡り');if(data.cafes.length>=20)badges.push('地図職人');if(info.total>=50)badges.push('星評価マスター');if(data.cafes.length>=30)badges.push('開業準備中');document.getElementById('badges').innerHTML=badges.map(b=>`<span class="badge">${b}</span>`).join('')||'<span class="muted">まだバッジなし</span>';document.getElementById('tasteBox').innerHTML=[['酸味','acid'],['苦味','bitter'],['甘み','sweet'],['香り','aroma'],['コク','body']].map(x=>`<div class="taste">${x[0]}<b>${avg(data.coffee,x[1])}</b><div class="meter"><span style="width:${avgNum(data.coffee,x[1])/5*100}%"></span></div></div>`).join('');let best=data.cafes.slice().sort((a,b)=>(+b.rating||0)-(+a.rating||0))[0];document.getElementById('analysisBox').innerHTML=`<p>一番多い焙煎度：<b>${mode('roast')}</b></p><p>一番評価が高いカフェ：<b>${best?.name||'-'}</b></p><p>お気に入りカフェ数：<b>${data.cafes.filter(x=>x.status=='お気に入り').length}</b></p><p>作業向きカフェ平均：<b>${avg(data.cafes,'work')}</b></p><p>開業ヒント記録数：<b>${data.cafes.filter(x=>x.hint).length}</b></p>`;document.getElementById('recentList').innerHTML=[...data.coffee.map(x=>({t:'コーヒー',name:x.bean||x.shop||'記録',id:x.id})),...data.cafes.map(x=>({t:'カフェ',name:x.name||'記録',id:x.id}))].sort((a,b)=>b.id-a.id).slice(0,5).map(x=>`<div class="list-item"><span class="badge mint">${x.t}</span> ${x.name}</div>`).join('')||'<div class="empty">まだ記録がありません</div>';document.getElementById('missionText').textContent=missions[data.mission||0]}
function newMission(){data.mission=((data.mission||0)+1)%missions.length;save()}
function exportData(){let blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});let a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='coffee-lab-map.json';a.click()}
function importData(e){let f=e.target.files[0];if(!f)return;let r=new FileReader();r.onload=()=>{try{data=JSON.parse(r.result);if(!data.coffee)data.coffee=[];if(!data.cafes)data.cafes=[];save();toast('インポートしました')}catch{alert('読み込みに失敗しました')}};r.readAsText(f)}
function renderAll(){renderCoffee();renderCafe();renderMap();renderTerms();renderAnalysis()}
makeForm('coffeeForm',coffeeFields);makeForm('cafeForm',cafeFields);showSec('home');renderAll();
</script>
