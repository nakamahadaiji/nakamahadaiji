<!DOCTYPE html>
<html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>ぽちっとダイエットログ</title><style>body{margin:0;font-family:system-ui,-apple-system,"Hiragino Sans","Yu Gothic",sans-serif;background:linear-gradient(135deg,#fff7a8,#ffd3ec,#dff7ff,#e7ffe9);color:#3a2d38;padding:14px}.app{max-width:1080px;margin:auto}.hero,.panel{border:5px solid #fff;border-radius:34px;background:rgba(255,255,255,.84);box-shadow:0 18px 42px rgba(255,79,163,.24);padding:18px}.badge{display:inline-block;background:#ffe65a;border-radius:999px;padding:8px 14px;font-weight:900}h1{font-size:clamp(34px,8vw,64px);line-height:.95;margin:14px 0 8px}.sub{font-weight:800;color:#675b66}.goals{display:grid;grid-template-columns:repeat(3,1fr);gap:13px;margin-top:16px}.goal{border:4px solid #fff;border-radius:28px;padding:14px;background:#fff}.goal:nth-child(1){background:#fff0f8}.goal:nth-child(2){background:#ecf9ff}.goal:nth-child(3){background:#effff6}.goal-title{font-weight:900;margin-bottom:8px}input,textarea{width:100%;box-sizing:border-box;border:2px solid rgba(58,45,56,.1);border-radius:18px;padding:11px;font:inherit;font-weight:900;background:#fff}input{text-align:center;font-size:20px}textarea{min-height:70px;margin-top:8px}.grid{display:grid;grid-template-columns:1fr 355px;gap:16px;margin-top:16px}.month{display:flex;align-items:center;gap:10px;margin-bottom:12px}.month-title{flex:1;text-align:center;font-size:26px;font-weight:900}button{border:0;border-radius:999px;padding:12px 16px;background:#ff4fa3;color:#fff;font-weight:900;box-shadow:0 7px 0 #d83d84}.mini{background:#4fc7ff;box-shadow:0 7px 0 #2ea7df}.week,.cal,.bonus-row{display:grid;grid-template-columns:repeat(7,1fr);gap:7px}.week div{text-align:center;font-size:12px;font-weight:900;background:#fff;border-radius:999px;padding:7px}.day{aspect-ratio:1/1;min-height:58px;border:4px solid #fff;border-radius:21px;background:#fff;color:#3a2d38;box-shadow:0 7px 12px rgba(0,0,0,.07);font-weight:900;display:flex;flex-direction:column;align-items:center;justify-content:center}.day.empty{background:transparent;border:0;box-shadow:none}.day.done{background:linear-gradient(145deg,#ffe95f,#ff78bb,#b98cff);color:#fff}.day.today{outline:4px solid rgba(79,199,255,.9)}.stamp{font-size:25px}.bonus{margin-top:15px;border:4px dashed #ff9bd2;border-radius:28px;background:rgba(255,255,255,.82);padding:14px}.bonus-head{display:flex;justify-content:space-between;font-weight:900;margin-bottom:10px}.chip{background:#fff0f8;color:#ff4fa3;border-radius:999px;padding:7px 11px;font-size:12px}.bonus-item{aspect-ratio:1/1;border-radius:18px;background:#f1eef1;display:grid;place-items:center;font-weight:900}.bonus-item.on{background:linear-gradient(145deg,#ffe65a,#ffb13b);color:#fff}.msg,.card{background:#fff;border-radius:22px;padding:12px;margin-top:10px;font-size:13px;font-weight:800;line-height:1.6}.count{text-align:center;background:#fff;border-radius:28px;padding:17px}.num{font-size:60px;color:#ff4fa3;font-weight:1000;line-height:.95}.ticket{background:linear-gradient(145deg,#fff7bf,#fff);border:4px solid #fff;border-radius:30px;padding:15px;margin-top:12px}.ticket-num{font-size:48px;color:#ff9d00;font-weight:1000}.ticket-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px}.use{background:#b98cff;box-shadow:0 7px 0 #8b63c8}.add{background:#79df6b;box-shadow:0 7px 0 #51b944}.bar{height:23px;border-radius:999px;background:#ece7ec;overflow:hidden}.fill{height:100%;width:0;background:linear-gradient(90deg,#ff4fa3,#4fc7ff,#63e7c2)}.actions{display:grid;gap:10px;margin-top:13px}.dark{background:#4a3f4a;box-shadow:0 7px 0 #272027}.gray{background:#aaa1aa;box-shadow:0 7px 0 #766e76}.modal{position:fixed;inset:0;display:none;place-items:center;background:rgba(58,45,56,.36);padding:20px}.modal-box{max-width:430px;background:#fff;border:5px solid #fff;border-radius:34px;padding:22px;text-align:center;box-shadow:0 24px 60px rgba(0,0,0,.24)}@media(max-width:880px){.goals,.grid{grid-template-columns:1fr}.day{min-height:47px;border-radius:15px}}</style></head><body><div class="app"><section class="hero"><span class="badge">ログインボーナス型</span><h1>ぽちっと<br>ダイエットログ</h1><p class="sub">体重は書かない。目標・ご褒美・達成スタンプだけ。7日続くたびにチケットが貯まります。</p><div class="goals"><div class="goal"><div class="goal-title">短期目標</div><input id="shortGoal" type="number" value="5"><textarea id="shortReward" placeholder="例：好きなカフェに行く"></textarea></div><div class="goal"><div class="goal-title">中期目標</div><input id="middleGoal" type="number" value="10"><textarea id="middleReward" placeholder="例：新しい服を買う"></textarea></div><div class="goal"><div class="goal-title">長期目標</div><input id="longGoal" type="number" value="15"><textarea id="longReward" placeholder="例：旅行・ご褒美アイテム"></textarea></div></div></section><div class="grid"><section class="panel"><div class="month"><button class="mini" id="prevBtn">←</button><div class="month-title" id="monthTitle"></div><button class="mini" id="nextBtn">→</button></div><div class="week"><div>日</div><div>月</div><div>火</div><div>水</div><div>木</div><div>金</div><div>土</div></div><div class="cal" id="calendar"></div><div class="bonus"><div class="bonus-head"><div>7日チャレンジボーナス</div><div class="chip" id="bonusChip">あと7日</div></div><div class="bonus-row" id="bonusRow"></div><div class="msg" id="bonusMessage">7日達成ごとに、ご褒美チケットが1枚増えます。</div></div></section><aside class="panel"><h2>今月の進み具合</h2><div class="count"><div class="num" id="doneCount">0</div><div>日 達成</div></div><div class="ticket"><div>貯まったご褒美チケット</div><div class="ticket-num"><span id="bankTicketCount">0</span>枚</div><div class="ticket-actions"><button class="use" id="useTicketBtn">1枚使う</button><button class="add" id="addTicketBtn">手動で+1</button></div></div><div class="card"><div>今月の達成率 <span id="rateText">0%</span></div><div class="bar"><div class="fill" id="barFill"></div></div></div><div class="actions"><button id="todayBtn">今日を達成にする</button><button class="dark" id="saveBtn">目標とご褒美を保存</button><button class="gray" id="resetMonthBtn">今月の記録をリセット</button></div><div class="card"><b>目標ごとのご褒美</b><div id="rewardPreview"></div></div><div class="card"><b>チケットの使い道</b><br>好きな飲み物／入浴剤／30分自由時間／小さなお菓子／ゲーム時間。</div></aside></div></div><div class="modal" id="modal"><div class="modal-box"><div style="font-size:56px">🎁</div><h2 id="modalTitle">達成</h2><p id="modalText"></p><button id="closeModal">OK</button></div></div><script>const KEY='dietAppPublicV1';const stamps=['★','◎','✓','◆','●','♥','♪'];let st={y:new Date().getFullYear(),m:new Date().getMonth(),goals:{s:'5',mi:'10',l:'15'},rewards:{s:'',mi:'',l:''},done:{},tickets:0,awarded:{}};const $=id=>document.getElementById(id);function load(){try{const x=localStorage.getItem(KEY);if(x)st=Object.assign(st,JSON.parse(x))}catch(e){}$('shortGoal').value=st.goals.s||'5';$('middleGoal').value=st.goals.mi||'10';$('longGoal').value=st.goals.l||'15';$('shortReward').value=st.rewards.s||'';$('middleReward').value=st.rewards.mi||'';$('longReward').value=st.rewards.l||''}function save(){localStorage.setItem(KEY,JSON.stringify(st))}function pad(n){return String(n).padStart(2,'0')}function dkey(y,m,d){return y+'-'+pad(m+1)+'-'+pad(d)}function mkey(){return st.y+'-'+pad(st.m+1)}function dim(y,m){return new Date(y,m+1,0).getDate()}function count(){return Object.keys(st.done).filter(k=>k.startsWith(mkey())).length}function render(){renderCal();renderStatus();renderRewards();save()}function renderCal(){const cal=$('calendar');cal.innerHTML='';$('monthTitle').textContent=st.y+'年 '+(st.m+1)+'月';const first=new Date(st.y,st.m,1).getDay(),total=dim(st.y,st.m),today=new Date();for(let i=0;i<first;i++){const e=document.createElement('div');e.className='day empty';cal.appendChild(e)}for(let d=1;d<=total;d++){const k=dkey(st.y,st.m,d),b=document.createElement('button');b.className='day'+(st.done[k]?' done':'')+(today.getFullYear()==st.y&&today.getMonth()==st.m&&today.getDate()==d?' today':'');b.innerHTML='<div>'+d+'</div><div class="stamp">'+(st.done[k]?stamps[(d-1)%stamps.length]:'')+'</div>';b.onclick=()=>toggle(k);cal.appendChild(b)}}function renderStatus(){const c=count(),total=dim(st.y,st.m),rate=Math.round(c/total*100),stage=Math.floor(c/7),prog=c%7===0&&c>0?7:c%7,remain=prog===7?7:7-prog;$('doneCount').textContent=c;$('rateText').textContent=rate+'%';$('barFill').style.width=rate+'%';$('bankTicketCount').textContent=st.tickets;$('bonusChip').textContent=prog===7?'ボーナス'+stage+'回':'あと'+remain+'日';$('bonusMessage').textContent=stage>0?'今月は7日ボーナスを'+stage+'回達成。チケットは右側に貯まります。':'7日達成ごとに、ご褒美チケットが1枚増えます。';$('bonusRow').innerHTML='';for(let i=1;i<=7;i++){const it=document.createElement('div');it.className='bonus-item'+(i<=prog?' on':'');it.textContent=i<=prog?'★':i;$('bonusRow').appendChild(it)}}function esc(s){return String(s).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;')}function renderRewards(){const rows=[['短期',st.goals.s,st.rewards.s],['中期',st.goals.mi,st.rewards.mi],['長期',st.goals.l,st.rewards.l]];$('rewardPreview').innerHTML=rows.map(r=>'<div class="msg">'+r[0]+'：<b>−'+(r[1]||'未設定')+'kg</b><br>'+esc(r[2]||'ご褒美未設定')+'</div>').join('')}function award(){const stage=Math.floor(count()/7),k=mkey()+'-'+stage;if(stage>0&&!st.awarded[k]){st.awarded[k]=true;st.tickets++;show('7日ボーナス達成','ご褒美チケットを1枚ゲットしました。現在'+st.tickets+'枚です。')}}function toggle(k){if(st.done[k])delete st.done[k];else st.done[k]=true;render();award();render()}function markToday(){const t=new Date();st.y=t.getFullYear();st.m=t.getMonth();st.done[dkey(st.y,st.m,t.getDate())]=true;render();award();render()}function saveGoals(){st.goals={s:$('shortGoal').value||'5',mi:$('middleGoal').value||'10',l:$('longGoal').value||'15'};st.rewards={s:$('shortReward').value,mi:$('middleReward').value,l:$('longReward').value};render()}function resetMonth(){if(!confirm('今月の記録だけリセットしますか？\n※貯めたチケットは消えません。'))return;const p=mkey();Object.keys(st.done).forEach(k=>{if(k.startsWith(p))delete st.done[k]});Object.keys(st.awarded).forEach(k=>{if(k.startsWith(p))delete st.awarded[k]});render()}function show(t,x){$('modalTitle').textContent=t;$('modalText').textContent=x;$('modal').style.display='grid'}$('prevBtn').onclick=()=>{st.m--;if(st.m<0){st.m=11;st.y--}render()};$('nextBtn').onclick=()=>{st.m++;if(st.m>11){st.m=0;st.y++}render()};$('todayBtn').onclick=markToday;$('saveBtn').onclick=saveGoals;$('resetMonthBtn').onclick=resetMonth;$('useTicketBtn').onclick=()=>{if(st.tickets<=0){show('チケットなし','7日続けると1枚貯まります。');return}if(confirm('ご褒美チケットを1枚使いますか？')){st.tickets--;show('チケットを使いました','残りは'+st.tickets+'枚です。');render()}};$('addTicketBtn').onclick=()=>{st.tickets++;show('チケット追加','現在'+st.tickets+'枚です。');render()};$('closeModal').onclick=()=>$('modal').style.display='none';['shortGoal','middleGoal','longGoal','shortReward','middleReward','longReward'].forEach(id=>$(id).onchange=saveGoals);load();render();</script></body></html>
