<!DOCTYPE html>
<html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>ぽちっとダイエットログ</title><style>*{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,"Hiragino Sans","Yu Gothic",sans-serif;background:radial-gradient(circle at 8% 6%,#fff 0 9px,transparent 10px),radial-gradient(circle at 90% 18%,#fff 0 11px,transparent 12px),linear-gradient(135deg,#fff6a6,#ffd0eb 45%,#d9f6ff);color:#3a2d38;padding:10px}.app{width:100%;max-width:430px;margin:0 auto}.hero,.panel{border:4px solid #fff;border-radius:28px;background:rgba(255,255,255,.88);box-shadow:0 12px 28px rgba(255,79,163,.22);padding:14px}.badge,.sync{display:inline-block;border-radius:999px;padding:7px 11px;font-size:12px;font-weight:1000}.badge{background:#ffe65a;color:#6b4d00}.sync{float:right;background:#fff0f8;color:#ff4fa3}h1{font-size:38px;line-height:.98;margin:12px 0 0;font-weight:1000;letter-spacing:.03em}.goals{display:grid;gap:10px;margin-top:14px}.goal{border:3px solid #fff;border-radius:24px;padding:12px;background:#fff;box-shadow:0 6px 14px rgba(0,0,0,.06)}.goal:nth-child(1){background:#fff0f8}.goal:nth-child(2){background:#ecf9ff}.goal:nth-child(3){background:#effff6}.goal-title{font-size:15px;font-weight:1000;margin-bottom:7px}input,textarea{width:100%;border:2px solid rgba(58,45,56,.09);border-radius:16px;padding:10px;font:inherit;font-weight:900;background:#fff}input{text-align:center;font-size:22px}textarea{min-height:58px;margin-top:7px;font-size:14px;line-height:1.45}.grid{display:grid;gap:12px;margin-top:12px}.month{display:flex;align-items:center;gap:8px;margin-bottom:10px}.month-title{flex:1;text-align:center;font-size:21px;font-weight:1000}button{border:0;border-radius:999px;padding:12px 14px;background:#ff4fa3;color:#fff;font-size:15px;font-weight:1000;box-shadow:0 5px 0 #d83d84}.mini{min-width:44px;background:#4fc7ff;box-shadow:0 5px 0 #2ea7df}.week,.cal,.bonus-row{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}.week div{text-align:center;font-size:11px;font-weight:1000;background:#fff;border-radius:999px;padding:6px 0}.day{aspect-ratio:1/1;min-height:45px;border:3px solid #fff;border-radius:15px;background:#fff;color:#3a2d38;box-shadow:0 5px 9px rgba(0,0,0,.07);font-size:14px;font-weight:1000;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0}.day.empty{background:transparent;border:0;box-shadow:none}.day.done{background:linear-gradient(145deg,#ffe95f,#ff78bb,#b98cff);color:#fff;text-shadow:0 1px rgba(0,0,0,.15)}.day.today{outline:3px solid rgba(79,199,255,.95);outline-offset:1px}.stamp{font-size:18px;line-height:1}.memo-dot{font-size:9px;line-height:1;margin-top:1px}.bonus{margin-top:12px;border:3px dashed #ff9bd2;border-radius:24px;background:rgba(255,255,255,.85);padding:11px}.bonus-head{display:flex;justify-content:space-between;align-items:center;font-weight:1000;font-size:14px;margin-bottom:9px}.chip{background:#fff0f8;color:#ff4fa3;border-radius:999px;padding:6px 9px;font-size:11px;white-space:nowrap}.bonus-item{aspect-ratio:1/1;border-radius:13px;background:#f1eef1;display:grid;place-items:center;font-size:13px;font-weight:1000}.bonus-item.on{background:linear-gradient(145deg,#ffe65a,#ffb13b);color:#fff}.msg,.card{background:#fff;border-radius:18px;padding:10px;margin-top:9px;font-size:14px;font-weight:850;line-height:1.55}.panel h2{font-size:20px;margin:0 0 10px;font-weight:1000}.count{text-align:center;background:#fff;border-radius:24px;padding:13px}.num{font-size:54px;color:#ff4fa3;font-weight:1000;line-height:.95}.small{font-size:13px;font-weight:1000;color:#6b626b}.start-card{background:linear-gradient(145deg,#fff0f8,#fff);border:3px solid #fff;border-radius:22px;padding:12px;margin-top:10px;text-align:center}.start-num{font-size:42px;color:#b98cff;font-weight:1000;line-height:1}.ticket{background:linear-gradient(145deg,#fff7bf,#fff);border:4px solid #fff;border-radius:26px;padding:13px;margin-top:11px;box-shadow:0 7px 14px rgba(0,0,0,.07)}.ticket-title{font-size:14px;font-weight:1000;color:#6b4d00}.ticket-note{margin-top:6px;background:#fff0f8;color:#ff4fa3;border-radius:16px;padding:9px;font-size:14px;font-weight:1000;text-align:center}.ticket-num{font-size:46px;color:#ff9d00;font-weight:1000;line-height:1;margin-top:4px}.use{width:100%;margin-top:10px;background:#b98cff;box-shadow:0 5px 0 #8b63c8}.bar{height:22px;border-radius:999px;background:#ece7ec;overflow:hidden;margin-top:7px}.fill{height:100%;width:0;background:linear-gradient(90deg,#ff4fa3,#4fc7ff,#63e7c2)}.actions{display:grid;gap:9px;margin-top:11px}.dark{background:#4a3f4a;box-shadow:0 5px 0 #272027}.gray{background:#aaa1aa;box-shadow:0 5px 0 #766e76}.modal{position:fixed;inset:0;display:none;place-items:center;background:rgba(58,45,56,.36);padding:18px;z-index:5}.modal-box{width:min(360px,100%);background:#fff;border:5px solid #fff;border-radius:30px;padding:20px;text-align:center;box-shadow:0 24px 60px rgba(0,0,0,.24)}.modal-box h2{font-size:24px;margin:8px 0}.modal-box p{font-size:15px;line-height:1.6;font-weight:850}.note-text{min-height:140px;text-align:left;font-size:15px}.note-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}.note-save{grid-column:1/3}@media(max-width:380px){body{padding:8px}h1{font-size:34px}.day{min-height:40px;border-radius:13px;font-size:13px}.stamp{font-size:16px}button{font-size:14px;padding:11px 12px}}</style></head><body><div class="app"><section class="hero"><span class="badge">ログインボーナス型</span><span class="sync" id="syncStatus">未共有</span><h1>ぽちっと<br>ダイエットログ</h1><div class="goals"><div class="goal"><div class="goal-title">短期目標 −5kg</div><input id="shortGoal" type="number" value="5"><textarea id="shortReward" placeholder="短期のご褒美"></textarea></div><div class="goal"><div class="goal-title">中期目標 −10kg</div><input id="middleGoal" type="number" value="10"><textarea id="middleReward" placeholder="中期のご褒美"></textarea></div><div class="goal"><div class="goal-title">長期目標 −15kg</div><input id="longGoal" type="number" value="15"><textarea id="longReward" placeholder="長期のご褒美"></textarea></div></div></section><div class="grid"><section class="panel"><div class="month"><button class="mini" id="prevBtn">←</button><div class="month-title" id="monthTitle"></div><button class="mini" id="nextBtn">→</button></div><div class="week"><div>日</div><div>月</div><div>火</div><div>水</div><div>木</div><div>金</div><div>土</div></div><div class="cal" id="calendar"></div><div class="bonus"><div class="bonus-head"><div>7日ボーナス</div><div class="chip" id="bonusChip">あと7日</div></div><div class="bonus-row" id="bonusRow"></div><div class="msg" id="bonusMessage">7日達成ごとに、ご褒美チケットが1枚増えます。</div></div></section><aside class="panel"><h2>今月の進み具合</h2><div class="count"><div class="num" id="doneCount">0</div><div class="small">日 達成</div></div><div class="start-card"><div class="small">ダイエット開始から</div><div class="start-num"><span id="dietDayCount">-</span>日目</div><div class="small" id="dietStartText">最初の記録から数えます</div></div><div class="ticket"><div class="ticket-title">貯まったご褒美チケット</div><div class="ticket-num"><span id="bankTicketCount">0</span>枚</div><div class="ticket-note">使うときは<br>利空にお願いしてね</div><button class="use" id="useTicketBtn">1枚使う</button></div><div class="card"><div><b>今月の達成率</b> <span id="rateText">0%</span></div><div class="bar"><div class="fill" id="barFill"></div></div></div><div class="actions"><button id="todayBtn">今日を記録する</button><button class="dark" id="saveBtn">目標とご褒美を保存</button><button class="gray" id="resetMonthBtn">今月の記録をリセット</button><button class="gray" id="changeCodeBtn">共有コード変更</button></div><div class="card"><b>目標ごとのご褒美</b><div id="rewardPreview"></div></div><div class="card"><b>チケットの使い道</b><br>好きな飲み物／入浴剤／30分自由時間／小さなお菓子／ゲーム時間。</div></aside></div></div><div class="modal" id="modal"><div class="modal-box"><div style="font-size:52px">🎁</div><h2 id="modalTitle">達成</h2><p id="modalText"></p><button id="closeModal">OK</button></div></div><div class="modal" id="noteModal"><div class="modal-box"><h2 id="noteTitle">今日の記録</h2><textarea class="note-text" id="noteText" placeholder="例：10分歩いた、夜ごはん少なめ、ジュースを飲まなかった"></textarea><div class="note-actions"><button class="gray" id="deleteNoteBtn">削除</button><button class="dark" id="closeNoteBtn">閉じる</button><button class="note-save" id="saveNoteBtn">保存して達成</button></div></div></div><div class="modal" id="codeModal"><div class="modal-box"><h2>共有コード</h2><p>同じコードを入れた端末だけで記録を共有します。</p><input id="shareCodeInput" placeholder="例：RIKU-DIET"><button id="saveCodeBtn" style="margin-top:10px;width:100%">このコードで始める</button></div></div><script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script><script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script><script>const firebaseConfig={apiKey:"AIzaSyBXRVlcx-eZKrF6NpboKl8Z87w2sIkrOq4",authDomain:"kakuduke-fe62d.firebaseapp.com",databaseURL:"https://kakuduke-fe62d-default-rtdb.firebaseio.com",projectId:"kakuduke-fe62d",storageBucket:"kakuduke-fe62d.firebasestorage.app",messagingSenderId:"224688087057",appId:"1:224688087057:web:08a199a08bc91218e9d1b0",measurementId:"G-5XY6KLHSJ9"};firebase.initializeApp(firebaseConfig);const db=firebase.database();const oldKeys=['dietAppPublicV4','dietAppPublicV3','dietAppPublicV2','dietAppPublicV1'];const stamps=['★','◎','✓','◆','●','♥','♪'];let st={y:new Date().getFullYear(),m:new Date().getMonth(),goals:{s:'5',mi:'10',l:'15'},rewards:{s:'',mi:'',l:''},done:{},notes:{},tickets:0,awarded:{}};let ref=null,ready=false,currentNoteKey='',shareCode=localStorage.getItem('dietShareCode')||'';const $=id=>document.getElementById(id);function cleanCode(v){return String(v||'').trim().replace(/[^a-zA-Z0-9_-]/g,'').slice(0,30)}function merge(a,b){return Object.assign({},a,b,{goals:Object.assign({s:'5',mi:'10',l:'15'},a.goals||{},b.goals||{}),rewards:Object.assign({s:'',mi:'',l:''},a.rewards||{},b.rewards||{}),done:Object.assign({},a.done||{},b.done||{}),notes:Object.assign({},a.notes||{},b.notes||{}),awarded:Object.assign({},a.awarded||{},b.awarded||{}),tickets:Math.max(Number(a.tickets||0),Number(b.tickets||0))})}function localKey(){return 'dietShared_'+shareCode}function loadLocal(){let x=localStorage.getItem(localKey());if(!x){for(const k of oldKeys){x=localStorage.getItem(k);if(x)break}}try{if(x)st=merge(st,JSON.parse(x))}catch(e){}st.done=st.done||{};st.notes=st.notes||{};st.awarded=st.awarded||{};fill()}function fill(){$('shortGoal').value=st.goals.s||'5';$('middleGoal').value=st.goals.mi||'10';$('longGoal').value=st.goals.l||'15';$('shortReward').value=st.rewards.s||'';$('middleReward').value=st.rewards.mi||'';$('longReward').value=st.rewards.l||''}function connect(){if(!shareCode){$('codeModal').style.display='grid';return}localStorage.setItem('dietShareCode',shareCode);$('syncStatus').textContent='共有:'+shareCode;loadLocal();render(false);ref=db.ref('dietLoginBonus/'+shareCode);ref.once('value').then(s=>{if(s.val()){st=merge(st,s.val());fill();render(false)}else{saveCloud()}ready=true;ref.on('value',snap=>{const v=snap.val();if(v){st=merge(st,v);fill();render(false);localStorage.setItem(localKey(),JSON.stringify(st))}})}).catch(()=>{$('syncStatus').textContent='共有エラー'})}function saveCloud(){localStorage.setItem(localKey(),JSON.stringify(st));if(ready&&ref)ref.set(st)}function pad(n){return String(n).padStart(2,'0')}function dkey(y,m,d){return y+'-'+pad(m+1)+'-'+pad(d)}function mkey(){return st.y+'-'+pad(st.m+1)}function dim(y,m){return new Date(y,m+1,0).getDate()}function count(){return Object.keys(st.done).filter(k=>k.startsWith(mkey())).length}function firstKey(){const a=Object.keys(st.done||{}).sort();return a[0]||''}function dateObj(k){const a=k.split('-').map(Number);return new Date(a[0],a[1]-1,a[2])}function todayKey(){const t=new Date();return dkey(t.getFullYear(),t.getMonth(),t.getDate())}function render(save=true){renderCal();renderStatus();renderRewards();if(save)saveCloud()}function renderCal(){const cal=$('calendar');cal.innerHTML='';$('monthTitle').textContent=st.y+'年 '+(st.m+1)+'月';const first=new Date(st.y,st.m,1).getDay(),total=dim(st.y,st.m),t=new Date();for(let i=0;i<first;i++){const e=document.createElement('div');e.className='day empty';cal.appendChild(e)}for(let d=1;d<=total;d++){const k=dkey(st.y,st.m,d),b=document.createElement('button');b.className='day'+(st.done[k]?' done':'')+(t.getFullYear()==st.y&&t.getMonth()==st.m&&t.getDate()==d?' today':'');b.innerHTML='<div>'+d+'</div><div class="stamp">'+(st.done[k]?stamps[(d-1)%7]:'')+'</div><div class="memo-dot">'+(st.notes[k]?'●':'')+'</div>';b.onclick=()=>openNote(k,d);cal.appendChild(b)}}function renderStatus(){const c=count(),total=dim(st.y,st.m),rate=Math.round(c/total*100),stage=Math.floor(c/7),prog=c%7===0&&c>0?7:c%7,remain=prog===7?7:7-prog;$('doneCount').textContent=c;$('rateText').textContent=rate+'%';$('barFill').style.width=rate+'%';$('bankTicketCount').textContent=st.tickets;const fk=firstKey();if(fk){$('dietDayCount').textContent=Math.floor((dateObj(todayKey())-dateObj(fk))/86400000)+1;$('dietStartText').textContent=fk.replaceAll('-','/')+' 開始'}else{$('dietDayCount').textContent='-';$('dietStartText').textContent='最初の記録から数えます'}$('bonusChip').textContent=prog===7?'ボーナス'+stage+'回':'あと'+remain+'日';$('bonusMessage').textContent=stage>0?'今月は7日ボーナスを'+stage+'回達成。チケットが貯まっています。':'7日達成ごとに、ご褒美チケットが1枚増えます。';$('bonusRow').innerHTML='';for(let i=1;i<=7;i++){const x=document.createElement('div');x.className='bonus-item'+(i<=prog?' on':'');x.textContent=i<=prog?'★':i;$('bonusRow').appendChild(x)}}function esc(s){return String(s||'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;')}function renderRewards(){const r=[['短期',st.goals.s,st.rewards.s],['中期',st.goals.mi,st.rewards.mi],['長期',st.goals.l,st.rewards.l]];$('rewardPreview').innerHTML=r.map(x=>'<div class="msg">'+x[0]+'：<b>−'+(x[1]||'未設定')+'kg</b><br>'+esc(x[2]||'ご褒美未設定')+'</div>').join('')}function award(){const stage=Math.floor(count()/7),k=mkey()+'-'+stage;if(stage>0&&!st.awarded[k]){st.awarded[k]=true;st.tickets++;show('7日ボーナス達成','ご褒美チケットを1枚ゲットしました。使うときは利空にお願いしてね。現在'+st.tickets+'枚です。')}}function openNote(k,d){currentNoteKey=k;$('noteTitle').textContent=(st.m+1)+'月'+d+'日の記録';$('noteText').value=st.notes[k]||'';$('noteModal').style.display='grid'}function saveNote(){const txt=$('noteText').value.trim();if(txt)st.notes[currentNoteKey]=txt;else delete st.notes[currentNoteKey];st.done[currentNoteKey]=true;$('noteModal').style.display='none';award();render()}function deleteNote(){delete st.notes[currentNoteKey];delete st.done[currentNoteKey];$('noteModal').style.display='none';render()}function saveGoals(){st.goals={s:$('shortGoal').value||'5',mi:$('middleGoal').value||'10',l:$('longGoal').value||'15'};st.rewards={s:$('shortReward').value,mi:$('middleReward').value,l:$('longReward').value};render()}function resetMonth(){if(!confirm('今月の記録だけリセットしますか？\n※貯めたチケットは消えません。'))return;const p=mkey();for(const k of Object.keys(st.done))if(k.startsWith(p))delete st.done[k];for(const k of Object.keys(st.notes))if(k.startsWith(p))delete st.notes[k];for(const k of Object.keys(st.awarded))if(k.startsWith(p))delete st.awarded[k];render()}function show(t,x){$('modalTitle').textContent=t;$('modalText').textContent=x;$('modal').style.display='grid'}$('prevBtn').onclick=()=>{st.m--;if(st.m<0){st.m=11;st.y--}render()};$('nextBtn').onclick=()=>{st.m++;if(st.m>11){st.m=0;st.y++}render()};$('todayBtn').onclick=()=>{const t=new Date();st.y=t.getFullYear();st.m=t.getMonth();openNote(dkey(st.y,st.m,t.getDate()),t.getDate());render(false)};$('saveBtn').onclick=saveGoals;$('resetMonthBtn').onclick=resetMonth;$('saveNoteBtn').onclick=saveNote;$('deleteNoteBtn').onclick=deleteNote;$('closeNoteBtn').onclick=()=>$('noteModal').style.display='none';$('useTicketBtn').onclick=()=>{if(st.tickets<=0){show('チケットなし','7日続けると1枚貯まります。使うときは利空にお願いしてね。');return}if(confirm('ご褒美チケットを1枚使いますか？')){st.tickets--;show('チケットを使いました','残りは'+st.tickets+'枚です。利空にお願いしてね。');render()}};$('closeModal').onclick=()=>$('modal').style.display='none';$('saveCodeBtn').onclick=()=>{const c=cleanCode($('shareCodeInput').value);if(!c){alert('共有コードを入力してください');return}shareCode=c;$('codeModal').style.display='none';connect()};$('changeCodeBtn').onclick=()=>{$('shareCodeInput').value=shareCode;$('codeModal').style.display='grid'};['shortGoal','middleGoal','longGoal','shortReward','middleReward','longReward'].forEach(id=>$(id).onchange=saveGoals);connect();</script></body></html>
