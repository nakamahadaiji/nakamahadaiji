<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>評価される目標作成アプリ</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --card: #ffffff;
      --line: #d9deea;
      --text: #1f2937;
      --sub: #6b7280;
      --accent: #2563eb;
      --accent-soft: #dbeafe;
      --good: #065f46;
      --good-bg: #d1fae5;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Meiryo", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }

    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px;
    }

    .hero {
      margin-bottom: 20px;
    }

    h1 {
      font-size: 30px;
      margin: 0 0 8px;
    }

    .lead {
      margin: 0;
      color: var(--sub);
    }

    .grid {
      display: grid;
      grid-template-columns: 420px 1fr;
      gap: 20px;
      align-items: start;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 6px 18px rgba(15, 23, 42, 0.04);
    }

    .card h2 {
      margin: 0 0 14px;
      font-size: 20px;
    }

    .field {
      margin-bottom: 14px;
    }

    .field label {
      display: block;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .hint {
      font-size: 13px;
      color: var(--sub);
      margin-top: 4px;
    }

    select, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 15px;
      background: #fff;
      color: var(--text);
    }

    textarea {
      min-height: 84px;
      resize: vertical;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 8px;
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }

    .primary {
      background: var(--accent);
      color: #fff;
    }

    .secondary {
      background: #eef2ff;
      color: #3730a3;
    }

    .ghost {
      background: #f3f4f6;
      color: #374151;
    }

    .badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      background: var(--accent-soft);
      color: var(--accent);
      margin-bottom: 10px;
    }

    .output-block {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 14px;
      background: #fcfdff;
    }

    .output-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--sub);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .output-text {
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 15px;
    }

    .score-box {
      padding: 12px 14px;
      border-radius: 14px;
      background: var(--good-bg);
      color: var(--good);
      font-weight: 700;
      margin-bottom: 14px;
    }

    .mini {
      font-size: 13px;
      color: var(--sub);
    }

    @media (max-width: 920px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <h1>評価される目標作成アプリ</h1>
      <p class="lead">担当業務を選ぶと、目標文・数字目標・結果欄テンプレを1件ずつ自動生成します。</p>
    </div>

    <div class="grid">
      <section class="card">
        <h2>入力</h2>

        <div class="field">
          <label for="policy">今年度の上位方針</label>
          <select id="policy"></select>
        </div>

        <div class="field">
          <label for="role">自分の立場</label>
          <select id="role"></select>
        </div>

        <div class="field">
          <label for="task">担当業務</label>
          <select id="task"></select>
          <div class="hint">立場に応じて候補が変わります。</div>
        </div>

        <div class="row">
          <div class="field">
            <label for="focus">強調したいこと</label>
            <select id="focus"></select>
          </div>
          <div class="field">
            <label for="level">数字の厳しさ</label>
            <select id="level">
              <option value="standard">標準</option>
              <option value="safe">やや安全</option>
              <option value="challenge">やや挑戦</option>
            </select>
          </div>
        </div>

        <div class="field">
          <label for="memo">補足したいこと</label>
          <textarea id="memo" placeholder="例：未提出者対応を早めたい／保護者との連携を強めたい／属人化を減らしたい"></textarea>
          <div class="hint">空欄でも生成できます。</div>
        </div>

        <div class="buttons">
          <button class="primary" id="generateBtn">生成する</button>
          <button class="secondary" id="sampleBtn">サンプルを入れる</button>
          <button class="ghost" id="resetBtn">リセット</button>
        </div>
      </section>

      <section class="card">
        <div class="badge">出力</div>
        <h2>目標文・数字・結果欄テンプレ</h2>
        <div id="scoreBox" class="score-box">評価されやすさ：まずは入力して生成してください</div>

        <div class="output-block">
          <div class="output-title">目標タイトル</div>
          <div id="titleOut" class="output-text">-</div>
        </div>

        <div class="output-block">
          <div class="output-title">目標文</div>
          <div id="goalOut" class="output-text">-</div>
        </div>

        <div class="output-block">
          <div class="output-title">数字目標</div>
          <div id="metricOut" class="output-text">-</div>
        </div>

        <div class="output-block">
          <div class="output-title">具体行動</div>
          <div id="actionOut" class="output-text">-</div>
        </div>

        <div class="output-block">
          <div class="output-title">結果欄テンプレ</div>
          <div id="resultOut" class="output-text">-</div>
        </div>

        <p class="mini">※ 1件ずつ作るシンプル版です。前回の入力内容だけブラウザに保存します。</p>
      </section>
    </div>
  </div>

            metrics: {
              safe: "月2本以上公開",
              standard: "月4本以上公開、閲覧数の向上",
              challenge: "月6本以上公開、問い合わせや流入の増加"
            },
            actions: "授業案や教育実践を記事として整理し、継続発信によって認知拡大と信頼形成につなげる。",
            focusMap: {
              数字: "公開本数や閲覧数で成果を示す。",
              丁寧さ: "読者が使いやすい構成と表現を意識する。",
              改善: "反応の良いテーマを分析し、次回の企画へ生かす。",
              連携: "学校の実践や他業務ともつなげながら発信する。"
            }
          },
          {
            task: "問い合わせ導線",
            title: "問い合わせ導線の改善",
            metrics: {
              safe: "問い合わせ件数 月1件以上",
              standard: "問い合わせ件数 月3件以上",
              challenge: "問い合わせ件数 月5件以上"
            },
            actions: "投稿内容や案内文を見直し、問い合わせにつながる導線を分かりやすく設計する。",
            focusMap: {
              数字: "問い合わせ件数を明確に追う。",
              丁寧さ: "見た人が迷わない導線を整える。",
              改善: "反応の弱い導線を見直して改善する。",
              連携: "広報と学校現場の情報をつなげる。"
            }
          }
        ]
      },
      focusOptions: ["数字", "丁寧さ", "改善", "連携"]
    };

    const policyEl = document.getElementById('policy');
    const roleEl = document.getElementById('role');
    const taskEl = document.getElementById('task');
    const focusEl = document.getElementById('focus');
    const levelEl = document.getElementById('level');
    const memoEl = document.getElementById('memo');

    const titleOut = document.getElementById('titleOut');
    const goalOut = document.getElementById('goalOut');
    const metricOut = document.getElementById('metricOut');
    const actionOut = document.getElementById('actionOut');
    const resultOut = document.getElementById('resultOut');
    const scoreBox = document.getElementById('scoreBox');

    function fillSelect(el, list) {
      el.innerHTML = '';
      list.forEach(item => {
        const opt = document.createElement('option');
        opt.value = item;
        opt.textContent = item;
        el.appendChild(opt);
      });
    }

    function updateTasks() {
      const role = roleEl.value;
      const taskList = DATA.roles[role].map(item => item.task);
      fillSelect(taskEl, taskList);
    }

    function getSelectedTemplate() {
      const role = roleEl.value;
      const task = taskEl.value;
      return DATA.roles[role].find(item => item.task === task);
    }

    function calcScore(policy, focus, memo, tpl) {
      let point = 60;
      if (policy) point += 10;
      if (focus === '数字') point += 10;
      if (focus === '改善' || focus === '連携') point += 8;
      if (memo.length >= 10) point += 8;
      if (tpl && tpl.actions.length > 20) point += 8;
      if (point >= 90) return { label: '高め', reason: '学校方針・数字・具体行動がそろっています' };
      if (point >= 78) return { label: '十分', reason: '評価シートとして必要要素が入っています' };
      return { label: '標準', reason: '数字や具体行動をもう少し足すと強くなります' };
    }

    function buildGoal() {
      const policy = policyEl.value;
      const role = roleEl.value;
      const focus = focusEl.value;
      const level = levelEl.value;
      const memo = memoEl.value.trim();
      const tpl = getSelectedTemplate();
      if (!tpl) return;

      const metric = tpl.metrics[level] || tpl.metrics.standard;
      const focusSentence = tpl.focusMap[focus] || '';
      const memoSentence = memo ? ` また、${memo}ことを意識して取り組む。` : '';
      const goal = `${policy}を踏まえ、${role}として${tpl.task}に取り組み、${metric}を目指す。${focusSentence}${memoSentence}`;
      const result = `【実績】
${metric}に対して、実績は（　　）であった。

【要因】
達成または未達となった要因は、（　　）である。

【改善点】
次年度は、（　　）を改善し、より安定して成果につなげられるようにする。`;
      const score = calcScore(policy, focus, memo, tpl);

      titleOut.textContent = tpl.title;
      goalOut.textContent = goal;
      metricOut.textContent = metric;
      actionOut.textContent = tpl.actions;
      resultOut.textContent = result;
      scoreBox.textContent = `評価されやすさ：${score.label}（${score.reason}）`;
      saveState();
    }

    function saveState() {
      const state = {
        policy: policyEl.value,
        role: roleEl.value,
        task: taskEl.value,
        focus: focusEl.value,
        level: levelEl.value,
        memo: memoEl.value,
        outputs: {
          title: titleOut.textContent,
          goal: goalOut.textContent,
          metric: metricOut.textContent,
          action: actionOut.textContent,
          result: resultOut.textContent,
          score: scoreBox.textContent
        }
      };
      localStorage.setItem('evaluationGoalAppState', JSON.stringify(state));
    }

    function loadState() {
      const saved = localStorage.getItem('evaluationGoalAppState');
      if (!saved) {
        focusEl.value = '数字';
        return;
      }

      try {
        const state = JSON.parse(saved);
        if (state.policy) policyEl.value = state.policy;
        if (state.role && DATA.roles[state.role]) {
          roleEl.value = state.role;
          updateTasks();
        }
        if (state.task) taskEl.value = state.task;
        if (state.focus) focusEl.value = state.focus;
        if (state.level) levelEl.value = state.level;
        if (typeof state.memo === 'string') memoEl.value = state.memo;

        if (state.outputs) {
          titleOut.textContent = state.outputs.title || '-';
          goalOut.textContent = state.outputs.goal || '-';
          metricOut.textContent = state.outputs.metric || '-';
          actionOut.textContent = state.outputs.action || '-';
          resultOut.textContent = state.outputs.result || '-';
          scoreBox.textContent = state.outputs.score || '評価されやすさ：まずは入力して生成してください';
        }
      } catch (e) {
        focusEl.value = '数字';
      }
    }

    function resetAll() {
      localStorage.removeItem('evaluationGoalAppState');
      memoEl.value = '';
      levelEl.value = 'standard';
      focusEl.value = '数字';
      policyEl.selectedIndex = 0;
      roleEl.selectedIndex = 0;
      updateTasks();
      titleOut.textContent = '-';
      goalOut.textContent = '-';
      metricOut.textContent = '-';
      actionOut.textContent = '-';
      resultOut.textContent = '-';
      scoreBox.textContent = '評価されやすさ：まずは入力して生成してください';
    }

    function setSample() {
      policyEl.value = '業務効率改善・DX';
      roleEl.value = '分掌担当';
      updateTasks();
      taskEl.value = 'マニュアル整備';
      focusEl.value = '改善';
      levelEl.value = 'standard';
      memoEl.value = '属人化を減らし、担当交代時にも困らない形にしたい';
      buildGoal();
    }

    function init() {
      fillSelect(policyEl, DATA.policies);
      fillSelect(roleEl, Object.keys(DATA.roles));
      fillSelect(focusEl, DATA.focusOptions);
      updateTasks();
      loadState();
    }

    roleEl.addEventListener('change', () => {
      updateTasks();
      saveState();
    });
    policyEl.addEventListener('change', saveState);
    taskEl.addEventListener('change', saveState);
    focusEl.addEventListener('change', saveState);
    levelEl.addEventListener('change', saveState);
    memoEl.addEventListener('input', saveState);

    document.getElementById('generateBtn').addEventListener('click', buildGoal);
    document.getElementById('resetBtn').addEventListener('click', resetAll);
    document.getElementById('sampleBtn').addEventListener('click', setSample);
    
    init();
  </script>
</body>
</html>
