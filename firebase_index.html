<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>投票しなかった君の街</title>
<style>
*{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,'Hiragino Sans','Yu Gothic',sans-serif;background:#111827;color:#111}.wrap{max-width:900px;margin:auto;padding:16px}.card{background:#fff;border:4px solid #111;border-radius:24px;padding:24px;margin:16px 0;box-shadow:7px 7px 0 #111}.hero{background:linear-gradient(135deg,#ffe766,#ffae42)}h1{font-size:36px;line-height:1.18;margin:0 0 12px}h2{font-size:30px;margin:0 0 14px}h3{font-size:24px;margin:0 0 10px}p,li{font-size:18px;line-height:1.65}.hidden{display:none}button,select{width:100%;border:4px solid #111;border-radius:16px;background:#fff;padding:18px;margin:10px 0;font-size:20px;font-weight:900;box-shadow:5px 5px 0 #111;text-align:center}button:active{transform:translate(3px,3px);box-shadow:2px 2px 0 #111}.main{background:#ffe766}.soft{background:#e8f4ff}.dark{background:#111;color:#fff}.red{background:#ffd9d9}.green{background:#daf5d7}.orange{background:#ffe2bd}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.stat{background:#f4f4f4;border:3px solid #111;border-radius:16px;padding:14px;text-align:center}.num{font-size:34px;font-weight:1000}.small{font-size:16px;color:#333}.question{background:#f8f8f8;border:4px dashed #111;border-radius:16px;padding:16px;margin:14px 0;font-size:20px;line-height:1.65}.candidate{border:4px solid #111;border-radius:20px;padding:18px;margin:14px 0;background:#fafafa}.point div{border:3px solid #111;border-radius:14px;padding:11px 12px;font-size:18px;font-weight:800;margin:8px 0}.good{background:#e8f4ff}.bad{background:#fff3bf}.cost{background:#f1f1f1}.policy{border:3px solid #111;border-radius:16px;padding:14px;margin:12px 0;background:#fff}.policy h4{font-size:20px;margin:0 0 8px}.policy ul{margin:6px 0 0 22px;padding:0}.policy li{font-size:17px;margin:4px 0}.risk{background:#fff3bf}.benefit{background:#e8f4ff}.money{background:#f1f1f1}details{border:4px solid #111;border-radius:18px;background:#fff7cf;padding:14px;margin:14px 0}summary{font-weight:1000;cursor:pointer;font-size:20px}.topnav{display:flex;gap:8px}.topnav button{font-size:16px;padding:12px;margin:0 0 12px}.vote button{text-align:left}.notice{background:#fff3bf;border:4px solid #111;border-radius:16px;padding:16px;font-weight:900;font-size:19px;margin:12px 0}.winner{font-size:30px;font-weight:1000;background:#ffe766;border:4px solid #111;border-radius:18px;padding:16px;text-align:center;margin:14px 0}.barbox{margin:14px 0}.barlabel{display:flex;justify-content:space-between;font-weight:900;font-size:18px}.bar{height:26px;border:3px solid #111;border-radius:999px;background:#eee;overflow:hidden}.fill{height:100%;background:#ffe766}input{width:100%;border:4px solid #111;border-radius:16px;padding:16px;font-size:24px;font-weight:900;margin:10px 0}.rank{display:grid;grid-template-columns:90px 1fr;gap:10px;align-items:center}@media(max-width:700px){.grid{grid-template-columns:1fr}.wrap{padding:10px}.card{padding:18px;box-shadow:4px 4px 0 #111}h1{font-size:30px}h2{font-size:26px}h3{font-size:22px}p,li{font-size:17px}button,select{font-size:18px}.topnav{display:block}.topnav button{margin:6px 0}.question{font-size:18px}}
</style>
</head>
<body>
<div class="wrap">
<section id="home" class="card hero"><h1>投票しなかった君の街</h1><p><b>舞台：人口100人の「みらい市」</b></p><p>争点は、駅前、防災、税金。</p><p><b>見るのは2つ。決め方で結果は変わるか。投票しないと何が起きるか。</b></p><details><summary>街の設定を見る</summary><ul><li>人口100人。有権者80人。</li><li>若者の居場所が少ない。</li><li>防災に不安がある。</li><li>駅前の空き店舗が増えている。</li><li>使える予算は10億円。</li></ul></details><button class="main" onclick="go('candidates')">候補者を見る</button><button class="soft" onclick="go('vote')">投票する</button><button class="dark" onclick="teacherLogin()">先生用</button><p id="connection" class="small"></p></section>
<section id="candidates" class="card hidden"><div class="topnav"><button onclick="go('home')">トップ</button><button onclick="go('vote')">投票する</button></div><h2>候補者</h2><div class="grid"><div class="stat"><div class="small">市民</div><div class="num">100</div><div class="small">人</div></div><div class="stat"><div class="small">有権者</div><div class="num">80</div><div class="small">人</div></div><div class="stat"><div class="small">予算</div><div class="num">10</div><div class="small">億円</div></div></div><div class="question"><b>問い</b><br>中立に見るなら、まず不利な点を探せ。</div><div id="candidateList"></div><button class="main" onclick="go('vote')">投票する</button></section>
<section id="vote" class="card hidden vote"><div class="topnav"><button onclick="go('home')">トップ</button></div><h2>投票する</h2><div id="methodInfo" class="notice"></div><div id="voteArea"></div></section>
<section id="thanks" class="card hidden"><h2>投票しました</h2><p>スマホは伏せて、前を見てください。</p><button class="soft" onclick="go('home')">トップに戻る</button></section>
<section id="lock" class="card hidden"><h2>先生用</h2><input id="pass" inputmode="numeric" placeholder="パスワード"><button class="dark" onclick="checkPass()">開く</button><button class="soft" onclick="go('home')">戻る</button></section>
<section id="count" class="card hidden"><div class="topnav"><button onclick="go('home')">トップ</button><button onclick="go('vote')">投票する</button></div><h2>先生用</h2><div class="notice">現在の決め方：<span id="currentMethodLabel"></span></div><button class="soft" onclick="setMethod('plurality')">多数決</button><button class="green" onclick="setMethod('runoff1')">決戦投票付き多数決：1回目</button><button class="green" onclick="setMethod('runoff2')">決戦投票付き多数決：決戦</button><button class="orange" onclick="setMethod('borda')">ボルダルール</button><div id="summary"></div><div id="result"></div><button class="dark" onclick="showResult()">結果を見る</button><button class="main" onclick="showCompare()">3方式を比較する</button><button class="red" onclick="resetVotes()">リセット</button></section>
</div>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script><script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script>
const firebaseConfig={apiKey:"AIzaSyBXRVlcx-eZKrF6NpboKl8Z87w2sIkrOq4",authDomain:"kakuduke-fe62d.firebaseapp.com",databaseURL:"https://kakuduke-fe62d-default-rtdb.firebaseio.com",projectId:"kakuduke-fe62d",storageBucket:"kakuduke-fe62d.firebasestorage.app",messagingSenderId:"224688087057",appId:"1:224688087057:web:b5f1ffaf1901c306e9d1b0",measurementId:"G-HTFXLNJMFF"};
firebase.initializeApp(firebaseConfig);const db=firebase.database();const roomRef=db.ref('electionRooms/default');const settingsRef=roomRef.child('settings');const dataRef=roomRef.child('data');
let settings={method:'plurality'};let data=emptyData();
const candidates={A:'駅前にぎわい市長',B:'防災・通学安全市長',C:'負担を増やさない市長',N:'投票しない'};
function emptyData(){return{plurality:{A:0,B:0,C:0,N:0},runoff1:{A:0,B:0,C:0,N:0},runoff2:{A:0,B:0,C:0,N:0},borda:{A:0,B:0,C:0,N:0,count:0}}}
settingsRef.on('value',s=>{settings=s.val()||{method:'plurality'};renderVote();if(!document.getElementById('count').classList.contains('hidden'))renderSummary();document.getElementById('connection').textContent='接続中：リアルタイム集計'});
dataRef.on('value',s=>{data=s.val()||emptyData();if(!document.getElementById('count').classList.contains('hidden'))renderSummary();});
function go(id){['home','candidates','vote','thanks','lock','count'].forEach(x=>document.getElementById(x).classList.add('hidden'));document.getElementById(id).classList.remove('hidden');if(id==='candidates')renderCandidates();if(id==='vote')renderVote();if(id==='count')renderSummary()}
function teacherLogin(){go('lock');setTimeout(()=>{pass.value='';pass.focus()},50)}function checkPass(){if(pass.value==='0122')go('count');else alert('パスワードが違います')}
function methodLabel(m){return m==='plurality'?'多数決':m==='runoff1'?'決戦投票付き多数決：1回目':m==='runoff2'?'決戦投票付き多数決：決戦':m==='borda'?'ボルダルール':'多数決'}
function setMethod(m){settingsRef.set({method:m});document.getElementById('result').innerHTML=''}
function renderCandidates(){candidateList.innerHTML=`
<div class="candidate"><h3>A：駅前にぎわい市長</h3><p><b>キャッチコピー：</b>若者が集まる街へ</p><p>駅前を中心に、若者の居場所と商店街のにぎわいを同時に作る政策。</p><div class="point"><div class="good">良い：放課後の居場所と駅前の人通りが増える</div><div class="bad">心配：利用できる人が限られ、騒音や混雑も出る</div><div class="cost">予算：8億円＋維持費が毎年必要</div></div><div class="policy benefit"><h4>主な政策</h4><ul><li>駅前の空き店舗を改修し、学習スペースを作る</li><li>休日にマルシェ・音楽・地域イベントを開ける広場を整備する</li><li>若者や小規模事業者が使えるチャレンジショップを作る</li><li>放課後から夜まで使える居場所を増やす</li></ul></div><div class="policy"><h4>支持されやすい人</h4><ul><li>中高生・大学生など若者</li><li>駅前の商店街・飲食店</li><li>にぎやかな街を望む人</li><li>新しい挑戦を応援したい人</li></ul></div><div class="policy risk"><h4>心配される点</h4><ul><li>学習スペースが有料登録制になり、使えない人が出る</li><li>駅前に人が集まり、騒音・ごみ・混雑が増える</li><li>駅から遠い地域の人には恩恵が少ない</li><li>整備後も清掃・警備・運営費がかかり続ける</li></ul></div></div>
<div class="candidate"><h3>B：防災・通学安全市長</h3><p><b>キャッチコピー：</b>安全は、見えないインフラ</p><p>派手な施設ではなく、災害・防犯・通学路の安全を優先する政策。</p><div class="point"><div class="good">良い：通学路と災害時の安心が増える</div><div class="bad">心配：成果が見えにくく、楽しい施設は増えない</div><div class="cost">予算：7億円＋点検費が毎年必要</div></div><div class="policy benefit"><h4>主な政策</h4><ul><li>避難所の備蓄品、トイレ、発電設備を整備する</li><li>暗い通学路に街灯を増設する</li><li>危険箇所に防犯カメラを設置する</li><li>災害時にスマホへ避難情報を送る仕組みを作る</li><li>高齢者や一人暮らし世帯の見守り体制を強化する</li></ul></div><div class="policy"><h4>支持されやすい人</h4><ul><li>保護者</li><li>高齢者</li><li>通学路を使う生徒</li><li>災害や犯罪への不安が強い人</li></ul></div><div class="policy risk"><h4>心配される点</h4><ul><li>普段は効果を感じにくい</li><li>若者が集まる施設やイベントは増えない</li><li>防犯カメラに対して監視されていると感じる人もいる</li><li>街灯や設備は、設置後も修理・管理費がかかる</li></ul></div></div>
<div class="candidate"><h3>C：負担を増やさない市長</h3><p><b>キャッチコピー：</b>増やす前に、見直す</p><p>新しい施設を増やすより、今あるお金の使い方を見直す政策。</p><div class="point"><div class="good">良い：通学・通勤の負担を減らし、将来の借金を抑える</div><div class="bad">心配：街の見た目は大きく変わらない</div><div class="cost">予算：5億円。残りは将来への備え</div></div><div class="policy benefit"><h4>主な政策</h4><ul><li>通学・通勤に使える交通費支援を行う</li><li>利用者が少ない古い事業を見直す</li><li>市の支出を点検し、無駄な支出を減らす</li><li>税負担を増やしにくい財政運営をする</li><li>余った予算を災害・修繕・将来世代のために残す</li></ul></div><div class="policy"><h4>支持されやすい人</h4><ul><li>節約志向の人</li><li>税金の使い道を気にする人</li><li>将来の借金を増やしたくない人</li><li>通学・通勤の交通費を負担に感じる人</li></ul></div><div class="policy risk"><h4>心配される点</h4><ul><li>新しい施設やイベントが増えず、変化が見えにくい</li><li>今すぐ大きな支援を必要とする人には物足りない</li><li>事業の見直しで、今まで支援を受けていた人が困る可能性がある</li><li>「削る」判断が多くなり、反発が出やすい</li></ul></div></div>`}
function renderVote(){if(!document.getElementById('voteArea'))return;methodInfo.textContent='決め方：'+methodLabel(settings.method);if(settings.method==='borda'){voteArea.innerHTML=`<div class="question"><b>問い</b><br>1位・2位・3位をつけてください。</div><div class="rank"><b>1位</b><select id="r1"><option value="A">A：駅前にぎわい</option><option value="B">B：防災・通学安全</option><option value="C">C：負担を増やさない</option></select></div><div class="rank"><b>2位</b><select id="r2"><option value="B">B：防災・通学安全</option><option value="A">A：駅前にぎわい</option><option value="C">C：負担を増やさない</option></select></div><div class="rank"><b>3位</b><select id="r3"><option value="C">C：負担を増やさない</option><option value="A">A：駅前にぎわい</option><option value="B">B：防災・通学安全</option></select></div><button class="main" onclick="voteBorda()">送信する</button><button class="red" onclick="voteNoneBorda()">投票しない</button>`}else{let note=settings.method==='runoff2'?'決戦投票です。先生が指定した上位2人に投票してください。':'1つ選んでください。';voteArea.innerHTML=`<div class="question"><b>問い</b><br>${note}</div><button onclick="voteOne('A')">A：駅前にぎわい市長</button><button onclick="voteOne('B')">B：防災・通学安全市長</button><button onclick="voteOne('C')">C：負担を増やさない市長</button><button class="red" onclick="voteOne('N')">投票しない</button>`}}
function activeKey(){return settings.method||'plurality'}function voteOne(x){dataRef.child(activeKey()).child(x).transaction(c=>(c||0)+1).then(()=>go('thanks'))}
function voteNoneBorda(){dataRef.child('borda/N').transaction(c=>(c||0)+1).then(()=>go('thanks'))}
function voteBorda(){let a=[r1.value,r2.value,r3.value];if(new Set(a).size!==3){alert('1位・2位・3位は別々の候補を選んでください');return}let updates={};updates['borda/'+a[0]]=firebase.database.ServerValue.increment(3);updates['borda/'+a[1]]=firebase.database.ServerValue.increment(2);updates['borda/'+a[2]]=firebase.database.ServerValue.increment(1);updates['borda/count']=firebase.database.ServerValue.increment(1);dataRef.update(updates).then(()=>go('thanks'))}
function valid(v){return(v.A||0)+(v.B||0)+(v.C||0)}function total(v){return valid(v)+(v.N||0)}function pct(n,d){return d?Math.round(n/d*100):0}function win(v){let w='A';if((v.B||0)>(v[w]||0))w='B';if((v.C||0)>(v[w]||0))w='C';return w}function bar(label,n,d,unit){return `<div class="barbox"><div class="barlabel"><span>${label}</span><span>${n}${unit}</span></div><div class="bar"><div class="fill" style="width:${pct(n,d)}%"></div></div></div>`}
function renderSummary(){currentMethodLabel.textContent=methodLabel(settings.method);let v=data[activeKey()]||{};let voters=settings.method==='borda'?(v.count||0):valid(v);summary.innerHTML=`<div class="grid"><div class="stat"><div class="small">投票した人</div><div class="num">${voters}</div><div class="small">人</div></div><div class="stat"><div class="small">投票しない</div><div class="num">${v.N||0}</div><div class="small">人</div></div><div class="stat"><div class="small">方式</div><div class="num">${settings.method==='borda'?'点':'票'}</div><div class="small">で集計</div></div></div>`}
function showResult(){renderSummary();let v=data[activeKey()]||{};let d=Math.max(settings.method==='borda'?Math.max(v.A||0,v.B||0,v.C||0):valid(v),1);let unit=settings.method==='borda'?'点':'票';let w=win(v);let voters=settings.method==='borda'?(v.count||0):valid(v);result.innerHTML=bar('A：駅前にぎわい市長',v.A||0,d,unit)+bar('B：防災・通学安全市長',v.B||0,d,unit)+bar('C：負担を増やさない市長',v.C||0,d,unit)+`<div class="winner">結果：${candidates[w]}</div><div class="question"><b>問い</b><br>決め方が変わると、結果は変わるか。</div><p class="notice">決めたのは、投票した${voters}人です。</p><p class="notice">投票しない票：${v.N||0}人。投票しないことは、投票した人に決定を任せることです。</p>`}
function showCompare(){let p=data.plurality||{},r1=data.runoff1||{},r2=data.runoff2||{},b=data.borda||{};let allN=(p.N||0)+(r1.N||0)+(r2.N||0)+(b.N||0);result.innerHTML=`<div class="notice">多数決：${candidates[win(p)]}</div><div class="notice">決戦投票付き多数決 1回目：${candidates[win(r1)]}</div><div class="notice">決戦投票：${candidates[win(r2)]}</div><div class="notice">ボルダルール：${candidates[win(b)]}</div><div class="question"><b>問い</b><br>どの決め方が一番公平だと言えるか。</div><p class="notice">ただし、どの決め方でも、投票しなかった人の意見は結果に入りません。</p><p class="notice">投票しない人数の合計：${allN}人</p>`}
function resetVotes(){if(confirm('全方式の投票をリセットしますか？')){dataRef.set(emptyData());result.innerHTML=''}}
renderCandidates();renderVote();
</script>
</body>
</html>
