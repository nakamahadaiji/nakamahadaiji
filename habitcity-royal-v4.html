<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>HabitCity Royal V4</title>
<style>
:root{--bg:#070303;--wine:#4d1616;--wine2:#170808;--gold:#e5c77c;--gold2:#fff4d8;--text:#fffaf0;--sub:#ead8b2;--muted:#d9c296;--line:rgba(229,199,124,.24);--panelTop:rgba(96,24,22,.97);--panelBottom:rgba(28,10,10,.99)}
*{box-sizing:border-box}body{margin:0;min-height:100vh;padding:14px;font-family:"Hiragino Mincho ProN","Yu Mincho","Noto Serif JP",Georgia,serif;color:var(--text);background:radial-gradient(circle at top,rgba(229,199,124,.12),transparent 30%),linear-gradient(180deg,#160707,#050202)}
.shell{max-width:430px;min-height:calc(100vh - 28px);margin:0 auto;border-radius:34px;overflow:hidden;background:linear-gradient(180deg,#4d1616,#140707);border:1px solid var(--line);box-shadow:0 0 0 1px rgba(255,244,216,.05) inset,0 24px 70px rgba(0,0,0,.45);position:relative;padding-bottom:96px}
.top{padding:20px 20px 10px;display:flex;justify-content:space-between;align-items:flex-start;gap:12px}.content{padding:0 20px 28px}.btn,.seg button,.fab,.chip,.icon,.check{border:0;cursor:pointer;font-family:inherit}.btn{padding:10px 16px;border-radius:999px;background:linear-gradient(180deg,#74201a,#3c0d0d);border:1px solid var(--line);color:var(--gold2);font-weight:700}.btn:active,.seg button:active,.fab:active,.chip:active,.icon:active,.check:active{transform:scale(.98)}
.title{font-size:31px;font-weight:700;color:var(--gold2);letter-spacing:.06em;text-shadow:0 1px 0 #5a3910,0 0 18px rgba(229,199,124,.18)}.date{font-size:13px;color:var(--sub);letter-spacing:.08em}.hero,.rank,.panel,.habit,.empty,.stat,.city{background:linear-gradient(180deg,var(--panelTop),var(--panelBottom));border:1px solid var(--line);box-shadow:0 0 0 1px rgba(255,244,216,.04) inset}.hero,.rank,.panel,.empty{border-radius:28px}
.hero{padding:18px;position:relative;overflow:hidden}.medal{position:absolute;top:16px;right:16px;padding:9px 14px;border-radius:999px;background:linear-gradient(180deg,#8a241b,#4a0e0e);border:1px solid var(--line);color:var(--gold2);font-weight:700}.hero-copy h1{margin:0;font-size:28px;line-height:1.28;font-weight:700;color:var(--gold2);padding-right:108px}
.rank{margin-top:16px;padding:12px 14px}.rank-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.rank-card{padding:13px 12px;border-radius:18px;background:rgba(255,255,255,.03);border:1px solid rgba(229,199,124,.14)}.rank-card small{display:block;color:var(--muted);margin-bottom:6px;font-size:12px;letter-spacing:.06em}.rank-card b{font-size:24px;color:var(--gold2);font-weight:700}.judge-good{color:#fff1b8}.judge-mid{color:var(--sub)}
.seg{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;margin-top:16px;padding:4px;border-radius:16px;background:rgba(0,0,0,.18);border:1px solid var(--line)}.seg button{padding:12px 8px;border-radius:12px;background:transparent;color:#e2c98f;font-weight:700;font-size:13px}.seg .active{background:linear-gradient(180deg,#fbe7ab,#d49a3d);color:#32110b}
.view{display:none}.view.active{display:block}.habit-list{display:grid;gap:12px;margin-top:14px}.habit{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:16px;border-radius:22px}.left{display:flex;gap:14px;align-items:center;min-width:0}.dot{width:16px;height:16px;border-radius:50%;flex:0 0 auto;box-shadow:0 0 0 4px rgba(255,255,255,.04),0 0 16px currentColor}.main{min-width:0}.name{font-size:19px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}.meta{font-size:13px;line-height:1.55;color:var(--sub)}.actions{display:flex;gap:8px;align-items:center}.icon{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.04);border:1px solid var(--line);color:var(--gold2);font-size:15px}.check{width:46px;height:46px;border-radius:50%;border:2px solid currentColor;background:transparent;color:#9f7b45;font-size:24px;font-weight:700}.check.done{background:currentColor;color:#2f0f09;box-shadow:0 0 18px currentColor}
.panel{margin-top:18px;padding:18px}.head{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:12px}.pt{font-size:23px;font-weight:700;color:var(--gold2)}.badge{padding:8px 12px;border-radius:999px;background:linear-gradient(180deg,#7a2119,#3b0b0b);border:1px solid var(--line);font-size:12px;color:var(--gold2);font-weight:700}.illu{height:252px;border-radius:24px;overflow:hidden;position:relative;margin-bottom:16px;background:radial-gradient(circle at top,rgba(255,250,222,.7),rgba(255,250,222,0) 34%),linear-gradient(180deg,#eadcc4,#d2b48c 60%,#ba9160)}.bars{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;margin-bottom:14px}.bar{height:8px;border-radius:999px;background:rgba(255,255,255,.08)}.bar.fill{background:linear-gradient(90deg,#8e5f28,#f0d588,#8e5f28)}.status{font-size:14px;line-height:1.6;color:var(--sub)}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:16px}.stat{padding:14px 10px;border-radius:18px;text-align:center}.stat b{display:block;font-size:22px;margin-bottom:4px;color:var(--gold2);font-weight:700}.stat span{font-size:11px;color:var(--sub)}.sec{margin:22px 0 10px;font-size:14px;font-weight:700;letter-spacing:.12em;color:#f0d9a4}.chips{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}.chip{padding:8px 12px;border-radius:999px;background:linear-gradient(180deg,#5f1714,#2f0a0a);color:var(--gold2);border:1px solid var(--line);font-size:12px;font-weight:700}.city-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.city{height:102px;border-radius:18px;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center}.city span{position:absolute;left:10px;bottom:8px;font-size:10px;font-weight:700;color:#f2dfaf}.calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;margin-top:10px}.cal-h,.cal-d{text-align:center;border-radius:12px}.cal-h{padding:8px 0;color:#e2c98f;font-size:12px;font-weight:700}.cal-d{min-height:50px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:10px 0;background:rgba(255,255,255,.03);border:1px solid rgba(229,199,124,.1);font-size:13px;color:var(--text)}.cal-d.done{background:linear-gradient(180deg,rgba(230,194,114,.24),rgba(122,83,24,.18));border-color:rgba(229,199,124,.28)}.cal-d.today{box-shadow:0 0 0 1px rgba(255,244,216,.14) inset,0 0 0 1px rgba(229,199,124,.3)}.mini{font-size:10px;color:var(--sub)}.empty{margin-top:16px;padding:24px 18px;text-align:center;line-height:1.8;color:var(--sub);font-size:15px}.fab{position:absolute;right:20px;bottom:20px;width:64px;height:64px;border-radius:50%;background:linear-gradient(180deg,#fff0c0,#d29a3c);color:#3c130c;font-size:34px;font-weight:700;box-shadow:0 12px 24px rgba(0,0,0,.35);z-index:20}
.modal{position:absolute;inset:0;display:none;align-items:flex-end;justify-content:center;padding:20px;background:rgba(0,0,0,.55);backdrop-filter:blur(10px);z-index:30}.modal.active{display:flex}.sheet{width:100%;max-height:88vh;overflow:auto;padding:22px 18px 20px;border-radius:30px;border:1px solid var(--line);background:linear-gradient(180deg,#551816,#170808)}.shead{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:18px}.st{font-size:24px;font-weight:700;color:var(--gold2)}.field{margin-bottom:16px}.label{display:block;margin-bottom:8px;font-size:13px;color:#ead8b2;letter-spacing:.08em;text-transform:uppercase}input,textarea{width:100%;padding:14px 16px;border-radius:18px;border:1px solid rgba(229,199,124,.16);background:rgba(255,255,255,.04);color:#fffaf0;font-size:16px;outline:none;font-family:inherit}textarea{min-height:90px;resize:none}.colors{display:flex;gap:12px;flex-wrap:wrap;margin-top:8px}.cb{width:36px;height:36px;border-radius:50%;border:3px solid transparent;cursor:pointer}.cb.active{border-color:#fff2c5}.danger{width:100%;margin-top:10px;padding:16px 18px;border-radius:18px;border:1px solid rgba(255,120,120,.22);background:linear-gradient(180deg,#7b1010,#440a0a);color:#ffd3d3;font-size:16px;font-weight:700}.toast{position:absolute;left:50%;bottom:98px;transform:translateX(-50%) translateY(18px);opacity:0;pointer-events:none;white-space:nowrap;padding:12px 16px;border-radius:999px;font-size:13px;font-weight:700;color:#fff7e4;border:1px solid var(--line);background:linear-gradient(180deg,#521412,#220a0a);transition:all .25s ease;z-index:40}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}svg{max-width:100%;height:auto}@media(max-width:480px){body{padding:0}.shell{border-radius:0;min-height:100vh;max-width:none}}
</style>
</head>
<body>
<div class="shell">
<div class="top"><div><div class="title">HabitCity</div><div class="date" id="today"></div></div><button class="btn" id="reset">本日リセット</button></div>
<div class="content" style="padding-top:0">
<div class="hero"><div class="medal" id="rankMedal">三流習慣家</div><div class="hero-copy"><h1>今日の習慣で、<br>町の格が決まる</h1></div></div>
<div class="rank"><div class="rank-grid"><div class="rank-card"><small>Current Rank</small><b id="rank">三流習慣家</b></div><div class="rank-card"><small>Royal Score</small><b id="score">0</b></div><div class="rank-card"><small>達成率</small><b id="rate">0%</b></div><div class="rank-card"><small>判定</small><b id="judge" class="judge-mid">未判定</b></div></div></div>
<div class="seg"><button class="active" data-v="home">本日の採点</button><button data-v="progress">建築状況</button><button data-v="record">記録簿</button></div>
<div class="view active" id="v-home"><div class="habit-list" id="list"></div><div class="empty" id="empty" style="display:none">右下の＋から習慣を登録してください。</div><div class="panel"><div class="head"><div><div class="pt" id="bname">迎賓の館</div></div><div class="badge" id="badge">進捗 0 / 5</div></div><div class="illu" id="view"></div><div class="bars" id="bars"></div><div class="status" id="status"></div><div class="stats"><div class="stat"><b id="done">0</b><span>今日達成</span></div><div class="stat"><b id="streak">0</b><span>連続日数</span></div><div class="stat"><b id="complete">0</b><span>完成棟数</span></div><div class="stat"><b id="leftCount">0</b><span>残り項目</span></div></div></div></div>
<div class="view" id="v-progress"><div class="panel"><div class="illu" id="focus"></div><div class="bars" id="bars2"></div><div class="chips" id="bchips"></div><div class="sec">完成済みの邸宅</div><div class="city-grid" id="city"></div></div></div>
<div class="view" id="v-record"><div class="panel"><div class="head"><div><div class="pt">30日記録簿</div></div><div class="badge" id="recordBadge">0 / 30</div></div><div class="calendar" id="cal"></div><div class="sec">分析結果</div><div class="chips" id="ins"></div></div></div>
</div>
<button class="fab" id="add">＋</button>
<div class="modal" id="modal"><div class="sheet"><div class="shead"><button class="btn" id="close">取消</button><div class="st" id="mtitle">新しい習慣</div><button class="btn" id="save">保存</button></div><div class="field"><label class="label">Title</label><input id="ht" maxlength="40"></div><div class="field"><label class="label">Purpose</label><textarea id="hp"></textarea></div><div class="field"><label class="label">Icon</label><input id="he" maxlength="3"></div><div class="field"><label class="label">Daily Target</label><input id="hg" maxlength="24"></div><div class="field"><label class="label">Card Color</label><div class="colors" id="picker"></div></div><button class="danger" id="del" style="display:none">この習慣を削除</button></div></div>
<div class="toast" id="toast"></div>
</div>
<script>
const KEY='habit-city-royal-v4',BUILD=['迎賓の館','金の町家','紅の社','王の灯台','格付け城','時計台'],COL=['#E4C06E','#C74242','#C97D2A','#BF5AF2','#3A9CFF','#44C06A'];
const DEF={selectedColor:COL[0],habits:[],completions:{},rewardedDates:{},currentBuilding:{name:BUILD[0],step:0},completedBuildings:[],activeView:'home'};
let S=load(),edit=null;const $=id=>document.getElementById(id),tabs=[...document.querySelectorAll('.seg button')];init();
function init(){renderPicker();bind();render()}
function bind(){$('add').onclick=()=>openM();$('close').onclick=closeM;$('save').onclick=saveH;$('del').onclick=delH;$('reset').onclick=resetToday;$('modal').onclick=e=>{if(e.target===$('modal'))closeM()};tabs.forEach(t=>t.onclick=()=>setV(t.dataset.v))}
function render(){const tk=todayKey(),tm=S.completions[tk]||{},td=S.habits.filter(h=>tm[h.id]).length,all=S.habits.length>0&&td===S.habits.length,rate=S.habits.length?Math.round(td/S.habits.length*100):0;$('today').textContent=longDate(new Date());tabs.forEach(t=>t.classList.toggle('active',t.dataset.v===S.activeView));document.querySelectorAll('.view').forEach(v=>v.classList.toggle('active',v.id===`v-${S.activeView}`));$('rate').textContent=`${rate}%`;const judge=all?'一流':'採点中';$('judge').textContent=judge;$('judge').className=all?'judge-good':'judge-mid';renderHabits(tm);renderBuild(td,all);renderCity();renderCal();renderIns();renderRank();save()}
function renderHabits(tm){$('list').innerHTML='';$('empty').style.display=S.habits.length?'none':'block';S.habits.forEach(h=>{const d=!!tm[h.id],card=document.createElement('div');card.className='habit';const parts=[];if(h.purpose)parts.push(h.purpose);if(h.target)parts.push(`目安: ${h.target}`);card.innerHTML=`<div class='left'><div class='dot' style='background:${h.color};color:${h.color}'></div><div class='main'><div class='name'>${esc(h.title)} ${esc(h.emoji||'')}</div><div class='meta'>${esc(parts.join(' / ')||'')}</div></div></div><div class='actions'><button class='icon'>✎</button><button class='check ${d?'done':''}' style='color:${h.color}'>${d?'✓':''}</button></div>`;card.querySelector('.icon').onclick=()=>openM(h.id);card.querySelector('.check').onclick=()=>toggle(h.id);$('list').appendChild(card)})}
function renderBuild(td,all){const st=S.currentBuilding.step,sk=streak(),tt=S.habits.length,left=Math.max(tt-td,0);$('bname').textContent=S.currentBuilding.name;$('badge').textContent=`進捗 ${st} / 5`;$('view').innerHTML=svg(st,S.currentBuilding.name);$('focus').innerHTML=svg(st,S.currentBuilding.name);$('bars').innerHTML=bars(st);$('bars2').innerHTML=bars(st);$('done').textContent=td;$('streak').textContent=sk;$('complete').textContent=S.completedBuildings.length;$('leftCount').textContent=left;if(!S.habits.length)$('status').textContent='';else if(all)$('status').textContent='本日は全項目達成';else $('status').textContent=`残り ${left} 項目`;$('bchips').innerHTML='';BUILD.forEach(n=>{const c=document.createElement('button');c.className='chip';c.textContent=n;if(n===S.currentBuilding.name){c.style.background='linear-gradient(180deg,#fbe8ad,#d49a3d)';c.style.color='#32110b'}c.onclick=()=>toast(`現在の建築対象は「${S.currentBuilding.name}」です`);$('bchips').appendChild(c)})}
function renderCity(){$('city').innerHTML='';if(!S.completedBuildings.length){$('city').innerHTML="<div class='city' style='grid-column:span 3'><span>未完成</span></div>";return}S.completedBuildings.forEach((n,i)=>{const x=document.createElement('div');x.className='city';x.innerHTML=`${svg(5,n,true)}<span>${i+1}. ${esc(n)}</span>`;$('city').appendChild(x)})}
function renderCal(){const h=['月','火','水','木','金','土','日'],days=last30();$('cal').innerHTML='';h.forEach(t=>{const c=document.createElement('div');c.className='cal-h';c.textContent=t;$('cal').appendChild(c)});let cnt=0;days.forEach(d=>{const k=key(d),ok=full(k);if(ok)cnt++;const c=document.createElement('div');c.className=`cal-d ${ok?'done':''} ${k===todayKey()?'today':''}`;c.innerHTML=`<div>${d.getDate()}</div><div class='mini'>${ok?'達成':'未達'}</div>`;$('cal').appendChild(c)});$('recordBadge').textContent=`${cnt} / 30`}
function renderIns(){const arr=[],sk=streak(),c30=last30().filter(d=>full(key(d))).length;arr.push(`連続達成 ${sk} 日`);arr.push(`30日達成 ${c30} 日`);arr.push(`登録習慣 ${S.habits.length} 個`);arr.push(`完成棟数 ${S.completedBuildings.length}`);const w=weak();if(w)arr.push(`要強化 ${w.title}`);$('ins').innerHTML='';arr.forEach(t=>{const c=document.createElement('div');c.className='chip';c.textContent=t;$('ins').appendChild(c)})}
function renderRank(){const sk=streak(),score=S.completedBuildings.length*100+S.currentBuilding.step*20+sk*10;$('score').textContent=score;let l='三流習慣家';if(score>=500)l='超一流習慣家';else if(score>=300)l='一流習慣家';else if(score>=160)l='二流習慣家';else if(score>=60)l='見習い上級';$('rank').textContent=l;$('rankMedal').textContent=l}
function setV(v){S.activeView=v;render()}
function openM(id=null){edit=id;$('modal').classList.add('active');if(id){const h=S.habits.find(x=>x.id===id);if(!h)return;$('mtitle').textContent='習慣を編集';$('ht').value=h.title||'';$('hp').value=h.purpose||'';$('he').value=h.emoji||'';$('hg').value=h.target||'';S.selectedColor=h.color||COL[0];$('del').style.display='block'}else{$('mtitle').textContent='新しい習慣';$('ht').value='';$('hp').value='';$('he').value='';$('hg').value='';S.selectedColor=COL[0];$('del').style.display='none'}renderPicker();$('ht').focus()}
function closeM(){$('modal').classList.remove('active');edit=null;$('ht').value='';$('hp').value='';$('he').value='';$('hg').value='';S.selectedColor=COL[0];renderPicker()}
function saveH(){const t=$('ht').value.trim();if(!t){alert('タイトルを入力してください。');return}const p={title:t,purpose:$('hp').value.trim(),emoji:$('he').value.trim(),target:$('hg').value.trim(),color:S.selectedColor};if(edit){S.habits=S.habits.map(h=>h.id===edit?{...h,...p}:h);toast('習慣を更新しました')}else{S.habits.push({id:uid(),...p,createdAt:Date.now()});toast('習慣を登録しました')}closeM();render()}
function delH(){if(!edit)return;const t=S.habits.find(h=>h.id===edit);if(!t)return;if(!confirm(`「${t.title}」を削除しますか？`))return;S.habits=S.habits.filter(h=>h.id!==edit);Object.keys(S.completions).forEach(k=>{if(S.completions[k])delete S.completions[k][edit]});closeM();render();toast('習慣を削除しました')}
function toggle(id){const tk=todayKey();if(!S.completions[tk])S.completions[tk]={};S.completions[tk][id]=!S.completions[tk][id];advance();render()}
function advance(){const tk=todayKey(),d=S.completions[tk]||{};if(!S.habits.length)return;const all=S.habits.every(h=>d[h.id]);if(!all||S.rewardedDates[tk])return;S.currentBuilding.step+=1;S.rewardedDates[tk]=true;if(S.currentBuilding.step>=5){S.completedBuildings.push(S.currentBuilding.name);const n=BUILD[S.completedBuildings.length%BUILD.length];S.currentBuilding={name:n,step:0};toast('建物が完成しました')}else toast('建物が1段階進みました')}
function resetToday(){const tk=todayKey();delete S.completions[tk];delete S.rewardedDates[tk];render();toast('本日の記録をリセットしました')}
function bars(s){let h='';for(let i=1;i<=5;i++)h+=`<div class='bar ${s>=i?'fill':''}'></div>`;return h}
function streak(){let n=0,d=new Date;while(true){const k=key(d);if(full(k)){n++;d.setDate(d.getDate()-1)}else break}return n}
function full(k){if(!S.habits.length)return false;const d=S.completions[k]||{};return S.habits.every(h=>d[h.id])}
function weak(){if(!S.habits.length)return null;let t=null,m=Infinity;S.habits.forEach(h=>{let done=0,total=0;last30().forEach(d=>{const k=key(d);total++;if((S.completions[k]||{})[h.id])done++});const r=total?done/total:0;if(r<m){m=r;t=h}});return t}
function last30(){const a=[],n=new Date;for(let i=29;i>=0;i--){const d=new Date(n);d.setDate(n.getDate()-i);a.push(d)}return a}
function toast(t){$('toast').textContent=t;$('toast').classList.add('show');clearTimeout(toast.timer);toast.timer=setTimeout(()=>$('toast').classList.remove('show'),1800)}
function renderPicker(){$('picker').innerHTML='';COL.forEach(c=>{const b=document.createElement('button');b.className=`cb ${S.selectedColor===c?'active':''}`;b.style.background=c;b.onclick=()=>{S.selectedColor=c;renderPicker()};$('picker').appendChild(b)})}
function load(){try{const r=localStorage.getItem(KEY),p=r?JSON.parse(r):null;return p?{...DEF,...p}:JSON.parse(JSON.stringify(DEF))}catch(e){return JSON.parse(JSON.stringify(DEF))}}
function save(){localStorage.setItem(KEY,JSON.stringify(S))}function uid(){return `${Date.now()}-${Math.random().toString(36).slice(2,9)}`}
function todayKey(){return key(new Date)}function key(d){const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),da=String(d.getDate()).padStart(2,'0');return `${y}-${m}-${da}`}
function longDate(d){return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`}
function esc(v){return String(v||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\"/g,'&quot;').replace(/'/g,'&#39;')}

(#roof)'/><polygon points='112,101 105,115 160,139 160,121' fill='#671514'/><polygon points='208,100 215,114 160,139 160,121' fill='#4e0b0b'/></g>`:''}${step>=5?`<g><rect x='176' y='72' width='10' height='28' fill='#f0ddad'/><rect x='174' y='65' width='14' height='10' fill='#a6762a'/><circle cx='95' cy='169' r='4' fill='#dba23b'/><circle cx='226' cy='171' r='4' fill='#dba23b'/><circle cx='84' cy='160' r='3' fill='#f0d588'/><circle cx='238' cy='162' r='3' fill='#f0d588'/></g>`:''}</g>${small?'':`<text x='22' y='210' fill='rgba(77,23,12,.92)' font-size='30' font-weight='700'>Day ${step} / 5</text>`}</svg>`}
