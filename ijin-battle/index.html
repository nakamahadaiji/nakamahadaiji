<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>偉人バトル 入口</title>
<style>
*{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:system-ui,'Hiragino Sans','Yu Gothic',sans-serif;color:#151515;background:radial-gradient(circle at 10% 12%,#ffb5dc 0 8%,transparent 9%),radial-gradient(circle at 90% 10%,#a9bdff 0 9%,transparent 10%),linear-gradient(135deg,#fff3a6,#ffeaf6 48%,#eaf0ff)}.wrap{max-width:980px;margin:auto;padding:28px 14px 80px}.hero,.panel{border:5px solid #111;border-radius:32px;background:#fffdf4f5;box-shadow:0 10px 0 #0003,0 18px 28px #0002;padding:22px;margin:18px 0}h1{font-size:clamp(44px,8vw,82px);line-height:.95;margin:8px 0 16px;font-weight:1000}.blue{color:#5278ff}.note{font-weight:900;line-height:1.8;border:4px solid #111;border-radius:22px;background:#fff;padding:14px;margin:12px 0}.toolbar{display:flex;gap:12px;flex-wrap:wrap}button,input{border:4px solid #111;border-radius:18px;background:#fff;padding:14px 16px;font:inherit;font-weight:1000;box-shadow:0 7px 0 #0004}button{cursor:pointer}button:active{transform:translateY(5px);box-shadow:0 2px 0 #0004}.yellow{background:linear-gradient(135deg,#ffd83d,#fff4a6)}.bluebtn{background:linear-gradient(135deg,#9bb4ff,#f1f5ff)}.red{background:linear-gradient(135deg,#ff7777,#ffe4e4)}.green{background:linear-gradient(135deg,#72e8b0,#effff6)}.hide{display:none!important}.choice{display:grid;grid-template-columns:1fr 1fr;gap:14px}.big{width:100%;font-size:22px;padding:22px}.badge{display:inline-block;border:4px solid #111;border-radius:999px;background:#111;color:#fff;padding:8px 12px;font-weight:1000}.mini{font-size:13px;color:#555;font-weight:800}@media(max-width:700px){.choice{grid-template-columns:1fr}}
</style>
</head>
<body>
<main class="wrap">
<section class="hero">
<span class="badge">授業用</span>
<h1>偉人バトル<br><span class="blue">入口ページ</span></h1>
<div class="note" id="currentMode">現在の設定を読み込み中...</div>
<div class="toolbar">
<button class="yellow" onclick="showTeacher()">教師用</button>
<button class="bluebtn" onclick="goStudent()">生徒用で入る</button>
</div>
<p class="mini">切り替えは教師用だけで行います。生徒用には切り替えボタンを表示しません。</p>
</section>
<section class="panel hide" id="teacherLogin">
<h2>教師用パスワード</h2>
<div class="toolbar"><input id="pass" type="password" inputmode="numeric" placeholder="パスワード"><button class="yellow" onclick="checkPass()">入る</button></div>
<div id="passMsg" class="note">教師用画面に入るにはパスワードが必要です。</div>
</section>
<section class="panel hide" id="teacherPanel">
<h2>教師用：授業バージョン設定</h2>
<div class="note">ここで選んだ版が、生徒用ボタンの行き先になります。</div>
<div class="choice"><button class="big bluebtn" onclick="setMode('world')">世界史版に設定</button><button class="big yellow" onclick="setMode('japan')">日本史版に設定</button></div>
<div class="toolbar" style="margin-top:16px"><button class="green" onclick="openTeacherPage()">設定した版の教師用へ進む</button><button class="red" onclick="clearData()">設定をリセット</button></div>
<div class="note" id="teacherStatus"></div>
</section>
</main>
<script>
const MODE_KEY='ijin_battle_selected_mode';
function modeName(m){return m==='japan'?'日本史版':'世界史版'}
function current(){return localStorage.getItem(MODE_KEY)||'world'}
function update(){const m=current();document.getElementById('currentMode').innerHTML='現在の設定：<b>'+modeName(m)+'</b>';const ts=document.getElementById('teacherStatus');if(ts)ts.innerHTML='現在の設定：<b>'+modeName(m)+'</b><br>生徒用ボタンは <b>'+modeName(m)+'</b> に進みます。'}
function showTeacher(){document.getElementById('teacherLogin').classList.remove('hide')}
function checkPass(){if(document.getElementById('pass').value==='0122'){document.getElementById('teacherLogin').classList.add('hide');document.getElementById('teacherPanel').classList.remove('hide');update()}else{document.getElementById('passMsg').innerHTML='パスワードが違います。'}}
function setMode(m){localStorage.setItem(MODE_KEY,m);update()}
function goStudent(){location.href=current()==='japan'?'japan.html':'world.html'}
function openTeacherPage(){location.href=current()==='japan'?'japan.html':'world.html'}
function clearData(){localStorage.removeItem(MODE_KEY);update()}
update();
</script>
</body>
</html>
