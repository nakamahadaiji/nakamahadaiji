<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>偉人バトルアリーナ POP</title>
<style>
:root{--ink:#151515;--y:#ffd83d;--p:#ff5ca8;--b:#5278ff;--g:#39d98a;--r:#ff5a5a;--paper:#fffdf4}
*{box-sizing:border-box}body{margin:0;font-family:system-ui,"Hiragino Sans","Yu Gothic",sans-serif;color:var(--ink);min-height:100vh;background:radial-gradient(circle at 10% 12%,#ffb5dc 0 8%,transparent 9%),radial-gradient(circle at 90% 10%,#a9bdff 0 9%,transparent 10%),radial-gradient(circle at 16% 88%,#a4f5cc 0 8%,transparent 9%),linear-gradient(135deg,#fff3a6,#ffeaf6 48%,#eaf0ff)}rt{font-size:.58em}.top{position:sticky;top:0;z-index:5;border-bottom:5px solid #111;background:rgba(255,253,244,.94);backdrop-filter:blur(8px)}.topin{max-width:1100px;margin:auto;padding:10px 14px;display:flex;justify-content:space-between;align-items:center}.brand{font-weight:1000;display:flex;gap:10px;align-items:center}.mark{width:48px;height:48px;border:4px solid #111;border-radius:16px;display:grid;place-items:center;background:linear-gradient(135deg,var(--y),#fff);box-shadow:0 6px 0 #0003;transform:rotate(-7deg)}.badge{border:4px solid #111;border-radius:999px;background:#111;color:#fff;padding:8px 12px;font-weight:1000}.wrap{max-width:1100px;margin:auto;padding:18px 14px 80px}.hero,.panel{border:5px solid #111;border-radius:32px;background:rgba(255,253,244,.96);box-shadow:0 10px 0 #0003,0 18px 28px #0002;padding:20px;margin:16px 0}.hero{background:linear-gradient(135deg,#fffdf4,#fff0af)}h1{font-size:clamp(44px,8vw,82px);line-height:.92;margin:12px 0;font-weight:1000}.blue{color:var(--b)}h2{margin:0 0 12px;font-size:22px}.lead,.note{font-weight:800;line-height:1.7}.note{border:4px solid #111;border-radius:22px;background:#fff;padding:12px;margin:10px 0}.toolbar{display:flex;gap:10px;flex-wrap:wrap}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}.rooms{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}button,select{border:4px solid #111;border-radius:18px;background:#fff;padding:12px 14px;font:inherit;font-weight:1000;cursor:pointer;box-shadow:0 7px 0 #0004}button:active{transform:translateY(5px);box-shadow:0 2px 0 #0004}button:disabled{opacity:.45;filter:grayscale(.5)}.yellow{background:linear-gradient(135deg,var(--y),#fff4a6)}.pink{background:linear-gradient(135deg,#ff8ac5,#fff0f7)}.bluebtn{background:linear-gradient(135deg,#9bb4ff,#f1f5ff)}.green{background:linear-gradient(135deg,#72e8b0,#effff6)}.red{background:linear-gradient(135deg,#ff7777,#ffe4e4)}.topic{border:5px solid #111;border-radius:28px;background:repeating-linear-gradient(-45deg,#fff7bd 0 14px,#fffef8 14px 28px);padding:16px;margin:12px 0;box-shadow:0 7px 0 #0003}.topic h3{font-size:28px;margin:0 0 8px}.pill{display:inline-block;border:3px solid #111;border-radius:999px;background:#fff;padding:5px 10px;margin:3px;font-weight:1000}.card{border:5px solid #111;border-radius:26px;background:#fff;overflow:hidden;box-shadow:0 8px 0 #0003}.card.sel{outline:7px solid #ff5ca866}.card.off{opacity:.45;filter:grayscale(.7)}.art{aspect-ratio:2/3;border-bottom:5px solid #111;background:linear-gradient(135deg,#ffd83d,#ff7bbb 52%,#7da0ff);display:grid;place-items:center;text-align:center;font-weight:1000;font-size:18px;padding:10px}.body{padding:12px}.type{display:inline-block;border:3px solid #111;border-radius:999px;background:#eaf0ff;padding:2px 9px;font-size:12px;font-weight:1000}.type.c{background:#ddfff0}.name{font-size:20px;font-weight:1000;line-height:1.2;margin:7px 0}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}.stat{border:3px solid #111;border-radius:14px;background:#fff2a8;text-align:center;font-weight:1000;padding:6px 2px;font-size:13px}.desc{font-size:13px;line-height:1.45;font-weight:700;margin-top:8px}.full{width:100%;margin-top:10px}table{width:100%;border-collapse:collapse;background:#fff;border:4px solid #111}th,td{padding:9px;border-bottom:2px solid #eee;text-align:left}th{background:#111;color:#fff}.hide{display:none!important}@media(max-width:820px){.grid2,.cards{grid-template-columns:1fr}.rooms{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<header class="top"><div class="topin"><div class="brand"><div class="mark">⚔️</div><div>偉人バトル<br>アリーナ POP</div></div><div class="badge" id="badge">公開デモ</div></div></header>
<main class="wrap">
<section class="hero" id="home"><div><span class="pill">世界史版</span><span class="pill">授業用</span><span class="pill">POP UI</span></div><h1>偉人バトル<br><span class="blue">アリーナ</span></h1><p class="lead">ROOMを選ぶだけで参加。NO.1〜40を自動割り当て。<br>知力・攻撃力・防御力で、全員と一斉バトル。</p><div class="toolbar"><button class="yellow" onclick="setRole('teacher')">教師用ではじめる</button><button class="bluebtn" onclick="setRole('student')">生徒用ではじめる</button></div><p class="note">これは公開確認用のデモ版です。同じブラウザ内では教師用・生徒用を別タブで動かせます。</p></section>
<section class="panel hide" id="teacher"><h2>教師用 操作パネル</h2><div class="toolbar"><button class="yellow" onclick="initGame()">授業を開始・初期化</button><select id="topicSel"></select><button class="bluebtn" onclick="setTopic()">お題を出す</button><button class="green" onclick="openChoice()">選択受付</button><button class="pink" onclick="closeChoice()">締切</button><button class="yellow" onclick="battle()">対戦開始</button><button class="bluebtn" onclick="nextTurn()">次のターン</button><button class="red" onclick="resetAll()">全リセット</button></div><div class="grid2"><div class="panel"><h2>状態</h2><div class="note" id="tStatus"></div></div><div class="panel"><h2>選択状況</h2><div class="note" id="choiceStatus"></div></div></div><div id="topicBox"></div><div class="panel"><h2>ランキング</h2><div id="rank"></div></div></section>
<section class="panel hide" id="student"><h2>生徒用</h2><div id="join"><div class="note">名前入力は不要。ROOMを選ぶとNOが自動で出ます。</div><div class="rooms" id="rooms"></div></div><div id="hand" class="hide"><div class="note">配られた5枚から3枚を選びます。偉人カードを1枚以上入れてください。</div><div id="handMsg"></div><div class="cards" id="deal"></div><button class="yellow full" onclick="confirmHand()">この3枚で決定</button></div><div id="play" class="hide"><div id="sTopic"></div><div id="sMsg" class="note"></div><div class="cards" id="myCards"></div><button class="pink full" id="escapeBtn" onclick="escapeTurn()">回避する</button></div><div class="panel"><h2>自分の結果</h2><div class="note" id="myResult">まだ結果はありません。</div><button class="red full" onclick="leave()">退出する</button></div></section>
</main>
<script>
const KEY='ijin_battle_pop_public_v3',STUD='ijin_battle_student_v3';let role='',me=localStorage.getItem(STUD)||'',sel=[];
const base=[
 ['napoleon','great','ナポレオン','',9,10,6,'フランス皇帝としてヨーロッパを大きく動かした。'],['alexander','great','アレクサンドロス大王','アレクサンドロスだいおう',7,10,6,'東方遠征で広い地域を支配した。'],['qin','great','始皇帝','しこうてい',8,8,9,'中国を初めて統一した皇帝。'],['caesar','great','カエサル','',8,8,7,'ローマで大きな権力を握った政治家・軍人。'],['zhugeliang','great','諸葛亮','しょかつりょう',10,4,7,'三国時代の名軍師。'],['genghis','great','チンギス＝ハン','',6,10,7,'モンゴル帝国の基礎を築いた。'],['joan','great','ジャンヌ＝ダルク','',6,9,7,'百年戦争でフランス軍を勇気づけた。'],['gandhi','great','ガンディー','',10,2,9,'非暴力でインド独立運動を進めた。'],['soldier','common','一般兵','いっぱんへい',3,7,5,'戦場で実際に戦い、国家や王を支えた兵士。'],['archer','common','弓兵','きゅうへい',4,6,4,'遠くから攻撃し、戦場の流れを変えた兵士。'],['heavy','common','重装兵','じゅうそうへい',3,5,8,'重い装備で前線を守った防御型の兵士。'],['scout','common','斥候','せっこう',7,3,4,'敵の動きを探り、作戦に必要な情報を集めた。'],['farmer','common','農民','のうみん',4,3,7,'食料生産で社会を支えた人々。'],['merchant','common','商人','しょうにん',7,2,4,'交易やお金の流れを通じて国や都市を動かした。'],['official','common','役人','やくにん',7,2,7,'法律や命令を現場で動かした。']];
const cards=base.flatMap(x=>Array.from({length:x[1]=='great'?2:3},(_,i)=>({id:x[0]+'_'+i,base:x[0],type:x[1],name:x[2],kana:x[3],int:x[4],atk:x[5],def:x[6],desc:x[7]})));
const topics=[{id:'raid',title:'奇襲攻撃',kana:'きしゅうこうげき',ab:'atk',tie:'def',text:'敵のすきをついて一気に攻める。攻撃力が高いカードが勝利。'},{id:'battle',title:'大決戦',kana:'だいけっせん',ab:'atk',tie:'def',text:'大軍同士が正面からぶつかる。攻撃力が高いカードが勝利。'},{id:'reform',title:'制度改革',kana:'せいどかいかく',ab:'int',tie:'def',text:'新しい法律や仕組みを作る。知力が高いカードが勝利。'},{id:'diplomacy',title:'外交交渉',kana:'がいこうこうしょう',ab:'int',tie:'def',text:'戦わずに有利な条件を引き出す。知力が高いカードが勝利。'},{id:'castle',title:'籠城戦',kana:'ろうじょうせん',ab:'def',tie:'int',text:'城や都市を守り抜く。防御力が高いカードが勝利。'},{id:'empire',title:'帝国維持',kana:'ていこくいじ',ab:'def',tie:'int',text:'広い領土を安定して治める。防御力が高いカードが勝利。'}];
const $=id=>document.getElementById(id),ruby=(n,k)=>k?`<ruby>${n}<rt>${k}</rt></ruby>`:n,ab=x=>x=='int'?'知力':x=='atk'?'攻撃力':'防御力',card=id=>cards.find(c=>c.id==id),topic=id=>topics.find(t=>t.id==id)||topics[0];
function data(){return JSON.parse(localStorage.getItem(KEY)||'null')||{game:{turn:1,max:5,topic:'raid',accept:false,phase:'lobby'},p:{},choices:{},scores:{}}}function save(d){localStorage.setItem(KEY,JSON.stringify(d));render()}function setRole(r){role=r;$('home').classList.add('hide');$('teacher').classList.toggle('hide',r!='teacher');$('student').classList.toggle('hide',r!='student');render()}function initGame(){let d=data();d.game={turn:1,max:5,topic:'raid',accept:false,phase:'lobby'};d.choices={};d.scores={};Object.values(d.p).forEach(p=>{p.last='';p.escape=false});save(d)}function setTopic(){let d=data();d.game.topic=$('topicSel').value;d.game.phase='topic';d.game.accept=false;save(d)}function openChoice(){let d=data();d.game.accept=true;d.game.phase='choosing';save(d)}function closeChoice(){let d=data();d.game.accept=false;save(d)}function nextTurn(){let d=data();d.game.turn=Math.min(d.game.turn+1,d.game.max);d.game.accept=false;d.game.phase='topic';save(d)}function resetAll(){if(confirm('全データを消しますか？')){localStorage.removeItem(KEY);localStorage.removeItem(STUD);me='';sel=[];render()}}
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}function one(a){return a[Math.floor(Math.random()*a.length)]}function deal(){let great=cards.filter(c=>c.type=='great'),common=cards.filter(c=>c.type=='common'),out=[one(great),one(common)];for(const c of shuffle(cards)){if(out.length>=5)break;if(out.some(x=>x.base==c.base))continue;out.push(c)}return shuffle(out).map(c=>c.id)}
function join(room){let d=data(),used=new Set(Object.values(d.p).map(p=>p.no)),av=[];for(let i=1;i<=40;i++)if(!used.has(i))av.push(i);if(!av.length)return alert('参加上限です');let key='p'+Date.now()+Math.random().toString(36).slice(2,7);d.p[key]={no:one(av),room,deal:deal(),hand:[],last:'',escape:false};me=key;localStorage.setItem(STUD,key);save(d)}function leave(){let d=data();delete d.p[me];localStorage.removeItem(STUD);me='';sel=[];save(d)}
function confirmHand(){let cs=sel.map(card);if(cs.length!=3)return $('handMsg').innerHTML='<div class="note red">3枚ちょうど選んでください。</div>';if(!cs.some(c=>c.type=='great'))return $('handMsg').innerHTML='<div class="note red">偉人カードを1枚以上入れてください。</div>';let d=data();d.p[me].hand=sel;save(d)}
function choose(id){let d=data(),g=d.game;if(!g.accept)return;let tk='t'+g.turn;d.choices[tk]=d.choices[tk]||{};d.choices[tk][me]={type:'card',id};save(d)}function escapeTurn(){let d=data(),p=d.p[me],g=d.game;if(!g.accept||p.escape)return;let tk='t'+g.turn;d.choices[tk]=d.choices[tk]||{};d.choices[tk][me]={type:'escape'};save(d)}function win(a,b,t){if(a[t.ab]>b[t.ab])return 1;if(a[t.ab]<b[t.ab])return-1;if(a[t.tie]>b[t.tie])return 1;if(a[t.tie]<b[t.tie])return-1;return 0}
function battle(){let d=data(),g=d.game,tk='t'+g.turn,ch=d.choices[tk]||{},ps=Object.entries(d.p),t=topic(g.topic);ps.forEach(([k])=>d.scores[k]=d.scores[k]||{total:0,rounds:{}});ps.forEach(([k,p])=>{let c=ch[k],point=0,W=0,D=0,L=0,used='',act='未選択';if(c?.type=='escape'){point=5;act='回避';p.escape=true}else if(c?.type=='card'){act='カード';used=c.id;let mine=card(c.id);ps.forEach(([ok])=>{if(ok==k)return;let oc=ch[ok];if(!oc||oc.type=='escape'){W++;point+=3;return}let r=win(mine,card(oc.id),t);if(r>0){W++;point+=3}else if(r<0)L++;else{D++;point++}});p.last=used}d.scores[k].total+=point;d.scores[k].rounds[tk]={point,W,D,L,used,act}});g.accept=false;g.phase='result';save(d)}
function renderCard(c,extra=''){return `<div class="card ${extra}" onclick="tapCard('${c.id}')"><div class="art">${ruby(c.name,c.kana)}</div><div class="body"><span class="type ${c.type=='common'?'c':''}">${c.type=='great'?'偉人':'一般'}</span><div class="name">${ruby(c.name,c.kana)}</div><div class="stats"><div class="stat">知力<br>${c.int}</div><div class="stat">攻撃<br>${c.atk}</div><div class="stat">防御<br>${c.def}</div></div><div class="desc">${c.desc}</div></div></div>`}function tapCard(id){let d=data(),p=d.p[me];if(!p)return;if(!p.hand.length){if(sel.includes(id))sel=sel.filter(x=>x!=id);else if(sel.length<3)sel.push(id);return render()}let g=d.game,tk='t'+g.turn,already=d.choices[tk]?.[me];if(g.accept&&!already&&p.last!=id)choose(id)}
function renderTopic(id,el){let t=topic(id);el.innerHTML=`<div class="topic"><h3>${ruby(t.title,t.kana)}</h3><p>${t.text}</p><span class="pill">判定：${ab(t.ab)}</span><span class="pill">同点：${ab(t.tie)}</span></div>`}
function render(){let d=data(),g=d.game,plist=Object.entries(d.p).map(([k,p])=>({k,...p})).sort((a,b)=>a.no-b.no);$('badge').textContent=role=='student'&&me&&d.p[me]?`NO.${d.p[me].no} ROOM ${d.p[me].room}`:'公開デモ';if(role=='teacher'){renderTopic(g.topic,$('topicBox'));let tk='t'+g.turn,ch=d.choices[tk]||{},miss=plist.filter(p=>!ch[p.k]).map(p=>'NO.'+p.no);$('tStatus').innerHTML=`ターン：<b>${g.turn}/${g.max}</b><br>状態：<b>${g.phase}</b><br>受付：<b>${g.accept?'受付中':'停止中'}</b><br>参加：<b>${plist.length}/40</b>`;$('choiceStatus').innerHTML=`選択済み：<b>${plist.length-miss.length}/${plist.length}</b><br>未選択：${miss.join('、')||'なし'}`;let rows=plist.map(p=>[p.k,p.no,p.room,d.scores[p.k]?.total||0]).sort((a,b)=>b[3]-a[3]);$('rank').innerHTML=`<table><tr><th>順位</th><th>番号</th><th>ルーム</th><th>点</th></tr>${rows.map((r,i)=>`<tr><td>${i+1}</td><td>NO.${r[1]}</td><td>ROOM ${r[2]}</td><td>${r[3]}</td></tr>`).join('')}</table>`}if(role=='student'){let p=d.p[me];$('join').classList.toggle('hide',!!p);$('hand').classList.toggle('hide',!p||p.hand.length);$('play').classList.toggle('hide',!p||!p.hand.length);if(!p)return;if(!p.hand.length){$('deal').innerHTML=p.deal.map(id=>renderCard(card(id),sel.includes(id)?'sel':'')).join('')}else{renderTopic(g.topic,$('sTopic'));let tk='t'+g.turn,already=d.choices[tk]?.[me];$('sMsg').innerHTML=already?'選択済みです。先生を待ってください。':g.accept?'カードを1枚選んでください。前ターン使用カードは使えません。':'先生の操作を待っています。';$('myCards').innerHTML=p.hand.map(id=>renderCard(card(id),p.last==id?'off':'' )).join('');$('escapeBtn').disabled=!g.accept||already||p.escape;$('escapeBtn').textContent=p.escape?'回避は使用済み':'回避する（5点）';let sc=d.scores[me]||{total:0,rounds:{}},r=sc.rounds[tk];$('myResult').innerHTML=`合計点：<b>${sc.total||0}点</b>${r?`<hr>今回：${r.point}点<br>勝ち:${r.W} 引き分け:${r.D} 負け:${r.L}`:''}`}}}
function boot(){$('topicSel').innerHTML=topics.map(t=>`<option value="${t.id}">${t.title} / ${ab(t.ab)}</option>`).join('');$('rooms').innerHTML=Array.from({length:10},(_,i)=>`<button class="bluebtn" onclick="join(${i+1})">ROOM<br><span style="font-size:28px">${i+1}</span></button>`).join('');render()}window.addEventListener('storage',render);boot();
</script>
</body></html>
