<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>日本史 偉人バトル</title><style>:root{--ink:#18120f;--ai:#203a63;--aka:#d84b34;--kin:#d7a72f;--kami:#fff8e6;--sumi:#101820;--mid:#ede0c4}*{box-sizing:border-box}body{margin:0;font-family:system-ui,'Hiragino Sans','Yu Gothic',sans-serif;color:var(--ink);min-height:100vh;background:radial-gradient(circle at 10% 12%,#e45b4533 0 9%,transparent 10%),radial-gradient(circle at 88% 12%,#203a6330 0 10%,transparent 11%),radial-gradient(circle at 20% 88%,#d7a72f33 0 9%,transparent 10%),linear-gradient(135deg,#f8edd2,#fff8e6 48%,#e7dcc4)}rt{font-size:.58em}.top{position:sticky;top:0;z-index:9;background:#fff8e6f2;border-bottom:5px solid var(--sumi);backdrop-filter:blur(8px)}.topin{max-width:1180px;margin:auto;padding:10px 14px;display:flex;justify-content:space-between;align-items:center}.brand{display:flex;gap:10px;align-items:center;font-weight:1000}.mark{width:52px;height:52px;border:4px solid var(--sumi);border-radius:18px;display:grid;place-items:center;background:linear-gradient(135deg,var(--aka),var(--kin));color:#fff;box-shadow:0 7px 0 #0003;transform:rotate(-6deg)}.badge{border:4px solid var(--sumi);border-radius:999px;background:var(--ai);color:#fff;padding:8px 13px;font-weight:1000}.wrap{max-width:1180px;margin:auto;padding:18px 14px 80px}.hero,.panel{border:5px solid var(--sumi);border-radius:34px;background:#fff8e9f6;box-shadow:0 10px 0 #0003,0 18px 28px #0002;padding:20px;margin:16px 0}.hero{background:linear-gradient(135deg,#fff8e6,#f4d28d);position:relative;overflow:hidden}.hero:after{content:'日本史';position:absolute;right:-24px;top:22px;transform:rotate(16deg);font-size:58px;font-weight:1000;color:#d84b3420}h1{font-size:clamp(44px,8vw,82px);line-height:.92;margin:12px 0;font-weight:1000}.blue{color:var(--aka)}h2{margin:0 0 12px;font-size:22px}.note{font-weight:800;line-height:1.7;border:4px solid var(--sumi);border-radius:22px;background:#fff;padding:12px;margin:10px 0}.toolbar{display:flex;gap:10px;flex-wrap:wrap}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}.cards{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}.roomList{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}.roomBox{border:4px solid var(--sumi);border-radius:20px;background:#fff;padding:12px;text-align:center;font-weight:1000;box-shadow:0 6px 0 #0003}button,select,input{border:4px solid var(--sumi);border-radius:18px;background:#fff;padding:12px 14px;font:inherit;font-weight:1000;box-shadow:0 7px 0 #0004}button{cursor:pointer}button:active{transform:translateY(5px);box-shadow:0 2px 0 #0004}button:disabled{opacity:.45;filter:grayscale(.5);cursor:not-allowed}.yellow{background:linear-gradient(135deg,var(--kin),#fff0b0)}.pink{background:linear-gradient(135deg,#e77b68,#fff0e9)}.bluebtn{background:linear-gradient(135deg,#37598c,#dbe8ff);color:#fff}.green{background:linear-gradient(135deg,#4ca66a,#eaffef)}.red{background:linear-gradient(135deg,#c53030,#ffe2dc)}.purple{background:linear-gradient(135deg,#764b9b,#f0e6ff);color:#fff}.event,.finale{border:5px solid var(--sumi);border-radius:30px;background:repeating-linear-gradient(-45deg,#fff2c6 0 14px,#fffaf0 14px 28px);padding:16px;margin:12px 0;box-shadow:0 7px 0 #0003;position:relative;overflow:hidden}.event:before{content:'合戦'}.finale:before{content:'終幕'}.event:before,.finale:before{position:absolute;right:-16px;top:16px;transform:rotate(18deg);font-size:40px;font-weight:1000;color:#203a6316}.event h3,.finale h3{font-size:30px;margin:0 0 8px}.pill{display:inline-block;border:3px solid var(--sumi);border-radius:999px;background:#fff;padding:5px 10px;margin:3px;font-weight:1000}.card{border:5px solid var(--sumi);border-radius:26px;background:#fff;overflow:hidden;box-shadow:0 8px 0 #0003;position:relative}.card.used{opacity:.38;filter:grayscale(.85);transform:scale(.98)}.card.used:after{content:'使用済み';position:absolute;top:16px;left:-8px;right:-8px;background:var(--sumi);color:#fff;text-align:center;padding:8px;font-weight:1000;transform:rotate(-8deg);border:3px solid #fff}.photo{aspect-ratio:2/3;border-bottom:5px solid var(--sumi);background:#e2d2a9;display:grid;place-items:center;text-align:center;font-weight:1000;font-size:18px;position:relative;overflow:hidden}.photo img{width:100%;height:100%;object-fit:contain;display:block}.photo .ph{padding:12px}.body{padding:12px}.type{display:inline-block;border:3px solid var(--sumi);border-radius:999px;background:#e7efff;padding:2px 9px;font-size:12px;font-weight:1000}.type.c{background:#e9f7de}.name{font-size:20px;font-weight:1000;line-height:1.2;margin:7px 0}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}.stat{border:3px solid var(--sumi);border-radius:14px;background:#fff2bd;text-align:center;font-weight:1000;padding:6px 2px;font-size:13px}.desc{font-size:13px;line-height:1.45;font-weight:700;margin-top:8px}table{width:100%;border-collapse:collapse;background:#fff;border:4px solid var(--sumi)}th,td{padding:9px;border-bottom:2px solid #eee;text-align:left}th{background:var(--ai);color:#fff}.hide{display:none!important}.remain{display:flex;gap:6px;flex-wrap:wrap;margin:8px 0}.dot{border:3px solid var(--sumi);border-radius:999px;background:#fff;padding:3px 8px;font-weight:1000}.dot.used{background:var(--sumi);color:#fff}@media(max-width:980px){.cards{grid-template-columns:repeat(2,1fr)}.grid2{grid-template-columns:1fr}.roomList{grid-template-columns:repeat(2,1fr)}}@media(max-width:560px){.cards{grid-template-columns:1fr}}</style></head><body><header class="top"><div class="topin"><div class="brand"><div class="mark">和</div><div>日本史<br>偉人バトル</div></div><div class="badge" id="badge">日本史版</div></div></header><main class="wrap"><section class="hero" id="home"><h1>日本史<br><span class="blue">偉人バトル</span></h1><div class="toolbar"><button class="yellow" onclick="openTeacherLogin()">教師用</button><button class="bluebtn" onclick="setRole('student')">生徒用</button></div></section><section class="panel hide" id="teacherLogin"><h2>教師用パスワード</h2><div class="toolbar"><input id="pass" type="password" inputmode="numeric" placeholder="パスワード"><button class="yellow" onclick="checkPass()">入る</button></div><div id="passMsg" class="note">教師用画面に入るにはパスワードが必要です。</div></section><section class="panel hide" id="teacher"><h2>教師用</h2><div class="toolbar"><button class="yellow" onclick="initGame()">授業を開始・初期化</button><select id="roomCount"><option value="1">1ルーム</option><option value="2">2ルーム</option><option value="3">3ルーム</option><option value="4">4ルーム</option><option value="5" selected>5ルーム</option><option value="6">6ルーム</option><option value="7">7ルーム</option><option value="8">8ルーム</option><option value="9">9ルーム</option><option value="10">10ルーム</option></select><button class="purple" onclick="saveRoomCount()">ルーム数を保存</button><select id="eventSel"></select><button class="purple" onclick="setEvent()">イベントを出す</button><button class="green" onclick="openChoice()">選択受付</button><button class="pink" onclick="closeChoice()">締切</button><button class="yellow" onclick="battle()">対戦開始</button><button class="bluebtn" onclick="nextTurn()">次のターン</button><button class="red" onclick="resetAll()">全リセット</button></div><div class="grid2"><div class="panel"><h2>状態</h2><div class="note" id="tStatus"></div></div><div class="panel"><h2>選択状況</h2><div class="note" id="choiceStatus"></div></div></div><div id="eventBox"></div><div id="finalBox"></div><div class="panel"><h2>ルーム</h2><div class="roomList" id="roomsState"></div></div><div class="panel"><h2>ランキング</h2><div id="rank"></div></div></section><section class="panel hide" id="student"><h2>生徒用</h2><div id="join"><div class="note">参加ボタンを押すと、NOとルームが自動で割り振られます。</div><button class="bluebtn" style="width:100%;margin-top:10px" onclick="join()">参加する</button></div><div id="play" class="hide"><div id="sEvent"></div><div id="sFinal"></div><div id="sMsg" class="note"></div><div class="remain" id="remain"></div><div class="cards" id="myCards"></div></div><div class="panel"><h2>自分の結果</h2><div class="note" id="myResult">まだ結果はありません。</div></div></section></main><script>const KEY='ijin_japan_battle_v2',STUD='ijin_japan_student_v2';let role='',me=localStorage.getItem(STUD)||'',teacherOK=sessionStorage.getItem('teacherOK')==='1';const base=[['himiko','great','卑弥呼','ひみこ',8,3,8,'邪馬台国を治めた女王。'],['shotoku','great','聖徳太子','しょうとくたいし',9,4,7,'仏教政治を進めた皇族。'],['naka_no_oe','great','中大兄皇子','なかのおおえのおうじ',8,6,7,'大化の改新を進めた人物。'],['michinaga','great','藤原道長','ふじわらのみちなが',9,3,8,'摂関政治を代表する貴族。'],['kiyomori','great','平清盛','たいらのきよもり',7,8,7,'武士として初めて政権を握った人物。'],['yoritomo','great','源頼朝','みなもとのよりとも',8,8,8,'鎌倉幕府を開いた将軍。'],['masako','great','北条政子','ほうじょうまさこ',8,4,9,'鎌倉幕府を支えた尼将軍。'],['godaiigo','great','後醍醐天皇','ごだいごてんのう',7,5,7,'建武の新政を進めた天皇。'],['takauji','great','足利尊氏','あしかがたかうじ',7,8,7,'室町幕府を開いた武将。'],['nobunaga','great','織田信長','おだのぶなが',8,10,5,'天下統一を進めた武将。'],['hideyoshi','great','豊臣秀吉','とよとみひでよし',9,8,6,'全国統一を成し遂げた武将。'],['ieyasu','great','徳川家康','とくがわいえやす',8,7,10,'江戸幕府を開いた将軍。'],['yoshimune','great','徳川吉宗','とくがわよしむね',8,5,8,'享保の改革を行った将軍。'],['tanuma','great','田沼意次','たぬまおきつぐ',9,3,6,'商業重視の政治を進めた老中。'],['sadanobu','great','松平定信','まつだいらさだのぶ',8,3,8,'寛政の改革を行った老中。'],['ryoma','great','坂本龍馬','さかもとりょうま',9,5,6,'薩長同盟に関わった志士。'],['saigo','great','西郷隆盛','さいごうたかもり',7,9,7,'明治維新を進めた中心人物。'],['okubo','great','大久保利通','おおくぼとしみち',9,4,8,'近代国家づくりを進めた政治家。'],['ito','great','伊藤博文','いとうひろぶみ',9,4,8,'初代内閣総理大臣。'],['fukuzawa','great','福沢諭吉','ふくざわゆきち',10,2,6,'近代思想を広めた教育者。'],['shibusawa','great','渋沢栄一','しぶさわえいいち',9,3,7,'日本資本主義の父と呼ばれた人物。'],['japan_farmer','common','農民','のうみん',2,2,5,'年貢と生産で社会を支えた。'],['samurai','common','武士','ぶし',2,5,2,'戦いを担った身分。'],['ashigaru','common','足軽','あしがる',1,5,3,'戦場で戦った下級兵士。'],['japan_merchant','common','商人','しょうにん',5,1,3,'流通とお金を動かした。'],['japan_craftsman','common','職人','しょくにん',3,3,3,'技術でものづくりを支えた。'],['monk','common','僧','そう',5,1,3,'宗教と学問を広めた。'],['chonin','common','町人','ちょうにん',4,2,3,'都市の文化を支えた。'],['village_official','common','村役人','むらやくにん',4,1,4,'村の運営を支えた。'],['ninja','common','忍び','しのび',5,3,1,'情報収集や潜入を担った。'],['japan_people','common','民衆','みんしゅう',2,3,4,'時代を動かした名もなき人々。']];const cards=base.flatMap(x=>Array.from({length:x[1]=='great'?2:4},(_,i)=>({id:x[0]+'_'+i,base:x[0],type:x[1],name:x[2],kana:x[3],int:x[4],atk:x[5],def:x[6],desc:x[7],img:'images/'+x[0]+'.png'})));const events=[{id:'hakusukinoe',title:'白村江の戦い',kana:'はくすきのえのたたかい',ab:'atk',tie:'def',kind:'normal',text:'倭が唐・新羅連合軍に敗れた戦い。攻撃力で勝負。'},{id:'jinshin',title:'壬申の乱',kana:'じんしんのらん',ab:'atk',tie:'int',kind:'normal',text:'古代最大の内乱。攻撃力で勝負。'},{id:'taika',title:'大化の改新',kana:'たいかのかいしん',ab:'int',tie:'def',kind:'normal',text:'政治の仕組みを大きく変えた改革。知力で勝負。'},{id:'sekkan',title:'摂関政治',kana:'せっかんせいじ',ab:'int',tie:'def',kind:'normal',text:'藤原氏が政治の中心となった仕組み。知力で勝負。'},{id:'hogen',title:'保元の乱',kana:'ほうげんのらん',ab:'atk',tie:'def',kind:'normal',text:'武士の力が高まるきっかけとなった戦い。攻撃力で勝負。'},{id:'heiji',title:'平治の乱',kana:'へいじのらん',ab:'atk',tie:'def',kind:'normal',text:'平氏の力が強まった戦い。攻撃力で勝負。'},{id:'dannoura',title:'壇ノ浦の戦い',kana:'だんのうらのたたかい',ab:'atk',tie:'def',kind:'normal',text:'源平合戦の決着となった戦い。攻撃力で勝負。'},{id:'jokyu',title:'承久の乱',kana:'じょうきゅうのらん',ab:'def',tie:'int',kind:'normal',text:'朝廷と幕府の力関係が変わった戦い。防御力で勝負。'},{id:'genko',title:'元寇',kana:'げんこう',ab:'def',tie:'atk',kind:'normal',text:'モンゴル軍の襲来を防いだ出来事。防御力で勝負。'},{id:'onin',title:'応仁の乱',kana:'おうにんのらん',ab:'atk',tie:'def',kind:'normal',text:'戦国時代につながる大きな内乱。攻撃力で勝負。'},{id:'okehazama',title:'桶狭間の戦い',kana:'おけはざまのたたかい',ab:'atk',tie:'int',kind:'low',text:'少数の信長軍が大軍を破った戦い。攻撃力が低い方が勝つ。'},{id:'honnoji',title:'本能寺の変',kana:'ほんのうじのへん',ab:'atk',tie:'int',kind:'gekokujo',text:'明智光秀が織田信長を討った事件。一般カードが偉人相手なら+6。'},{id:'sekigahara',title:'関ヶ原の戦い',kana:'せきがはらのたたかい',ab:'atk',tie:'def',kind:'normal',text:'天下分け目の戦い。攻撃力で勝負。'},{id:'shimabara',title:'島原・天草一揆',kana:'しまばらあまくさいっき',ab:'atk',tie:'def',kind:'gekokujo',text:'民衆が幕府に抵抗した一揆。一般カードが偉人相手なら+6。'},{id:'kyoho',title:'享保の改革',kana:'きょうほうのかいかく',ab:'int',tie:'def',kind:'normal',text:'徳川吉宗による幕政改革。知力で勝負。'},{id:'kansei',title:'寛政の改革',kana:'かんせいのかいかく',ab:'def',tie:'int',kind:'normal',text:'松平定信による引き締め政策。防御力で勝負。'},{id:'taiseihokan',title:'大政奉還',kana:'たいせいほうかん',ab:'int',tie:'def',kind:'normal',text:'徳川慶喜が政権を朝廷に返した出来事。知力で勝負。'},{id:'boshin',title:'戊辰戦争',kana:'ぼしんせんそう',ab:'atk',tie:'def',kind:'normal',text:'旧幕府軍と新政府軍の戦い。攻撃力で勝負。'},{id:'seinan',title:'西南戦争',kana:'せいなんせんそう',ab:'atk',tie:'def',kind:'normal',text:'西郷隆盛を中心とした士族反乱。攻撃力で勝負。'},{id:'minken',title:'自由民権運動',kana:'じゆうみんけんうんどう',ab:'int',tie:'def',kind:'revolution',text:'国会開設や憲法制定を求めた運動。合計能力が低いカードに+5。'},{id:'nisshin',title:'日清戦争',kana:'にっしんせんそう',ab:'atk',tie:'def',kind:'normal',text:'朝鮮をめぐる日本と清の戦争。攻撃力で勝負。'},{id:'nichiro',title:'日露戦争',kana:'にちろせんそう',ab:'def',tie:'atk',kind:'normal',text:'日本とロシアの戦争。防御力で勝負。'}];const $=id=>document.getElementById(id),ruby=(n,k)=>k?`<ruby>${n}<rt>${k}</rt></ruby>`:n,ab=x=>x=='int'?'知力':x=='atk'?'攻撃力':'防御力',card=id=>cards.find(c=>c.id==id),eventBy=id=>events.find(t=>t.id==id)||events[0],total=c=>c.int+c.atk+c.def;function data(){return JSON.parse(localStorage.getItem(KEY)||'null')||{game:{turn:1,max:5,event:'hakusukinoe',accept:false,phase:'lobby',roomCount:5},p:{},choices:{},scores:{}}}function save(d){localStorage.setItem(KEY,JSON.stringify(d));render()}function hideAll(){['home','teacherLogin','teacher','student'].forEach(id=>$(id).classList.add('hide'))}function openTeacherLogin(){hideAll();$('teacherLogin').classList.remove('hide')}function checkPass(){if($('pass').value==='0122'){teacherOK=true;sessionStorage.setItem('teacherOK','1');setRole('teacher')}else{$('passMsg').innerHTML='パスワードが違います。'}}function setRole(r){if(r==='teacher'&&!teacherOK)return openTeacherLogin();role=r;hideAll();$(r).classList.remove('hide');render()}function eventNow(g){return eventBy(g.event)}function validRoomCount(want,players){want=Number(want||1);if(want<=1)return 1;if(players<6)return 1;return Math.max(1,Math.min(want,10,Math.floor(players/3)))}function initGame(){let d=data();let rc=validRoomCount($('roomCount').value,Object.keys(d.p).length);d.game={turn:1,max:5,event:'hakusukinoe',accept:false,phase:'lobby',roomCount:rc};d.choices={};d.scores={};Object.values(d.p).forEach(p=>{p.used=[]});assignRooms(d);save(d)}function saveRoomCount(){let d=data();d.game.roomCount=validRoomCount($('roomCount').value,Object.keys(d.p).length);assignRooms(d);save(d)}function setEvent(){let d=data();d.game.event=$('eventSel').value;d.game.phase='event';d.game.accept=false;save(d)}function openChoice(){let d=data();d.game.accept=true;d.game.phase='choosing';save(d)}function closeChoice(){let d=data();d.game.accept=false;save(d)}function nextTurn(){let d=data();d.game.turn=Math.min(d.game.turn+1,d.game.max);d.game.accept=false;d.game.phase='event';save(d)}function resetAll(){if(confirm('全データを消しますか？')){localStorage.removeItem(KEY);localStorage.removeItem(STUD);me='';render()}}function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}function one(a){return a[Math.floor(Math.random()*a.length)]}function deal(){let great=cards.filter(c=>c.type==='great'),common=cards.filter(c=>c.type==='common'),out=[one(great),one(common)];for(const c of shuffle(cards)){if(out.length>=5)break;if(out.some(x=>x.base===c.base))continue;out.push(c)}return shuffle(out).map(c=>c.id)}function assignRooms(d){let n=validRoomCount(d.game.roomCount,Object.keys(d.p).length),list=Object.entries(d.p).sort((a,b)=>a[1].no-b[1].no);d.game.roomCount=n;list.forEach(([k,p],i)=>p.room=(i%n)+1)}function join(){let d=data(),used=new Set(Object.values(d.p).map(p=>p.no)),av=[];for(let i=1;i<=40;i++)if(!used.has(i))av.push(i);if(!av.length)return alert('参加上限です');let key='p'+Date.now()+Math.random().toString(36).slice(2,7);d.p[key]={no:one(av),room:1,hand:deal(),used:[]};me=key;localStorage.setItem(STUD,key);assignRooms(d);save(d)}function score(c,t,op){let v=c[t.ab];if(t.kind==='gekokujo'&&c.type==='common'&&op&&op.type==='great')v+=6;if(t.kind==='revolution'&&total(c)<=9)v+=5;return v}function cmp(a,b,t){let av=score(a,t,b),bv=score(b,t,a);if(t.kind==='low'){if(av<bv)return 1;if(av>bv)return-1}else{if(av>bv)return 1;if(av<bv)return-1}if(a[t.tie]>b[t.tie])return 1;if(a[t.tie]<b[t.tie])return-1;return 0}function choose(id){let d=data(),g=d.game,p=d.p[me];if(!g.accept||p.used.includes(id))return;let tk='t'+g.turn;d.choices[tk]=d.choices[tk]||{};d.choices[tk][me]={id};save(d)}function battle(){let d=data(),g=d.game,tk='t'+g.turn,ch=d.choices[tk]||{},ps=Object.entries(d.p),ev=eventNow(g);ps.forEach(([k])=>d.scores[k]=d.scores[k]||{total:0,rounds:{}});ps.forEach(([k,p])=>{let c=ch[k],point=0,W=0,D=0,L=0,used='';if(c){used=c.id;let mine=card(c.id);ps.forEach(([ok])=>{if(ok===k)return;let oc=ch[ok];if(!oc){W++;point+=3;return}let r=cmp(mine,card(oc.id),ev);if(r>0){W++;point+=3}else if(r<0)L++;else{D++;point++}});p.used.push(used)}d.scores[k].total=(d.scores[k].total||0)+point;d.scores[k].rounds=d.scores[k].rounds||{};d.scores[k].rounds[tk]={point,W,D,L,used}});g.accept=false;g.phase='result';save(d)}function renderEvent(ev,el){el.innerHTML='<div class="event"><h3>'+ruby(ev.title,ev.kana)+'</h3><p>'+ev.text+'</p><span class="pill">判定：'+ab(ev.ab)+'</span><span class="pill">同点：'+ab(ev.tie)+'</span></div>'}function renderCard(c,used){return '<div class="card '+(used?'used':'')+'" onclick="choose(\''+c.id+'\')"><div class="photo"><img src="'+c.img+'" onerror="this.remove();this.parentElement.innerHTML=\'<div class=ph>画像はあとで追加<br>'+c.base+'.png</div>\'"></div><div class="body"><span class="type '+(c.type==='common'?'c':'')+'">'+(c.type==='great'?'偉人':'一般')+'</span><div class="name">'+ruby(c.name,c.kana)+'</div><div class="stats"><div class="stat">知力<br>'+c.int+'</div><div class="stat">攻撃<br>'+c.atk+'</div><div class="stat">防御<br>'+c.def+'</div></div><div class="desc">'+c.desc+'</div></div></div>'}function renderFinal(d){let ps=Object.entries(d.p).map(([k,p])=>({k,...p,score:d.scores[k]?.total||0})).sort((a,b)=>b.score-a.score);if(d.game.turn<5||d.game.phase!=='result'||!ps.length)return'';return '<div class="finale"><h3>最終結果</h3><p><b>優勝：NO.'+ps[0].no+'</b>　'+ps[0].score+'点</p><p>称号：時代を動かした覇者</p><p>下位の人も称号：名もなき挑戦者</p></div>'}function render(){let d=data(),g=d.game,ev=eventNow(g),plist=Object.entries(d.p).map(([k,p])=>({k,...p})).sort((a,b)=>a.no-b.no);$('badge').textContent=role==='student'&&me&&d.p[me]?'NO.'+d.p[me].no+' ROOM '+d.p[me].room:'日本史版';if(role==='teacher'){$('eventSel').innerHTML=events.map(e=>'<option value="'+e.id+'">'+e.title+'</option>').join('');$('eventSel').value=g.event;renderEvent(ev,$('eventBox'));$('finalBox').innerHTML=renderFinal(d);let tk='t'+g.turn,ch=d.choices[tk]||{},miss=plist.filter(p=>!ch[p.k]).map(p=>'NO.'+p.no);$('tStatus').innerHTML='ターン：<b>'+g.turn+'/'+g.max+'</b><br>状態：<b>'+g.phase+'</b><br>受付：<b>'+(g.accept?'受付中':'停止中')+'</b><br>参加：<b>'+plist.length+'/40</b><br>モード：<b>日本史</b>';$('choiceStatus').innerHTML='選択済み：<b>'+(plist.length-miss.length)+'/'+plist.length+'</b><br>未選択：'+(miss.join('、')||'なし');let counts={};for(let i=1;i<=g.roomCount;i++)counts[i]=0;plist.forEach(p=>counts[p.room]=(counts[p.room]||0)+1);$('roomsState').innerHTML=Object.keys(counts).map(r=>'<div class="roomBox">ROOM '+r+'<br>'+counts[r]+'人</div>').join('');let rows=plist.map(p=>[p.k,p.no,p.room,d.scores[p.k]?.total||0]).sort((a,b)=>b[3]-a[3]);$('rank').innerHTML='<table><tr><th>順位</th><th>番号</th><th>ルーム</th><th>点</th></tr>'+rows.map((r,i)=>'<tr><td>'+(i+1)+'</td><td>NO.'+r[1]+'</td><td>ROOM '+r[2]+'</td><td>'+r[3]+'</td></tr>').join('')+'</table>'}if(role==='student'){let p=d.p[me];$('join').classList.toggle('hide',!!p);$('play').classList.toggle('hide',!p);if(!p)return;renderEvent(ev,$('sEvent'));$('sFinal').innerHTML=renderFinal(d);let tk='t'+g.turn,already=d.choices[tk]?.[me];$('sMsg').innerHTML=already?'選択済みです。先生を待ってください。':g.accept?'カードを1枚選んでください。使ったカードは消えます。':'先生の操作を待っています。';$('remain').innerHTML=p.hand.map((id,i)=>'<span class="dot '+(p.used.includes(id)?'used':'')+'">'+(i+1)+'</span>').join('');$('myCards').innerHTML=p.hand.map(id=>renderCard(card(id),p.used.includes(id))).join('');let sc=d.scores[me]||{total:0,rounds:{}},r=sc.rounds?.[tk];$('myResult').innerHTML='合計点：<b>'+(sc.total||0)+'点</b>'+(r?'<hr>今回：'+r.point+'点<br>勝ち:'+r.W+' 引き分け:'+r.D+' 負け:'+r.L:'')}}function boot(){$('eventSel').innerHTML=events.map(e=>'<option value="'+e.id+'">'+e.title+'</option>').join('');render()}window.addEventListener('storage',render);boot();</script></body></html>
