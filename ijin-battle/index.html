<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>偉人バトル 入口</title><style>*{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:system-ui,'Hiragino Sans','Yu Gothic',sans-serif;color:#151515;background:radial-gradient(circle at 10% 12%,#ffb5dc 0 8%,transparent 9%),radial-gradient(circle at 90% 10%,#a9bdff 0 9%,transparent 10%),linear-gradient(135deg,#fff3a6,#ffeaf6 48%,#eaf0ff)}.wrap{max-width:900px;margin:auto;padding:28px 14px 80px}.hero,.panel{border:5px solid #111;border-radius:32px;background:#fffdf4f5;box-shadow:0 10px 0 #0003,0 18px 28px #0002;padding:22px;margin:18px 0}h1{font-size:clamp(44px,8vw,82px);line-height:.95;margin:8px 0 16px;font-weight:1000}.blue{color:#5278ff}.note{font-weight:900;line-height:1.8;border:4px solid #111;border-radius:22px;background:#fff;padding:14px;margin:12px 0}.toolbar{display:flex;gap:12px;flex-wrap:wrap}button,input{border:4px solid #111;border-radius:18px;background:#fff;padding:14px 16px;font:inherit;font-weight:1000;box-shadow:0 7px 0 #0004}button{cursor:pointer}button:active{transform:translateY(5px);box-shadow:0 2px 0 #0004}.yellow{background:linear-gradient(135deg,#ffd83d,#fff4a6)}.bluebtn{background:linear-gradient(135deg,#9bb4ff,#f1f5ff)}.red{background:linear-gradient(135deg,#ff7777,#ffe4e4)}.green{background:linear-gradient(135deg,#72e8b0,#effff6)}.hide{display:none!important}.choice{display:grid;grid-template-columns:1fr 1fr;gap:14px}.big{width:100%;font-size:22px;padding:22px}.badge{display:inline-block;border:4px solid #111;border-radius:999px;background:#111;color:#fff;padding:8px 12px;font-weight:1000}@media(max-width:700px){.choice{grid-template-columns:1fr}}</style></head><body><main class="wrap"><section class="hero"><span class="badge">授業用</span><h1>偉人バトル<br><span class="blue">入口ページ</span></h1><div class="note" id="currentMode"></div><div class="toolbar"><button class="yellow" id="teacherBtn">教師用</button><button class="bluebtn" id="studentBtn">生徒用で入る</button></div></section><section class="panel hide" id="teacherLogin"><h2>教師用パスワード</h2><div class="toolbar"><input id="pass" type="password" inputmode="numeric" placeholder="パスワード"><button class="yellow" id="loginBtn">入る</button></div><div id="passMsg" class="note">教師用画面に入るにはパスワードが必要です。</div></section><section class="panel hide" id="teacherPanel"><h2>教師用：授業バージョン設定</h2><div class="choice"><button class="big bluebtn" id="worldBtn">世界史版に設定</button><button class="big yellow" id="japanBtn">日本史版に設定</button></div><div class="toolbar" style="margin-top:16px"><button class="green" id="openBtn">設定した版の教師用へ進む</button><button class="red" id="resetBtn">設定をリセット</button></div><div class="note" id="teacherStatus"></div></section></main><script>const MODE_KEY='ijin_battle_selected_mode';const $=id=>document.getElementById(id);function modeName(m){return m==='japan'?'日本史版':'世界史版'}function current(){return localStorage.getItem(MODE_KEY)||'world'}function url(){return current()==='japan'?'japan.html':'world.html'}function update(){const m=current();$('currentMode').innerHTML='現在の設定：<b>'+modeName(m)+'</b>';if($('teacherStatus'))$('teacherStatus').innerHTML='現在の設定：<b>'+modeName(m)+'</b>'}$('teacherBtn').onclick=()=>{$('teacherLogin').classList.remove('hide')};$('studentBtn').onclick=()=>{location.href=url()};$('loginBtn').onclick=()=>{if($('pass').value==='0122'){$('teacherLogin').classList.add('hide');$('teacherPanel').classList.remove('hide');update()}else{$('passMsg').textContent='パスワードが違います。'}};$('worldBtn').onclick=()=>{localStorage.setItem(MODE_KEY,'world');update()};$('japanBtn').onclick=()=>{localStorage.setItem(MODE_KEY,'japan');update()};$('openBtn').onclick=()=>{location.href=url()};$('resetBtn').onclick=()=>{localStorage.removeItem(MODE_KEY);update()};update();</script></body></html>
