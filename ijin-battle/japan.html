<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>日本史 偉人バトル</title><style>*{box-sizing:border-box}body{margin:0;font-family:system-ui,'Hiragino Sans','Yu Gothic',sans-serif;background:linear-gradient(135deg,#f8edd2,#fff8e6 48%,#e7dcc4);color:#18120f}.wrap{max-width:1180px;margin:auto;padding:18px 14px 80px}.top{position:sticky;top:0;z-index:9;background:#fff8e6f2;border-bottom:5px solid #101820}.topin{max-width:1180px;margin:auto;padding:10px 14px;display:flex;justify-content:space-between;align-items:center}.brand{font-weight:1000}.badge{border:4px solid #101820;border-radius:999px;background:#203a63;color:#fff;padding:8px 12px;font-weight:1000}.hero,.panel{border:5px solid #101820;border-radius:30px;background:#fff8e9f6;box-shadow:0 10px 0 #0003;padding:18px;margin:16px 0}h1{font-size:clamp(44px,8vw,82px);line-height:.92;margin:12px 0;font-weight:1000}.blue{color:#d84b34}.note{font-weight:900;line-height:1.7;border:4px solid #101820;border-radius:20px;background:#fff;padding:12px;margin:10px 0}.toolbar{display:flex;gap:10px;flex-wrap:wrap}button,select,input{border:4px solid #101820;border-radius:18px;background:#fff;padding:12px 14px;font:inherit;font-weight:1000;box-shadow:0 7px 0 #0004}button{cursor:pointer}button:active{transform:translateY(5px);box-shadow:0 2px 0 #0004}.yellow{background:linear-gradient(135deg,#d7a72f,#fff0b0)}.bluebtn{background:linear-gradient(135deg,#37598c,#dbe8ff);color:#fff}.green{background:linear-gradient(135deg,#4ca66a,#eaffef)}.pink{background:linear-gradient(135deg,#e77b68,#fff0e9)}.red{background:linear-gradient(135deg,#c53030,#ffe2dc)}.purple{background:linear-gradient(135deg,#764b9b,#f0e6ff);color:#fff}.hide{display:none!important}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}.cards{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}.roomList{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}.roomBox{border:4px solid #1 px){.cards{grid-template-columns:1fr}}</style></head><body><header class="top"><div class="topin"><div class="brand">和 日本史 偉人バトル</div><div class="badge" id="badge">日本史版</div></div></header><main class="wrap"><section class="hero" id="home"><h1>日本史<br><span class="blue">偉人バトル</span></h1><div class="toolbar"><button class="yellow" id="teacherBtn">教師用</button><button class="bluebtn" id="studentBtn">生徒用</button></div></section><section class="panel hide" id="login"><h2>教師用パスワード</h2><div class="toolbar"><input id="pass" type="password" inputmode="numeric" placeholder="パスワード"><button class="yellow" id="loginBtn">入る</button></div><div class="note" id="passMsg">パスワードを入力してください。</div></section><section class="panel hide" id="teacher"><h2>教師用</h2><div class="toolbar"><button class="yellow" id="startBtn">開始・初期化</button><select id="roomCount"><option value="1">1ルーム</option><option value="2">2ルーム</option><option value="3">3ルーム</option><option value="4">4ルーム</option><option value="5" selected>5ルーム</option><option value="6">6ルーム</option><option value="7">7ルーム</option><option value="8">8ルーム</option><option value="9">9ルーム</option><option value="10">10ルーム</option></select><button class="purple" id="roomBtn">保存</button><select id="eventSel"></select><button class="purple" id="eventBtn">イベントを出す</button><button class="green" id="openBtn">選択受付</button><button class="pink" id="closeBtn">締切</button><button class="yellow" id="battleBtn">対戦開始</button><button class="bluebtn" id="nextBtn">次のターン</button><button class="red" id="resetBtn">全リセット</button></div><div id="eventBox"></div><div id="finalBox"></div><div class="grid2"><div class="panel"><h2>状態</h2><div class="note" id="status"></div></div><div class="panel"><h2>選択状況</h2><div class="note" id="choices"></div></div></div><div class="panel"><h2>ルーム</h2><div class="roomList" id="rooms"></div></div><div class="panel"><h2>ランキング</h2><div id="rank"></div></div></section><section class="panel hide" id="student"><h2>生徒用</h2><div id="joinBox"><button class="bluebtn" style="width:100%" id="joinBtn">参加する</button></div><div id="playBox" class="hide"><div id="sEvent"></div><div id="sFinal"></div><div class="note" id="sMsg"></div><div class="remain" id="remain"></div><div class="cards" id="myCards"></div></div><div class="panel"><h2>自分の結果</h2><div class="note" id="myResult">まだ結果はありません。</div></div></section></main><script>window.GAME_CONFIG={label:'日本史版',storageKey:'battle_japan_v4',studentKey:'battle_japan_me_v4',cards:[['himiko','great','卑弥呼','ひみこ',8,3,8,'邪馬台国を治めた女王。',2],['shotoku','great','聖徳太子','しょうとくたいし',9,4,7,'仏教政治を進めた皇族。',2],['naka_no_oe','great','中大兄皇子','なかのおおえのおうじ',8,6,7,'大化の改新を進めた人物。',2],['michinaga','great','藤原道長','ふじわらのみちなが',9,3,8,'摂関政治を代表する貴族。',2],['kiyomori','great','平清盛','たいらのきよもり',7,8,7,'武士として初めて政権を握った人物。',2],['yoritomo','great','源頼朝','みなもとのよりとも',8,8,8,'鎌倉幕府を開いた将軍。',2],['masako','great','北条政子','ほうじょうまさこ',8,4,9,'鎌倉幕府を支えた尼将軍。',2],['godaiigo','great','後醍醐天皇','ごだいごてんのう',7,5,7,'建武の新政を進めた天皇。',2],['takauji','great','足利尊氏','あしかがたかうじ',7,8,7,'室町幕府を開いた武将。',2],['nobunaga','great','織田信長','おだのぶなが',8,10,5,'天下統一を進めた武将。',3],['hideyoshi','great','豊臣秀吉','とよとみひでよし',9,8,6,'全国統一を成し遂げた武将。',3],['ieyasu','great','徳川家康','とくがわいえやす',8,7,10,'江戸幕府を開いた将軍。',3],['yoshimune','great','徳川吉宗','とくがわよしむね',8,5,8,'享保の改革を行った将軍。',2],['tanuma','great','田沼意次','たぬまおきつぐ',9,3,6,'商業重視の政治を進めた老中。',2],['sadanobu','great','松平定信','まつだいらさだのぶ',8,3,8,'寛政の改革を行った老中。',2],['ryoma','great','坂本龍馬','さかもとりょうま',9,5,6,'薩長同盟に関わった志士。',2],['saigo','great','西郷隆盛','さいごうたかもり',7,9,7,'明治維新を進めた中心人物。',2],['okubo','great','大久保利通','おおくぼとしみち',9,4,8,'近代国家づくりを進めた政治家。',2],['ito','great','伊藤博文','いとうひろぶみ',9,4,8,'初代内閣総理大臣。',2],['fukuzawa','great','福沢諭吉','ふくざわゆきち',10,2,6,'近代思想を広めた教育者。',2],['shibusawa','great','渋沢栄一','しぶさわえいいち',9,3,7,'日本資本主義の父と呼ばれた人物。',2],['japan_farmer','common','農民','のうみん',2,2,5,'年貢と生産で社会を支えた。',1],['samurai','common','武士','ぶし',2,5,2,'戦いを担った身分。',1],['ashigaru','common','足軽','あしがる',1,5,3,'戦場で戦った下級兵士。',1],['japan_merchant','common','商人','しょうにん',5,1,3,'流通とお金を動かした。',1],['jap
