<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>日本史 偉人バトル</title><style>*{box-sizing:border-box}body{margin:0;font-family:system-ui,'Hiragino Sans','Yu Gothic',sans-serif;background:linear-gradient(135deg,#f8edd2,#fff8e6 48%,#e7dcc4);color:#18120f}.wrap{max-width:1180px;margin:auto;padding:18px 14px 80px}.top{position:sticky;top:0;z-index:9;background:#fff8e6f2;border-bottom:5px solid #101820}.topin{max-width:1180px;margin:auto;padding:10px 14px;display:flex;justify-content:space-between;align-items:center}.brand{font-weight:1000}.badge{border:4px solid #101820;border-radius:999px;background:#203a63;color:#fff;padding:8px 12px;font-weight:1000}.hero,.panel{border:5px solid #101820;border-radius:30px;background:#fff8e9f6;box-shadow:0 10px 0 #0003;padding:18px;margin:16px 0}h1{font-size:clamp(44px,8vw,82px);line-height:.92;margin:12px 0;font-weight:1000}.blue{color:#d84b34}.note{font-weight:900;line-height:1.7;border:4px solid #101820;border-radius:20px;background:#fff;padding:12px;margin:10px 0}.toolbar{display:flex;gap:10px;flex-wrap:wrap}button,select,input{border:4px solid #101820;border-radius:18px;background:#fff;padding:12px 14px;font:inherit;font-weight:1000;box-shadow:0 7px 0 #0004}button{cursor:pointer}button:active{transform:translateY(5px);box-shadow:0 2px 0 #0004}.yellow{background:linear-gradient(135deg,#d7a72f,#fff0b0)}.bluebtn{background:linear-gradient(135deg,#37598c,#dbe8ff);color:#fff}.green{background:linear-gradient(135deg,#4ca66a,#eaffef)}.pink{background:linear-gradient(135deg,#e77b68,#fff0e9)}.red{background:linear-gradient(135deg,#c53030,#ffe2dc)}.purple{background:linear-gradient(135deg,#764b9b,#f0e6ff);color:#fff}.hide{display:none!important}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}.cards{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}.roomList{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}.roomBox{border:4px solid #101820;border-radius:18px;background:#fff;padding:12px;text-align:center;font-weight:1000}.event,.finale{border:5px solid #101820;border-radius:28px;background:repeating-linear-gradient(-45deg,#fff2c6 0 14px,#fffaf0 14px 28px);padding:16px;margin:12px 0;box-shadow:0 7px 0 #0003}.event h3,.finale h3{font-size:28px;margin:0 0 8px}.pill{display:inline-block;border:3px solid #101820;border-radius:999px;background:#fff;padding:5px 10px;margin:3px;font-weight:1000}.card{border:5px solid #101820;border-radius:24px;background:#fff;overflow:hidden;box-shadow:0 8px 0 #0003}.photo{aspect-ratio:2/3;border-bottom:5px solid #101820;background:#e2d2a9;display:grid;place-items:center;text-align:center;font-weight:1000;overflow:hidden}.photo img{width:100%;height:100%;object-fit:contain}.body{padding:12px}.type,.rarity{display:inline-block;border:3px solid #101820;border-radius:999px;padding:2px 9px;font-size:12px;font-weight:1000}.type{background:#e7efff}.type.c{background:#e9f7de}.rarity{margin-left:4px}.r1{background:#e9f7de}.r2{background:#e7efff}.r3{background:linear-gradient(135deg,#ffd94a,#fff4b8)}.name{font-size:20px;font-weight:1000;line-height:1.2;margin:7px 0}rt{font-size:.58em}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}.stat{border:3px solid #101820;border-radius:14px;background:#fff2bd;text-align:center;font-weight:1000;padding:6px 2px;font-size:13px}.desc{font-size:13px;line-height:1.45;font-weight:700;margin-top:8px}table{width:100%;border-collapse:collapse;background:#fff;border:4px solid #101820}th,td{padding:9px;border-bottom:2px solid #eee;text-align:left}th{background:#203a63;color:#fff}.dot{border:3px solid #101820;border-radius:999px;background:#fff;padding:3px 8px;font-weight:1000}.dot.used{background:#101820;color:#fff}.remain{display:flex;gap:6px;flex-wrap:wrap;margin:8px 0}@media(max-width:980px){.cards{grid-template-columns:repeat(2,1fr)}.grid2{grid-template-columns:1fr}.roomList{grid-template-columns:repeat(2,1fr)}}@media(max-width:560px){.cards{grid-template-columns:1fr}}</style></head><body><header class="top"><div class="topin"><div class="brand">和 日本史 偉人バトル</div><div class="badge" id="badge">日本史版</div></div></header><main class="wrap"><section class="hero" id="home"><h1>日本史<br><span class="blue">偉人バトル</span></h1><div class="toolbar"><button class="yellow" id="teacherBtn">教師用</button><button class="bluebtn" id="studentBtn">生徒用</button></div></section><section class="panel hide" id="login"><h2>教師用パスワード</h2><div class="toolbar"><input id="pass" type="password" inputmode="numeric" placeholder="パスワード"><button class="yellow" id="loginBtn">入る</button></div><div class="note" id="passMsg">パスワードを入力してください。</div></section><section class="panel hide" id="teacher"><h2>教師用</h2><div class="toolbar"><button class="yellow" id="startBtn">開始・初期化</button><select id="roomCount"><option value="1">1ルーム</option><option value="2">2ルーム</option><option value="3">3ルーム</option><option value="4">4ルーム</option><option value="5" selected>5ルーム</option><option value="6">6ルーム</option><option value="7">7ルーム</option><option value="8">8ルーム</option><option value="9">9ルーム</option><option value="10">10ルーム</option></select><button class="purple" id="roomBtn">保存</button><select id="eventSel"></select><button class="purple" id="eventBtn">イベントを出す</button><button class="green" id="openBtn">選択受付</button><button class="pink" id="closeBtn">締切</button><button class="yellow" id="battleBtn">対戦開始</button><button class="bluebtn" id="nextBtn">次のターン</button><button class="red" id="resetBtn">全リセット</button></div><div id="eventBox"></div><div id="finalBox"></div><div class="grid2"><div class="panel"><h2>状態</h2><div class="note" id="status"></div></div><div class="panel"><h2>選択状況</h2><div class="note" id="choices"></div></div></div><div class="panel"><h2>ルーム</h2><div class="roomList" id="rooms"></div></div><div class="panel"><h2>ランキング</h2><div id="rank"></div></div></section><section class="panel hide" id="student"><h2>生徒用</h2><div id="joinBox"><button class="bluebtn" style="width:100%" id="joinBtn">参加する</button></div><div id="playBox" class="hide"><div id="sEvent"></div><div id="sFinal"></div><div class="note" id="sMsg"></div><div class="remain" id="remain"></div><div class="cards" id="myCards"></div></div><div class="panel"><h2>自分の結果</h2><div class="note" id="myResult">まだ結果はありません。</div></div></section></main><script>const KEY='battle_japan_v3',STUD='battle_japan_me_v3';let role='',me=localStorage.getItem(STUD)||'',teacherOK=sessionStorage.getItem('teacherOK')==='1';const base=[['himiko','great','卑弥呼','ひみこ',8,3,8,'邪馬台国を治めた女王。',2],['shotoku','great','聖徳太子','しょうとくたいし',9,4,7,'仏教政治を進めた皇族。',2],['naka_no_oe','great','中大兄皇子','なかのおおえのおうじ',8,6,7,'大化の改新を進めた人物。',2],['michinaga','great','藤原道長','ふじわらのみちなが',9,3,8,'摂関政治を代表する貴族。',2],['kiyomori','great','平清盛','たいらのきよもり',7,8,7,'武士として初めて政権を握った人物。',2],['yoritomo','great','源頼朝','みなもとのよりとも',8,8,8,'鎌倉幕府を開いた将軍。',2],['masako','great','北条政子','ほうじょうまさこ',8,4,9,'鎌倉幕府を支えた尼将軍。',2],['godaiigo','great','後醍醐天皇','ごだいごてんのう',7,5,7,'建武の新政を進めた天皇。',2],['takauji','great','足利尊氏','あしかがたかうじ',7,8,7,'室町幕府を開いた武将。',2],['nobunaga','great','織田信長','おだのぶなが',8,10,5,'天下統一を進めた武将。',3],['hideyoshi','great','豊臣秀吉','とよとみひでよし',9,8,6,'全国統一を成し遂げた武将。',3],['ieyasu','great','徳川家康','とくがわいえやす',8,7,10,'江戸幕府を開いた将軍。',3],['yoshimune','great','徳川吉宗','とくがわよしむね',8,5,8,'享保の改革を行った将軍。',2],['tanuma','great','田沼意次','たぬまおきつぐ',9,3,6,'商業重視の政治を進めた老中。',2],['sadanobu','great','松平定信','まつだいらさだのぶ',8,3,8,'寛政の改革を行った老中。',2],['ryoma','great','坂本龍馬','さかもとりょうま',9,5,6,'薩長同盟に関わった志士。',2],['saigo','great','西郷隆盛','さいごうたかもり',7,9,7,'明治維新を進めた中心人物。',2],['okubo','great','大久保利通','おおくぼとしみち',9,4,8,'近代国家づくりを進めた政治家。',2],['ito','great','伊藤博文','いとうひろぶみ',9,4,8,'初代内閣総理大臣。',2],['fukuzawa','great','福沢諭吉','ふくざわゆきち',10,2,6,'近代思想を広めた教育者。',2],['shibusawa','great','渋沢栄一','しぶさわえいいち',9,3,7,'日本資本主義の父と呼ばれた人物。',2],['japan_farmer','common','農民','のうみん',2,2,5,'年貢と生産で社会を支えた。',1],['samurai','common','武士','ぶし',2,5,2,'戦いを担った身分。',1],['ashigaru','common','足軽','あしがる',1,5,3,'戦場で戦った下級兵士。',1],['japan_merchant','common','商人','しょうにん',5,1,3,'流通とお金を動かした。',1],['japan_craftsman','common','職人','しょくにん',3,3,3,'技術でものづくりを支えた。',1],['monk','common','僧','そう',5,1,3,'宗教と学問を広めた。',1],['chonin','common','町人','ちょうにん',4,2,3,'都市の文化を支えた。',1],['village_official','common','村役人','むらやくにん',4,1,4,'村の運営を支えた。',1],['ninja','common','忍び','しのび',5,3,1,'情報収集や潜入を担った。',1],['japan_people','common','民衆','みんしゅう',2,3,4,'時代を動かした名もなき人々。',1]];const events=[['hakusukinoe','白村江の戦い','はくすきのえのたたかい','atk','def','normal','倭が唐・新羅連合軍に敗れた戦い。攻撃力で勝負。'],['jinshin','壬申の乱','じんしんのらん','atk','int','normal','古代最大の内乱。攻撃力で勝負。'],['taika','大化の改新','たいかのかいしん','int','def','normal','政治の仕組みを変えた改革。知力で勝負。'],['dannoura','壇ノ浦の戦い','だんのうらのたたかい','atk','def','normal','源平合戦の決着。攻撃力で勝負。'],['jokyu','承久の乱','じょうきゅうのらん','def','int','normal','朝廷と幕府の力関係が変わった。防御力で勝負。'],['genko','元寇','げんこう','def','atk','normal','モンゴル軍の襲来を防いだ。防御力で勝負。'],['okehazama','桶狭間の戦い','おけはざまのたたかい','atk','int','low','少数の信長軍が大軍を破った。攻撃力が低い方が勝つ。'],['honnoji','本能寺の変','ほんのうじのへん','atk','int','gekokujo','明智光秀が織田信長を討った。一般カードが偉人相手なら+6。'],['sekigahara','関ヶ原の戦い','せきがはらのたたかい','atk','def','normal','天下分け目の戦い。攻撃力で勝負。'],['shimabara','島原・天草一揆','しまばらあまくさいっき','atk','def','gekokujo','民衆が幕府に抵抗した一揆。一般カードが偉人相手なら+6。'],['taiseihokan','大政奉還','たいせいほうかん','int','def','normal','政権を朝廷に返した出来事。知力で勝負。'],['boshin','戊辰戦争','ぼしんせんそう','atk','def','normal','旧幕府軍と新政府軍の戦い。攻撃力で勝負。'],['minken','自由民権運動','じゆうみんけんうんどう','int','def','revolution','国会開設や憲法制定を求めた運動。合計が低いカードに+5。']].map(e=>({id:e[0],title:e[1],kana:e[2],ab:e[3],tie:e[4],kind:e[5],text:e[6]}));</script><script>const cards=base.flatMap(x=>Array.from({length:x[1]=='great'?2:4},(_,i)=>({id:x[0]+'_'+i,base:x[0],type:x[1],name:x[2],kana:x[3],int:x[4],atk:x[5],def:x[6],desc:x[7],rarity:x[8],img:'images/'+x[0]+'.png'})));const $=id=>document.getElementById(id),ruby=(n,k)=>k?'<ruby>'+n+'<rt>'+k+'</rt></ruby>':n,ab=x=>x==='int'?'知力':x==='atk'?'攻撃力':'防御力',card=id=>cards.find(c=>c.id===id),total=c=>c.int+c.atk+c.def,stars=n=>'★'.repeat(n)+'☆'.repeat(3-n),eventBy=id=>events.find(e=>e.id===id)||events[0];function data(){return JSON.parse(localStorage.getItem(KEY)||'null')||{game:{turn:1,max:5,event:events[0].id,accept:false,phase:'lobby',roomCount:1},p:{},choices:{},scores:{}}}function save(d){localStorage.setItem(KEY,JSON.stringify(d));render()}function show(id){['home','login','teacher','student'].forEach(x=>$(x).classList.add('hide'));$(id).classList.remove('hide')}function validRooms(w,p){w=+w||1;if(w<=1||p<6)return 1;return Math.max(1,Math.min(w,10,Math.floor(p/3)))}function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}function one(a){return a[Math.floor(Math.random()*a.length)]}function deal(){let g=cards.filter(c=>c.type==='great'),m=cards.filter(c=>c.type==='common'),out=[one(g),one(m)];for(const c of shuffle(cards)){if(out.length>=5)break;if(!out.some(x=>x.base===c.base))out.push(c)}return shuffle(out).map(c=>c.id)}function assign(d){let n=validRooms(d.game.roomCount,Object.keys(d.p).length),list=Object.entries(d.p).sort((a,b)=>a[1].no-b[1].no);d.game.roomCount=n;list.forEach(([k,p],i)=>p.room=(i%n)+1)}function init(){let d=data();d.game={turn:1,max:5,event:events[0].id,accept:false,phase:'lobby',roomCount:validRooms($('roomCount').value,Object.keys(d.p).length)};d.choices={};d.scores={};Object.values(d.p).forEach(p=>p.used=[]);assign(d);save(d)}function join(){let d=data(),used=new Set(Object.values(d.p).map(p=>p.no)),av=[];for(let i=1;i<=40;i++)if(!used.has(i))av.push(i);if(!av.length)return alert('参加上限です');let k='p'+Date.now()+Math.random().toString(36).slice(2,7);d.p[k]={no:one(av),room:1,hand:deal(),used:[]};me=k;localStorage.setItem(STUD,k);assign(d);save(d)}function val(c,e,op){let v=c[e.ab];if(e.kind==='gekokujo'&&c.type==='common'&&op&&op.type==='great')v+=6;if(e.kind==='revolution'&&total(c)<=9)v+=5;return v}function cmp(a,b,e){let av=val(a,e,b),bv=val(b,e,a);if(e.kind==='low'){if(av<bv)return 1;if(av>bv)return-1}else{if(av>bv)return 1;if(av<bv)return-1}if(a[e.tie]>b[e.tie])return 1;if(a[e.tie]<b[e.tie])return-1;return 0}function choose(id){let d=data(),p=d.p[me],g=d.game;if(!g.accept||!p||p.used.includes(id))return;let tk='t'+g.turn;d.choices[tk]=d.choices[tk]||{};d.choices[tk][me]={id};save(d)}function battle(){let d=data(),g=d.game,tk='t'+g.turn,ch=d.choices[tk]||{},ps=Object.entries(d.p),e=eventBy(g.event);ps.forEach(([k])=>d.scores[k]=d.scores[k]||{total:0,rounds:{}});ps.forEach(([k,p])=>{let c=ch[k],pt=0,W=0,D=0,L=0;if(c){let mine=card(c.id);ps.forEach(([ok])=>{if(ok===k)return;let oc=ch[ok];if(!oc){W++;pt+=3;return}let r=cmp(mine,card(oc.id),e);if(r>0){W++;pt+=3}else if(r<0)L++;else{D++;pt++}});if(!p.used.includes(c.id))p.used.push(c.id)}d.scores[k].total+=pt;d.scores[k].rounds[tk]={point:pt,W,D,L}});g.accept=false;g.phase='result';save(d)}function renderEvent(e,el){el.innerHTML='<div class="event"><h3>'+ruby(e.title,e.kana)+'</h3><p>'+e.text+'</p><span class="pill">判定：'+ab(e.ab)+'</span><span class="pill">同点：'+ab(e.tie)+'</span></div>'}function renderCard(c){return '<div class="card" data-id="'+c.id+'"><div class="photo"><img src="'+c.img+'" onerror="this.remove();this.parentElement.textContent=\''+c.name+'\'"></div><div class="body"><span class="type '+(c.type==='common'?'c':'')+'">'+(c.type==='great'?'偉人':'一般')+'</span><span class="rarity r'+c.rarity+'">'+stars(c.rarity)+'</span><div class="name">'+ruby(c.name,c.kana)+'</div><div class="stats"><div class="stat">知力<br>'+c.int+'</div><div class="stat">攻撃<br>'+c.atk+'</div><div class="stat">防御<br>'+c.def+'</div></div><div class="desc">'+c.desc+'</div></div></div>'}function final(d){let rows=rankRows(d);if(d.game.turn<5||d.game.phase!=='result'||!rows.length)return'';return '<div class="finale"><h3>最終結果</h3><p><b>優勝：NO.'+rows[0][1]+'</b>　'+rows[0][3]+'点</p><p>称号：時代を動かした覇者</p></div>'}function rankRows(d){return Object.entries(d.p).map(([k,p])=>[k,p.no,p.room,d.scores[k]?.total||0,(p.used||[]).length]).sort((a,b)=>b[3]-a[3]||a[1]-b[1])}function render(){let d=data(),g=d.game,e=eventBy(g.event),plist=Object.entries(d.p).map(([k,p])=>({k,...p})).sort((a,b)=>a.no-b.no);$('badge').textContent=role==='student'&&me&&d.p[me]?'NO.'+d.p[me].no+' ROOM '+d.p[me].room:'日本史版';if(role==='teacher'){$('eventSel').innerHTML=events.map(x=>'<option value="'+x.id+'" '+(x.id===g.event?'selected':'')+'>'+x.title+' / '+ab(x.ab)+'</option>').join('');renderEvent(e,$('eventBox'));$('finalBox').innerHTML=final(d);let tk='t'+g.turn,ch=d.choices[tk]||{},miss=plist.filter(p=>!ch[p.k]).map(p=>'NO.'+p.no);$('status').innerHTML='ターン：<b>'+g.turn+'/'+g.max+'</b><br>状態：<b>'+g.phase+'</b><br>受付：<b>'+(g.accept?'受付中':'停止中')+'</b><br>参加：<b>'+plist.length+'/40</b><br>ルーム数：<b>'+g.roomCount+'</b>';$('choices').innerHTML='選択済み：<b>'+(plist.length-miss.length)+'/'+plist.length+'</b><br>未選択：'+(miss.join('、')||'なし');let counts={};for(let i=1;i<=g.roomCount;i++)counts[i]=0;plist.forEach(p=>counts[p.room]=(counts[p.room]||0)+1);$('rooms').innerHTML=Object.keys(counts).map(r=>'<div class="roomBox">ROOM '+r+'<br><span style="font-size:28px">'+counts[r]+'</span>人</div>').join('');$('rank').innerHTML='<table><tr><th>順位</th><th>番号</th><th>ルーム</th><th>点</th><th>使用</th></tr>'+rankRows(d).map((r,i)=>'<tr><td>'+(i+1)+'</td><td>NO.'+r[1]+'</td><td>ROOM '+r[2]+'</td><td>'+r[3]+'</td><td>'+r[4]+'/5</td></tr>').join('')+'</table>'}if(role==='student'){let p=d.p[me];$('joinBox').classList.toggle('hide',!!p);$('playBox').classList.toggle('hide',!p);if(!p)return;renderEvent(e,$('sEvent'));$('sFinal').innerHTML=final(d);let tk='t'+g.turn,already=d.choices[tk]?.[me],left=5-(p.used||[]).length;$('sMsg').innerHTML=g.phase==='result'&&g.turn>=5?'ゲーム終了です。':already?'選択済みです。先生を待ってください。':g.accept?'使うカードを1枚選んでください。残り'+left+'枚です。':'先生の操作を待っています。';$('remain').innerHTML=p.hand.map((id,i)=>'<span class="dot '+(p.used.includes(id)?'used':'')+'">'+(i+1)+'</span>').join('');let usable=p.hand.filter(id=>!p.used.includes(id));$('myCards').innerHTML=usable.map(id=>renderCard(card(id))).join('');document.querySelectorAll('.card').forEach(el=>el.onclick=()=>choose(el.dataset.id));let sc=d.scores[me]||{total:0,rounds:{}},r=sc.rounds?.[tk];$('myResult').innerHTML='合計点：<b>'+(sc.total||0)+'点</b><br>使用済み：<b>'+p.used.length+'/5枚</b>'+(r?'<hr>今回：'+r.point+'点<br>勝ち:'+r.W+' 引き分け:'+r.D+' 負け:'+r.L:'')}}}function boot(){$('teacherBtn').onclick=()=>{teacherOK? (role='teacher',show('teacher'),render()) : show('login')};$('studentBtn').onclick=()=>{role='student';show('student');render()};$('loginBtn').onclick=()=>{if($('pass').value==='0122'){teacherOK=true;sessionStorage.setItem('teacherOK','1');role='teacher';show('teacher');render()}else $('passMsg').textContent='パスワードが違います。'};$('startBtn').onclick=init;$('roomBtn').onclick=()=>{let d=data();d.game.roomCount=validRooms($('roomCount').value,Object.keys(d.p).length);assign(d);save(d)};$('eventBtn').onclick=()=>{let d=data();d.game.event=$('eventSel').value;d.game.phase='event';d.game.accept=false;save(d)};$('openBtn').onclick=()=>{let d=data();d.game.accept=true;d.game.phase='choosing';save(d)};$('closeBtn').onclick=()=>{let d=data();d.game.accept=false;save(d)};$('battleBtn').onclick=battle;$('nextBtn').onclick=()=>{let d=data();if(d.game.turn<d.game.max)d.game.turn++;d.game.accept=false;d.game.phase='event';save(d)};$('resetBtn').onclick=()=>{localStorage.removeItem(KEY);localStorage.removeItem(STUD);me='';render()};$('joinBtn').onclick=join;render()}window.addEventListener('storage',render);boot();</script></body></html>
