<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>世界史 偉人バトル</title><style>*{box-sizing:border-box}body{margin:0;font-family:system-ui,'Hiragino Sans','Yu Gothic',sans-serif;background:linear-gradient(135deg,#fff3a6,#ffeaf6 48%,#eaf0ff);color:#151515}.wrap{max-width:1180px;margin:auto;padding:18px 14px 80px}.top{position:sticky;top:0;z-index:9;background:#fffdf4ee;border-bottom:5px solid #111}.topin{max-width:1180px;margin:auto;padding:10px 14px;display:flex;justify-content:space-between;align-items:center}.brand{font-weight:1000}.badge{border:4px solid #111;border-radius:999px;background:#111;color:#fff;padding:8px 12px;font-weight:1000}.hero,.panel{border:5px solid #111;border-radius:30px;background:#fffdf4f6;box-shadow:0 10px 0 #0003;padding:18px;margin:16px 0}h1{font-size:clamp(44px,8vw,82px);line-height:.92;margin:12px 0;font-weight:1000}.blue{color:#5278ff}.note{font-weight:900;line-height:1.7;border:4px solid #111;border-radius:20px;background:#fff;padding:12px;margin:10px 0}.toolbar{display:flex;gap:10px;flex-wrap:wrap}button,select,input{border:4px solid #111;border-radius:18px;background:#fff;padding:12px 14px;font:inherit;font-weight:1000;box-shadow:0 7px 0 #0004}button{cursor:pointer}button:active{transform:translateY(5px);box-shadow:0 2px 0 #0004}.yellow{background:linear-gradient(135deg,#ffd83d,#fff4a6)}.bluebtn{background:linear-gradient(135deg,#9bb4ff,#f1f5ff)}.green{background:linear-gradient(135deg,#72e8b0,#effff6)}.pink{background:linear-gradient(135deg,#ff8ac5,#fff0f7)}.red{background:linear-gradient(135deg,#ff7777,#ffe4e4)}.purple{background:linear-gradient(135deg,#c4b5fd,#f4f0ff)}.hide{display:none!important}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}.cards{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}.roomList{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}.roomBox{border:4px solid #111;border-radius:18px;background:#fff;padding:12px;text-align:center;font-weight:1000}.event,.finale{border:5px solid #111;border-radius:28px;background:repeating-linear-gradient(-45deg,#fff7bd 0 14px,#fffef8 14px 28px);padding:16px;margin:12px 0;box-shadow:0 7px 0 #0003}.event h3,.finale h3{font-size:28px;margin:0 0 8px}.pill{display:inline-block;border:3px solid #111;border-radius:999px;background:#fff;padding:5px 10px;margin:3px;font-weight:1000}.card{border:5px solid #111;border-radius:24px;background:#fff;overflow:hidden;box-shadow:0 8px 0 #0003}.photo{aspect-ratio:2/3;border-bottom:5px solid #111;background:#e2d2a9;display:grid;place-items:center;text-align:center;font-weight:1000;overflow:hidden}.photo img{width:100%;height:100%;object-fit:contain}.body{padding:12px}.type,.rarity{display:inline-block;border:3px solid #111;border-radius:999px;padding:2px 9px;font-size:12px;font-weight:1000}.type{background:#eaf0ff}.type.c{background:#ddfff0}.rarity{margin-left:4px}.r1{background:#ddfff0}.r2{background:#eaf0ff}.r3{background:linear-gradient(135deg,#ffd83d,#fff)}.name{font-size:20px;font-weight:1000;line-height:1.2;margin:7px 0}rt{font-size:.58em}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}.stat{border:3px solid #111;border-radius:14px;background:#fff2a8;text-align:center;font-weight:1000;padding:6px 2px;font-size:13px}.desc{font-size:13px;line-height:1.45;font-weight:700;margin-top:8px}table{width:100%;border-collapse:collapse;background:#fff;border:4px solid #111}th,td{padding:9px;border-bottom:2px solid #eee;text-align:left}th{background:#111;color:#fff}.dot{border:3px solid #111;border-radius:999px;background:#fff;padding:3px 8px;font-weight:1000}.dot.used{background:#111;color:#fff}.remain{display:flex;gap:6px;flex-wrap:wrap;margin:8px 0}@media(max-width:980px){.cards{grid-template-columns:repeat(2,1fr)}.grid2{grid-template-columns:1fr}.roomList{grid-template-columns:repeat(2,1fr)}}@media(max-width:560px){.cards{grid-template-columns:1fr}}</style></head><body><header class="top"><div class="topin"><div class="brand">🌍 世界史 偉人バトル</div><div class="badge" id="badge">世界史版</div></div></header><main class="wrap"><section class="hero" id="home"><h1>世界史<br><span class="blue">偉人バトル</span></h1><div class="toolbar"><button class="yellow" id="teacherBtn">教師用</button><button class="bluebtn" id="studentBtn">生徒用</button></div></section><section class="panel hide" id="login"><h2>教師用パスワード</h2><div class="toolbar"><input id="pass" type="password" inputmode="numeric" placeholder="パスワード"><button class="yellow" id="loginBtn">入る</button></div><div class="note" id="passMsg">パスワードを入力してください。</div></section><section class="panel hide" id="teacher"><h2>教師用</h2><div class="toolbar"><button class="yellow" id="startBtn">開始・初期化</button><select id="roomCount"><option value="1">1ルーム</option><option value="2">2ルーム</option><option value="3">3ルーム</option><option value="4">4ルーム</option><option value="5" selected>5ルーム</option><option value="6">6ルーム</option><option value="7">7ルーム</option><option value="8">8ルーム</option><option value="9">9ルーム</option><option value="10">10ルーム</option></select><button class="purple" id="roomBtn">保存</button><select id="eventSel"></select><button class="purple" id="eventBtn">イベントを出す</button><button class="green" id="openBtn">選択受付</button><button class="pink" id="closeBtn">締切</button><button class="yellow" id="battleBtn">対戦開始</button><button class="bluebtn" id="nextBtn">次のターン</button><button class="red" id="resetBtn">全リセット</button></div><div id="eventBox"></div><div id="finalBox"></div><div class="grid2"><div class="panel"><h2>状態</h2><div class="note" id="status"></div></div><div class="panel"><h2>選択状況</h2><div class="note" id="choices"></div></div></div><div class="panel"><h2>ルーム</h2><div class="roomList" id="rooms"></div></div><div class="panel"><h2>ランキング</h2><div id="rank"></div></div></section><section class="panel hide" id="student"><h2>生徒用</h2><div id="joinBox"><button class="bluebtn" style="width:100%" id="joinBtn">参加する</button></div><div id="playBox" class="hide"><div id="sEvent"></div><div id="sFinal"></div><div class="note" id="sMsg"></div><div class="remain" id="remain"></div><div class="cards" id="myCards"></div></div><div class="panel"><h2>自分の結果</h2><div class="note" id="myResult">まだ結果はありません。</div></div></section></main><script>window.GAME_CONFIG={label:'世界史版',storageKey:'battle_world_v4',studentKey:'battle_world_me_v4',cards:[['napoleon','great','ナポレオン','',9,10,6,'フランス皇帝としてヨーロッパを大きく動かした。',3],['alexander','great','アレクサンドロス大王','アレクサンドロスだいおう',7,10,6,'東方遠征で広い地域を支配した。',3],['genghis','great','チンギス＝ハン','',6,10,7,'モンゴル帝国の基礎を築いた。',3],['qin','great','始皇帝','しこうてい',8,8,9,'中国を初めて統一した皇帝。',2],['caesar','great','カエサル','',8,8,7,'ローマで大きな権力を握った政治家・軍人。',2],['zhugeliang','great','諸葛亮','しょかつりょう',10,4,7,'三国時代の名軍師。',2],['joan','great','ジャンヌ＝ダルク','',6,9,7,'百年戦争でフランス軍を勇気づけた。',2],['gandhi','great','ガンディー','',10,2,9,'非暴力でインド独立運動を進めた。',2],['hammurabi','great','ハンムラビ王','ハンムラビおう',8,6,8,'ハンムラビ法典で知られる王。',2],['ramses','great','ラムセス2世','ラムセスにせい',6,8,8,'古代エジプトのファラオ。',2],['augustus','great','アウグストゥス','',8,6,9,'ローマ帝国の初代皇帝。',2],['muhammad','great','ムハンマド','',9,6,8,'イスラームを開いた人物。',2],['charlemagne','great','カール大帝','カールたいてい',7,8,8,'西ヨーロッパ形成に影響を与えた。',2],['kublai','great','フビライ＝ハン','',7,8,8,'元を建てた皇帝。',2],['columbus','great','コロンブス','',7,6,5,'大西洋を渡り世界をつなげた。',2],['luther','great','ルター','',9,4,7,'宗教改革を進めた。',2],['elizabeth','great','エリザベス1世','エリザベスいっせい',9,6,8,'イギリスを発展させた女王。',2],['louis14','great','ルイ14世','ルイじゅうよんせい',7,7,8,'フランス絶対王政の王。',2],['washington','great','ワシントン','',8,7,8,'アメリカ初代大統領。',2],['bismarck','great','ビスマルク','',9,7,8,'ドイツ統一を進めた政治家。',2],['king','great','キング牧師','キングぼくし',9,3,8,'公民権運動の指導者。',2],['soldier','common','一般兵','いっぱんへい',1,5,3,'戦場で戦った兵士。',1],['archer','common','弓兵','きゅうへい',2,5,2,'遠くから攻撃する兵士。',1],['heavy','common','重装兵','じゅうそうへい',1,3,5,'防御を重視する兵士。',1],['scout','common','斥候','せっこう',5,2,2,'敵の動きを探る役。',1],['farmer','common','農民','のうみん',2,2,5,'食料生産で社会を支えた。',1],['merchant','common','商人','しょうにん',5,1,3,'交易やお金を動かした。',1],['official','common
