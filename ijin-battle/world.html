<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>世界史 偉人バトル</title><style>*{box-sizing:border-box}body{margin:0;font-family:system-ui,'Hiragino Sans','Yu Gothic',sans-serif;background:linear-gradient(135deg,#fff3a6,#ffeaf6 48%,#eaf0ff);color:#151515}rt{font-size:.58em}.top{position:sticky;top:0;z-index:9;background:#fffdf4ee;border-bottom:5px solid #111}.topin{max-width:1180px;margin:auto;padding:10px 14px;display:flex;justify-content:space-between;align-items:center}.brand{display:flex;gap:10px;align-items:center;font-weight:1000}.mark{width:52px;height:52px;border:4px solid #111;border-radius:18px;display:grid;place-items:center;background:linear-gradient(135deg,#ffd83d,#fff);box-shadow:0 7px 0 #0003;transform:rotate(-6deg)}.badge{border:4px solid #111;border-radius:999px;background:#111;color:#fff;padding:8px 13px;font-weight:1000}.wrap{max-width:1180px;margin:auto;padding:18px 14px 80px}.hero,.panel{border:5px solid #111;border-radius:34px;background:#fffdf4f6;box-shadow:0 10px 0 #0003,0 18px 28px #0002;padding:20px;margin:16px 0}.hero{background:linear-gradient(135deg,#fffdf4,#fff0af)}h1{font-size:clamp(44px,8vw,82px);line-height:.92;margin:12px 0;font-weight:1000}.blue{color:#5278ff}h2{margin:0 0 12px}.note{font-weight:800;line-height:1.7;border:4px solid #111;border-radius:22px;background:#fff;padding:12px;margin:10px 0}.toolbar{display:flex;gap:10px;flex-wrap:wrap}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}.cards{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}.roomList{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}.roomBox{border:4px solid #111;border-radius:20px;background:#fff;padding:12px;text-align:center;font-weight:1000;box-shadow:0 6px 0 #0003}button,select,input{border:4px solid #111;border-radius:18px;background:#fff;padding:12px 14px;font:inherit;font-weight:1000;box-shadow:0 7px 0 #0004}button{cursor:pointer}button:active{transform:translateY(5px);box-shadow:0 2px 0 #0004}.yellow{background:linear-gradient(135deg,#ffd83d,#fff4a6)}.pink{background:linear-gradient(135deg,#ff8ac5,#fff0f7)}.bluebtn{background:linear-gradient(135deg,#9bb4ff,#f1f5ff)}.green{background:linear-gradient(135deg,#72e8b0,#effff6)}.red{background:linear-gradient(135deg,#ff7777,#ffe4e4)}.purple{background:linear-gradient(135deg,#c4b5fd,#f4f0ff)}.event,.finale{border:5px solid #111;border-radius:30px;background:repeating-linear-gradient(-45deg,#fff7bd 0 14px,#fffef8 14px 28px);padding:16px;margin:12px 0;box-shadow:0 7px 0 #0003}.event h3,.finale h3{font-size:30px;margin:0 0 8px}.pill{display:inline-block;border:3px solid #111;border-radius:999px;background:#fff;padding:5px 10px;margin:3px;font-weight:1000}.card{border:5px solid #111;border-radius:26px;background:#fff;overflow:hidden;box-shadow:0 8px 0 #0003;position:relative}.card.used{opacity:.38;filter:grayscale(.85)}.card.used:after{content:'使用済み';position:absolute;top:16px;left:-8px;right:-8px;background:#111;color:#fff;text-align:center;padding:8px;font-weight:1000;transform:rotate(-8deg);border:3px solid #fff}.photo{aspect-ratio:2/3;border-bottom:5px solid #111;background:#e2d2a9;display:grid;place-items:center;text-align:center;font-weight:1000;overflow:hidden}.photo img{width:100%;height:100%;object-fit:contain;display:block}.body{padding:12px}.type,.rarity{display:inline-block;border:3px solid #111;border-radius:999px;padding:2px 9px;font-size:12px;font-weight:1000}.type{background:#eaf0ff}.type.c{background:#ddfff0}.rarity{margin-left:4px}.r1{background:#ddfff0}.r2{background:#eaf0ff}.r3{background:linear-gradient(135deg,#ffd83d,#fff)}.name{font-size:20px;font-weight:1000;line-height:1.2;margin:7px 0}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}.stat{border:3px solid #111;border-radius:14px;background:#fff2a8;text-align:center;font-weight:1000;padding:6px 2px;font-size:13px}.desc{font-size:13px;line-height:1.45;font-weight:700;margin-top:8px}table{width:100%;border-collapse:collapse;background:#fff;border:4px solid #111}th,td{padding:9px;border-bottom:2px solid #eee;text-align:left}th{background:#111;color:#fff}.hide{display:none!important}.remain{display:flex;gap:6px;flex-wrap:wrap;margin:8px 0}.dot{border:3px solid #111;border-radius:999px;background:#fff;padding:3px 8px;font-weight:1000}.dot.used{background:#111;color:#fff}@media(max-width:980px){.cards{grid-template-columns:repeat(2,1fr)}.grid2{grid-template-columns:1fr}.roomList{grid-template-columns:repeat(2,1fr)}}@media(max-width:560px){.cards{grid-template-columns:1fr}}</style></head><body><header class="top"><div class="topin"><div class="brand"><div class="mark">🌍</div><div>世界史<br>偉人バトル</div></div><div class="badge" id="badge">世界史版</div></div></header><main class="wrap"><section class="hero" id="home"><h1>世界史<br><span class="blue">偉人バトル</span></h1><div class="toolbar"><button class="yellow" onclick="openTeacherLogin()">教師用</button><button class="bluebtn" onclick="setRole('student')">生徒用</button></div><p class="note">版の切り替えは入口ページの教師用だけで行います。</p></section><section class="panel hide" id="teacherLogin"><h2>教師用パスワード</h2><div class="toolbar"><input id="pass" type="password" inputmode="numeric" placeholder="パスワード"><button class="yellow" onclick="checkPass()">入る</button></div><div id="passMsg" class="note">教師用画面に入るにはパスワードが必要です。</div></section><section class="panel hide" id="teacher"><h2>教師用</h2><div class="toolbar"><button class="yellow" onclick="initGame()">授業を開始・初期化</button><select id="roomCount"><option value="1">1ルーム</option><option value="2">2ルーム</option><option value="3">3ルーム</option><option value="4">4ルーム</option><option value="5" selected>5ルーム</option><option value="6">6ルーム</option><option value="7">7ルーム</option><option value="8">8ルーム</option><option value="9">9ルーム</option><option value="10">10ルーム</option></select><button class="purple" onclick="saveRoomCount()">ルーム数を保存</button><select id="eventSel"></select><button class="purple" onclick="setEvent()">イベントを出す</button><button class="green" onclick="openChoice()">選択受付</button><button class="pink" onclick="closeChoice()">締切</button><button class="yellow" onclick="battle()">対戦開始</button><button class="bluebtn" onclick="nextTurn()">次のターン</button><button class="red" onclick="resetAll()">全リセット</button></div><div class="grid2"><div class="panel"><h2>状態</h2><div class="note" id="tStatus"></div></div><div class="panel"><h2>選択状況</h2><div class="note" id="choiceStatus"></div></div></div><div id="eventBox"></div><div id="finalBox"></div><div class="panel"><h2>ルーム</h2><div class="roomList" id="roomsState"></div></div><div class="panel"><h2>ランキング</h2><div id="rank"></div></div></section><section class="panel hide" id="student"><h2>生徒用</h2><div id="join"><div class="note">参加ボタンを押すと、NOとルームが自動で割り振られます。</div><button class="bluebtn" style="width:100%;margin-top:10px" onclick="join()">参加する</button></div><div id="play" class="hide"><div id="sEvent"></div><div id="sFinal"></div><div id="sMsg" class="note"></div><div class="remain" id="remain"></div><div class="cards" id="myCards"></div></div><div class="panel"><h2>自分の結果</h2><div class="note" id="myResult">まだ結果はありません。</div></div></section></main><script>const KEY='ijin_world_battle_v2',STUD='ijin_world_student_v2';let role='',me=localStorage.getItem(STUD)||'',teacherOK=sessionStorage.getItem('teacherOK')==='1';const base=[['napoleon','great','ナポレオン','',9,10,6,'フランス皇帝としてヨーロッパを大きく動かした。',3],['alexander','great','アレクサンドロス大王','アレクサンドロスだいおう',7,10,6,'東方遠征で広い地域を支配した。',3],['genghis','great','チンギス＝ハン','',6,10,7,'モンゴル帝国の基礎を築いた。',3],['qin','great','始皇帝','しこうてい',8,8,9,'中国を初めて統一した皇帝。',2],['caesar','great','カエサル','',8,8,7,'ローマで大きな権力を握った政治家・軍人。',2],['zhugeliang','great','諸葛亮','しょかつりょう',10,4,7,'三国時代の名軍師。',2],['joan','great','ジャンヌ＝ダルク','',6,9,7,'百年戦争でフランス軍を勇気づけた。',2],['gandhi','great','ガンディー','',10,2,9,'非暴力でインド独立運動を進めた。',2],['hammurabi','great','ハンムラビ王','ハンムラビおう',8,6,8,'ハンムラビ法典で知られる王。',2],['ramses','great','ラムセス2世','ラムセスにせい',6,8,8,'古代エジプトのファラオ。',2],['augustus','great','アウグストゥス','',8,6,9,'ローマ帝国の初代皇帝。',2],['muhammad','great','ムハンマド','',9,6,8,'イスラームを開いた人物。',2],['charlemagne','great','カール大帝','カールたいてい',7,8,8,'西ヨーロッパ形成に影響を与えた。',2],['kublai','great','フビライ＝ハン','',7,8,8,'元を建てた皇帝。',2],['columbus','great','コロンブス','',7,6,5,'大西洋を渡り世界をつなげた。',2],['luther','great','ルター','',9,4,7,'宗教改革を進めた。',2],['elizabeth','great','エリザベス1世','エリザベスいっせい',9,6,8,'イギリスを発展させた女王。',2],['louis14','great','ルイ14世','ルイじゅうよんせい',7,7,8,'フランス絶対王政の王。',2],['washington','great','ワシントン','',8,7,8,'アメリカ初代大統領。',2],['bismarck','great','ビスマルク','',9,7,8,'ドイツ統一を進めた政治家。',2],['king','great','キング牧師','キングぼくし',9,3,8,'公民権運動の指導者。',2],['soldier','common','一般兵','いっぱんへい',1,5,3,'戦場で戦った兵士。',1],['archer','common','弓兵','きゅうへい',2,5,2,'遠くから攻撃する兵士。',1],['heavy','common','重装兵','じゅうそうへい',1,3,5,'防御を重視する兵士。',1],['scout','common','斥候','せっこう',5,2,2,'敵の動きを探る役。',1],['farmer','common','農民','のうみん',2,2,5,'食料生産で社会を支えた。',1],['merchant','common','商人','しょうにん',5,1,3,'交易やお金を動かした。',1],['official','common','役人','やくにん',4,1,4,'法律や命令を動かした。',1],['craftsman','common','職人','しょくにん',3,3,3,'ものづくりを支えた。',1],['sailor','common','船乗り','ふなのり',3,4,2,'航海や交易を支えた。',1],['people','common','民衆','みんしゅう',2,3,4,'時代を支えた人々。',1]];const events=[['gaugamela','ガウガメラの戦い','ガウガメラのたたかい','atk','int','normal','アレクサンドロス大王の大決戦。攻撃力で勝負。'],['redcliffs','赤壁の戦い','せきへきのたたかい','int','def','normal','作戦と判断が勝敗を分ける。知力で勝負。'],['waterloo','ワーテルローの戦い','ワーテルローのたたかい','atk','def','normal','ナポレオン最後の大決戦。攻撃力で勝負。'],['frenchrev','フランス革命','フランスかくめい','atk','int','low','身分制が揺らいだ革命。攻撃力が低い方が勝つ。'],['russianrev','ロシア革命','ロシアかくめい','int','def','revolution','帝政が倒れた革命。合計が低いカードに+5。'],['xinhai','辛亥革命','しんがいかくめい','int','def','revolution','清を倒した革命。合計が低いカードに+5。'],['peasant','黄巾の乱','こうきんのらん','atk','int','gekokujo','一般カードが偉人相手なら+6。'],['spartacus','スパルタクスの反乱','スパルタクスのはんらん','atk','def','gekokujo','奴隷反乱。一般カードが偉人相手なら+6。'],['silkroad','シルクロード交易','シルクロードこうえき','int','def','normal','東西を結んだ交易路。知力で勝負。'],['coldwar','冷戦','れいせん','def','int','normal','直接戦争ではないにらみ合い。防御力で勝負。']].map(e=>({id:e[0],title:e[1],kana:e[2],ab:e[3],tie:e[4],kind:e[5],text:e[6]}));</script><script>const cards=base.flatMap(x=>Array.from({length:x[1]=='great'?2:4},(_,i)=>({id:x[0]+'_'+i,base:x[0],type:x[1],name:x[2],kana:x[3],int:x[4],atk:x[5],def:x[6],desc:x[7],rarity:x[8],img:'images/'+x[0]+'.png'})));const $=id=>document.getElementById(id),ruby=(n,k)=>k?'<ruby>'+n+'<rt>'+k+'</rt></ruby>':n,ab=x=>x=='int'?'知力':x=='atk'?'攻撃力':'防御力',card=id=>cards.find(c=>c.id==id),eventBy=id=>events.find(t=>t.id==id)||events[0],total=c=>c.int+c.atk+c.def,stars=n=>'★'.repeat(n)+'☆'.repeat(3-n);function data(){return JSON.parse(localStorage.getItem(KEY)||'null')||{game:{turn:1,max:5,event:events[0].id,accept:false,phase:'lobby',roomCount:5},p:{},choices:{},scores:{}}}function save(d){localStorage.setItem(KEY,JSON.stringify(d));render()}function hideAll(){['home','teacherLogin','teacher','student'].forEach(id=>$(id).classList.add('hide'))}function openTeacherLogin(){hideAll();$('teacherLogin').classList.remove('hide')}function checkPass(){if($('pass').value==='0122'){teacherOK=true;sessionStorage.setItem('teacherOK','1');setRole('teacher')}else{$('passMsg').innerHTML='パスワードが違います。'}}function setRole(r){if(r==='teacher'&&!teacherOK)return openTeacherLogin();role=r;hideAll();$(r).classList.remove('hide');render()}function ev(g){return eventBy(g.event)}function validRoomCount(w,p){w=+w||1;if(w<=1||p<6)return 1;return Math.max(1,Math.min(w,10,Math.floor(p/3)))}function initGame(){let d=data();d.game={turn:1,max:5,event:events[0].id,accept:false,phase:'lobby',roomCount:validRoomCount($('roomCount').value,Object.keys(d.p).length)};d.choices={};d.scores={};Object.values(d.p).forEach(p=>p.used=[]);assignRooms(d);save(d)}function saveRoomCount(){let d=data();d.game.roomCount=validRoomCount($('roomCount').value,Object.keys(d.p).length);assignRooms(d);save(d)}function setEvent(){let d=data();d.game.event=$('eventSel').value;d.game.phase='event';d.game.accept=false;save(d)}function openChoice(){let d=data();d.game.accept=true;d.game.phase='choosing';save(d)}function closeChoice(){let d=data();d.game.accept=false;save(d)}function nextTurn(){let d=data();d.game.turn=Math.min(d.game.turn+1,d.game.max);d.game.accept=false;d.game.phase='event';save(d)}function resetAll(){if(confirm('全データを消しますか？')){localStorage.removeItem(KEY);localStorage.removeItem(STUD);me='';render()}}function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}function one(a){return a[Math.floor(Math.random()*a.length)]}function deal(){let g=cards.filter(c=>c.type==='great'),m=cards.filter(c=>c.type==='common'),out=[one(g),one(m)];for(const c of shuffle(cards)){if(out.length>=5)break;if(out.some(x=>x.base===c.base))continue;out.push(c)}return shuffle(out).map(c=>c.id)}function assignRooms(d){let n=validRoomCount(d.game.roomCount,Object.keys(d.p).length),list=Object.entries(d.p).sort((a,b)=>a[1].no-b[1].no);d.game.roomCount=n;list.forEach(([k,p],i)=>p.room=(i%n)+1)}function join(){let d=data(),used=new Set(Object.values(d.p).map(p=>p.no)),av=[];for(let i=1;i<=40;i++)if(!used.has(i))av.push(i);if(!av.length)return alert('参加上限です');let key='p'+Date.now()+Math.random().toString(36).slice(2,7);d.p[key]={no:one(av),room:1,hand:deal(),used:[]};me=key;localStorage.setItem(STUD,key);assignRooms(d);save(d)}function score(c,t,op){let v=c[t.ab];if(t.kind==='gekokujo'&&c.type==='common'&&op&&op.type==='great')v+=6;if(t.kind==='revolution'&&total(c)<=9)v+=5;return v}function cmp(a,b,t){let av=score(a,t,b),bv=score(b,t,a);if(t.kind==='low'){if(av<bv)return 1;if(av>bv)return-1}else{if(av>bv)return 1;if(av<bv)return-1}if(a[t.tie]>b[t.tie])return 1;if(a[t.tie]<b[t.tie])return-1;return 0}function choose(id){let d=data(),g=d.game,p=d.p[me];if(!g.accept||p.used.includes(id))return;let tk='t'+g.turn;d.choices[tk]=d.choices[tk]||{};d.choices[tk][me]={id};save(d)}function battle(){let d=data(),g=d.game,tk='t'+g.turn,ch=d.choices[tk]||{},ps=Object.entries(d.p),e=ev(g);ps.forEach(([k])=>d.scores[k]=d.scores[k]||{total:0,rounds:{}});ps.forEach(([k,p])=>{let c=ch[k],point=0,W=0,D=0,L=0,used='';if(c){used=c.id;let mine=card(c.id);ps.forEach(([ok])=>{if(ok===k)return;let oc=ch[ok];if(!oc){W++;point+=3;return}let r=cmp(mine,card(oc.id),e);if(r>0){W++;point+=3}else if(r<0)L++;else{D++;point++}});if(!p.used.includes(used))p.used.push(used)}d.scores[k].total=(d.scores[k].total||0)+point;d.scores[k].rounds[tk]={point,W,D,L,used}});g.accept=false;g.phase='result';save(d)}function renderEvent(e,el){el.innerHTML='<div class="event"><h3>'+ruby(e.title,e.kana)+'</h3><p>'+e.text+'</p><span class="pill">判定：'+ab(e.ab)+'</span><span class="pill">同点：'+ab(e.tie)+'</span></div>'}function renderCard(c,used){return '<div class="card '+(used?'used':'')+'" onclick="choose(\''+c.id+'\')"><div class="photo"><img src="'+c.img+'" onerror="this.remove();this.parentElement.innerHTML=\'<div class=ph>画像はあとで追加<br>'+c.base+'.png</div>\'"></div><div class="body"><span class="type '+(c.type==='common'?'c':'')+'">'+(c.type==='great'?'偉人':'一般')+'</span><span class="rarity r'+c.rarity+'">'+stars(c.rarity)+'</span><div class="name">'+ruby(c.name,c.kana)+'</div><div class="stats"><div class="stat">知力<br>'+c.int+'</div><div class="stat">攻撃<br>'+c.atk+'</div><div class="stat">防御<br>'+c.def+'</div></div><div class="desc">'+c.desc+'</div></div></div>'}function final(d){let ps=Object.entries(d.p).map(([k,p])=>({k,...p,score:d.scores[k]?.total||0})).sort((a,b)=>b.score-a.score);if(d.game.turn<5||d.game.phase!=='result'||!ps.length)return'';return '<div class="finale"><h3>最終結果</h3><p><b>優勝：NO.'+ps[0].no+'</b>　'+ps[0].score+'点</p><p>称号：時代を動かした覇者</p></div>'}function render(){let d=data(),g=d.game,e=ev(g),plist=Object.entries(d.p).map(([k,p])=>({k,...p})).sort((a,b)=>a.no-b.no);$('badge').textContent=role==='student'&&me&&d.p[me]?'NO.'+d.p[me].no+' ROOM '+d.p[me].room:'世界史版';if(role==='teacher'){$('eventSel').innerHTML=events.map(e=>'<option value="'+e.id+'" '+(e.id===g.event?'selected':'')+'>'+e.title+' / '+ab(e.ab)+'</option>').join('');renderEvent(e,$('eventBox'));$('finalBox').innerHTML=final(d);let tk='t'+g.turn,ch=d.choices[tk]||{},miss=plist.filter(p=>!ch[p.k]).map(p=>'NO.'+p.no);$('tStatus').innerHTML='ターン：<b>'+g.turn+'/'+g.max+'</b><br>状態：<b>'+g.phase+'</b><br>受付：<b>'+(g.accept?'受付中':'停止中')+'</b><br>参加：<b>'+plist.length+'/40</b><br>ルーム数：<b>'+g.roomCount+'</b>';$('choiceStatus').innerHTML='選択済み：<b>'+(plist.length-miss.length)+'/'+plist.length+'</b><br>未選択：'+(miss.join('、')||'なし');let counts={};for(let i=1;i<=g.roomCount;i++)counts[i]=0;plist.forEach(p=>counts[p.room]=(counts[p.room]||0)+1);$('roomsState').innerHTML=Object.keys(counts).map(r=>'<div class="roomBox">ROOM '+r+'<br><span style="font-size:28px">'+counts[r]+'</span>人</div>').join('');let rows=plist.map(p=>[p.no,p.room,d.scores[p.k]?.total||0,(p.used||[]).length]).sort((a,b)=>b[2]-a[2]);$('rank').innerHTML='<table><tr><th>順位</th><th>番号</th><th>ルーム</th><th>点</th><th>使用</th></tr>'+rows.map((r,i)=>'<tr><td>'+(i+1)+'</td><td>NO.'+r[0]+'</td><td>ROOM '+r[1]+'</td><td>'+r[2]+'</td><td>'+r[3]+'/5</td></tr>').join('')+'</table>'}if(role==='student'){let p=d.p[me];$('join').classList.toggle('hide',!!p);$('play').classList.toggle('hide',!p);if(!p)return;renderEvent(e,$('sEvent'));$('sFinal').innerHTML=final(d);let tk='t'+g.turn,already=d.choices[tk]?.[me],left=5-(p.used||[]).length;$('sMsg').innerHTML=g.phase==='result'&&g.turn>=5?'ゲーム終了です。':already?'選択済みです。先生を待ってください。':g.accept?'使うカードを1枚選んでください。残り'+left+'枚です。':'先生の操作を待っています。';$('remain').innerHTML=p.hand.map((id,i)=>'<span class="dot '+((p.used||[]).includes(id)?'used':'')+'">'+(i+1)+'</span>').join('');$('myCards').innerHTML=p.hand.map(id=>renderCard(card(id),(p.used||[]).includes(id))).join('');let sc=d.scores[me]||{total:0,rounds:{}},r=sc.rounds?.[tk];$('myResult').innerHTML='合計点：<b>'+(sc.total||0)+'点</b><br>使用済み：<b>'+(p.used||[]).length+'/5枚</b>'+(r?'<hr>今回：'+r.point+'点<br>勝ち:'+r.W+' 引き分け:'+r.D+' 負け:'+r.L:'')}}}window.addEventListener('storage',render);render();</script></body></html>
