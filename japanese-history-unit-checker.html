<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>日本史単元チェックアプリ</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --card: #ffffff;
      --line: #d9dce7;
      --text: #1e2430;
      --sub: #5c667a;
      --accent: #2b67f6;
      --accent-soft: #e8f0ff;
      --good: #1c7c54;
      --good-soft: #e8f6ef;
      --normal: #8c6b00;
      --normal-soft: #fff6d9;
      --weak: #b42318;
      --weak-soft: #fdecec;
      --shadow: 0 8px 24px rgba(17, 24, 39, 0.08);
      --radius: 16px;
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
    }
    body { padding: 16px 14px 28px; }
    .app { max-width: 820px; margin: 0 auto; }
    .header {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 18px 16px;
      box-shadow: var(--shadow);
      position: sticky;
      top: 10px;
      z-index: 10;
    }
    h1 { margin: 0; font-size: 22px; line-height: 1.3; }
    .subline { margin-top: 6px; color: var(--sub); font-size: 13px; line-height: 1.6; }
    .stats {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 14px;
    }
    .stat {
      background: #fafbff;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 10px 12px;
    }
    .stat-label { color: var(--sub); font-size: 12px; margin-bottom: 4px; }
    .stat-value { font-size: 19px; font-weight: 700; }
    .panel {
      margin-top: 14px;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 14px;
      box-shadow: var(--shadow);
    }
    .panel-title { font-size: 14px; font-weight: 700; margin-bottom: 10px; }
    .search {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 16px;
      background: #fff;
      color: var(--text);
    }
    .chips, .toolbar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
    }
    .chip, .secondary-btn, .level-btn {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      border-radius: 999px;
      padding: 10px 12px;
      font-size: 13px;
      line-height: 1;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .chip.active {
      background: var(--accent-soft);
      border-color: var(--accent);
      color: var(--accent);
      font-weight: 700;
    }
    .secondary-btn { padding: 11px 14px; }
    .list { margin-top: 14px; display: grid; gap: 12px; }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 14px;
      box-shadow: var(--shadow);
    }
    .card.weak { border-color: #f1b0ab; background: linear-gradient(180deg, #fff, #fff8f8); }
    .card.good { border-color: #b8dec9; background: linear-gradient(180deg, #fff, #f8fffb); }
    .row-top { display: flex; gap: 10px; align-items: flex-start; }
    .check-wrap { display: flex; align-items: center; justify-content: center; padding-top: 2px; }
    .check { width: 23px; height: 23px; accent-color: var(--accent); cursor: pointer; }
    .unit-body { flex: 1; min-width: 0; }
    .unit-name { font-size: 16px; line-height: 1.45; font-weight: 700; word-break: break-word; }
    .meta { margin-top: 8px; display: flex; flex-wrap: wrap; gap: 8px; color: var(--sub); font-size: 12px; }
    .meta-badge {
      background: #f5f7fb;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 7px 10px;
    }
    .levels {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin-top: 12px;
    }
    .level-btn { border-radius: 12px; padding: 12px 8px; font-size: 14px; font-weight: 700; background: #fff; }
    .level-btn.good.active { background: var(--good-soft); border-color: var(--good); color: var(--good); }
    .level-btn.normal.active { background: var(--normal-soft); border-color: var(--normal); color: var(--normal); }
    .level-btn.weak.active { background: var(--weak-soft); border-color: var(--weak); color: var(--weak); }
    .empty {
      text-align: center;
      color: var(--sub);
      padding: 26px 12px;
      background: var(--card);
      border: 1px dashed var(--line);
      border-radius: 18px;
    }
    .footer-note { color: var(--sub); font-size: 12px; line-height: 1.7; margin-top: 16px; text-align: center; }
    @media (min-width: 720px) {
      .stats { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <h1>日本史単元チェックアプリ</h1>
      <div class="subline">チェックすると、その日の日付が自動で入ります。スマホで使いやすい一覧型です。</div>
      <div class="stats">
        <div class="stat"><div class="stat-label">全単元</div><div class="stat-value" id="statTotal">0</div></div>
        <div class="stat"><div class="stat-label">チェック済み</div><div class="stat-value" id="statChecked">0</div></div>
        <div class="stat"><div class="stat-label">苦手</div><div class="stat-value" id="statWeak">0</div></div>
        <div class="stat"><div class="stat-label">今日やった数</div><div class="stat-value" id="statToday">0</div></div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-title">検索・絞り込み</div>
      <input id="searchInput" class="search" type="text" placeholder="単元名で検索" />
      <div class="chips" id="filterChips"></div>
      <div class="toolbar">
        <button class="secondary-btn" id="sortDefaultBtn">時代順に戻す</button>
        <button class="secondary-btn" id="sortWeakBtn">苦手を上にする</button>
        <button class="secondary-btn" id="resetBtn">全記録を初期化</button>
      </div>
    </div>

    <div id="list" class="list"></div>
    <div class="footer-note">保存はこの端末のブラウザ内に自動で行われます。</div>
  </div>

  <script>
    const STORAGE_KEY = 'japanese_history_unit_checker_v1';
    const units = [
      '旧石器・縄文時代','弥生時代','ヤマト政権1','ヤマト政権2','律令国家(推古〜舒明)','律令国家(皇極〜持統)','律令制度(官制・官人制)','律令制度(田制・税制)','奈良(文武〜元正)','奈良(聖武〜光仁)','奈良(外交・東北経営)','飛鳥〜天平文化1','飛鳥〜天平文化2)','平安(桓武・嵯峨)','平安(摂関政治)','平安(10Cの土地と武士)','平安(11Cの土地)','平安(11Cの武士)','平安(院政・平氏政権)','平安文化(弘仁・貞観文化)','平安文化(国風文化)','平安文化(院政期文化)','鎌倉(鎌倉幕府の成立)','鎌倉(承久の乱)','鎌倉(北条泰時〜時頼)','鎌倉(北条時宗〜高時)','鎌倉・室町仏教','鎌倉文化','室町(建武新政〜室町幕府)','室町(守護大名・日明貿易・周辺)','室町(土一揆・応仁の乱〜戦国)','鎌倉・室町時代の農業と商業','室町文化(南北朝〜東山文化)','織豊政権(鉄砲伝来〜織田信長)','織豊政権(豊臣秀吉)','桃山文化','江戸(大名・朝廷統制・職制)','江戸(寺社・農民・町人統制)','江戸(初期外交と周辺地域)','江戸(文治政治)','江戸(朱子学・陽明学・古学)','江戸(寛永文化・元禄文化)','江戸(化政文化・学問)','江戸(幕政改革・農村)','江戸(対外関係の変化〜開国)','江戸(公武合体・尊攘・倒幕)','明治(維新政府・諸改革)','明治(殖産興業・文明開化)','明治(自由民権・立憲国家)','明治(日清・日露戦争と外交)','明治(社会・経済・文化)','大正(大戦・国際協調)','大正(政党政治・社会運動・文化)','昭和(恐慌・軍部台頭〜日中戦争)','昭和(太平洋戦争・戦時体制)','昭和(敗戦・占領改革・憲法)','昭和(講和・高度経済成長)','昭和(安定成長・文化)','平成・令和(現代社会)'
    ];
    const filters = [
      { key: 'all', label: '全部' },
      { key: 'unchecked', label: '未チェック' },
      { key: 'weak', label: '苦手のみ' },
      { key: 'today', label: '今日やったもの' }
    ];
    let appState = { filter: 'all', sort: 'default', query: '' };
    function formatDate(date) {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, '0');
      const d = String(date.getDate()).padStart(2, '0');
      return y + '/' + m + '/' + d;
    }
    function todayText() { return formatDate(new Date()); }
    function createInitialData() {
      return units.map((name, index) => ({ id: index + 1, name, checked: false, lastDate: '', level: '', checkCount: 0 }));
    }
    function loadData() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return createInitialData();
      try {
        const parsed = JSON.parse(raw);
        return units.map((name, index) => {
          const saved = Array.isArray(parsed) ? parsed.find(item => item && item.name === name) : null;
          return {
            id: index + 1,
            name,
            checked: saved ? Boolean(saved.checked) : false,
            lastDate: saved && typeof saved.lastDate === 'string' ? saved.lastDate : '',
            level: saved && typeof saved.level === 'string' ? saved.level : '',
            checkCount: saved && Number.isFinite(saved.checkCount) ? saved.checkCount : 0
          };
        });
      } catch (error) {
        return createInitialData();
      }
    }
    let data = loadData();
    function saveData() { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }
    function updateStats() {
      const today = todayText();
      document.getElementById('statTotal').textContent = data.length;
      document.getElementById('statChecked').textContent = data.filter(item => item.checked).length;
      document.getElementById('statWeak').textContent = data.filter(item => item.level === 'weak').length;
      document.getElementById('statToday').textContent = data.filter(item => item.lastDate === today).length;
    }
    function getVisibleItems() {
      const q = appState.query.trim().toLowerCase();
      const today = todayText();
      let items = data.filter(item => {
        const matchText = !q || item.name.toLowerCase().includes(q);
        if (!matchText) return false;
        if (appState.filter === 'unchecked') return !item.checked;
        if (appState.filter === 'weak') return item.level === 'weak';
        if (appState.filter === 'today') return item.lastDate === today;
        return true;
      });
      if (appState.sort === 'weak') {
        const levelRank = { weak: 0, normal: 1, good: 2, '': 3 };
        items = items.slice().sort((a, b) => {
          const diff = levelRank[a.level] - levelRank[b.level];
          if (diff !== 0) return diff;
          return a.id - b.id;
        });
      } else {
        items = items.slice().sort((a, b) => a.id - b.id);
      }
      return items;
    }
    function renderFilters() {
      const wrap = document.getElementById('filterChips');
      wrap.innerHTML = '';
      filters.forEach(filter => {
        const btn = document.createElement('button');
        btn.className = 'chip' + (appState.filter === filter.key ? ' active' : '');
        btn.textContent = filter.label;
        btn.addEventListener('click', () => { appState.filter = filter.key; render(); });
        wrap.appendChild(btn);
      });
    }
    function createLevelButton(item, levelKey, label, extraClass) {
      const button = document.createElement('button');
      button.className = 'level-btn ' + extraClass + (item.level === levelKey ? ' active' : '');
      button.textContent = label;
      button.addEventListener('click', () => {
        item.level = item.level === levelKey ? '' : levelKey;
        saveData();
        render();
      });
      return button;
    }
    function renderList() {
      const list = document.getElementById('list');
      list.innerHTML = '';
      const items = getVisibleItems();
      updateStats();
      if (items.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'empty';
        empty.textContent = '該当する単元がありません。';
        list.appendChild(empty);
        return;
      }
      items.forEach(item => {
        const card = document.createElement('div');
        card.className = 'card';
        if (item.level === 'weak') card.classList.add('weak');
        if (item.level === 'good') card.classList.add('good');
        const rowTop = document.createElement('div');
        rowTop.className = 'row-top';
        const checkWrap = document.createElement('div');
        checkWrap.className = 'check-wrap';
        const checkbox = document.createElement('input');
        checkbox.type = 'checkbox';
        checkbox.className = 'check';
        checkbox.checked = item.checked;
        checkbox.addEventListener('change', () => {
          const nowChecked = checkbox.checked;
          if (nowChecked && !item.checked) {
            item.checkCount += 1;
            item.lastDate = todayText();
          }
          item.checked = nowChecked;
          saveData();
          render();
        });
        checkWrap.appendChild(checkbox);
        const body = document.createElement('div');
        body.className = 'unit-body';
        const unitName = document.createElement('div');
        unitName.className = 'unit-name';
        unitName.textContent = item.name;
        body.appendChild(unitName);
        const meta = document.createElement('div');
        meta.className = 'meta';
        const dateBadge = document.createElement('div');
        dateBadge.className = 'meta-badge';
        dateBadge.textContent = item.lastDate ? ('最終学習日 ' + item.lastDate) : '最終学習日 なし';
        meta.appendChild(dateBadge);
        const countBadge = document.createElement('div');
        countBadge.className = 'meta-badge';
        countBadge.textContent = '回数 ' + item.checkCount;
        meta.appendChild(countBadge);
        const stateBadge = document.createElement('div');
        stateBadge.className = 'meta-badge';
        stateBadge.textContent = item.checked ? '今はチェック済み' : '今は未チェック';
        meta.appendChild(stateBadge);
        body.appendChild(meta);
        const levels = document.createElement('div');
        levels.className = 'levels';
        levels.appendChild(createLevelButton(item, 'good', '得意', 'good'));
        levels.appendChild(createLevelButton(item, 'normal', '普通', 'normal'));
        levels.appendChild(createLevelButton(item, 'weak', '苦手', 'weak'));
        body.appendChild(levels);
        rowTop.appendChild(checkWrap);
        rowTop.appendChild(body);
        card.appendChild(rowTop);
        list.appendChild(card);
      });
    }
    function render() { renderFilters(); renderList(); }
    document.getElementById('searchInput').addEventListener('input', (event) => { appState.query = event.target.value; render(); });
    document.getElementById('sortDefaultBtn').addEventListener('click', () => { appState.sort = 'default'; render(); });
    document.getElementById('sortWeakBtn').addEventListener('click', () => { appState.sort = 'weak'; render(); });
    document.getElementById('resetBtn').addEventListener('click', () => {
      const ok = window.confirm('すべての記録を初期化します。よろしいですか。');
      if (!ok) return;
      data = createInitialData();
      saveData();
      render();
    });
    render();
  </script>
</body>
</html>
