<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Justice Divider</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
:root{--b:#4677dc;--r:#df6370;--g:#31977a;--y:#f3c95a;--ink:#26364c;--mute:#6a788b;--line:#dbe4ef}*{box-sizing:border-box}html,body{margin:0;background:#edf2fa}body{font-family:"M PLUS Rounded 1c",sans-serif;color:var(--ink);font-size:16px;line-height:1.75}main{max-width:375px;min-height:100vh;margin:auto;background:#fff;box-shadow:0 0 24px #24405d1a}header{height:62px;padding:0 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #edf1f5}.brand{display:flex;align-items:center;gap:9px}.logo{width:28px;height:28px;border-radius:9px;background:var(--b)}.brand small{display:block;font-size:9px;font-weight:800;letter-spacing:.1em;color:#7c8b9e}.brand b{display:block;font-size:16px;line-height:1.2}.reset{border:0;background:none;color:#748196;font:inherit;font-size:11px}.page{padding:24px 18px 30px}.hero{padding:42px 22px 30px;background:#315dba;color:#fff}.hero h1{margin:10px 0;font-size:34px;line-height:1.3}.hero p{margin:0;color:#eef3ff;font-size:15px}.eyebrow{font-size:11px;font-weight:800;letter-spacing:.1em;color:#ffe39e}.btn{width:100%;border:0;border-radius:14px;padding:15px;font:inherit;font-weight:800;font-size:16px}.start{margin-top:24px;background:var(--y);color:#4a380c}.next{margin-top:16px;background:var(--b);color:#fff}.notice{padding:16px 20px 22px;background:#fff9ed;color:#685c44;font-size:12px}.screen{display:none}.screen.active{display:block}.tag{display:inline-block;padding:4px 9px;border-radius:99px;background:#edf4ff;color:#3e66b5;font-size:10px;font-weight:800}.head{display:flex;justify-content:space-between;gap:8px;align-items:flex-start}.head h2{margin:4px 0 0;font-size:23px}.timer{min-width:74px;padding:7px;border-radius:10px;background:#264d99;color:#fff;text-align:center;font-size:12px;font-weight:800}.timer.warn{background:var(--r)}.bar{height:8px;border-radius:99px;overflow:hidden;background:#e8eef6}.bar i{display:block;height:100%;background:var(--g)}.timerbar{margin:16px 0}.timerbar i{background:var(--r)}.diagram{margin:16px 0;padding:14px;border:1px solid var(--line);border-radius:18px;background:#f7faff}.diagram-title{margin-bottom:10px;color:#687a91;font-size:11px;font-weight:800}.center,.card,.role,.view,.note{border-radius:14px;text-align:center;font-weight:800}.center{padding:9px;border:2px solid var(--y);background:#fff7d5;color:#5c470e;font-size:13px}.arrow{text-align:center;padding:7px;color:#6b7d91;font-size:12px;font-weight:800}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:9px}.card{padding:11px;border:2px solid var(--line);background:#fff;font-size:12px}.card small{display:block;color:var(--mute);font-size:10px}.people{display:flex;justify-content:center;gap:4px;flex-wrap:wrap;margin-top:7px}.person{width:23px;height:23px;border-radius:50%;display:grid;place-items:center;background:var(--b);color:#fff;font-size:9px}.person.red{background:var(--r)}.role{padding:11px;color:#fff;font-size:13px}.role.you{background:var(--y);color:#55420c}.role.other{background:var(--r)}.role small{display:block;font-size:10px}.contract{display:grid;grid-template-columns:1fr auto 1fr;gap:7px;align-items:center}.deal{padding:8px;border-radius:10px;background:#fff7d5;color:#5c470e;text-align:center;font-size:11px;font-weight:800}.triples{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-top:8px}.mini{padding:8px 4px;border-radius:10px;background:#fff;text-align:center;color:#62738a;font-size:11px;font-weight:800}.stack{display:grid;gap:8px}.view{padding:11px;color:#fff;font-size:14px}.view.b{background:var(--b)}.view.r{background:var(--r)}.view.g{background:var(--g)}.note{padding:10px;background:#fff;color:#536276;font-size:12px}.question{margin:0 0 10px;font-size:18px;font-weight:800;line-height:1.75}.context{padding:13px 14px;border-left:4px solid var(--y);border-radius:0 12px 12px 0;background:#fff9ed;color:#536276;font-size:13px}.ask{margin:18px 0 9px;font-weight:800;color:#3a4f6d;font-size:14px}.choices{display:grid;gap:10px}.choice{width:100%;padding:14px;border:2px solid var(--line);border-radius:15px;background:#fff;text-align:left;color:var(--ink);font:inherit}.choice b{display:block;font-size:16px}.choice small{display:block;color:var(--mute);font-size:13px;line-height:1.6}.result{padding:18px;border-radius:18px;background:#315dba;color:#fff}.result h2{margin:5px 0;font-size:25px}.result p{margin:0;color:#eaf1ff;font-size:13px}.box{margin-top:15px;padding:16px 14px;border:1px solid var(--line);border-radius:16px}.box h3{margin:0 0 7px;font-size:14px}.box p{margin:0;color:#536276;font-size:13px}.guide{padding:12px 13px;border-radius:14px;background:#fff7df;color:#5e5338;font-size:12px}.metric{margin-top:12px;padding:15px;border-radius:16px;background:#f1f5fb}.metric small{color:var(--mute);font-size:11px}.metric b{display:block;color:#31548d;font-size:28px}.metric p{margin:7px 0 0;color:#536276;font-size:12px}.log{border-top:1px solid #edf1f5}.log div{padding:11px 0;border-bottom:1px solid #edf1f5}.log small{display:block;color:var(--mute);font-size:12px}.footer{padding:12px;background:#f0f4f8;color:#8997a8;text-align:center;font-size:10px}
</style>
</head>
<body><main>
<header><div class="brand"><div class="logo"></div><div><small>ETHICAL THOUGHT EXPERIMENT</small><b>Justice Divider</b></div></div><button class="reset" onclick="resetGame()">記録を消去</button></header>
<section id="home" class="screen active"><div class="hero"><div class="eyebrow">答えを決めるゲームではない</div><h1>あなたは、<br>どこで線を引くか。</h1><p>4つの場面で選びながら、自分が何を大事にしているのかを考えるゲームです。</p><button class="btn start" onclick="showMenu()">思考実験を始める</button></div><div class="notice">この教材に正解はありません。テーマが重く感じられたときは、無理に続けず、先生や信頼できる大人に相談してください。</div></section>
<section id="menu" class="screen"><div class="page"><h2>4つの境界線</h2><p style="color:#6a788b;font-size:14px">まず状況を見て、自分ならどうするかを選びます。</p><div id="list"></div><div style="display:flex;justify-content:space-between;margin:18px 0 5px;color:#6a788b;font-size:11px"><span>進行状況</span><span id="progressText"></span></div><div class="bar"><i id="progress"></i></div></div></section>
<section id="play" class="screen"></section><section id="result" class="screen"></section><section id="report" class="screen"></section><footer class="footer">授業用プロトタイプ｜選択はこの端末内に保存されます</footer>
</main>
<script>
const data=[
['t1','01','トロッコ問題','数を減らすことは、正義か。','数と功利主義','暴走する乗り物が近づいています。操作をすると、進む先を変えられます。','何もしなければ5人がいる先へ進みます。操作をすれば、1人がいる先へ進みます。',[['act','操作する','5人を助けるが、1人が犠牲になる。','5人を助けるため、1人を犠牲にする'],['wait','何もしない','自分で犠牲者を選ばないが、5人が助からない。','自ら犠牲者を選ばない']]],
['t2','02','トロッコ問題 2','直接手を下すことは、何を変えるか。','直接加害と心理','橋の下を乗り物が通ります。目の前の人を押せば、下にいる5人は助かると分かっています。','前の場面と人数の構図は同じです。ただし今回は、あなたが目の前の人に直接触れる必要があります。',[['push','押す','目の前の人を押し、5人を助ける。','直接の行為を引き受ける'],['watch','見送る','直接手を下さず、そのまま通過させる。','直接の加害を避ける']]],
['organ','03','臓器移植の問題','同意は、いつ自由といえるか。','自由と格差','治療を急ぐ人の前に、生活に困っている人が提供を申し出ます。','本人は「自分で決めた」と言います。しかし、その背景には深刻な経済的な困難があります。',[['buy','契約する','当事者同士の同意を重視し、取引を成立させる。','個人の選択を尊重する'],['support','取引せず、別の支援を探す','売らずに済むよう、生活や医療への支援を探す。','格差による圧力を問題にする'],['decline','取引を断る','制度上の手続きに従い、別の機会を待つ。','個人間の取引を避ける']]],
['preg','04','妊娠をめぐる問題','権利がぶつかるとき、誰と考えるか。','権利の衝突と共通善','本人の人生に関する決定と、生命をどう考えるかが対立しています。','ここでは結論を採点しません。どの視点を丁寧に扱うかを選びます。現実では、本人の安全と意思を尊重し、支援者と相談することが大切です。',[['self','本人の自己決定を中心に考える','身体・生活・将来への影響を最も重く扱う。','本人の自由を重視する'],['life','生命の保護を中心に考える','生命をどう位置づけるかを重く扱う。','守るべき生命を考える'],['talk','支援と対話の仕組みを中心に考える','二者択一にせず、孤立を防ぐ支援と社会の責任を考える。','共通善を探る']]]
];
let state=JSON.parse(localStorage.getItem('jd-safe-v1')||'{"answers":[]}');let current=null;const el=id=>document.getElementById(id);function show(id){['home','menu','play','result','report'].forEach(x=>el(x).classList.toggle('active',x===id));window.scrollTo(0,0)}function save(){localStorage.setItem('jd-safe-v1',JSON.stringify(state))}function dots(n,r=false){return '<div class="people">'+Array.from({length:n},()=>'<i class="person '+(r?'red':'')+'">人</i>').join('')+'</div>'}
function diagram(id){if(id==='t1')return '<div class="diagram"><div class="diagram-title">状況図</div><div class="center">あなたは操作の前にいる</div><div class="arrow">どちらの先へ進ませる？</div><div class="grid2"><div class="card"><b>5人がいる先</b><small>何もしない場合</small>'+dots(5)+'</div><div class="card"><b>1人がいる先</b><small>操作する場合</small>'+dots(1,true)+'</div></div></div>';if(id==='t2')return '<div class="diagram"><div class="diagram-title">状況図</div><div class="grid2"><div class="role you">あなた<small>橋の上</small></div><div class="role other">目の前の人<small>橋の上</small></div></div><div class="arrow">↓ 押すと下へ</div><div class="card"><b>下には5人</b>'+dots(5)+'</div></div>';if(id==='organ')return '<div class="diagram"><div class="diagram-title">関係図</div><div class="contract"><div class="card"><b>患者</b><small>治療を急いでいる</small></div><div class="deal">契約<br>する？</div><div class="card"><b>提供者</b><small>生活に困っている</small></div></div><div class="triples"><div class="mini">お金</div><div class="mini">健康</div><div class="mini">公平さ</div></div></div>';return '<div class="diagram"><div class="diagram-title">考える視点</div><div class="stack"><div class="view b">本人の気持ち</div><div class="view r">生命の考え方</div><div class="view g">社会の支援</div><div class="note">どの視点を、いちばん重く考える？</div></div></div>'}
function showMenu(){const done=new Set(state.answers.map(x=>x.id));el('list').innerHTML=data.map((q,i)=>{const lock=i>0&&!done.has(data[i-1][0]);return '<button class="chapter" '+(lock?'disabled':'')+' onclick="openQ(\''+q[0]+'\')"><span class="n">CHAPTER '+q[1]+'</span><b>'+q[2]+'</b><span>'+q[3]+'</span><i>'+(done.has(q[0])?'✓':lock?'●':'›')+'</i></button>'}).join('');el('progress').style.width=(done.size/4*100)+'%';el('progressText').textContent=done.size+' / 4';show('menu')}
function openQ(id){current=data.find(x=>x[0]===id);const q=current;el('play').innerHTML='<div class="page"><div class="head"><div><span class="tag">'+q[1]+'｜'+q[4]+'</span><h2>'+q[2]+'</h2></div></div>'+diagram(q[0])+'<p class="question">'+q[5]+'</p><div class="context">'+q[6]+'</div><div class="ask">あなたはどうする？</div><div class="choices">'+q[7].map(o=>'<button class="choice" onclick="choose(\''+o[0]+'\')"><b>'+o[1]+'</b><small>'+o[2]+'</small></button>').join('')+'</div></div>';show('play')}
function choose(key){const q=current,o=q[7].find(x=>x[0]===key);state.answers=state.answers.filter(x=>x.id!==q[0]);state.answers.push({id:q[0],key:key,tag:o[3]});save();el('result').innerHTML='<div class="page"><div class="result"><div class="eyebrow">YOUR CHOICE</div><h2>'+o[1]+'</h2><p>正誤ではなく、「何を大切にしたか」として記録しました。</p></div><div class="box"><h3>次に考える問い</h3><p>自分と違う選択をした人は、何を大切にしたのでしょうか。</p></div><button class="btn next" onclick="'+(q[0]==='preg'?'showReport()':'showMenu()')+'">'+(q[0]==='preg'?'選択の見方を見る':'次の章へ進む')+'</button></div>';show('result')}
function showReport(){const a=Object.fromEntries(state.answers.map(x=>[x.id,x.key]));const m=[['数・結果を重視',(a.t1==='act'?1:0)+(a.t2==='push'?1:0),'2つの場面で、助かる人数を重く見た回数です。'],['自由・自己決定を重視',(a.organ==='buy'?1:0)+(a.preg==='self'?1:0),'関連する2つの場面で、本人の選択を重く見た回数です。'],['支援・対話を重視',((a.organ==='support'||a.organ==='decline')?1:0)+(a.preg==='talk'?1:0),'個人だけに背負わせず、支援や社会の役割を考えた回数です。']];el('report').innerHTML='<div class="page"><span class="tag">ALL CHAPTERS COMPLETED</span><h2 style="margin-top:7px">あなたの選択の見方</h2><p style="color:#6a788b;font-size:14px">3つの観点を別々に見ています。合計100になる診断ではありません。</p><div class="guide"><b>読み方</b><br>「2 / 2場面」は、関連する2場面の両方でその観点を重く見たということです。</div>'+m.map(x=>'<div class="metric"><small>'+x[0]+'</small><b>'+x[1]+' / 2 場面</b><div class="bar"><i style="width:'+(x[1]*50)+'%"></i></div><p>'+x[2]+'</p></div>').join('')+'<div class="box"><h3>今回の選択ログ</h3><div class="log">'+data.map(q=>{const x=state.answers.find(a=>a.id===q[0]);return '<div><b>'+q[1]+'｜'+q[2]+'</b><small>'+(x?x.tag:'未回答')+'</small></div>'}).join('')+'</div></div><button class="btn next" onclick="showMenu()">章の一覧に戻る</button></div>';show('report')}
function resetGame(){if(confirm('この端末に保存した記録を消去しますか？')){state={answers:[]};save();show('home')}}
</script></body></html>
