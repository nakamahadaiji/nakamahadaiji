<html lang="ja">
<head>
<meta charset="utf-8">

<title>Justice Divider｜倫理選択ゲーム</title>
<style>
:root{--navy:#102039;--ink:#192638;--muted:#68768a;--paper:#fbfaf6;--line:#dbe1e9;--blue:#2e63cf;--red:#bf4550;--gold:#bf8121;--green:#277a63;--soft:#eef3fb;--shadow:0 10px 28px rgba(19,35,61,.12)}
*{box-sizing:border-box}html{background:#e8eef6}body{margin:0;color:var(--ink);background:linear-gradient(145deg,#eef2f8,#e6edf6);font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif;font-size:16px;line-height:1.7;letter-spacing:.02em}button,input{font:inherit}.app{width:100%;max-width:375px;min-height:100vh;margin:0 auto;background:var(--paper);box-shadow:0 0 40px rgba(14,28,50,.16);overflow:hidden}.top{height:64px;padding:0 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #edf0f4;background:rgba(255,255,255,.94)}.brand{display:flex;gap:9px;align-items:center}.mark{width:27px;height:27px;border-radius:9px;background:conic-gradient(from 210deg,#2e63cf,#e5b14a,#bf4550,#2e63cf)}.brand small{display:block;font-size:9px;line-height:1.1;letter-spacing:.11em;color:var(--muted);font-weight:800}.brand h1{margin:2px 0 0;font-size:16px;line-height:1.1;letter-spacing:.03em}.reset{border:0;background:transparent;color:var(--muted);font-size:11px;padding:7px 0;cursor:pointer}.screen{display:none;min-height:calc(100vh - 64px)}.screen.active{display:block}.hero{padding:43px 24px 31px;color:#fff;background:radial-gradient(circle at 96% 6%,rgba(247,203,110,.9) 0 6%,transparent 30%),linear-gradient(145deg,#102039 0%,#264d91 100%)}.eyebrow{font-weight:800;font-size:11px;letter-spacing:.13em;color:#f6cf7f}.hero h2{margin:14px 0 13px;font-size:35px;line-height:1.25;letter-spacing:.025em}.hero p{font-size:15px;line-height:1.85;margin:0;color:#e3ecff}.start,.primary{display:block;width:100%;border:0;border-radius:13px;padding:15px 16px;background:#f2c75f;color:#243657;font-size:16px;font-weight:800;cursor:pointer}.start{margin-top:26px}.notice{padding:17px 20px 21px;color:#64573f;background:#fffbf0;font-size:12px;line-height:1.75}.menu{padding:25px 18px 30px}.menu h2,.scene h2,.result h2,.dashboard h2{margin:0;font-size:22px;line-height:1.45;letter-spacing:.02em}.lead{margin:7px 0 19px;color:var(--muted);font-size:14px;line-height:1.75}.chapters{display:grid;gap:10px}.chapter{width:100%;position:relative;padding:16px 49px 16px 16px;text-align:left;border:1px solid var(--line);border-radius:15px;background:#fff;color:var(--ink);cursor:pointer;min-height:92px}.chapter:disabled{opacity:.46}.chapter .no{display:block;margin-bottom:3px;color:var(--gold);font-size:10px;font-weight:900;letter-spacing:.12em}.chapter strong{display:block;font-size:16px;line-height:1.35}.chapter span{display:block;color:var(--muted);font-size:12px;line-height:1.45;margin-top:4px}.chapter .state{position:absolute;right:17px;top:32px;margin:0;color:var(--blue);font-size:18px}.progress-wrap{margin-top:18px}.progress-label{display:flex;justify-content:space-between;color:var(--muted);font-size:11px;margin-bottom:6px}.progress{height:7px;border-radius:99px;background:#e7ebf1;overflow:hidden}.progress i{display:block;height:100%;width:0;background:linear-gradient(90deg,#2e63cf,#2c856b);transition:.35s}.scene{padding:24px 18px 30px}.scene-head{display:flex;gap:9px;align-items:flex-start;justify-content:space-between}.tag{display:inline-flex;align-items:center;min-height:26px;padding:5px 9px;border-radius:99px;background:#eaf1ff;color:#355da8;font-size:10px;font-weight:900;letter-spacing:.06em}.timer{flex:none;min-width:72px;padding:6px 8px;border-radius:10px;background:var(--navy);color:#fff;font-weight:900;font-size:12px;text-align:center;line-height:1.2}.timer.urgent{background:var(--red)}.meter{height:7px;background:#ebeff3;overflow:hidden;border-radius:99px;margin:17px 0}.meter i{height:100%;display:block;background:linear-gradient(90deg,#ebb94f,#c44851);width:100%;transition:width .1s linear}.visual{position:relative;min-height:206px;margin:17px 0 20px;border-radius:18px;overflow:hidden;border:1px solid #d9e1ec;background:#eaf0f8}.visual-title{position:absolute;left:14px;top:12px;color:#526174;font-size:10px;font-weight:900;letter-spacing:.08em}.question{font-size:18px;font-weight:800;line-height:1.7;margin:0 0 12px}.context{padding:13px 14px;border-left:4px solid var(--gold);border-radius:0 11px 11px 0;background:#f6f3ea;color:#4d5a6a;font-size:13px;line-height:1.7}.choices{display:grid;gap:10px;margin-top:17px}.choice{width:100%;padding:14px 14px;text-align:left;border:1px solid #d6deea;border-radius:14px;background:#fff;color:var(--ink);cursor:pointer}.choice b{display:block;font-size:15px;line-height:1.4}.choice small{display:block;margin-top:4px;color:var(--muted);font-size:12px;line-height:1.55}.choice:active{transform:scale(.99);background:#f3f7ff}.choice.danger{border-color:#e6c6ca}.choice.danger:active{background:#fff6f6}.trolley-bg{background:linear-gradient(#dce9f8 0 47%,#788a9b 47% 100%)}.rail{position:absolute;height:6px;background:#5c6a79;border-radius:99px;transform-origin:left}.rail:after{content:"";position:absolute;left:0;right:0;top:9px;height:5px;background:repeating-linear-gradient(90deg,#687785 0 11px,transparent 11px 21px)}.rail.a{left:19px;top:134px;width:210px;transform:rotate(-16deg)}.rail.b{left:19px;top:134px;width:210px;transform:rotate(16deg)}.trolley{position:absolute;top:80px;left:19px;width:44px;height:32px;border:4px solid #b83d49;border-bottom-width:8px;border-radius:5px;background:#e25b63;box-shadow:7px 7px 0 #812f38}.trolley:before{content:"";position:absolute;left:7px;top:6px;width:22px;height:9px;border-radius:2px;background:#f9d9a6}.token-row{position:absolute;display:flex;gap:5px}.token{width:20px;height:20px;border-radius:50%;background:#fff;border:3px solid #344b68;box-shadow:0 2px 0 rgba(0,0,0,.1)}.token:after{content:"";display:block;width:5px;height:5px;margin:5px auto;border-radius:50%;background:#344b68}.workers-left{left:35px;bottom:22px}.workers-right{right:40px;top:74px}.label{position:absolute;padding:3px 7px;border-radius:99px;background:rgba(255,255,255,.84);color:#334860;font-size:10px;font-weight:900}.label.left{left:32px;bottom:51px}.label.right{right:33px;top:47px}.bridge-bg{background:linear-gradient(#e8eef7 0 42%,#9caec0 42% 100%)}.bridge{position:absolute;left:18px;right:18px;top:63px;height:17px;border-radius:6px;background:#8d6646;box-shadow:0 5px 0 #62452e}.person{position:absolute;width:25px;height:40px}.person:before{content:"";display:block;width:14px;height:14px;margin:auto;border-radius:50%;background:#324a68}.person:after{content:"";display:block;width:20px;height:22px;margin:4px auto;border-radius:8px 8px 3px 3px;background:#567596}.person.a{left:135px;top:21px}.person.b{left:181px;top:21px}.track{position:absolute;left:0;right:0;bottom:42px;height:6px;background:#596879}.track:after{content:"";position:absolute;left:0;right:0;top:10px;height:5px;background:repeating-linear-gradient(90deg,#667789 0 12px,transparent 12px 23px)}.workers{right:29px;bottom:17px}.hospital-bg{background:linear-gradient(135deg,#d9edf2,#f6f6f2)}.bed{position:absolute;left:20px;bottom:32px;width:106px;height:51px;border-radius:8px;background:#eef3f7;border:4px solid #7995a9}.bed:before{content:"";position:absolute;left:11px;top:-17px;width:44px;height:21px;border-radius:12px;background:#d8e4ed}.bed:after{content:"";position:absolute;right:-5px;bottom:-12px;width:105px;height:10px;border-radius:5px;background:#5e778b}.patient{position:absolute;left:46px;bottom:73px;width:29px;height:29px;border-radius:50%;background:#c88f72}.parent{position:absolute;right:43px;bottom:48px;width:42px;height:75px}.parent:before{content:"";display:block;width:25px;height:25px;margin:auto;border-radius:50%;background:#7f5d52}.parent:after{content:"";display:block;width:38px;height:43px;margin:5px auto;border-radius:12px 12px 3px 3px;background:#4d7793}.quote{position:absolute;right:16px;top:25px;left:152px;padding:10px;border-radius:11px;background:rgba(255,255,255,.92);color:#46576b;font-size:11px;line-height:1.55}.dialogue-bg{background:linear-gradient(135deg,#e6dce9,#f8e1ce)}.room{position:absolute;left:0;right:0;bottom:0;height:62px;background:#d1b7a7}.chat-person{position:absolute;bottom:34px;width:48px;height:73px}.chat-person:before{content:"";display:block;width:27px;height:27px;border-radius:50%;margin:auto;background:#86675c}.chat-person:after{content:"";display:block;width:44px;height:41px;margin:5px auto;border-radius:14px 14px 2px 2px;background:#6a789b}.chat-person.one{left:72px}.chat-person.two{right:67px}.bubble{position:absolute;max-width:154px;padding:10px 11px;border-radius:12px;background:rgba(255,255,255,.92);color:#4a4d5d;font-size:11px;font-weight:700;line-height:1.55}.bubble.a{left:16px;top:22px}.bubble.b{right:15px;top:70px}.slider-wrap{margin-top:17px;padding:14px;border-radius:14px;background:#f2f5f9}.slider-title{font-size:12px;font-weight:800}.amount{margin:4px 0 6px;color:var(--blue);font-size:25px;font-weight:900;line-height:1.2}input[type=range]{width:100%;accent-color:var(--blue)}.result,.dashboard{padding:25px 18px 31px}.result-head{padding:19px;border-radius:17px;color:#fff;background:linear-gradient(135deg,#142744,#315da2)}.result-head h2{margin:6px 0 4px;font-size:24px}.result-head p{margin:0;color:#e3ecff;font-size:13px;line-height:1.7}.reflection{margin-top:15px;padding:17px 15px;border:1px solid var(--line);border-radius:15px;background:#fff}.reflection h3{margin:0 0 8px;font-size:14px;line-height:1.4}.reflection p{margin:0;color:#526072;font-size:13px;line-height:1.75}.primary{margin-top:16px;color:#fff;background:var(--blue)}.matrix{display:grid;gap:10px;margin:18px 0}.metric{padding:15px;border-radius:14px;background:#f0f4fa}.metric small{display:block;color:var(--muted);font-size:11px}.metric strong{display:block;margin-top:2px;color:#294573;font-size:28px;line-height:1.25}.metric .meter{margin:8px 0 0}.log{border-top:1px solid #ecf0f4}.log-item{display:flex;gap:12px;padding:11px 0;border-bottom:1px solid #ecf0f4}.log-item time{flex:0 0 34px;color:var(--gold);font-size:11px;font-weight:900}.log-item b{font-size:13px}.log-item small{display:block;color:var(--muted);font-size:12px;line-height:1.5}.footer{padding:12px;text-align:center;color:#8590a0;background:#f0f3f7;font-size:10px;line-height:1.5}
</style>
</head>
<body>
<main class="app">
<header class="top"><div class="brand"><div class="mark"></div><div><small>ETHICAL THOUGHT EXPERIMENT</small><h1>Justice Divider</h1></div></div><button id="resetBtn" class="reset">記録を消去</button></header>
<section class="screen active" id="home"><div class="hero"><div class="eyebrow">答えを決めるゲームではない</div><h2>あなたは、<br>どこで線を引くか。</h2><p>4つの選択を通じて、「数」「直接の行為」「自由と格差」「共通善」の間にある自分の考え方を見つめます。</p><button class="start" id="startBtn">思考実験を始める</button></div><div class="notice">この教材は、正解や特定の行動を示すものではありません。テーマが重く感じられたときは、無理に続けず、授業者や信頼できる大人に相談してください。</div></section>
<section class="screen" id="menu"><div class="menu"><h2>4つの境界線</h2><p class="lead">順番に進めると、最後に選択の傾向が表示されます。</p><div class="chapters" id="chapterButtons"></div><div class="progress-wrap"><div class="progress-label"><span>進行状況</span><span id="progressText">0 / 4</span></div><div class="progress"><i id="progressBar"></i></div></div></div></section>
<section class="screen" id="game"></section>
<section class="screen" id="result"></section>
<section class="screen" id="dashboard"></section>
<footer class="footer">授業用プロトタイプ｜記録はこの端末内にのみ保存されます</footer>
</main>
<script>
const DATA=[
{id:'trolley1',no:'01',title:'トロッコ問題',sub:'数を減らすことは、正義か。',theme:'数と功利主義',time:10,question:'あなたは分岐器のそばに立っています。レバーを引くと、5人ではなく1人がいる線路へ進路が変わります。',context:'何もしなければ5人が犠牲になります。レバーを引けば、1人が犠牲になります。どちらの命も、あなたには知らない人のものです。',choices:[{key:'act',title:'レバーを引く',desc:'自分の行為で進路を変え、5人を助ける。',tag:'5人を助けるため、1人を犠牲にする',axis:{utility:1,direct:1}},{key:'wait',title:'何もしない',desc:'進路を変えず、5人がいる線路をそのまま進ませる。',tag:'自ら犠牲者を選ばない',axis:{utility:0,direct:0}}],reflect:{act:'5人を助ける選択は、「結果として救える人数」を重視する考え方に近づきます。一方で、自分が進路を変えたことで1人が犠牲になる点は消えません。',wait:'レバーに触れない選択は、誰かを手段として扱うことを避けようとする考え方に近づきます。一方で、何もしないことも結果を生む行為だ、と考える立場もあります。'}},
{id:'trolley2',no:'02',title:'トロッコ問題 2',sub:'直接手を下すことは、何を変えるか。',theme:'直接加害と心理',time:10,question:'橋の下をトロッコが通ります。目の前の人を押せば、トロッコは止まり、線路上の5人は助かると分かっています。',context:'前の場面と同じく、1人の犠牲で5人が助かります。ただし今度は、あなた自身が目の前の人に直接触れる必要があります。',choices:[{key:'push',title:'押す',desc:'目の前の人を押し、5人を助ける。',tag:'直接の行為を引き受ける',axis:{utility:1,direct:2}},{key:'watch',title:'見送る',desc:'手を出さず、トロッコを通過させる。',tag:'直接の加害を避ける',axis:{utility:0,direct:0}}],reflect:{push:'前章と同じく人数を重視した選択です。しかし、直接触れることへの抵抗が強くなる人は少なくありません。結果だけでなく、行為の形も判断に影響します。',watch:'直接の加害を避ける選択です。前章でレバーを引いた場合、同じ人数の構図でも判断が変わったことになります。その差がどこから生まれるかを考えてみてください。'}},
{id:'organ',no:'03',title:'臓器移植の問題',sub:'同意は、いつ自由といえるか。',theme:'自由と格差',question:'治療を急ぐ患者であるあなたの前に、家族の学費のために臓器提供を申し出る人がいます。双方の同意があれば、取引は正当化されるでしょうか。',context:'本人は「自分で決めた」と言います。しかし、その決断の背景には深刻な経済的困難があります。金額を提示したうえで、あなたはどうしますか。',choices:[{key:'buy',title:'契約する',desc:'当事者同士の同意を重視し、取引を成立させる。',tag:'個人の選択を尊重する',axis:{liberty:2,equality:0}},{key:'support',title:'取引せず、別の支援を探す',desc:'臓器を売らずに済むよう、生活や医療への支援を探す。',tag:'格差による圧力を問題にする',axis:{liberty:0,equality:2}},{key:'decline',title:'取引を断る',desc:'制度上の手続きに従い、別の治療機会を待つ。',tag:'個人間の取引を避ける',axis:{liberty:0,equality:1}}],reflect:{buy:'同意を重視する立場です。ただし、選択肢が極端に狭い状況での同意を、完全に自由な意思と言えるかが問われます。',support:'問題を個人の選択だけで終わらせず、選ばなくてよい環境をつくる立場です。公平な制度とは何か、という問いにつながります。',decline:'取引の線引きを守る立場です。一方で、目の前の二人の困難を制度だけで解決できるかという問題が残ります。'}},
{id:'abortion',no:'04',title:'妊娠をめぐる問題',sub:'権利がぶつかるとき、誰と考えるか。',theme:'権利の衝突と共通善',question:'予期しない妊娠をめぐり、本人の身体や人生に関する決定と、胎児の生命をどう考えるかが対立しています。単純な正解はありません。',context:'ここでは結論そのものを採点しません。どの観点を丁寧に扱うかを選び、対話の進め方を考えます。現実の相談では、医療者・家族・支援者とともに、本人の安全と意思を尊重することが重要です。',choices:[{key:'self',title:'本人の自己決定を中心に考える',desc:'身体・生活・将来への影響を最も重く扱う。',tag:'本人の自由を重視する',axis:{liberty:2,common:0}},{key:'life',title:'生命の保護を中心に考える',desc:'胎児の生命をどう位置づけるかを重く扱う。',tag:'守るべき生命を考える',axis:{liberty:0,common:1}},{key:'dialogue',title:'支援と対話の仕組みを中心に考える',desc:'二者択一にせず、孤立を防ぐ支援と社会の責任を考える。',tag:'共通善を探る',axis:{liberty:1,common:3}}],reflect:{self:'本人が自分の身体と人生について決める権利を重視する立場です。同時に、孤立や経済的事情によって「選ばされた」状態になっていないかも考える必要があります。',life:'生命をどう守るかを重視する立場です。その考えを現実の支援や本人への配慮と、どのように両立させるかが課題になります。',dialogue:'対立する権利を、個人だけに背負わせない立場です。住まい、医療、経済、相談先など、社会側にできることを考える方向へ進みます。'}}
];
let state=JSON.parse(localStorage.getItem('justice-divider-v2')||'{"answers":[]}');let current=null,interval=null,remaining=0;const $=s=>document.querySelector(s);const screens=['home','menu','game','result','dashboard'];
function show(id){screens.forEach(s=>$('#'+s).classList.toggle('active',s===id));window.scrollTo({top:0,behavior:'smooth'})}function save(){localStorage.setItem('justice-divider-v2',JSON.stringify(state))}
function renderMenu(){const done=new Set(state.answers.map(x=>x.id));$('#chapterButtons').innerHTML=DATA.map((d,i)=>{const locked=i>0&&!done.has(DATA[i-1].id);return `<button class="chapter" data-id="${d.id}" ${locked?'disabled':''}><span class="no">CHAPTER ${d.no}</span><strong>${d.title}</strong><span>${d.sub}</span><span class="state">${done.has(d.id)?'✓':locked?'●':'›'}</span></button>`}).join('');$('#progressBar').style.width=(done.size/DATA.length*100)+'%';$('#progressText').textContent=done.size+' / '+DATA.length;document.querySelectorAll('.chapter').forEach(b=>b.onclick=()=>openChapter(b.dataset.id))}
function tokens(n,cls){return `<div class="token-row ${cls}">${Array.from({length:n},()=>'<i class="token"></i>').join('')}</div>`}
function visual(d){if(d.id==='trolley1')return `<div class="visual trolley-bg"><span class="visual-title">分岐した線路</span><i class="rail a"></i><i class="rail b"></i><i class="trolley"></i>${tokens(5,'workers-left')}${tokens(1,'workers-right')}<span class="label left">5人</span><span class="label right">1人</span></div>`;if(d.id==='trolley2')return `<div class="visual bridge-bg"><span class="visual-title">橋の上と線路</span><i class="bridge"></i><i class="person a"></i><i class="person b"></i><i class="track"></i><i class="trolley" style="top:128px;left:15px"></i>${tokens(5,'workers')}<span class="label" style="right:25px;bottom:59px">5人</span></div>`;if(d.id==='organ')return `<div class="visual hospital-bg"><span class="visual-title">病室での対話</span><i class="bed"></i><i class="patient"></i><i class="parent"></i><div class="quote">「子どもの進学費用のためなら……。自分で決めたことです」</div></div>`;return `<div class="visual dialogue-bg"><span class="visual-title">相談室での対話</span><i class="room"></i><i class="chat-person one"></i><i class="chat-person two"></i><div class="bubble a">「これからの生活を、どう支えればいいのだろう」</div><div class="bubble b">「一人で結論を背負わなくていい」</div></div>`}
function openChapter(id){current=DATA.find(x=>x.id===id);clearInterval(interval);remaining=current.time||0;renderScene();show('game');if(current.time)startTimer()}
function renderScene(){const d=current;$('#game').innerHTML=`<div class="scene"><div class="scene-head"><div><span class="tag">${d.no}｜${d.theme}</span><h2>${d.title}</h2></div>${d.time?'<div id="timer" class="timer"></div>':''}</div>${d.time?'<div class="meter"><i id="meter"></i></div>':''}${visual(d)}<p class="question">${d.question}</p><div class="context">${d.context}</div>${d.id==='organ'?'<div class="slider-wrap"><div class="slider-title">提示する支援額（考えるための設定）</div><div id="amount" class="amount">1,000万円</div><input id="offer" type="range" min="100" max="3000" step="100" value="1000"></div>':''}<div class="choices">${d.choices.map(c=>`<button class="choice ${c.key==='push'||c.key==='buy'?'danger':''}" data-choice="${c.key}"><b>${c.title}</b><small>${c.desc}</small></button>`).join('')}</div></div>`;document.querySelectorAll('[data-choice]').forEach(b=>b.onclick=()=>choose(b.dataset.choice));if(d.id==='organ')$('#offer').oninput=e=>$('#amount').textContent=Number(e.target.value).toLocaleString()+'万円'}
function startTimer(){clearInterval(interval);updateTimer();interval=setInterval(()=>{remaining-=.1;updateTimer();if(remaining<=0){clearInterval(interval);choose(current.id==='trolley1'?'wait':'watch',true)}},100)}function updateTimer(){const n=Math.max(0,Math.ceil(remaining)),el=$('#timer'),m=$('#meter');if(!el)return;el.textContent='残り '+n+' 秒';el.classList.toggle('urgent',n<=3);m.style.width=Math.max(0,remaining/current.time*100)+'%'}
function choose(key,timeout=false){clearInterval(interval);const d=current,c=d.choices.find(x=>x.key===key);state.answers=state.answers.filter(x=>x.id!==d.id);state.answers.push({id:d.id,key,tag:c.tag,axis:c.axis});save();renderResult(d,c,timeout);show('result')}
function consistency(){const a=state.answers.find(x=>x.id==='trolley1'),b=state.answers.find(x=>x.id==='trolley2');if(!a||!b)return '';if(a.key==='act'&&b.key==='push')return 'どちらでも「助かる人数」を重視しました。結果を一貫して重く見る判断です。';if(a.key==='wait'&&b.key==='watch')return 'どちらでも直接的に犠牲を選ばない判断でした。行為の責任を重く見る判断です。';return '人数の構図は似ていますが、判断が変わりました。距離や直接性が、あなたの判断にどう影響したかを考えてみてください。'}
function nextQ(id){return {trolley1:'「何もしない」ことは、本当に選択をしていないことになるでしょうか。',trolley2:'同じ結果でも、手段が違えば責任の重さは変わるでしょうか。',organ:'選択の自由を守るために、社会はどこまで条件を整えるべきでしょうか。',abortion:'対立を個人だけに背負わせずに済む社会とは、どんな仕組みでしょうか。'}[id]}
function renderResult(d,c,timeout){const related=d.id==='trolley2'?consistency():'';$('#result').innerHTML=`<div class="result"><div class="result-head"><div class="eyebrow">YOUR CHOICE</div><h2>${c.title}</h2><p>${timeout?'時間内に選択がなかったため、この選択として記録しました。':'正誤ではなく、「どこを重く見たか」として記録しました。'}</p></div><div class="reflection"><h3>この選択から考えられること</h3><p>${d.reflect[c.key]}</p>${related?'<p style="margin-top:10px"><b>前章との比較：</b>'+related+'</p>':''}</div><div class="reflection"><h3>次に考える問い</h3><p>${nextQ(d.id)}</p></div><button id="continue" class="primary">${d.id===DATA.at(-1).id?'あなたの選択の傾向を見る':'次の章へ進む'}</button></div>`;$('#continue').onclick=()=>{if(d.id===DATA.at(-1).id)renderDashboard();else{renderMenu();show('menu')}}}
function renderDashboard(){let a={utility:0,liberty:0,equality:0,common:0};state.answers.forEach(x=>Object.entries(x.axis).forEach(([k,v])=>a[k]=(a[k]||0)+v));const vals=[['数・結果を重視',a.utility,2],['自由・自己決定を重視',a.liberty,5],['共通善・支援を重視',a.common+a.equality,6]];$('#dashboard').innerHTML=`<div class="dashboard"><span class="tag">ALL CHAPTERS COMPLETED</span><h2 style="margin-top:8px">あなたの選択の傾向</h2><p class="lead">これは診断や評価ではありません。4つの場面で、比較的どの観点を選んだかを示しています。</p><div class="matrix">${vals.map(([n,v,m])=>`<div class="metric"><small>${n}</small><strong>${Math.round(v/m*100)}%</strong><div class="meter"><i style="width:${v/m*100}%;background:linear-gradient(90deg,#2e63cf,#277a63)"></i></div></div>`).join('')}</div><div class="reflection"><h3>今回の選択ログ</h3><div class="log">${DATA.map(d=>{const x=state.answers.find(a=>a.id===d.id);return `<div class="log-item"><time>${d.no}</time><div><b>${d.title}</b><small>${x?x.tag:'未回答'}</small></div></div>`}).join('')}</div></div><div class="reflection"><h3>授業でのまとめ方</h3><p>自分と異なる選択をした人を説得するのではなく、「何を大切にしたから、その選択になったのか」を聞いてください。意見の違いを、考えの浅さではなく、重く見た価値の違いとして扱うことが出発点です。</p></div><button class="primary" id="backMenu">章の一覧に戻る</button></div>`;$('#backMenu').onclick=()=>{renderMenu();show('menu')};show('dashboard')}
$('#startBtn').onclick=()=>{renderMenu();show('menu')};$('#resetBtn').onclick=()=>{if(confirm('この端末に保存した選択履歴を削除しますか？')){state={answers:[]};save();show('home')}};
</script>
</body>
</html>
