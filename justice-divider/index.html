<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#426fd0">
<title>Justice Divider</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
:root{--blue:#4d82ef;--blue-pale:#eef4ff;--red:#e56673;--green:#43a783;--yellow:#f2c75f;--ink:#26364c;--mute:#6d7b8d;--line:#dce5ef;--bg:#fbfdff}*{box-sizing:border-box}html{background:#eaf0fa}body{margin:0;background:#eaf0fa;font-family:"M PLUS Rounded 1c",sans-serif;color:var(--ink);font-size:16px;line-height:1.75}.app{max-width:375px;min-height:100vh;margin:auto;background:var(--bg);box-shadow:0 0 28px #203b661f}.top{height:62px;padding:0 16px;display:flex;align-items:center;justify-content:space-between;background:#fff;border-bottom:1px solid #edf1f6}.brand{display:flex;gap:9px;align-items:center}.logo{width:27px;height:27px;border-radius:9px;background:conic-gradient(var(--blue),var(--yellow),var(--red),var(--blue)}.brand small{display:block;font-size:9px;font-weight:800;letter-spacing:.1em;line-height:1;color:#75869a}.brand b{display:block;font-size:16px;line-height:1.3}.reset{border:0;background:none;color:#718197;font-size:11px}.screen{display:none;min-height:calc(100vh - 62px)}.screen.active{display:block}.hero{padding:42px 22px 29px;color:#fff;background:linear-gradient(145deg,#213e79,#4d82ef)}.eyebrow{font-size:11px;font-weight:800;letter-spacing:.12em;color:#ffe09a}.hero h1{margin:12px 0;font-size:34px;line-height:1.3}.hero p{margin:0;color:#e8efff;font-size:15px}.button{width:100%;border:0;border-radius:14px;padding:15px 16px;font-family:inherit;font-size:16px;font-weight:800}.button.start{margin-top:24px;background:var(--yellow);color:#503a0e}.button.next{margin-top:16px;background:var(--blue);color:#fff}.notice{padding:16px 20px 22px;background:#fffaf0;color:#6c5d42;font-size:12px}.page{padding:24px 18px 30px}.page h2{margin:0;font-size:23px;line-height:1.45}.lead{margin:7px 0 18px;color:var(--mute);font-size:14px}.chapter-list{display:grid;gap:10px}.chapter{position:relative;width:100%;min-height:90px;padding:14px 45px 13px 15px;border:1px solid var(--line);border-radius:16px;background:#fff;text-align:left;color:var(--ink);font-family:inherit}.chapter:disabled{opacity:.45}.chapter .num{display:block;font-size:10px;font-weight:800;color:#ba7e21;letter-spacing:.12em}.chapter b{display:block;font-size:16px}.chapter span{display:block;color:var(--mute);font-size:12px;line-height:1.45}.chapter i{position:absolute;right:17px;top:31px;color:var(--blue);font-style:normal;font-size:22px}.progress-head{display:flex;justify-content:space-between;margin:18px 0 5px;color:var(--mute);font-size:11px}.bar{height:8px;border-radius:99px;overflow:hidden;background:#e7edf5}.bar i{display:block;height:100%;background:linear-gradient(90deg,var(--blue),var(--green))}.head{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}.tag{display:inline-block;padding:4px 9px;border-radius:99px;background:var(--blue-pale);color:#3e68b9;font-size:10px;font-weight:800;letter-spacing:.06em}.head h2{margin:4px 0 0}.timer{min-width:72px;padding:7px 8px;border-radius:10px;background:#1e3d7a;color:#fff;font-size:12px;font-weight:800;text-align:center}.timer.warn{background:var(--red)}.timerbar{height:7px;margin:16px 0;border-radius:99px;overflow:hidden;background:#e8edf2}.timerbar i{display:block;height:100%;background:linear-gradient(90deg,var(--yellow),var(--red))}.diagram{margin:16px 0 18px;padding:14px;border:1px solid var(--line);border-radius:18px;background:#f7faff}.diagram-title{margin-bottom:10px;color:#63758c;font-size:11px;font-weight:800;letter-spacing:.08em}.question{margin:0 0 10px;font-size:18px;line-height:1.75;font-weight:800}.context{padding:13px 14px;border-left:4px solid var(--yellow);border-radius:0 12px 12px 0;background:#fff9eb;color:#536276;font-size:13px}.ask{margin:18px 0 9px;color:#3b4f6e;font-size:14px;font-weight:800}.choices{display:grid;gap:10px}.choice{width:100%;padding:14px;border:2px solid #dce5ef;border-radius:15px;background:#fff;text-align:left;color:var(--ink);font-family:inherit}.choice b{display:block;font-size:16px}.choice small{display:block;margin-top:4px;color:var(--mute);font-size:13px;line-height:1.6}.choice:first-child{border-color:#cbdcff}.choice:last-child{border-color:#f0cbd0}.people{display:flex;justify-content:center;gap:4px;flex-wrap:wrap;margin-top:7px}.person{width:23px;height:23px;border-radius:50%;display:grid;place-items:center;background:var(--blue);color:#fff;font-size:9px;font-weight:800}.person.red{background:var(--red)}.two-col{display:grid;grid-template-columns:1fr 1fr;gap:9px}.card{padding:11px;border:2px solid var(--line);border-radius:14px;background:#fff;text-align:center}.card b{display:block;font-size:12px}.card small{display:block;color:var(--mute);font-size:10px}.center{padding:9px;border:2px solid var(--yellow);border-radius:12px;background:#fff4c8;color:#60490d;text-align:center;font-size:13px;font-weight:800}.arrow{text-align:center;color:#66778f;font-size:12px;font-weight:800}.role{padding:11px;border-radius:14px;color:#fff;text-align:center;font-size:13px;font-weight:800}.role small{display:block;font-size:10px}.role.yellow{background:var(--yellow);color:#55410d}.role.red{background:var(--red)}.contract{display:grid;grid-template-columns:1fr auto 1fr;gap:7px;align-items:center}.deal{padding:8px;border-radius:10px;background:#fff4c8;color:#60490d;text-align:center;font-size:11px;font-weight:800}.triples{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-top:8px}.mini{padding:8px 4px;border-radius:10px;background:#fff;text-align:center;color:#65758a;font-size:11px;font-weight:800}.stack{display:grid;gap:8px}.view{padding:11px;border-radius:14px;color:#fff;text-align:center;font-size:14px;font-weight:800}.view.blue{background:var(--blue)}.view.red{background:var(--red)}.view.green{background:var(--green)}.note{padding:10px;border-radius:12px;background:#fff;color:#536276;text-align:center;font-size:12px;font-weight:800}.slider{margin-top:15px;padding:13px;border-radius:14px;background:#f2f6fc}.slider b{font-size:12px}.amount{font-size:25px;font-weight:800;line-height:1.25;color:var(--blue)}input[type=range]{width:100%;accent-color:var(--blue)}.result-top{padding:18px;border-radius:18px;background:linear-gradient(135deg,#1e3d7a,#4d82ef);color:#fff}.result-top h2{margin:5px 0;font-size:25px}.result-top p{margin:0;color:#e7efff;font-size:13px}.box{margin-top:15px;padding:16px 14px;border:1px solid var(--line);border-radius:16px;background:#fff}.box h3{margin:0 0 7px;font-size:14px}.box p{margin:0;color:#536276;font-size:13px}.guide{padding:12px 13px;border-radius:14px;background:#fff8e8;color:#5d5338;font-size:12px}.metric{margin-top:12px;padding:15px;border-radius:16px;background:#f1f5fb}.metric small{display:block;color:var(--mute);font-size:11px}.metric b{display:block;margin:2px 0;color:#33548a;font-size:28px;line-height:1.25}.metric p{margin:8px 0 0;color:#536276;font-size:12px;line-height:1.6}.log{border-top:1px solid #edf1f5}.log div{padding:11px 0;border-bottom:1px solid #edf1f5}.log b{font-size:13px}.log small{display:block;color:var(--mute);font-size:12px}.footer{padding:12px;background:#f0f4f8;color:#8a98a9;text-align:center;font-size:10px}
</style></head>
<body><main class="app"><header class="top"><div class="brand"><div class="logo"></div><div><small>ETHICAL THOUGHT EXPERIMENT</small><b>Justice Divider</b></div></div><button class="reset" id="reset">記録を消去</button></header>
<section id="home" class="screen active"><div class="hero"><div class="eyebrow">答えを決めるゲームではない</div><h1>あなたは、<br>どこで線を引くか。</h1><p>4つの場面で選びながら、自分が何を大事にしているのかを考えるゲームです。</p><button id="start" class="button start">思考実験を始める</button></div><div class="notice">この教材に正解はありません。テーマが重く感じられたときは、無理に続けず、先生や信頼できる大人に相談してください。</div></section>
<section id="menu" class="screen"><div class="page"><h2>4つの境界線</h2><p class="lead">まず状況を見て、自分ならどうするかを選びます。</p><div id="chapters" class="chapter-list"></div><div class="progress-head"><span>進行状況</span><span id="progressText"></span></div><div class="bar"><i id="progress"></i></div></div></section><section id="game" class="screen"></section><section id="result" class="screen"></section><section id="report" class="screen"></section><footer class="footer">授業用プロトタイプ｜選択はこの端末内に保存されます</footer></main>
<script>
const qs=[
{id:'t1',no:'01',title:'トロッコ問題',sub:'数を減らすことは、正義か。',theme:'数と功利主義',time:10,q:'暴走するトロッコが近づいています。レバーを引くと、進む先を変えられます。',c:'何もしなければ5人がいる線路へ進みます。レバーを引けば、1人がいる線路へ進みます。',o:[['act','レバーを引く','5人を助けるが、1人が犠牲になる。','5人を助けるため、1人を犠牲にする'],['wait','何もしない','自分で犠牲者を選ばないが、5人が助からない。','自ら犠牲者を選ばない']],r:{act:'「より多くの人を助ける」という結果を重く見る選択です。ただし、自分が進路を変えたことで1人が犠牲になる点も残ります。',wait:'自分が誰かを犠牲にする行為を避ける選択です。ただし、何もしないことも結果を生む、と考える立場もあります。'}},
{id:'t2',no:'02',title:'トロッコ問題 2',sub:'直接手を下すことは、何を変えるか。',theme:'直接加害と心理',time:10,q:'橋の下をトロッコが通ります。目の前の人を押せば、線路上の5人は助かると分かっています。',c:'前の場面と人数の構図は同じです。ただし今回は、あなたが目の前の人に直接触れる必要があります。',o:[['push','押す','目の前の人を押し、5人を助ける。','直接の行為を引き受ける'],['watch','見送る','直接手を下さず、トロッコを通過させる。','直接の加害を避ける']],r:{push:'人数を重視した選択です。しかし、直接触れることへの抵抗が強くなる人は少なくありません。結果だけでなく、行為の形も判断に影響します。',watch:'直接の加害を避ける選択です。前の章と判断が違ったなら、どこに違いを感じたのかを考えてみてください。'}},
{id:'organ',no:'03',title:'臓器移植の問題',sub:'同意は、いつ自由といえるか。',theme:'自由と格差',q:'治療を急ぐ患者であるあなたの前に、生活に困っている父親が臓器提供を申し出ます。',c:'父親は「自分で決めた」と言います。しかし、その背景には深刻な経済的な困難があります。',o:[['buy','契約する','当事者同士の同意を重視し、取引を成立させる。','個人の選択を尊重する'],['support','取引せず、別の支援を探す','臓器を売らずに済むよう、生活や医療への支援を探す。','格差による圧力を問題にする'],['decline','取引を断る','制度上の手続きに従い、別の治療機会を待つ。','個人間の取引を避ける']],r:{buy:'同意を重視する立場です。ただし、選択肢が極端に狭い状況での同意を、完全に自由な意思と言えるかが問われます。',support:'問題を個人の選択だけで終わらせず、そもそも売らなくてよい環境をつくる立場です。',decline:'取引の線引きを守る立場です。一方で、目の前の二人の困難を制度だけで解決できるかという問題が残ります。'}},
{id:'preg',no:'04',title:'妊娠をめぐる問題',sub:'権利がぶつかるとき、誰と考えるか。',theme:'権利の衝突と共通善',q:'予期しない妊娠をめぐり、本人の人生に関する決定と、胎児の生命をどう考えるかが対立しています。',c:'ここでは結論を採点しません。どの視点を丁寧に扱うかを選びます。現実では、本人の安全と意思を尊重し、医療者や支援者と相談することが大切です。',o:[['self','本人の自己決定を中心に考える','身体・生活・将来への影響を最も重く扱う。','本人の自由を重視する'],['life','生命の保護を中心に考える','胎児の生命をどう位置づけるかを重く扱う。','守るべき生命を考える'],['talk','支援と対話の仕組みを中心に考える','二者択一にせず、孤立を防ぐ支援と社会の責任を考える。','共通善を探る']],r:{self:'本人が自分の身体と人生について決める権利を重視する立場です。同時に、「選ばされた」状態になっていないかも考える必要があります。',life:'生命をどう守るかを重視する立場です。その考えを本人への配慮や現実の支援とどう両立させるかが課題になります。',talk:'対立する権利を、個人だけに背負わせない立場です。住まい、医療、経済、相談先など、社会側にできることを考える方向へ進みます。'}}];
let state=JSON.parse(localStorage.getItem('justice-divider-student-v3')||'{"answers":[]}'),cur,timer,left=0;const $=s=>document.querySelector(s);function save(){localStorage.setItem('justice-divider-student-v3',JSON.stringify(state))}function show(id){['home','menu','game','result','report'].forEach(x=>$('#'+x).classList.toggle('active',x===id));scrollTo(0,0)}function persons(n,red=false){return '<div class="people">'+Array.from({length:n},()=>'<i class="person '+(red?'red':'')+'">人</i>').join('')+'</div>'}
function visual(d){if(d.id==='t1')return `<div class="diagram"><div class="diagram-title">状況図</div><div class="center">あなたはレバーの前にいる</div><div class="arrow">どちらの線路へ進ませる？</div><div class="two-col"><div class="card"><b>5人の線路</b><small>何もしない場合</small>${persons(5)}</div><div class="card"><b>1人の線路</b><small>レバーを引く場合</small>${persons(1,true)}</div></div></div>`;if(d.id==='t2')return `<div class="diagram"><div class="diagram-title">状況図</div><div class="two-col"><div class="role yellow">あなた<small>橋の上</small></div><div class="role red">目の前の人<small>橋の上</small></div></div><div class="arrow">↓ 押すと線路へ落ちる</div><div class="card"><b>下の線路には5人</b>${persons(5)}</div></div>`;if(d.id==='organ')return `<div class="diagram"><div class="diagram-title">関係図</div><div class="contract"><div class="card"><b>患者</b><small>治療を急いでいる</small></div><div class="deal">契約<br>する？</div><div class="card"><b>父親</b><small>学費のために困っている</small></div></div><div class="triples"><div class="mini">お金</div><div class="mini">健康</div><div class="mini">公平さ</div></div></div>`;return `<div class="diagram"><div class="diagram-title">考える視点</div><div class="stack"><div class="view blue">本人の気持ち</div><div class="view red">生命の考え方</div><div class="view green">社会の支援</div><div class="note">どの視点を、いちばん重く考える？</div></div></div>`}
function menu(){let done=new Set(state.answers.map(a=>a.id));$('#chapters').innerHTML=qs.map((d,i)=>{let lock=i>0&&!done.has(qs[i-1].id);return `<button class="chapter" data-id="${d.id}" ${lock?'disabled':''}><span class="num">CHAPTER ${d.no}</span><b>${d.title}</b><span>${d.sub}</span><i>${done.has(d.id)?'✓':lock?'●':'›'}</i></button>`}).join('');$('#progress').style.width=(done.size/4*100)+'%';$('#progressText').textContent=done.size+' / 4';document.querySelectorAll('.chapter').forEach(b=>b.onclick=()=>open(b.dataset.id))}
function open(id){cur=qs.find(q=>q.id===id);left=cur.time||0;render();show('game');if(cur.time){tick();timer=setInterval(()=>{left-=.1;tick();if(left<=0){clearInterval(timer);choose(cur.o[1][0],true)}},100)}}function tick(){let t=$('#time'),b=$('#timebar');if(!t)return;let n=Math.max(0,Math.ceil(left));t.textContent='残り '+n+' 秒';t.classList.toggle('warn',n<=3);b.style.width=Math.max(0,left/cur.time*100)+'%'}
function render(){let d=cur;$('#game').innerHTML=`<div class="page"><div class="head"><div><span class="tag">${d.no}｜${d.theme}</span><h2>${d.title}</h2></div>${d.time?'<div id="time" class="timer"></div>':''}</div>${d.time?'<div class="timerbar"><i id="timebar"></i></div>':''}${visual(d)}<p class="question">${d.q}</p><div class="context">${d.c}</div>${d.id==='organ'?'<div class="slider"><b>提示する支援額（考えるための設定）</b><div id="amount" class="amount">1,000万円</div><input id="range" type="range" min="100" max="3000" step="100" value="1000"></div>':''}<div class="ask">あなたはどうする？</div><div class="choices">${d.o.map(o=>`<button class="choice" data-choice="${o[0]}"><b>${o[1]}</b><small>${o[2]}</small></button>`).join('')}</div></div>`;document.querySelectorAll('[data-choice]').forEach(b=>b.onclick=()=>choose(b.dataset.choice));if(d.id==='organ')$('#range').oninput=e=>$('#amount').textContent=Number(e.target.value).toLocaleString()+'万円'}
function choose(key,timeout){clearInterval(timer);let d=cur,o=d.o.find(x=>x[0]===key);state.answers=state.answers.filter(a=>a.id!==d.id);state.answers.push({id:d.id,key,tag:o[3]});save();$('#result').innerHTML=`<div class="page"><div class="result-top"><div class="eyebrow">YOUR CHOICE</div><h2>${o[1]}</h2><p>${timeout?'時間内に選べなかったため、この選択として記録しました。':'正誤ではなく、「何を大切にしたか」として記録しました。'}</p></div><div class="box"><h3>この選択から考えられること</h3><p>${d.r[key]}</p></div><div class="box"><h3>次に考える問い</h3><p>${next(d.id)}</p></div><button id="go" class="button next">${d.id==='preg'?'選択の見方を見る':'次の章へ進む'}</button></div>`;$('#go').onclick=()=>d.id==='preg'?report():(menu(),show('menu'));show('result')}
function next(id){return {t1:'「何もしない」ことは、本当に選択をしていないことになるでしょうか。',t2:'同じ結果でも、手段が違えば責任の重さは変わるでしょうか。',organ:'選択の自由を守るために、社会はどこまで条件を整えるべきでしょうか。',preg:'対立を個人だけに背負わせずに済む社会とは、どんな仕組みでしょうか。'}[id]}
function report(){let a=Object.fromEntries(state.answers.map(x=>[x.id,x.key]));let m=[['数・結果を重視',(a.t1==='act'?1:0)+(a.t2==='push'?1:0),'トロッコ問題2つで、「助かる人数」を重く見た回数です。'],['自由・自己決定を重視',(a.organ==='buy'?1:0)+(a.preg==='self'?1:0),'関連する2つの場面で、「本人の選択」を重く見た回数です。'],['支援・対話を重視',((a.organ==='support'||a.organ==='decline')?1:0)+(a.preg==='talk'?1:0),'関連する2つの場面で、「個人だけに背負わせず、支援や社会の役割を考える」方向を選んだ回数です。']];$('#report').innerHTML=`<div class="page"><span class="tag">ALL CHAPTERS COMPLETED</span><h2 style="margin-top:7px">あなたの選択の見方</h2><p class="lead">ここでは、3つの観点をそれぞれ別々に見ています。合計100になる診断ではありません。</p><div class="guide"><b>読み方</b><br>「2 / 2場面」なら、その観点を関連する2つの場面の両方で重く見たということです。<br>「1 / 2場面」なら片方で選んだ、「0 / 2場面」なら今回はあまり選ばなかった、という見方をします。</div>${m.map(x=>`<div class="metric"><small>${x[0]}</small><b>${x[1]} / 2 場面</b><div class="bar"><i style="width:${x[1]*50}%"></i></div><p>${x[2]}</p></div>`).join('')}<div class="box"><h3>今回の選択ログ</h3><div class="log">${qs.map(q=>{let x=state.answers.find(a=>a.id===q.id);return `<div><b>${q.no}｜${q.title}</b><small>${x?x.tag:'未回答'}</small></div>`}).join('')}</div></div><div class="box"><h3>授業でのまとめ方</h3><p>自分と違う選択をした人を説得するよりも、「何を大切にしたからその選択になったのか」を聞いてみてください。</p></div><button id="back" class="button next">章の一覧に戻る</button></div>`;$('#back').onclick=()=>{menu();show('menu')};show('report')}
$('#start').onclick=()=>{menu();show('menu')};$('#reset').onclick=()=>{if(confirm('この端末に保存した記録を消去しますか？')){state={answers:[]};save();show('home')}};
</script></body></html>
