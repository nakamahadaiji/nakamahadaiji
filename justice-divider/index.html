<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="theme-color" content="#101826" />
<title>Justice Divider｜倫理選択ゲーム</title>
<style>
:root{--ink:#152033;--muted:#677387;--paper:#f6f3ec;--line:#d9d2c7;--navy:#101826;--blue:#3166d8;--red:#bc3e47;--gold:#c58a28;--green:#2c856b;--white:#fff;--shadow:0 18px 45px rgba(21,32,51,.12)}
*{box-sizing:border-box} body{margin:0;background:linear-gradient(135deg,#ece8dd,#f8f7f2 45%,#e7edf6);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;letter-spacing:.02em} button{font:inherit} .app{width:min(980px,calc(100% - 32px));margin:28px auto 48px}.top{display:flex;justify-content:space-between;align-items:center;gap:16px;margin-bottom:18px}.brand{display:flex;align-items:center;gap:12px}.mark{width:42px;height:42px;border-radius:14px;background:conic-gradient(from 210deg,var(--blue),var(--gold),var(--red),var(--blue));box-shadow:var(--shadow)}.brand small{display:block;color:var(--muted);font-size:11px;letter-spacing:.16em}.brand h1{margin:2px 0 0;font-size:21px;letter-spacing:.03em}.reset{border:1px solid var(--line);background:rgba(255,255,255,.7);color:var(--muted);border-radius:99px;padding:9px 13px;cursor:pointer}.card{background:rgba(255,255,255,.88);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.9);box-shadow:var(--shadow);border-radius:28px;overflow:hidden}.hero{padding:46px 46px 40px;background:radial-gradient(circle at 88% 8%,#f8d690 0 10%,transparent 32%),linear-gradient(130deg,#131f36,#213c72);color:#fff}.eyebrow{font-size:12px;letter-spacing:.14em;font-weight:700;color:#f1c975}.hero h2{font-size:clamp(32px,6vw,58px);margin:12px 0;line-height:1.12;letter-spacing:.01em}.hero p{max-width:660px;line-height:1.9;margin:0;color:#dae5ff}.start{margin-top:25px;border:0;border-radius:14px;background:#f6cc70;color:#24314c;font-weight:800;padding:14px 21px;cursor:pointer;transition:.2s}.start:hover{transform:translateY(-2px);filter:brightness(1.04)}.notice{padding:18px 46px;background:#fffaf0;color:#6b5430;font-size:13px;line-height:1.7;border-top:1px solid #f1e3c3}.screen{display:none}.screen.active{display:block}.chapter-list{padding:30px}.chapter-list h3,.scene h3{font-size:20px;margin:0 0 8px}.lead{color:var(--muted);line-height:1.75;margin:0 0 23px}.chapters{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}.chapter{position:relative;text-align:left;padding:22px;border:1px solid var(--line);border-radius:18px;background:#fff;cursor:pointer;transition:.2s;min-height:158px}.chapter:hover:not(:disabled){transform:translateY(-3px);box-shadow:0 10px 22px rgba(20,30,45,.10)}.chapter:disabled{opacity:.52;cursor:not-allowed}.chapter .no{font-size:12px;font-weight:800;color:var(--gold);letter-spacing:.1em}.chapter strong{display:block;margin:8px 0;font-size:17px}.chapter span{color:var(--muted);font-size:13px;line-height:1.55}.chapter .state{position:absolute;right:14px;top:14px;font-size:18px}.progress{height:8px;background:#e9e7e0;border-radius:99px;overflow:hidden;margin:0 30px 30px}.progress>i{height:100%;display:block;background:linear-gradient(90deg,var(--blue),var(--green));transition:.4s}.scene{padding:35px 42px 42px}.scene-top{display:flex;justify-content:space-between;gap:14px;align-items:flex-start}.tag{display:inline-block;background:#edf2ff;color:#3158a9;font-size:12px;font-weight:800;border-radius:99px;padding:6px 10px}.timer{font-variant-numeric:tabular-nums;background:#182640;color:#fff;border-radius:14px;padding:10px 14px;font-weight:800;min-width:82px;text-align:center}.timer.urgent{background:var(--red);animation:pulse .7s infinite}@keyframes pulse{50%{transform:scale(1.04)}}.meter{height:10px;background:#ece8de;border-radius:99px;overflow:hidden;margin:24px 0}.meter i{display:block;height:100%;background:linear-gradient(90deg,#e3b94e,#ca4949);width:100%;transition:width .2s linear}.visual{position:relative;border-radius:22px;min-height:230px;margin:24px 0;background:#182640;overflow:hidden;color:#fff}.rail{position:absolute;left:8%;right:8%;height:8px;background:#bfc5ce;transform-origin:left;border-radius:8px}.rail.one{top:52%;transform:rotate(13deg)}.rail.two{top:52%;transform:rotate(-13deg)}.rail.straight{top:63%;transform:none}.trolley{position:absolute;left:8%;top:25%;font-size:50px;transition:1s linear}.people{position:absolute;font-size:32px;letter-spacing:2px}.people.left{bottom:20px;left:16%}.people.right{top:33px;right:13%}.bridge{position:absolute;background:#805e44;height:22px;left:12%;right:12%;top:28%;border-radius:6px}.bridge-people{position:absolute;top:11%;left:44%;font-size:45px}.track-workers{position:absolute;bottom:15%;right:12%;font-size:30px}.hospital{background:linear-gradient(120deg,#c8d9e5,#f9f6ee 52%,#b4c4d3)}.hospital .quote{position:absolute;right:8%;bottom:18%;max-width:280px;color:#35485e;background:rgba(255,255,255,.82);padding:18px;border-radius:16px;line-height:1.7}.hospital .patient{position:absolute;bottom:8%;left:9%;font-size:90px}.hospital .parent{position:absolute;bottom:9%;left:35%;font-size:72px}.dialogue{background:linear-gradient(130deg,#593d54,#d4998b 52%,#f1d5ae)}.dialogue .bubble{position:absolute;max-width:290px;background:rgba(255,255,255,.9);color:#3a3142;padding:17px;border-radius:17px;line-height:1.7}.dialogue .bubble.a{left:9%;top:14%}.dialogue .bubble.b{right:9%;bottom:13%}.dialogue .fig{position:absolute;bottom:13%;left:44%;font-size:78px}.question{font-size:23px;line-height:1.65;margin:22px 0 16px}.context{padding:17px 19px;background:#f7f5ef;border-left:4px solid var(--gold);border-radius:0 12px 12px 0;color:#4e5767;line-height:1.75}.choices{display:grid;gap:12px;margin-top:21px}.choice{width:100%;text-align:left;background:#fff;border:1px solid #d7dce6;border-radius:16px;padding:17px 18px;cursor:pointer;transition:.18s;color:var(--ink)}.choice:hover{border-color:var(--blue);box-shadow:0 8px 18px rgba(49,102,216,.12);transform:translateY(-1px)}.choice b{display:block;font-size:15px;margin-bottom:5px}.choice small{display:block;color:var(--muted);line-height:1.55}.choice.danger:hover{border-color:var(--red)}.slider-wrap{background:#f7f5ef;border-radius:18px;padding:20px;margin-top:20px}.amount{font-weight:800;font-size:28px;color:var(--blue);margin:8px 0 12px}input[type=range]{width:100%;accent-color:var(--blue)}.result{padding:42px}.result .result-head{padding:25px;border-radius:20px;background:linear-gradient(135deg,#172845,#284b80);color:#fff}.result h2{margin:6px 0;font-size:28px}.result p{line-height:1.8}.reflection{border:1px solid var(--line);border-radius:18px;padding:22px;margin:20px 0}.reflection h3{font-size:16px;margin-top:0}.reflection p{color:#4d586a}.continue{border:0;background:var(--blue);color:#fff;font-weight:800;border-radius:13px;padding:13px 18px;cursor:pointer}.dashboard{padding:38px}.matrix{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin:23px 0}.metric{border-radius:18px;background:#f7f5ef;padding:19px}.metric strong{display:block;font-size:29px;color:#293d65;margin-top:9px}.metric small{color:var(--muted)}.log{border-top:1px solid var(--line);padding-top:18px}.log-item{display:flex;gap:13px;padding:12px 0;border-bottom:1px solid #ece9e1}.log-item time{color:var(--muted);font-size:12px;min-width:91px}.footer{font-size:12px;color:#7b8492;text-align:center;margin:16px 0}.hidden{display:none!important}@media(max-width:650px){.app{width:min(100% - 18px,980px);margin:10px auto 26px}.top{padding:0 6px}.hero,.notice,.scene,.result,.dashboard{padding:26px 20px}.chapters{grid-template-columns:1fr}.chapter-list{padding:23px 20px}.question{font-size:19px}.visual{min-height:205px}.matrix{grid-template-columns:1fr}.brand h1{font-size:17px}.reset{font-size:12px;padding:8px 10px}}
</style>
</head>
<body>
<main class="app">
  <header class="top"><div class="brand"><div class="mark"></div><div><small>ETHICAL THOUGHT EXPERIMENT</small><h1>Justice Divider</h1></div></div><button class="reset" id="resetBtn">記録をリセット</button></header>
  <section class="card screen active" id="home">
    <div class="hero"><div class="eyebrow">答えを決めるゲームではない</div><h2>あなたは、<br>どこで線を引くか。</h2><p>4つの選択を通じて、「数」「直接の行為」「自由と格差」「共通善」の間にある自分の判断基準を見つめます。</p><button class="start" id="startBtn">思考実験を始める</button></div>
    <div class="notice">この教材は、正解や特定の行動を示すものではありません。重いテーマを扱うため、つらさや不安を感じた場合は無理に続けず、授業者や信頼できる大人に相談してください。</div>
  </section>
  <section class="card screen" id="menu"><div class="chapter-list"><h3>4つの境界線</h3><p class="lead">章を順番に進めると、最後にあなたの選択の傾向が表示されます。</p><div class="chapters" id="chapterButtons"></div></div><div class="progress"><i id="progressBar"></i></div></section>
  <section class="card screen" id="game"></section>
  <section class="card screen" id="result"></section>
  <section class="card screen" id="dashboard"></section>
  <div class="footer">授業用プロトタイプ｜選択履歴はこの端末内に保存されます</div>
</main>
<script>
const DATA=[
 {id:'trolley1',no:'01',title:'トロッコ問題',sub:'数を減らすことは、正義か。',theme:'数と功利主義',time:10,
  question:'あなたは分岐器のそばに立っています。レバーを引くと、5人ではなく1人がいる線路へ進路が変わります。',
  context:'何もしなければ5人が犠牲になります。レバーを引けば、1人が犠牲になります。どちらの命も、あなたには知らない人のものです。',
  choices:[
   {key:'act',title:'レバーを引く',desc:'自分の行為で進路を変え、5人を助ける。',tag:'5人を助けるため、1人を犠牲にする',axis:{utility:1,direct:1}},
   {key:'wait',title:'何もしない',desc:'進路を変えず、5人がいる線路をそのまま進ませる。',tag:'自ら犠牲者を選ばない',axis:{utility:0,direct:0}}
  ],
  reflect:{act:'5人を助ける選択は、「結果として救える人数」を重視する考え方に近づきます。一方で、自分が進路を変えたことで1人が犠牲になる点は消えません。',wait:'レバーに触れない選択は、誰かを手段として扱うことを避けようとする考え方に近づきます。一方で、何もしないことも結果を生む行為だ、と考える立場もあります。'}},
 {id:'trolley2',no:'02',title:'トロッコ問題 2',sub:'直接手を下すことは、何を変えるか。',theme:'直接加害と心理',time:10,
  question:'橋の下をトロッコが通ります。目の前の人を押せば、トロッコは止まり、線路上の5人は助かると分かっています。',
  context:'前の場面と同じく、1人の犠牲で5人が助かります。ただし今度は、あなた自身が目の前の人に直接触れる必要があります。',
  choices:[
   {key:'push',title:'押す',desc:'目の前の人を押し、5人を助ける。',tag:'直接の行為を引き受ける',axis:{utility:1,direct:2}},
   {key:'watch',title:'見送る',desc:'手を出さず、トロッコを通過させる。',tag:'直接の加害を避ける',axis:{utility:0,direct:0}}
  ],
  reflect:{push:'前章と同じく人数を重視した選択です。しかし、直接触れることへの抵抗が強くなる人は少なくありません。結果だけでなく、行為の形も判断に影響します。',watch:'直接の加害を避ける選択です。前章でレバーを引いた場合、同じ人数の構図でも判断が変わったことになります。その差がどこから生まれるかを考えてみてください。'}},
 {id:'organ',no:'03',title:'臓器移植の問題',sub:'同意は、いつ自由といえるか。',theme:'自由と格差',
  question:'治療を急ぐ患者であるあなたの前に、家族の学費のために臓器提供を申し出る人がいます。双方の同意があれば、取引は正当化されるでしょうか。',
  context:'本人は「自分で決めた」と言います。しかし、その決断の背景には深刻な経済的困難があります。金額を提示したうえで、あなたはどうしますか。',
  choices:[
   {key:'buy',title:'契約する',desc:'当事者同士の同意を重視し、取引を成立させる。',tag:'個人の選択を尊重する',axis:{liberty:2,equality:0}},
   {key:'support',title:'取引せず、別の支援を探す',desc:'臓器を売らずに済むよう、生活や医療への支援を探す。',tag:'格差による圧力を問題にする',axis:{liberty:0,equality:2}},
   {key:'decline',title:'取引を断る',desc:'制度上の手続きに従い、別の治療機会を待つ。',tag:'個人間の取引を避ける',axis:{liberty:0,equality:1}}
  ],
  reflect:{buy:'同意を重視する立場です。ただし、選択肢が極端に狭い状況での同意を、完全に自由な意思と言えるかが問われます。',support:'問題を個人の選択だけで終わらせず、選ばなくてよい環境をつくる立場です。公平な制度とは何か、という問いにつながります。',decline:'取引の線引きを守る立場です。一方で、目の前の二人の困難を制度だけで解決できるかという問題が残ります。'}},
 {id:'abortion',no:'04',title:'妊娠をめぐる問題',sub:'権利がぶつかるとき、誰と考えるか。',theme:'権利の衝突と共通善',
  question:'予期しない妊娠をめぐり、本人の身体や人生に関する決定と、胎児の生命をどう考えるかが対立しています。単純な正解はありません。',
  context:'ここでは結論そのものを採点しません。どの観点を丁寧に扱うかを選び、対話の進め方を考えます。現実の相談では、医療者・家族・支援者とともに、本人の安全と意思を尊重することが重要です。',
  choices:[
   {key:'self',title:'本人の自己決定を中心に考える',desc:'身体・生活・将来への影響を最も重く扱う。',tag:'本人の自由を重視する',axis:{liberty:2,common:0}},
   {key:'life',title:'生命の保護を中心に考える',desc:'胎児の生命をどう位置づけるかを重く扱う。',tag:'守るべき生命を考える',axis:{liberty:0,common:1}},
   {key:'dialogue',title:'支援と対話の仕組みを中心に考える',desc:'二者択一にせず、孤立を防ぐ支援と社会の責任を考える。',tag:'共通善を探る',axis:{liberty:1,common:3}}
  ],
  reflect:{self:'本人が自分の身体と人生について決める権利を重視する立場です。同時に、孤立や経済的事情によって「選ばされた」状態になっていないかも考える必要があります。',life:'生命をどう守るかを重視する立場です。その考えを現実の支援や本人への配慮と、どのように両立させるかが課題になります。',dialogue:'対立する権利を、個人だけに背負わせない立場です。住まい、医療、経済、相談先など、社会側にできることを考える方向へ進みます。'}}
];
let state=JSON.parse(localStorage.getItem('justice-divider-v1')||'{"answers":[],"seen":[]}');
let current=null,interval=null,remaining=0;
const $=s=>document.querySelector(s); const screens=['home','menu','game','result','dashboard'];
function show(id){screens.forEach(x=>$('#'+x).classList.toggle('active',x===id));window.scrollTo({top:0,behavior:'smooth'})}
function save(){localStorage.setItem('justice-divider-v1',JSON.stringify(state))}
function renderMenu(){let done=new Set(state.answers.map(a=>a.id));$('#chapterButtons').innerHTML=DATA.map((d,i)=>{let locked=i>0&&!done.has(DATA[i-1].id);return `<button class="chapter" data-id="${d.id}" ${locked?'disabled':''}><span class="no">CHAPTER ${d.no}</span><strong>${d.title}</strong><span>${d.sub}</span><span class="state">${done.has(d.id)?'✓':locked?'🔒':'→'}</span></button>`}).join('');$('#progressBar').style.width=(done.size/DATA.length*100)+'%';document.querySelectorAll('.chapter').forEach(b=>b.onclick=()=>openChapter(b.dataset.id));}
function visual(d){if(d.id==='trolley1')return `<div class="visual"><div class="rail one"></div><div class="rail two"></div><div class="trolley">🚋</div><div class="people left">👷 👷 👷 👷 👷</div><div class="people right">👷</div></div>`;if(d.id==='trolley2')return `<div class="visual"><div class="bridge"></div><div class="bridge-people">🧍 🧍</div><div class="rail straight"></div><div class="trolley" style="top:52%;left:8%">🚋</div><div class="track-workers">👷 👷 👷 👷 👷</div></div>`;if(d.id==='organ')return `<div class="visual hospital"><div class="patient">🛏️</div><div class="parent">🧑</div><div class="quote">「子どもの進学費用のためなら……。自分で決めたことです」</div></div>`;return `<div class="visual dialogue"><div class="bubble a">「これからの生活を、どう支えればいいのだろう」</div><div class="fig">🧑</div><div class="bubble b">「一人で結論を背負わなくていい」</div></div>`}
function openChapter(id){current=DATA.find(x=>x.id===id);clearInterval(interval);remaining=current.time||0;renderScene();show('game');if(current.time)startTimer()}
function renderScene(){let d=current;let timed=d.time;$('#game').innerHTML=`<div class="scene"><div class="scene-top"><div><span class="tag">${d.no}｜${d.theme}</span><h3>${d.title}</h3></div>${timed?`<div class="timer" id="timer">残り ${remaining} 秒</div>`:''}</div>${timed?`<div class="meter"><i id="meter"></i></div>`:''}${visual(d)}<div class="question">${d.question}</div><div class="context">${d.context}</div>${d.id==='organ'?`<div class="slider-wrap"><small>提示する支援額（考えるための設定です）</small><div class="amount" id="amount">1,000万円</div><input id="offer" type="range" min="100" max="3000" step="100" value="1000"></div>`:''}<div class="choices">${d.choices.map(c=>`<button class="choice ${c.key==='push'||c.key==='buy'?'danger':''}" data-choice="${c.key}"><b>${c.title}</b><small>${c.desc}</small></button>`).join('')}</div></div>`;document.querySelectorAll('[data-choice]').forEach(b=>b.onclick=()=>choose(b.dataset.choice));if(d.id==='organ')$('#offer').oninput=e=>$('#amount').textContent=Number(e.target.value).toLocaleString()+'万円';}
function startTimer(){clearInterval(interval);updateTimer();interval=setInterval(()=>{remaining-=.1;updateTimer();if(remaining<=0){clearInterval(interval);choose(current.id==='trolley1'?'wait':'watch',true)}},100)}
function updateTimer(){let n=Math.max(0,Math.ceil(remaining));let el=$('#timer'),m=$('#meter');if(!el)return;el.textContent='残り '+n+' 秒';el.classList.toggle('urgent',n<=3);m.style.width=(remaining/current.time*100)+'%'}
function choose(key,timeout=false){clearInterval(interval);let d=current,c=d.choices.find(x=>x.key===key);state.answers=state.answers.filter(x=>x.id!==d.id);state.answers.push({id:d.id,key,tag:c.tag,axis:c.axis,at:new Date().toLocaleString('ja-JP')});save();renderResult(d,c,timeout);show('result')}
function renderResult(d,c,timeout){let cross=d.id==='trolley2'?consistencyText():'';$('#result').innerHTML=`<div class="result"><div class="result-head"><span class="eyebrow">YOUR CHOICE</span><h2>${c.title}</h2><p>${timeout?'時間内に選択がなかったため、この選択として記録しました。':'あなたの選択を、正誤ではなく「どこを重く見たか」として記録しました。'}</p></div><div class="reflection"><h3>この選択から考えられること</h3><p>${d.reflect[c.key]}</p>${cross?`<p><b>前章との比較：</b>${cross}</p>`:''}</div><div class="reflection"><h3>次に考える問い</h3><p>${nextQuestion(d.id)}</p></div><button class="continue" id="continue">${d.id===DATA.at(-1).id?'あなたの倫理マトリクスを見る':'次の章へ進む'}</button></div>`;$('#continue').onclick=()=>{if(d.id===DATA.at(-1).id)renderDashboard();else{renderMenu();show('menu')}}}
function consistencyText(){let a=state.answers.find(x=>x.id==='trolley1');let b=state.answers.find(x=>x.id==='trolley2');if(!a||!b)return '';if(a.key==='act'&&b.key==='push')return 'どちらでも「助かる人数」を重視しました。結果を一貫して重く見る判断です。';if(a.key==='wait'&&b.key==='watch')return 'どちらでも直接的に犠牲を選ばない判断でした。行為の責任を重く見る判断です。';return '人数の構図は似ていますが、判断が変わりました。距離や直接性が、あなたの判断にどう影響したかを考えてみてください。'}
function nextQuestion(id){return {trolley1:'「何もしない」ことは、本当に選択をしていないことになるでしょうか。',trolley2:'同じ結果でも、手段が違えば責任の重さは変わるでしょうか。',organ:'選択の自由を守るために、社会はどこまで条件を整えるべきでしょうか。',abortion:'対立を個人だけに背負わせずに済む社会とは、どんな仕組みでしょうか。'}[id]}
function renderDashboard(){let a={utility:0,direct:0,liberty:0,equality:0,common:0};state.answers.forEach(x=>Object.entries(x.axis).forEach(([k,v])=>a[k]+=v));let vals=[['数・結果を重視',a.utility,2],['自由・自己決定を重視',a.liberty,5],['共通善・支援を重視',a.common+a.equality,6]];let max=Math.max(...vals.map(x=>x[2]));$('#dashboard').innerHTML=`<div class="dashboard"><span class="tag">ALL CHAPTERS CLEARED</span><h2>あなたの倫理マトリクス</h2><p class="lead">これは診断や評価ではありません。4つの場面で、あなたが比較的どの観点を選んだかを可視化したものです。</p><div class="matrix">${vals.map(([name,v,m])=>`<div class="metric"><small>${name}</small><strong>${Math.round(v/m*100)}%</strong><div class="meter" style="margin:12px 0 0"><i style="width:${v/m*100}%;background:linear-gradient(90deg,var(--blue),var(--green))"></i></div></div>`).join('')}</div><div class="reflection"><h3>今回の選択ログ</h3><div class="log">${DATA.map(d=>{let x=state.answers.find(a=>a.id===d.id);return `<div class="log-item"><time>${d.no}</time><div><b>${d.title}</b><br><small>${x?x.tag:'未回答'}</small></div></div>`}).join('')}</div></div><div class="reflection"><h3>授業でのまとめ方</h3><p>自分と異なる選択をした人を説得するのではなく、「何を大切にしたから、その選択になったのか」を聞いてください。意見の違いを、考えの浅さではなく、重く見た価値の違いとして扱うことが出発点です。</p></div><button class="continue" id="backMenu">章の一覧に戻る</button></div>`;$('#backMenu').onclick=()=>{renderMenu();show('menu')};show('dashboard')}
$('#startBtn').onclick=()=>{renderMenu();show('menu')};$('#resetBtn').onclick=()=>{if(confirm('この端末に保存した選択履歴を削除しますか？')){state={answers:[],seen:[]};save();renderMenu();show('home')}};
</script>
