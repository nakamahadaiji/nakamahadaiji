<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>オリジナル格付けチェック v22</title>
<style>
html,body{margin:0;padding:0;height:100%;background:#0d0d0d;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",Meiryo,sans-serif}
iframe{width:100%;height:100%;border:none;display:block;background:#0d0d0d}.loading{position:fixed;inset:0;display:grid;place-items:center;color:#f3d892;background:radial-gradient(circle at top,#2a2a2a 0%,#151515 35%,#0d0d0d 100%);font-weight:800;letter-spacing:.08em;z-index:10}.hidden{display:none}
</style>
</head>
<body>
<div id="loading" class="loading">読み込み中…</div>
<iframe id="appFrame" src="./kakuzuke-check-premium-v21.html?mode=host"></iframe>
<script>
const frame=document.getElementById('appFrame');
const loading=document.getElementById('loading');
frame.addEventListener('load',()=>{
  const doc=frame.contentDocument;
  const win=frame.contentWindow;
  if(!doc||!win)return;
  loading.classList.add('hidden');

  const style=doc.createElement('style');
  style.textContent=`
    body.mode-host .control-group .btn-row{display:grid !important;grid-template-columns:1fr !important;gap:10px !important}
    body.mode-host .control-group button{width:100% !important}
  `;
  doc.head.appendChild(style);

  function addJudgeButtonToProgress(){
    const groups=Array.from(doc.querySelectorAll('.control-group'));
    const progressGroup=groups.find(el=>el.querySelector('h4')?.textContent.trim()==='進行');
    if(!progressGroup)return;
    const row=progressGroup.querySelector('.btn-row');
    if(!row)return;
    if(doc.getElementById('progress-judge-btn'))return;
    const btn=doc.createElement('button');
    btn.id='progress-judge-btn';
    btn.type='button';
    btn.className='btn-gold';
    btn.textContent='判定';
    btn.addEventListener('click',()=>{
      if(typeof win.judgeWithSettings==='function') win.judgeWithSettings();
    });
    row.insertBefore(btn,row.firstChild);
  }

  function init(){
    addJudgeButtonToProgress();
  }

  init();
  const observer=new MutationObserver(()=>addJudgeButtonToProgress());
  observer.observe(doc.body,{childList:true,subtree:true});
});
</script>
</body>
</html>
