<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>オリジナル格付けチェック リアルタイム版 v49</title>
  <style>
    html,body{margin:0;padding:0;width:100%;height:100%;background:#000;overflow:hidden}
    iframe{border:0;width:100%;height:100%;display:block;background:#000}
  </style>
</head>
<body>
  <iframe id="appFrame" src="./kakuzuke-check-realtime-v46.html"></iframe>
  <script>
    const frame = document.getElementById('appFrame');

    function applyPatch(doc){
      const styleId = 'v49-patch-style';
      if(!doc.getElementById(styleId)){
        const style = doc.createElement('style');
        style.id = styleId;
        style.textContent = `
          #host-reset-current, .team-rereg, .small-actions { display: none !important; }
          @media (max-width:900px){
            .answer-grid.cols-5 {
              display:grid !important;
              grid-template-columns: 220px 120px 120px 120px 180px !important;
              gap:10px !important;
              min-width:760px !important;
            }
            .answer-cell, .answer-head {
              white-space: nowrap !important;
              font-size:16px !important;
              padding:14px 10px !important;
            }
            .v49-scroll-wrap {
              overflow-x:auto !important;
              -webkit-overflow-scrolling: touch;
            }
          }
        `;
        doc.head.appendChild(style);
      }

      doc.querySelectorAll('#host-reset-current, .team-rereg, .small-actions').forEach(el => el.remove());

      ['host-answer-grid','display-answer-grid'].forEach(id => {
        const grid = doc.getElementById(id);
        if(!grid) return;
        const parent = grid.parentElement;
        if(!parent) return;
        if(parent.classList.contains('v49-scroll-wrap')) return;
        const wrap = doc.createElement('div');
        wrap.className = 'v49-scroll-wrap';
        parent.insertBefore(wrap, grid);
        wrap.appendChild(grid);
      });
    }

    frame.addEventListener('load', () => {
      const doc = frame.contentDocument;
      if(!doc) return;
      applyPatch(doc);
      const observer = new MutationObserver(() => applyPatch(doc));
      observer.observe(doc.body, { childList:true, subtree:true });
    });
  </script>
</body>
</html>
