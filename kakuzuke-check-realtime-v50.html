<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>オリジナル格付けチェック リアルタイム版 v50</title>
  <style>
    html,body{margin:0;padding:0;width:100%;height:100%;background:#000;overflow:hidden}
    iframe{border:0;width:100%;height:100%;display:block;background:#000}
  </style>
</head>
<body>
  <iframe id="appFrame" src="./kakuzuke-check-realtime-v46.html"></iframe>
  <script>
    const frame = document.getElementById('appFrame');

    function getColumnCount(grid){
      if(!grid) return 4;
      const headCount = grid.querySelectorAll('.answer-head').length;
      return headCount >= 5 ? 5 : 4;
    }

    function getTemplate(count){
      return count === 5
        ? '220px 120px 120px 120px 180px'
        : '220px 120px 120px 180px';
    }

    function ensureStyle(doc){
      const styleId = 'v50-patch-style';
      if(doc.getElementById(styleId)) return;
      const style = doc.createElement('style');
      style.id = styleId;
      style.textContent = `
        #host-reset-current, .team-rereg, .small-actions { display: none !important; }
        .v50-scroll-wrap {
          overflow-x: auto !important;
          -webkit-overflow-scrolling: touch;
          width: 100%;
        }
        @media (max-width:900px){
          .answer-cell, .answer-head {
            white-space: nowrap !important;
            font-size: 16px !important;
            padding: 14px 10px !important;
          }
        }
      `;
      doc.head.appendChild(style);
    }

    function patchOneGrid(doc, id){
      const grid = doc.getElementById(id);
      if(!grid) return;

      const count = getColumnCount(grid);
      const template = getTemplate(count);

      grid.style.display = 'grid';
      grid.style.gridTemplateColumns = template;
      grid.style.gap = '10px';
      grid.style.minWidth = count === 5 ? '760px' : '640px';

      const parent = grid.parentElement;
      if(parent && !parent.classList.contains('v50-scroll-wrap')){
        const wrap = doc.createElement('div');
        wrap.className = 'v50-scroll-wrap';
        parent.insertBefore(wrap, grid);
        wrap.appendChild(grid);
      }
    }

    function applyPatch(doc){
      ensureStyle(doc);
      doc.querySelectorAll('#host-reset-current, .team-rereg, .small-actions').forEach(el => el.remove());
      patchOneGrid(doc, 'host-answer-grid');
      patchOneGrid(doc, 'display-answer-grid');
    }

    frame.addEventListener('load', () => {
      const doc = frame.contentDocument;
      if(!doc) return;
      applyPatch(doc);
      const observer = new MutationObserver(() => applyPatch(doc));
      observer.observe(doc.body, { childList:true, subtree:true });
    });
  </script>
</body>
</html>
