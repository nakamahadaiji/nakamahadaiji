<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>オリジナル格付けチェック リアルタイム版 v60</title>
  <style>
    html,body{margin:0;padding:0;width:100%;height:100%;background:#000;overflow:hidden}
    iframe{border:0;width:100%;height:100%;display:block;background:#000}
  </style>
</head>
<body>
  <iframe id="appFrame" src="./kakuzuke-check-realtime-v46.html"></iframe>
  <script type="module">
    import { initializeApp, getApps } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
    import { getDatabase, ref, onValue, runTransaction } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js';

    const FIREBASE_CONFIG={apiKey:'AIzaSyBXRVlcx-eZKrF6NpboKl8Z87w2sIkrOq4',authDomain:'kakuduke-fe62d.firebaseapp.com',databaseURL:'https://kakuduke-fe62d-default-rtdb.firebaseio.com',projectId:'kakuduke-fe62d',storageBucket:'kakuduke-fe62d.firebasestorage.app',messagingSenderId:'224688087057',appId:'1:224688087057:web:a0f6c8404728f761e9d1b0',measurementId:'G-05D75P50F2'};
    const ROOM_PATH='kakuzukeRealtime/default-room';
    const TEAM_NAME_MAX_LENGTH=12;
    const rankNames=['一流高校生','普通高校生','二流高校生','三流高校生','そっくりさん','映す価値なし'];
    const rankShort=['一流','普通','二流','三流','そっくりさん','映す価値なし'];
    const BLOCKED_TERMS=['adult','adalt','erotic','porn','obscene','violence','violent','abuse','harass','bully','suicide','selfharm','drug','drugs','murder','kill','badword','エロ','えろ','アダルト','ポルノ','暴力','ぼうりょく','いじめ','差別','ハラスメント','自殺','じさつ','死ね','しね','ころす','殺す','麻薬','大麻','覚醒剤','薬物','ドラッグ','ちん','チン','まん','マン','せっ','セッ','フェ','ふぇ'];

    const frame=document.getElementById('appFrame');
    const app=getApps().length ? getApps()[0] : initializeApp(FIREBASE_CONFIG);
    const db=getDatabase(app);
    const roomRef=ref(db,ROOM_PATH);
    let latestState=null;
    let frozenRanks={};
    let frozenQuestionKey='';

    function normalizeText(text){ return String(text || '').normalize('NFKC'); }
    function escapeRegExp(str){ return str.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'); }
    function sanitizeTeamName(name){ return normalizeText(name).trim().replace(/\s+/g,' ').slice(0,TEAM_NAME_MAX_LENGTH); }
    function isKanaOnly(name){ return /^[ぁ-ゖァ-ヶー　 ]+$/.test(name); }
    function maskBlockedTerms(name){
      let masked=normalizeText(name);
      BLOCKED_TERMS.forEach(term=>{ const re=new RegExp(escapeRegExp(normalizeText(term)),'g'); masked=masked.replace(re,m=>'＊'.repeat(m.length)); });
      return masked;
    }
    function randomTeamId(){ return 'team_'+Date.now()+'_'+Math.random().toString(36).slice(2,7); }
    function showToast(win,msg){ try{ if(typeof win.showToast==='function') win.showToast(msg); }catch{} }
    function teamsArray(state){
      const teams=state && state.teams ? Object.entries(state.teams).map(([id,v])=>({id,...v})) : [];
      teams.sort((a,b)=>((a.rank||0)-(b.rank||0))||((a.joinedAt||0)-(b.joinedAt||0)));
      return teams;
    }
    function getQuestionKey(state){ return String((state && state.game && state.game.currentQuestion) || 1); }
    function snapshotRanks(state){
      const next={};
      const teams=state && state.teams ? state.teams : {};
      Object.entries(teams).forEach(([id,team])=>{ next[id]=Number(team && team.rank ? team.rank : 0); });
      frozenRanks=next; frozenQuestionKey=getQuestionKey(state);
    }
    function maybeFreeze(state){
      const status=state && state.game ? state.game.status : '';
      const key=getQuestionKey(state);
      if(!frozenQuestionKey){ snapshotRanks(state); return; }
      if((status==='registration' || status==='question_open') && key!==frozenQuestionKey){ snapshotRanks(state); }
    }

    function ensureStyle(doc){
      const id='v60-style'; if(doc.getElementById(id)) return;
      const style=doc.createElement('style'); style.id=id;
      style.textContent=`
        #host-reset-current,.team-rereg,.small-actions{display:none !important;}
        .v60-scroll{overflow-x:auto !important;-webkit-overflow-scrolling:touch;width:100%;}
        .v60-wait-note{margin:14px auto 0;max-width:560px;padding:14px 16px;border-radius:16px;background:linear-gradient(180deg,#1c1c1c,#101010);border:1px solid rgba(255,223,127,.18);color:#fff0b4;text-align:center;font-weight:900;letter-spacing:.04em;}
        .v60-rank-stage{margin-top:16px;padding:20px 18px 22px;border-radius:24px;border:1px solid rgba(255,223,127,.24);background:radial-gradient(circle at 50% 0%,rgba(255,244,196,.34),transparent 38%),linear-gradient(180deg,#2b2317 0%,#111111 55%,#1a1712 100%);box-shadow:inset 0 0 0 1px rgba(255,255,255,.04),0 18px 30px rgba(0,0,0,.28);text-align:center}
        .v60-rank-eyebrow{font-size:12px;letter-spacing:.26em;color:#e7d49f;font-weight:900}
        .v60-rank-main{margin-top:10px;font-size:clamp(42px,9vw,68px);line-height:1.02;font-weight:900;color:#fff6cf;text-shadow:0 2px 0 rgba(255,255,255,.20),0 8px 18px rgba(0,0,0,.34);font-family:"Yu Mincho","Hiragino Mincho ProN",serif}
        .v60-rank-sub{margin-top:8px;font-size:22px;font-weight:900;color:#f2dfac;letter-spacing:.04em}
        .v60-rank-line{margin:14px auto 0;width:72%;height:2px;background:linear-gradient(90deg,transparent,rgba(255,223,127,.68),transparent)}
        .v60-final-simple .result-detail{display:none !important}
        .v60-final-meta{max-width:560px;margin:18px auto 0;display:grid;gap:10px}
        .v60-final-chip{padding:14px 16px;border-radius:16px;background:linear-gradient(180deg,#1a1a1a,#101010);border:1px solid rgba(255,223,127,.18);color:#f3e2b0;font-weight:800;text-align:center}
        @media (max-width:900px){ .answer-cell,.answer-head{white-space:nowrap !important;font-size:16px !important;padding:14px 10px !important;} }
      `;
      doc.head.appendChild(style);
    }

    function fixGrid(doc,id){
      const grid=doc.getElementById(id); if(!grid) return;
      const heads=grid.querySelectorAll('.answer-head').length; if(!heads) return;
      const count=heads>=5?5:4;
      grid.style.display='grid';
      grid.style.gridTemplateColumns=count===5?'220px 120px 120px 120px 180px':'220px 120px 120px 180px';
      grid.style.gap='10px';
      grid.style.minWidth=count===5?'760px':'640px';
      const parent=grid.parentElement; if(parent && !parent.classList.contains('v60-scroll')){ const wrap=doc.createElement('div'); wrap.className='v60-scroll'; parent.insertBefore(wrap,grid); wrap.appendChild(grid); }
    }

    function updateWaitingPremium(doc,myTeam){
      const waiting=doc.getElementById('screen-team-waiting'); if(!waiting) return;
      const stack=waiting.querySelector('.stack'); if(!stack) return;
      const namePill=doc.getElementById('team-current-name-pill'); if(namePill) namePill.textContent='チーム名：'+myTeam.name;
      const rankPill=doc.getElementById('team-current-rank-pill'); if(rankPill) rankPill.textContent='現在のランク：'+rankNames[myTeam.rank||0];
      let note=waiting.querySelector('.v60-wait-note');
      if(!note){ note=doc.createElement('div'); note.className='v60-wait-note'; note.textContent='登録されました'; const box=waiting.querySelector('.waiting-box'); if(box) box.insertAdjacentElement('afterend',note); }
      if(rankPill) rankPill.style.display='none';
      let stage=waiting.querySelector('.v60-rank-stage');
      if(!stage){ stage=doc.createElement('div'); stage.className='v60-rank-stage'; stage.innerHTML='<div class="v60-rank-eyebrow">YOUR CURRENT RANK</div><div class="v60-rank-main"></div><div class="v60-rank-line"></div><div class="v60-rank-sub"></div>'; stack.appendChild(stage); }
      let short='一流'; const full=rankNames[myTeam.rank||0]; if(full.includes('普通'))short='普通'; else if(full.includes('二流'))short='二流'; else if(full.includes('三流'))short='三流'; else if(full.includes('そっくり'))short='そっくり'; else if(full.includes('映す価値なし'))short='映す価値なし';
      stage.querySelector('.v60-rank-main').textContent=short; stage.querySelector('.v60-rank-sub').textContent=full;
    }

    function routeTeamScreen(doc,state){
      const teamId=localStorage.getItem('kakuzukeRealtimeTeamId') || ''; if(!teamId) return;
      const teams=state && state.teams ? state.teams : {}; const myTeam=teams[teamId]; if(!myTeam) return;
      const screens=['screen-launcher','screen-host','screen-display','screen-team-register','screen-team-waiting','screen-team-question','screen-team-answered','screen-team-result','screen-firebase-error'];
      const show=id=>screens.forEach(key=>{ const el=doc.getElementById(key); if(el) el.classList.toggle('active', key===id); });
      const title=doc.getElementById('team-question-title'); const text=doc.getElementById('team-question-text');
      if(title) title.textContent='第'+((state.game && state.game.currentQuestion)||1)+'問';
      if(text) text.textContent=(state.game && state.game.question && state.game.question.text)||'高級品はどっち？';
      const answeredName=doc.getElementById('team-answered-name-pill'); if(answeredName) answeredName.textContent='チーム名：'+myTeam.name;
      const answeredAns=doc.getElementById('team-answered-answer-pill'); if(answeredAns) answeredAns.textContent='今回の回答：'+(myTeam.answer||'---');
      const answeredRank=doc.getElementById('team-answered-rank-pill'); if(answeredRank) answeredRank.textContent='現在のランク：'+rankNames[(frozenRanks[teamId]!==undefined && (state.game.status==='question_open'||state.game.status==='judging')) ? frozenRanks[teamId] : (myTeam.rank||0)];
      const doorC=doc.getElementById('team-door-c'); if(doorC) doorC.style.display=(state.game && state.game.question && state.game.question.choiceMode)==='3' ? '' : 'none';
      ['A','B','C'].forEach(choice=>{ const el=doc.getElementById('team-door-'+choice.toLowerCase()); if(el) el.classList.toggle('selected', myTeam.answer===choice); });
      updateWaitingPremium(doc,{...myTeam, rank:(frozenRanks[teamId]!==undefined && (state.game.status==='question_open'||state.game.status==='judging')) ? frozenRanks[teamId] : (myTeam.rank||0)});
      if(state.game && state.game.showFinal){
        show('screen-team-result');
        const panel=doc.querySelector('#screen-team-result .result-panel'); const main=doc.getElementById('team-result-main'); const sub=doc.getElementById('team-result-sub'); const detail=doc.getElementById('team-result-detail'); const rankMain=doc.getElementById('team-result-rank-main'); const rankSub=doc.getElementById('team-result-rank-sub'); const label=doc.querySelector('.result-rank-label');
        if(panel && main && sub && detail && rankMain && rankSub && label){ panel.classList.add('v60-final-simple'); main.className='result-main result-correct'; main.textContent='最終結果'; sub.className='result-sub result-correct'; sub.textContent=myTeam.name; detail.textContent=''; label.textContent='YOUR FINAL RANK'; rankMain.textContent=rankShort[myTeam.rank||0]; rankSub.textContent=rankNames[myTeam.rank||0]; }
        panel && panel.querySelectorAll('.v60-final-meta').forEach(el=>el.remove());
        return;
      }
      const status=state.game ? state.game.status : 'registration';
      if(status==='registration') show('screen-team-waiting'); else if(status==='question_open') show(myTeam.answer?'screen-team-answered':'screen-team-question'); else if(status==='judging') show(myTeam.answer?'screen-team-answered':'screen-team-question'); else show('screen-team-result');
    }

    function patchRankDisplay(doc,state){
      maybeFreeze(state);
      const teamId=localStorage.getItem('kakuzukeRealtimeTeamId') || '';
      if(teamId && (state.game.status==='question_open' || state.game.status==='judging')){
        const frozen=frozenRanks[teamId];
        if(frozen!==undefined){ const cur=doc.getElementById('team-current-rank-pill'); const ans=doc.getElementById('team-answered-rank-pill'); if(cur) cur.textContent='現在のランク：'+rankNames[frozen]; if(ans) ans.textContent='現在のランク：'+rankNames[frozen]; }
      }
      ['host-answer-grid','display-answer-grid'].forEach(id=>{
        const grid=doc.getElementById(id); if(!grid) return; const heads=Array.from(grid.querySelectorAll('.answer-head')).map(el=>(el.textContent||'').trim()); const colCount=heads.length; const rankIndex=heads.indexOf('ランク'); if(rankIndex<0) return; const rows=Array.from(grid.children).slice(colCount); const teams=state.teams||{}; if(state.game.status!=='question_open' && state.game.status!=='judging') return; for(let i=0;i<rows.length;i+=colCount){ const row=rows.slice(i,i+colCount); if(row.length<colCount) continue; const name=(row[0].textContent||'').trim(); const entry=Object.entries(teams).find(([,team])=>String(team&&team.name||'').trim()===name); if(!entry) continue; const frozen=frozenRanks[entry[0]]; if(frozen===undefined) continue; const cell=row[rankIndex]; if(cell) cell.textContent=rankNames[frozen]; }
      });
    }

    function maybeFreeze(state){ const key=getQuestionKey(state); const status=state.game?state.game.status:''; if(!frozenQuestionKey){ snapshotRanks(state); return; } if((status==='registration'||status==='question_open') && key!==frozenQuestionKey) snapshotRanks(state); }

    async function patchedRegister(doc,win){
      const input=doc.getElementById('team-name-input'); const error=doc.getElementById('team-register-error'); if(!input||!error) return;
      error.classList.add('hidden'); error.textContent='';
      const raw=sanitizeTeamName(input.value); if(!raw){ error.classList.remove('hidden'); error.textContent='チーム名を入力してください。'; return; }
      if(!isKanaOnly(raw)){ error.classList.remove('hidden'); error.textContent='ひらがな または カタカナのみ入力できます。'; return; }
      const finalName=maskBlockedTerms(raw); const savedId=localStorage.getItem('kakuzukeRealtimeTeamId')||'';
      try{
        const result=await runTransaction(roomRef,state=>{ if(!state) return state; if(!state.game||state.game.status!=='registration') return state; const teams=state.teams||{}; const dup=Object.values(teams).some(t=>String(t.name||'').trim()===finalName); if(dup){ state.__dup__=true; return state; } if(Object.keys(teams).length>=40){ state.__full__=true; return state; } const teamId=savedId||randomTeamId(); teams[teamId]={name:finalName,rank:0,answer:'',joinedAt:Date.now(),lastOutcome:''}; state.teams=teams; state.meta=state.meta||{}; state.meta.updatedAt=Date.now(); return state; });
        const state=result.snapshot.val()||{}; if(state.__dup__){ error.classList.remove('hidden'); error.textContent='同じチーム名は登録できません。'; return; } if(state.__full__){ error.classList.remove('hidden'); error.textContent='参加上限に達しました。'; return; }
        const found=Object.entries(state.teams||{}).find(([,v])=>v&&v.name===finalName); if(found){ localStorage.setItem('kakuzukeRealtimeTeamId',found[0]); showToast(win,'参加登録が完了しました'); routeTeamScreen(doc,state); }
      }catch(e){ console.error(e); error.classList.remove('hidden'); error.textContent='参加登録に失敗しました。'; }
    }

    async function patchedShowFinal(win){ try{ await runTransaction(roomRef,state=>{ if(!state) return state; state.game=state.game||{}; state.game.showFinal=true; state.game.status='judged'; state.meta=state.meta||{}; state.meta.updatedAt=Date.now(); return state; }); showToast(win,'最終結果を表示しました'); }catch(e){ console.error(e); } }

    function patchButtons(doc,win){ const reg=doc.getElementById('team-register-btn'); if(reg && !reg.dataset.v60){ reg.dataset.v60='1'; reg.addEventListener('click',e=>{ e.preventDefault(); e.stopImmediatePropagation(); patchedRegister(doc,win); }, true); } const finalBtn=doc.getElementById('host-show-final'); if(finalBtn && !finalBtn.dataset.v60){ finalBtn.dataset.v60='1'; finalBtn.addEventListener('click',e=>{ e.preventDefault(); e.stopImmediatePropagation(); patchedShowFinal(win); }, true); } }

    function applyAll(doc,win,state){ ensureStyle(doc); latestState=state; fixGrid(doc,'host-answer-grid'); fixGrid(doc,'display-answer-grid'); doc.querySelectorAll('#host-reset-current,.team-rereg,.small-actions').forEach(el=>el.remove()); patchButtons(doc,win); patchRankDisplay(doc,state); routeTeamScreen(doc,state); const detail=doc.getElementById('team-result-detail'); const main=doc.getElementById('team-result-main'); if(detail && main){ const label=(main.textContent||'').trim(); if(label==='不正解') detail.innerHTML='今回は不正解でした。<br>ランクが1段階下がりました。'; else if(label==='正解') detail.innerHTML='見事に正解です。<br>現在のランクを維持しました。'; else if(label==='絶対あかん') detail.innerHTML='最も避けたい選択でした。<br>ランクが一気に下がりました。'; } }

    frame.addEventListener('load',()=>{ const win=frame.contentWindow; const doc=frame.contentDocument; if(!doc) return; onValue(roomRef,snapshot=>{ const state=snapshot.val()||{}; applyAll(doc,win,state); }); const observer=new MutationObserver(()=>{ if(latestState) applyAll(doc,win,latestState); }); observer.observe(doc.body,{childList:true,subtree:true,characterData:true}); });
  </script>
</body>
</html>
