<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>オリジナル格付けチェック v63 host+display table fix</title>
<style>
html,body{margin:0;padding:0;width:100%;height:100%;background:#000;overflow:hidden}
iframe{border:0;width:100%;height:100%;display:block;background:#000}
</style>
</head>
<body>
<iframe id="outer" src="./kakuzuke-check-realtime-v63.html"></iframe>
<script>
const outer=document.getElementById('outer');

function getVisibleDoc(){
  try{
    const doc1 = outer.contentDocument;
    if(!doc1) return null;
    const frame2 = doc1.getElementById('appFrame');
    if(!frame2 || !frame2.contentDocument) return null;
    const doc2 = frame2.contentDocument;
    const frame3 = doc2.getElementById('appFrame');
    if(!frame3 || !frame3.contentDocument) return null;
    return frame3.contentDocument;
  }catch(e){
    return null;
  }
}

function injectStyle(doc){
  if(doc.getElementById('bothtablefix-style')) return;
  const style=doc.createElement('style');
  style.id='bothtablefix-style';
  style.textContent=`
    #host-answer-grid.bothfix-applied,#display-answer-grid.bothfix-applied{display:block !important;width:100% !important;min-width:0 !important}
    #host-answer-grid.bothfix-applied > .answer-head,
    #host-answer-grid.bothfix-applied > .answer-cell,
    #host-answer-grid.bothfix-applied > .rank-chip,
    #display-answer-grid.bothfix-applied > .answer-head,
    #display-answer-grid.bothfix-applied > .answer-cell,
    #display-answer-grid.bothfix-applied > .rank-chip{display:none !important}
    .bothfix-wrap{display:block !important;width:100% !important;overflow-x:auto !important;overflow-y:hidden !important;-webkit-overflow-scrolling:touch;padding-bottom:4px}
    .bothfix-table{display:table !important;border-collapse:separate;border-spacing:6px;min-width:470px;width:max-content}
    .bothfix-row{display:table-row !important}
    .bothfix-head,.bothfix-cell{display:table-cell !important;vertical-align:middle;padding:9px 7px;border-radius:12px;border:1px solid rgba(255,223,127,.20);background:linear-gradient(180deg,#181818,#101010);color:#fff;text-align:center;font-size:12px;line-height:1.15;white-space:nowrap;min-width:68px}
    .bothfix-head{background:linear-gradient(180deg,#232323,#111);font-weight:900}
    .bothfix-col-name{min-width:122px}
    .bothfix-col-rank{min-width:118px;font-weight:900}
    .bothfix-r0{background:linear-gradient(180deg,#fff2b2,#daa925)!important;color:#2f1d00!important}
    .bothfix-r1{background:linear-gradient(180deg,#fcfcfc,#d8d8d8)!important;color:#222!important}
    .bothfix-r2{background:linear-gradient(180deg,#2f88f0,#1258a9)!important;color:#fff!important}
    .bothfix-r3{background:linear-gradient(180deg,#f9f9f9,#d8d8d8)!important;color:#222!important}
    .bothfix-r4{background:linear-gradient(180deg,#4a3211,#2c1d09)!important;color:#f0dbb2!important}
    .bothfix-r5{background:linear-gradient(180deg,#141414,#000)!important;color:#ff5353!important}
  `;
  doc.head.appendChild(style);
}

function rebuildGridAsTable(doc, gridId, screenId){
  const screen=doc.getElementById(screenId);
  const grid=doc.getElementById(gridId);
  if(!screen || !grid) return;
  if(!screen.classList.contains('active')) return;
  injectStyle(doc);

  const sourceChildren=Array.from(grid.children).filter(el=>!el.classList.contains('bothfix-wrap'));
  const heads=sourceChildren.filter(el=>el.classList.contains('answer-head'));
  const body=sourceChildren.filter(el=>el.classList.contains('answer-cell') || el.classList.contains('rank-chip'));
  if(!heads.length || !body.length) return;

  const colCount=heads.length;
  const rows=[];
  for(let i=0;i<body.length;i+=colCount){
    const row=body.slice(i,i+colCount);
    if(row.length===colCount) rows.push(row);
  }
  if(!rows.length) return;

  let wrap=grid.querySelector('.bothfix-wrap');
  if(!wrap){
    wrap=doc.createElement('div');
    wrap.className='bothfix-wrap';
    grid.appendChild(wrap);
  }
  let table=wrap.querySelector('.bothfix-table');
  if(!table){
    table=doc.createElement('div');
    table.className='bothfix-table';
    wrap.appendChild(table);
  }

  table.innerHTML='';
  grid.classList.add('bothfix-applied');

  const headerRow=doc.createElement('div');
  headerRow.className='bothfix-row';
  heads.forEach((head,idx)=>{
    const cell=doc.createElement('div');
    cell.className='bothfix-head';
    if(idx===0) cell.classList.add('bothfix-col-name');
    if(idx===colCount-1) cell.classList.add('bothfix-col-rank');
    cell.textContent=head.textContent.trim();
    headerRow.appendChild(cell);
  });
  table.appendChild(headerRow);

  rows.forEach(row=>{
    const tr=doc.createElement('div');
    tr.className='bothfix-row';
    row.forEach((src,idx)=>{
      const cell=doc.createElement('div');
      cell.className='bothfix-cell';
      if(idx===0) cell.classList.add('bothfix-col-name');
      if(idx===colCount-1) cell.classList.add('bothfix-col-rank');
      cell.textContent=src.textContent.trim();
      const rankClass=[...src.classList].find(c=>/^rank-\d$/.test(c));
      if(rankClass) cell.classList.add('bothfix-'+rankClass.replace('rank-','r'));
      tr.appendChild(cell);
    });
    table.appendChild(tr);
  });
}

function run(){
  const doc=getVisibleDoc();
  if(!doc) return;
  try{
    rebuildGridAsTable(doc,'host-answer-grid','screen-host');
    rebuildGridAsTable(doc,'display-answer-grid','screen-display');
  }catch(e){}
}

outer.addEventListener('load',()=>{
  run();
  setInterval(run,250);
});
</script>
</body>
</html>
