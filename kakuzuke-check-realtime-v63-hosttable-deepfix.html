<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>オリジナル格付けチェック v63 host table deep fix</title>
<style>
html,body{margin:0;padding:0;width:100%;height:100%;background:#000;overflow:hidden}
iframe{border:0;width:100%;height:100%;display:block;background:#000}
</style>
</head>
<body>
<iframe id="outer" src="./kakuzuke-check-realtime-v63.html"></iframe>
<script>
const outer=document.getElementById('outer');

function getInnerDoc(){
  try{
    const outerDoc=outer.contentDocument;
    if(!outerDoc) return null;
    const innerFrame=outerDoc.getElementById('appFrame');
    if(!innerFrame) return null;
    return innerFrame.contentDocument || null;
  }catch(e){
    return null;
  }
}

function addStyle(doc){
  if(doc.getElementById('deepfix-style')) return;
  const style=doc.createElement('style');
  style.id='deepfix-style';
  style.textContent=`
    #host-answer-grid.deepfix-applied{display:block !important;width:100% !important;min-width:0 !important}
    #host-answer-grid.deepfix-applied > .answer-head,
    #host-answer-grid.deepfix-applied > .answer-cell,
    #host-answer-grid.deepfix-applied > .rank-chip{display:none !important}
    .deepfix-wrap{display:block !important;width:100% !important;overflow-x:auto !important;overflow-y:hidden !important;-webkit-overflow-scrolling:touch;padding-bottom:4px}
    .deepfix-table{display:table !important;border-collapse:separate;border-spacing:6px;min-width:470px;width:max-content}
    .deepfix-row{display:table-row !important}
    .deepfix-head,.deepfix-cell{display:table-cell !important;vertical-align:middle;padding:10px 8px;border-radius:14px;border:1px solid rgba(255,223,127,.20);background:linear-gradient(180deg,#181818,#101010);color:#fff;text-align:center;font-size:12px;line-height:1.2;white-space:nowrap;min-width:72px}
    .deepfix-head{background:linear-gradient(180deg,#232323,#111);font-weight:900}
    .deepfix-col-name{min-width:130px}
    .deepfix-col-rank{min-width:120px;font-weight:900}
    .deepfix-r0{background:linear-gradient(180deg,#fff2b2,#daa925)!important;color:#2f1d00!important}
    .deepfix-r1{background:linear-gradient(180deg,#fcfcfc,#d8d8d8)!important;color:#222!important}
    .deepfix-r2{background:linear-gradient(180deg,#2f88f0,#1258a9)!important;color:#fff!important}
    .deepfix-r3{background:linear-gradient(180deg,#f9f9f9,#d8d8d8)!important;color:#222!important}
    .deepfix-r4{background:linear-gradient(180deg,#4a3211,#2c1d09)!important;color:#f0dbb2!important}
    .deepfix-r5{background:linear-gradient(180deg,#141414,#000)!important;color:#ff5353!important}
  `;
  doc.head.appendChild(style);
}

function buildHostTable(doc){
  const hostScreen=doc.getElementById('screen-host');
  const grid=doc.getElementById('host-answer-grid');
  if(!hostScreen || !grid) return;
  if(!hostScreen.classList.contains('active')) return;

  addStyle(doc);

  const sourceChildren=Array.from(grid.children).filter(el=>!el.classList.contains('deepfix-wrap'));
  const heads=sourceChildren.filter(el=>el.classList.contains('answer-head'));
  const body=sourceChildren.filter(el=>el.classList.contains('answer-cell') || el.classList.contains('rank-chip'));
  if(!heads.length || !body.length) return;

  const colCount=heads.length;
  const rows=[];
  for(let i=0;i<body.length;i+=colCount){
    const row=body.slice(i,i+colCount);
    if(row.length===colCount) rows.push(row);
  }
  if(!rows.length) return;

  let wrap=grid.querySelector('.deepfix-wrap');
  if(!wrap){
    wrap=doc.createElement('div');
    wrap.className='deepfix-wrap';
    grid.appendChild(wrap);
  }
  let table=wrap.querySelector('.deepfix-table');
  if(!table){
    table=doc.createElement('div');
    table.className='deepfix-table';
    wrap.appendChild(table);
  }

  table.innerHTML='';
  grid.classList.add('deepfix-applied');

  const headerRow=doc.createElement('div');
  headerRow.className='deepfix-row';
  heads.forEach((head,idx)=>{
    const cell=doc.createElement('div');
    cell.className='deepfix-head';
    if(idx===0) cell.classList.add('deepfix-col-name');
    if(idx===colCount-1) cell.classList.add('deepfix-col-rank');
    cell.textContent=head.textContent.trim();
    headerRow.appendChild(cell);
  });
  table.appendChild(headerRow);

  rows.forEach(row=>{
    const tr=doc.createElement('div');
    tr.className='deepfix-row';
    row.forEach((src,idx)=>{
      const cell=doc.createElement('div');
      cell.className='deepfix-cell';
      if(idx===0) cell.classList.add('deepfix-col-name');
      if(idx===colCount-1) cell.classList.add('deepfix-col-rank');
      cell.textContent=src.textContent.trim();
      const rankClass=[...src.classList].find(c=>/^rank-\d$/.test(c));
      if(rankClass) cell.classList.add('deepfix-'+rankClass.replace('rank-','r'));
      tr.appendChild(cell);
    });
    table.appendChild(tr);
  });
}

function run(){
  const doc=getInnerDoc();
  if(!doc) return;
  try{ buildHostTable(doc); }catch(e){}
}

outer.addEventListener('load',()=>{
  run();
  setInterval(run,300);
});
</script>
</body>
</html>
