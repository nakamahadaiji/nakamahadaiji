<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>オリジナル格付けチェック v63 host table fix</title>
<style>
html,body{margin:0;padding:0;width:100%;height:100%;background:#000;overflow:hidden}
iframe{border:0;width:100%;height:100%;display:block;background:#000}
</style>
</head>
<body>
<iframe id="app" src="./kakuzuke-check-realtime-v63.html"></iframe>
<script>
const iframe=document.getElementById('app');

function addStyle(doc){
  if(doc.getElementById('hosttablefix-style')) return;
  const style=doc.createElement('style');
  style.id='hosttablefix-style';
  style.textContent=`
    #host-answer-grid.hosttablefix-applied{display:block !important;width:100% !important}
    #host-answer-grid.hosttablefix-applied > *{display:none !important}
    .hosttablefix-wrap{display:block !important;width:100% !important;overflow-x:auto !important;-webkit-overflow-scrolling:touch;padding-bottom:4px}
    .hosttablefix-table{display:table !important;border-collapse:separate;border-spacing:6px;min-width:470px;width:max-content}
    .hosttablefix-row{display:table-row !important}
    .hosttablefix-head,.hosttablefix-cell{display:table-cell !important;vertical-align:middle;padding:10px 8px;border-radius:14px;border:1px solid rgba(255,223,127,.20);background:linear-gradient(180deg,#181818,#101010);color:#fff;text-align:center;font-size:12px;line-height:1.2;white-space:nowrap;min-width:72px}
    .hosttablefix-head{background:linear-gradient(180deg,#232323,#111);font-weight:900}
    .hosttablefix-col-name{min-width:130px}
    .hosttablefix-col-rank{min-width:120px;font-weight:900}
    .hosttablefix-r0{background:linear-gradient(180deg,#fff2b2,#daa925)!important;color:#2f1d00!important}
    .hosttablefix-r1{background:linear-gradient(180deg,#fcfcfc,#d8d8d8)!important;color:#222!important}
    .hosttablefix-r2{background:linear-gradient(180deg,#2f88f0,#1258a9)!important;color:#fff!important}
    .hosttablefix-r3{background:linear-gradient(180deg,#f9f9f9,#d8d8d8)!important;color:#222!important}
    .hosttablefix-r4{background:linear-gradient(180deg,#4a3211,#2c1d09)!important;color:#f0dbb2!important}
    .hosttablefix-r5{background:linear-gradient(180deg,#141414,#000)!important;color:#ff5353!important}
  `;
  doc.head.appendChild(style);
}

function buildHostTable(doc){
  const hostScreen=doc.getElementById('screen-host');
  const grid=doc.getElementById('host-answer-grid');
  if(!hostScreen || !grid) return;
  if(!hostScreen.classList.contains('active')) return;
  addStyle(doc);

  const allChildren=Array.from(grid.children).filter(el=>!el.classList.contains('hosttablefix-wrap'));
  const heads=allChildren.filter(el=>el.classList.contains('answer-head'));
  const body=allChildren.filter(el=>el.classList.contains('answer-cell') || el.classList.contains('rank-chip'));
  if(!heads.length || !body.length) return;

  const colCount=heads.length;
  const rows=[];
  for(let i=0;i<body.length;i+=colCount){
    const row=body.slice(i,i+colCount);
    if(row.length===colCount) rows.push(row);
  }
  if(!rows.length) return;

  let wrap=grid.querySelector('.hosttablefix-wrap');
  if(!wrap){
    wrap=doc.createElement('div');
    wrap.className='hosttablefix-wrap';
    grid.appendChild(wrap);
  }

  let table=wrap.querySelector('.hosttablefix-table');
  if(!table){
    table=doc.createElement('div');
    table.className='hosttablefix-table';
    wrap.appendChild(table);
  }

  table.innerHTML='';
  grid.classList.add('hosttablefix-applied');

  const headRow=doc.createElement('div');
  headRow.className='hosttablefix-row';
  heads.forEach((head,idx)=>{
    const cell=doc.createElement('div');
    cell.className='hosttablefix-head';
    if(idx===0) cell.classList.add('hosttablefix-col-name');
    if(idx===colCount-1) cell.classList.add('hosttablefix-col-rank');
    cell.textContent=head.textContent.trim();
    headRow.appendChild(cell);
  });
  table.appendChild(headRow);

  rows.forEach(row=>{
    const tr=doc.createElement('div');
    tr.className='hosttablefix-row';
    row.forEach((src,idx)=>{
      const cell=doc.createElement('div');
      cell.className='hosttablefix-cell';
      if(idx===0) cell.classList.add('hosttablefix-col-name');
      if(idx===colCount-1) cell.classList.add('hosttablefix-col-rank');
      cell.textContent=src.textContent.trim();
      const rankClass=[...src.classList].find(c=>/^rank-\d$/.test(c));
      if(rankClass){
        cell.classList.add('hosttablefix-'+rankClass.replace('rank-','r'));
      }
      tr.appendChild(cell);
    });
    table.appendChild(tr);
  });
}

iframe.addEventListener('load',()=>{
  const doc=iframe.contentDocument;
  if(!doc) return;
  const run=()=>{ try{ buildHostTable(doc); }catch(e){} };
  run();
  const observer=new MutationObserver(run);
  observer.observe(doc.body,{childList:true,subtree:true,characterData:true,attributes:true});
  setInterval(run,250);
});
</script>
</body>
</html>
