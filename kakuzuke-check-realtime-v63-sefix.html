<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>オリジナル格付けチェック リアルタイム版 v63 SE fix</title>
<style>
html,body{margin:0;padding:0;width:100%;height:100%;background:#000;overflow:hidden}
iframe{border:0;width:100%;height:100%;display:block;background:#000}
</style>
</head>
<body>
<iframe id="appFrame" src="./kakuzuke-check-realtime-v63.html"></iframe>
<script>
const frame=document.getElementById('appFrame');
function applyPatch(doc){
  if(!doc) return;
  if(!doc.getElementById('sefix-style')){
    const style=doc.createElement('style');
    style.id='sefix-style';
    style.textContent=`
      #host-answer-grid{
        display:grid !important;
        gap:8px !important;
      }
      .sefix-scroll{
        width:100%;
        overflow-x:auto !important;
        overflow-y:hidden !important;
        -webkit-overflow-scrolling:touch;
        padding-bottom:4px;
      }
      .sefix-table{
        display:grid;
        gap:8px;
      }
      .sefix-head,.sefix-cell{
        padding:12px 10px;
        border-radius:16px;
        border:1px solid rgba(255,223,127,.20);
        background:linear-gradient(180deg,#181818,#101010);
        text-align:center;
        font-size:15px;
        line-height:1.35;
        white-space:nowrap;
      }
      .sefix-head{
        font-weight:900;
        background:linear-gradient(180deg,#232323,#111);
      }
      @media (max-width: 420px){
        .sefix-head,.sefix-cell{font-size:14px;padding:11px 8px;}
      }
    `;
    doc.head.appendChild(style);
  }

  const hostGrid=doc.getElementById('host-answer-grid');
  if(!hostGrid) return;

  const headTexts=Array.from(hostGrid.querySelectorAll('.answer-head')).map(el=>el.textContent.trim());
  const originalCells=Array.from(hostGrid.children);
  if(!headTexts.length || !originalCells.length) return;

  const colCount=headTexts.length;
  const bodyCells=originalCells.slice(colCount);
  if(bodyCells.length===0) return;

  const rows=[];
  for(let i=0;i<bodyCells.length;i+=colCount){
    rows.push(bodyCells.slice(i,i+colCount));
  }

  hostGrid.innerHTML='';
  const scroll=doc.createElement('div');
  scroll.className='sefix-scroll';
  const table=doc.createElement('div');
  table.className='sefix-table';
  table.style.gridTemplateColumns = colCount===5
    ? '160px 88px 88px 88px 132px'
    : '160px 88px 88px 132px';
  table.style.minWidth = colCount===5 ? '580px' : '468px';

  headTexts.forEach(text=>{
    const el=doc.createElement('div');
    el.className='sefix-head';
    el.textContent=text;
    table.appendChild(el);
  });

  rows.forEach(row=>{
    row.forEach(cell=>{
      const el=doc.createElement('div');
      el.className='sefix-cell';
      el.textContent=cell.textContent.trim();
      table.appendChild(el);
    });
  });

  scroll.appendChild(table);
  hostGrid.appendChild(scroll);
}
frame.addEventListener('load',()=>{
  const doc=frame.contentDocument;
  if(!doc) return;
  applyPatch(doc);
  const observer=new MutationObserver(()=>applyPatch(doc));
  observer.observe(doc.body,{childList:true,subtree:true,characterData:true});
});
</script>
</body>
</html>
