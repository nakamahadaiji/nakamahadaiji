<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>オリジナル格付けチェック リアルタイム版 v63</title>
<style>html,body{margin:0;padding:0;width:100%;height:100%;background:#000;overflow:hidden}iframe{border:0;width:100%;height:100%;display:block;background:#000}</style>
</head>
<body>
<iframe id="appFrame" src="./kakuzuke-check-realtime-v60.html"></iframe>
<script type="module">
import { initializeApp, getApps } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
import { getDatabase, ref, onValue } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js';
const cfg={apiKey:'AIzaSyBXRVlcx-eZKrF6NpboKl8Z87w2sIkrOq4',authDomain:'kakuduke-fe62d.firebaseapp.com',databaseURL:'https://kakuduke-fe62d-default-rtdb.firebaseio.com',projectId:'kakuduke-fe62d',storageBucket:'kakuduke-fe62d.firebasestorage.app',messagingSenderId:'224688087057',appId:'1:224688087057:web:a0f6c8404728f761e9d1b0',measurementId:'G-05D75P50F2'};
const rankNames=['一流高校生','普通高校生','二流高校生','三流高校生','そっくりさん','映す価値なし'];
const rankShort=['一流','普通','二流','三流','そっくりさん','映す価値なし'];
const frame=document.getElementById('appFrame');
const app=getApps().length?getApps()[0]:initializeApp(cfg);
const db=getDatabase(app);
const roomRef=ref(db,'kakuzukeRealtime/default-room');
let latest=null;
let replaced=false;
function renderFinal(doc,team){
  const short=rankShort[team.rank||0]||'普通';
  const full=rankNames[team.rank||0]||'普通高校生';
  doc.open();
  doc.write(`<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"><title>最終結果</title><style>
  *{box-sizing:border-box}html,body{margin:0;padding:0;min-height:100%;background:radial-gradient(circle at top,#2a2a2a 0%,#141414 36%,#080808 100%);color:#f8f5ee;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",Meiryo,sans-serif}body{overflow-x:hidden}.app{width:min(100%,1180px);margin:0 auto;padding:18px 14px 40px}.frame{background:linear-gradient(180deg,rgba(255,248,220,.07),rgba(255,255,255,.02)),#171717;border:4px solid #cf9719;border-radius:26px;overflow:hidden;box-shadow:0 18px 40px rgba(0,0,0,.45),inset 0 0 0 2px rgba(255,234,170,.22)}.header{position:relative;padding:34px 20px 24px;text-align:center;background:radial-gradient(circle at 18% 12%,rgba(255,255,255,.72),transparent 18%),radial-gradient(circle at 78% 10%,rgba(255,255,255,.30),transparent 16%),linear-gradient(180deg,#fff9d7,#f1cf73 42%,#cf9719 76%,#b27b0e);border-bottom:6px solid #8f6208;color:#3f2500}.header:before,.header:after{content:"❦";position:absolute;top:12px;font-size:30px;color:#a76d09}.header:before{left:16px}.header:after{right:16px}.header h1{margin:0;font-family:"Yu Mincho","Hiragino Mincho ProN",serif;font-size:clamp(36px,6vw,62px);line-height:1.16;letter-spacing:.12em;font-weight:900;color:#2f1700;text-shadow:0 1px 0 rgba(255,255,255,.68),0 2px 0 rgba(255,241,180,.95),0 10px 18px rgba(120,70,0,.16)}.header p{margin:14px 0 0;font-size:12px;color:#5e3c00;font-weight:900;letter-spacing:.22em;text-transform:uppercase;opacity:.92}.panel{max-width:860px;margin:34px auto 0;padding:30px;border-radius:28px;border:1px solid rgba(255,223,127,.30);background:radial-gradient(circle at 50% 0%,rgba(255,240,180,.30),transparent 34%),linear-gradient(180deg,#2a2214,#0f0f0f 52%,#1b1710);box-shadow:inset 0 0 0 1px rgba(255,255,255,.05),0 24px 42px rgba(0,0,0,.34)}.eyebrow{text-align:center;font-size:13px;letter-spacing:.36em;color:#edd48b;font-weight:900}.main{text-align:center;margin-top:12px;font-size:clamp(44px,9vw,84px);font-weight:900;line-height:1.04;color:#fff2bc}.sub{text-align:center;margin-top:10px;font-size:28px;font-weight:900;color:#fff0b4}.rankbox{margin:24px auto 0;max-width:560px;padding:22px;border-radius:22px;background:linear-gradient(180deg,#fffdf4,#dbd7cf);color:#222;text-align:center;box-shadow:0 14px 30px rgba(0,0,0,.28)}.ranklabel{font-size:14px;font-weight:900;letter-spacing:.22em}.rankmain{font-size:clamp(42px,7vw,72px);font-weight:900;line-height:1.08;margin-top:6px}.ranksub{font-size:18px;font-weight:900;margin-top:6px}</style></head><body><div class="app"><div class="frame"><div class="header"><h1>オリジナル<br>格付けチェック</h1><p>Realtime Edition</p></div><div class="panel"><div class="eyebrow">FINAL RESULT</div><div class="main">最終結果</div><div class="sub">${team.name}</div><div class="rankbox"><div class="ranklabel">YOUR FINAL RANK</div><div class="rankmain">${short}</div><div class="ranksub">${full}</div></div></div></div></div></body></html>`);
  doc.close();
}
frame.addEventListener('load',()=>{
  onValue(roomRef,s=>{
    latest=s.val()||{};
    const teamId=localStorage.getItem('kakuzukeRealtimeTeamId')||'';
    if(!teamId) return;
    const team=(latest.teams||{})[teamId];
    if(!team) return;
    if(latest.game&&latest.game.showFinal){
      try{ renderFinal(frame.contentDocument,team); replaced=true; }catch(e){ console.error(e); }
    }
  });
  setInterval(()=>{
    const teamId=localStorage.getItem('kakuzukeRealtimeTeamId')||'';
    if(!teamId||!latest||!(latest.game&&latest.game.showFinal)) return;
    const team=(latest.teams||{})[teamId];
    if(!team) return;
    try{ renderFinal(frame.contentDocument,team); replaced=true; }catch(e){}
  },500);
});
</script>
</body>
</html>
