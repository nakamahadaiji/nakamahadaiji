<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>オリジナル格付けチェック リアルタイム版 v68</title>
  <style>
    :root{--gold1:#fff9d7;--gold2:#f1cf73;--gold3:#cf9719;--gold4:#8f6208;--bg:#080808;--panel:#171717;--text:#f8f5ee;--line:rgba(255,223,127,.20)}
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;min-height:100%;background:radial-gradient(circle at top,#2a2a2a 0%,#141414 36%,var(--bg) 100%);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",Meiryo,sans-serif}
    body{overflow:hidden}
    .app{width:min(100%,1180px);margin:0 auto;padding:18px 14px 40px}
    .frame{background:linear-gradient(180deg,rgba(255,248,220,.07),rgba(255,255,255,.02)),var(--panel);border:4px solid var(--gold3);border-radius:26px;overflow:hidden;box-shadow:0 18px 40px rgba(0,0,0,.45),inset 0 0 0 2px rgba(255,234,170,.22)}
    .header{position:relative;padding:34px 20px 24px;text-align:center;background:radial-gradient(circle at 18% 12%,rgba(255,255,255,.72),transparent 18%),radial-gradient(circle at 78% 10%,rgba(255,255,255,.30),transparent 16%),linear-gradient(180deg,var(--gold1),var(--gold2) 42%,var(--gold3) 76%,#b27b0e);border-bottom:6px solid var(--gold4);color:#3f2500}
    .header:before,.header:after{content:"❦";position:absolute;top:12px;font-size:30px;color:#a76d09}.header:before{left:16px}.header:after{right:16px}
    .header h1{margin:0;font-family:"Yu Mincho","Hiragino Mincho ProN",serif;font-size:clamp(36px,6vw,62px);line-height:1.16;letter-spacing:.12em;font-weight:900;color:#2f1700;text-shadow:0 1px 0 rgba(255,255,255,.68),0 2px 0 rgba(255,241,180,.95),0 10px 18px rgba(120,70,0,.16)}
    .header p{margin:14px 0 0;font-size:12px;color:#5e3c00;font-weight:900;letter-spacing:.22em;text-transform:uppercase;opacity:.92}
    .section{padding:18px}
    .mode-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
    .mode-btn{appearance:none;border:none;border-radius:22px;padding:20px 16px;cursor:pointer;font-weight:900;transition:transform .15s ease,filter .15s ease;min-height:150px;font-size:22px;background:linear-gradient(180deg,#1f1f1f,#0f0f0f);border:1px solid rgba(255,223,127,.18);color:#fff;box-shadow:inset 0 0 0 1px rgba(255,255,255,.03)}
    .mode-btn.primary{background:linear-gradient(180deg,#fff1b1,#ddb04a 58%,#b4780b);color:#2f1e00;box-shadow:inset 0 1px 0 rgba(255,255,255,.55),0 10px 24px rgba(0,0,0,.18)}
    .mode-btn:hover{filter:brightness(1.05)} .mode-btn:active{transform:translateY(1px)}
    .mini-status{font-size:12px;color:#d7c08a;text-align:center;letter-spacing:.08em;margin-top:10px}
    #viewer{display:none;width:100vw;height:100vh;border:0;background:#000}
    .hidden{display:none !important}
    @media (max-width:900px){.mode-grid{grid-template-columns:1fr}.app{padding:14px 12px 32px}}
  </style>
</head>
<body>
  <div id="launcher" class="app">
    <div class="frame">
      <div class="header">
        <h1>オリジナル<br>格付けチェック</h1>
        <p>Realtime Edition</p>
      </div>
      <div class="section">
        <div class="mode-grid">
          <button class="mode-btn primary" id="openTeam" type="button">チーム用</button>
          <button class="mode-btn" id="openHost" type="button">教員用</button>
        </div>
        <div class="mini-status">表示用は削除済みです</div>
      </div>
    </div>
  </div>
  <iframe id="viewer" title="kakuzuke app"></iframe>
  <script>
    const launcher=document.getElementById('launcher');
    const viewer=document.getElementById('viewer');
    function openMode(mode){
      launcher.classList.add('hidden');
      viewer.style.display='block';
      viewer.src='./kakuzuke-check-realtime-v60.html?mode='+encodeURIComponent(mode);
    }
    document.getElementById('openTeam').addEventListener('click',()=>openMode('team'));
    document.getElementById('openHost').addEventListener('click',()=>{
      const pw=window.prompt('パスワードを入力してください');
      if(pw!=='0122') return;
      openMode('host');
    });
  </script>
</body>
</html>
