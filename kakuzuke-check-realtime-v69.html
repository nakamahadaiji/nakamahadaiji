<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>オリジナル格付けチェック リアルタイム版 v69</title>
  <style>
    :root{--gold1:#fff9d7;--gold2:#f1cf73;--gold3:#cf9719;--gold4:#8f6208;--bg:#080808;--panel:#171717;--text:#f8f5ee;--line:rgba(255,223,127,.20)}
    *{box-sizing:border-box} html,body{margin:0;padding:0;min-height:100%;background:radial-gradient(circle at top,#2a2a2a 0%,#141414 36%,var(--bg) 100%);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",Meiryo,sans-serif} body{overflow:hidden}
    .app{width:min(100%,1180px);margin:0 auto;padding:18px 14px 40px}.frame{background:linear-gradient(180deg,rgba(255,248,220,.07),rgba(255,255,255,.02)),var(--panel);border:4px solid var(--gold3);border-radius:26px;overflow:hidden;box-shadow:0 18px 40px rgba(0,0,0,.45),inset 0 0 0 2px rgba(255,234,170,.22)}
    .header{position:relative;padding:34px 20px 24px;text-align:center;background:radial-gradient(circle at 18% 12%,rgba(255,255,255,.72),transparent 18%),radial-gradient(circle at 78% 10%,rgba(255,255,255,.30),transparent 16%),linear-gradient(180deg,var(--gold1),var(--gold2) 42%,var(--gold3) 76%,#b27b0e);border-bottom:6px solid var(--gold4);color:#3f2500}.header:before,.header:after{content:"❦";position:absolute;top:12px;font-size:30px;color:#a76d09}.header:before{left:16px}.header:after{right:16px}.header h1{margin:0;font-family:"Yu Mincho","Hiragino Mincho ProN",serif;font-size:clamp(36px,6vw,62px);line-height:1.16;letter-spacing:.12em;font-weight:900;color:#2f1700;text-shadow:0 1px 0 rgba(255,255,255,.68),0 2px 0 rgba(255,241,180,.95),0 10px 18px rgba(120,70,0,.16)}.header p{margin:14px 0 0;font-size:12px;color:#5e3c00;font-weight:900;letter-spacing:.22em;text-transform:uppercase;opacity:.92}
    .section{padding:18px}.mode-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}.mode-btn{appearance:none;border:none;border-radius:22px;padding:20px 16px;cursor:pointer;font-weight:900;transition:transform .15s ease,filter .15s ease;min-height:150px;font-size:22px;background:linear-gradient(180deg,#1f1f1f,#0f0f0f);border:1px solid rgba(255,223,127,.18);color:#fff;box-shadow:inset 0 0 0 1px rgba(255,255,255,.03)}.mode-btn.primary{background:linear-gradient(180deg,#fff1b1,#ddb04a 58%,#b4780b);color:#2f1e00;box-shadow:inset 0 1px 0 rgba(255,255,255,.55),0 10px 24px rgba(0,0,0,.18)}.mode-btn:hover{filter:brightness(1.05)} .mode-btn:active{transform:translateY(1px)}
    .mini-status{font-size:12px;color:#d7c08a;text-align:center;letter-spacing:.08em;margin-top:10px} .hidden{display:none !important}
    #viewer{display:none;width:100vw;height:100vh;border:0;background:#000}
    @media (max-width:900px){.mode-grid{grid-template-columns:1fr}.app{padding:14px 12px 32px}}
  </style>
</head>
<body>
  <div id="launcher" class="app">
    <div class="frame">
      <div class="header"><h1>オリジナル<br>格付けチェック</h1><p>Realtime Edition</p></div>
      <div class="section">
        <div class="mode-grid">
          <button class="mode-btn primary" id="openTeam" type="button">チーム用</button>
          <button class="mode-btn" id="openHost" type="button">教員用</button>
        </div>
        <div class="mini-status">表示用は削除済みです</div>
      </div>
    </div>
  </div>
  <iframe id="viewer" title="kakuzuke app"></iframe>

  <script type="module">
    import { initializeApp, getApps } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
    import { getDatabase, ref, onValue, runTransaction } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js';

    const FIREBASE_CONFIG={apiKey:'AIzaSyBXRVlcx-eZKrF6NpboKl8Z87w2sIkrOq4',authDomain:'kakuduke-fe62d.firebaseapp.com',databaseURL:'https://kakuduke-fe62d-default-rtdb.firebaseio.com',projectId:'kakuduke-fe62d',storageBucket:'kakuduke-fe62d.firebasestorage.app',messagingSenderId:'224688087057',appId:'1:224688087057:web:a0f6c8404728f761e9d1b0',measurementId:'G-05D75P50F2'};
    const ROOM_PATH='kakuzukeRealtime/default-room';
    const ACCESS_PASSWORD='0122';
    const TEAM_NAME_MAX_LENGTH=12;
    const rankNames=['一流高校生','普通高校生','二流高校生','三流高校生','そっくりさん','映す価値なし'];
    const rankShort=['一流','普通','二流','三流','そっくりさん','映す価値なし'];
    const BLOCKED_TERMS=['adult','adalt','erotic','porn','obscene','violence','violent','abuse','harass','bully','suicide','selfharm','drug','drugs','murder','kill','badword','エロ','えろ','アダルト','ポルノ','暴力','ぼうりょく','いじめ','差別','ハラスメント','自殺','じさつ','死ね','しね','ころす','殺す','麻薬','大麻','覚醒剤','薬物','ドラッグ','ちん','チン','まん','マン','せっ','セッ','フェ','ふぇ'];

    const launcher=document.getElementById('launcher');
    const viewer=document.getElementById('viewer');
    const app=getApps().length ? getApps()[0] : initializeApp(FIREBASE_CONFIG);
    const db=getDatabase(app);
    const roomRef=ref(db,ROOM_PATH);
    let selectedMode='';
    let latestState=null;
    let frozenRanks={};
    let frozenQuestionKey='';

    function normalizeText(text){ return String(text || '').normalize('NFKC'); }
    function escapeRegExp(str){ return str.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'); }
    function sanitizeTeamName(name){ return normalizeText(name).trim().replace(/\s+/g,' ').slice(0,TEAM_NAME_MAX_LENGTH); }
    function isKanaOnly(name){ return /^[ぁ-ゖァ-ヶー　 ]+$/.test(name); }
    function maskBlockedTerms(name){ let masked=normalizeText(name); BLOCKED_TERMS.forEach(term=>{ const re=new RegExp(escapeRegExp(normalizeText(term)),'g'); masked=masked.replace(re,m=>'＊'.repeat(m.length)); }); return masked; }
    function randomTeamId(){ return 'team_'+Date.now()+'_'+Math.random().toString(36).slice(2,7); }
    function showToast(win,msg){ try{ if(typeof win.showToast==='function') win.showToast(msg); }catch{} }
    function teamsArray(state){ const teams=state && state.teams ? Object.entries(state.teams).map(([id,v])=>({id,...v})) : []; teams.sort((a,b)=>((a.rank||0)-(b.rank||0))||((a.joinedAt||0)-(b.joinedAt||0))); return teams; }
    function getQuestionKey(state){ return String((state && state.game && state.game.currentQuestion) || 1); }
    function snapshotRanks(state){ const next={}; Object.entries((state&&state.teams)||{}).forEach(([id,team])=>{ next[id]=Number(team&&team.rank?team.rank:0); }); frozenRanks=next; frozenQuestionKey=getQuestionKey(state); }
    function maybeFreeze(state){ const status=state&&state.game?state.game.status:''; const key=getQuestionKey(state); if(!frozenQuestionKey){ snapshotRanks(state); return; } if((status==='registration'||status==='question_open')&&key!==frozenQuestionKey){ snapshotRanks(state); } }

    function openMode(mode){
      selectedMode=mode;
      launcher.classList.add('hidden');
      viewer.style.display='block';
      viewer.src='./kakuzuke-check-realtime-v46.html?ts='+Date.now();
    }

    document.getElementById('openTeam').addEventListener('click',()=>openMode('team'));
    document.getElementById('openHost').addEventListener('click',()=>{
      const pw=window.prompt('パスワードを入力してください');
      if(pw!==ACCESS_PASSWORD) return;
      openMode('host');
    });

    function ensureStyle(doc){
      if(doc.getElementById('v69-style')) return;
      const style=doc.createElement('style');
      style.id='v69-style';
      style.textContent=`
        #screen-launcher,#screen-display,[data-mode="display"],.small-actions,.team-rereg,#host-reset-current{display:none !important;}
        .v69-answer-wrap{overflow-x:auto;width:100%}
        .v69-host-grid{display:grid;grid-template-columns:1.3fr 1fr;gap:10px;min-width:520px}
        .v69-head,.v69-cell{padding:16px 12px;border-radius:18px;border:1px solid rgba(255,223,127,.20);background:linear-gradient(180deg,#181818,#101010);text-align:center;font-size:18px;white-space:nowrap}
        .v69-head{font-weight:900;background:linear-gradient(180deg,#232323,#111)}
        .v69-rank{font-weight:900}
        .v69-rank.rank0{background:linear-gradient(180deg,#fff2b2,#daa925);color:#2f1d00}
        .v69-rank.rank1{background:linear-gradient(180deg,#fcfcfc,#d8d8d8);color:#222}
        .v69-rank.rank2{background:linear-gradient(180deg,#2f88f0,#1258a9);color:#fff}
        .v69-rank.rank3{background:linear-gradient(180deg,#f9f9f9,#d8d8d8);color:#222}
        .v69-rank.rank4{background:linear-gradient(180deg,#4a3211,#2c1d09);color:#f0dbb2}
        .v69-rank.rank5{background:linear-gradient(180deg,#141414,#000);color:#ff5353}
        .v69-wait-note{margin:14px auto 0;max-width:560px;padding:14px 16px;border-radius:16px;background:linear-gradient(180deg,#1c1c1c,#101010);border:1px solid rgba(255,223,127,.18);color:#fff0b4;text-align:center;font-weight:900;letter-spacing:.04em}
        .v69-rank-stage{margin-top:16px;padding:20px 18px 22px;border-radius:24px;border:1px solid rgba(255,223,127,.24);background:radial-gradient(circle at 50% 0%,rgba(255,244,196,.34),transparent 38%),linear-gradient(180deg,#2b2317 0%,#111111 55%,#1a1712 100%);box-shadow:inset 0 0 0 1px rgba(255,255,255,.04),0 18px 30px rgba(0,0,0,.28);text-align:center}
        .v69-rank-eyebrow{font-size:12px;letter-spacing:.26em;color:#e7d49f;font-weight:900}
        .v69-rank-main{margin-top:10px;font-size:clamp(42px,9vw,68px);line-height:1.02;font-weight:900;color:#fff6cf;text-shadow:0 2px 0 rgba(255,255,255,.20),0 8px 18px rgba(0,0,0,.34);font-family:"Yu Mincho","Hiragino Mincho ProN",serif}
        .v69-rank-sub{margin-top:8px;font-size:22px;font-weight:900;color:#f2dfac;letter-spacing:.04em}
        .v69-rank-line{margin:14px auto 0;width:72%;height:2px;background:linear-gradient(90deg,transparent,rgba(255,223,127,.68),transparent)}
        .v69-final-simple .result-detail{display:none !important}
        @media (max-width:900px){ .v69-head,.v69-cell{font-size:16px;padding:14px 10px} }
      `;
      doc.head.appendChild(style);
    }

    function showOnly(doc,id){
      ['screen-host','screen-team-register','screen-team-waiting','screen-team-question','screen-team-answered','screen-team-result','screen-firebase-error'].forEach(key=>{
        const el=doc.getElementById(key);
        if(el) el.classList.toggle('active', key===id);
      });
    }

    function renderHostAnswerGrid(doc,state){
      const grid=doc.getElementById('host-answer-grid');
      if(!grid) return;
      const teams=teamsArray(state);
      grid.innerHTML='';
      const wrap=doc.createElement('div');
      wrap.className='v69-answer-wrap';
      const table=doc.createElement('div');
      table.className='v69-host-grid';
      table.innerHTML='<div class="v69-head">チーム名</div><div class="v69-head">現在のランク</div>';
      teams.forEach(team=>{
        const shownRank=(state.game.status==='question_open'||state.game.status==='judging') && frozenRanks[team.id]!==undefined ? frozenRanks[team.id] : (team.rank||0);
        const name=doc.createElement('div'); name.className='v69-cell'; name.textContent=team.name;
        const rank=doc.createElement('div'); rank.className='v69-cell v69-rank rank'+shownRank; rank.textContent=rankNames[shownRank];
        table.appendChild(name); table.appendChild(rank);
      });
      wrap.appendChild(table);
      grid.appendChild(wrap);
    }

    function updateWaitingPremium(doc,myTeam){
      const waiting=doc.getElementById('screen-team-waiting'); if(!waiting) return;
      const stack=waiting.querySelector('.stack'); if(!stack) return;
      const namePill=doc.getElementById('team-current-name-pill'); if(namePill) namePill.textContent='チーム名：'+myTeam.name;
      const rankPill=doc.getElementById('team-current-rank-pill'); if(rankPill) rankPill.textContent='現在のランク：'+rankNames[myTeam.rank||0];
      let note=waiting.querySelector('.v69-wait-note'); if(!note){ note=doc.createElement('div'); note.className='v69-wait-note'; note.textContent='登録されました'; const box=waiting.querySelector('.waiting-box'); if(box) box.insertAdjacentElement('afterend',note); }
      if(rankPill) rankPill.style.display='none';
      let stage=waiting.querySelector('.v69-rank-stage'); if(!stage){ stage=doc.createElement('div'); stage.className='v69-rank-stage'; stage.innerHTML='<div class="v69-rank-eyebrow">YOUR CURRENT RANK</div><div class="v69-rank-main"></div><div class="v69-rank-line"></div><div class="v69-rank-sub"></div>'; stack.appendChild(stage); }
      let short='一流'; const full=rankNames[myTeam.rank||0]; if(full.includes('普通'))short='普通'; else if(full.includes('二流'))short='二流'; else if(full.includes('三流'))short='三流'; else if(full.includes('そっくり'))short='そっくり'; else if(full.includes('映す価値なし'))short='映す価値なし';
      stage.querySelector('.v69-rank-main').textContent=short; stage.querySelector('.v69-rank-sub').textContent=full;
    }

    function routeTeam(doc,state){
      const teamId=localStorage.getItem('kakuzukeRealtimeTeamId')||''; if(!teamId) return showOnly(doc,'screen-team-register');
      const team=(state.teams||{})[teamId]; if(!team) return showOnly(doc,'screen-team-register');
      const questionTitle=doc.getElementById('team-question-title'); const questionText=doc.getElementById('team-question-text');
      if(questionTitle) questionTitle.textContent='第'+((state.game&&state.game.currentQuestion)||1)+'問';
      if(questionText) questionText.textContent=(state.game&&state.game.question&&state.game.question.text)||'高級品はどっち？';
      const doorC=doc.getElementById('team-door-c'); if(doorC) doorC.style.display=(state.game&&state.game.question&&state.game.question.choiceMode)==='3' ? '' : 'none';
      ['A','B','C'].forEach(choice=>{ const el=doc.getElementById('team-door-'+choice.toLowerCase()); if(el) el.classList.toggle('selected', team.answer===choice); });
      const shownRank=(state.game.status==='question_open'||state.game.status==='judging') && frozenRanks[teamId]!==undefined ? frozenRanks[teamId] : (team.rank||0);
      const currentName=doc.getElementById('team-current-name-pill'); if(currentName) currentName.textContent='チーム名：'+team.name;
      const currentRank=doc.getElementById('team-current-rank-pill'); if(currentRank) currentRank.textContent='現在のランク：'+rankNames[shownRank];
      const answeredName=doc.getElementById('team-answered-name-pill'); if(answeredName) answeredName.textContent='チーム名：'+team.name;
      const answeredAnswer=doc.getElementById('team-answered-answer-pill'); if(answeredAnswer) answeredAnswer.textContent='今回の回答：'+(team.answer||'---');
      const answeredRank=doc.getElementById('team-answered-rank-pill'); if(answeredRank) answeredRank.textContent='現在のランク：'+rankNames[shownRank];
      updateWaitingPremium(doc,{...team, rank:shownRank});

      if(state.game && state.game.showFinal){
        showOnly(doc,'screen-team-result');
        const panel=doc.querySelector('#screen-team-result .result-panel'); const main=doc.getElementById('team-result-main'); const sub=doc.getElementById('team-result-sub'); const detail=doc.getElementById('team-result-detail'); const rankMain=doc.getElementById('team-result-rank-main'); const rankSub=doc.getElementById('team-result-rank-sub'); const label=doc.querySelector('.result-rank-label');
        if(panel&&main&&sub&&detail&&rankMain&&rankSub&&label){ panel.classList.add('v69-final-simple'); main.className='result-main result-correct'; main.textContent='最終結果'; sub.className='result-sub result-correct'; sub.textContent=team.name; detail.textContent=''; label.textContent='YOUR FINAL RANK'; rankMain.textContent=rankShort[team.rank||0]; rankSub.textContent=rankNames[team.rank||0]; }
        return;
      }
      const status=state.game?state.game.status:'registration';
      if(status==='registration') return showOnly(doc,'screen-team-waiting');
      if(status==='question_open') return showOnly(doc, team.answer?'screen-team-answered':'screen-team-question');
      if(status==='judging') return showOnly(doc, team.answer?'screen-team-answered':'screen-team-question');
      showOnly(doc,'screen-team-result');
    }

    async function patchedRegister(doc,win){
      const input=doc.getElementById('team-name-input'); const error=doc.getElementById('team-register-error'); if(!input||!error) return;
      error.classList.add('hidden'); error.textContent='';
      const raw=sanitizeTeamName(input.value); if(!raw){ error.classList.remove('hidden'); error.textContent='チーム名を入力してください。'; return; }
      if(!isKanaOnly(raw)){ error.classList.remove('hidden'); error.textContent='ひらがな または カタカナのみ入力できます。'; return; }
      const finalName=maskBlockedTerms(raw); const savedId=localStorage.getItem('kakuzukeRealtimeTeamId')||'';
      try{
        const result=await runTransaction(roomRef,state=>{ if(!state) return state; if(!state.game||state.game.status!=='registration') return state; const teams=state.teams||{}; const dup=Object.values(teams).some(t=>String(t.name||'').trim()===finalName); if(dup){ state.__dup__=true; return state; } if(Object.keys(teams).length>=40){ state.__full__=true; return state; } const teamId=savedId||randomTeamId(); teams[teamId]={name:finalName,rank:0,answer:'',joinedAt:Date.now(),lastOutcome:''}; state.teams=teams; state.meta=state.meta||{}; state.meta.updatedAt=Date.now(); return state; });
        const state=result.snapshot.val()||{}; if(state.__dup__){ error.classList.remove('hidden'); error.textContent='同じチーム名は登録できません。'; return; } if(state.__full__){ error.classList.remove('hidden'); error.textContent='参加上限に達しました。'; return; }
        const found=Object.entries(state.teams||{}).find(([,v])=>v&&v.name===finalName); if(found){ localStorage.setItem('kakuzukeRealtimeTeamId',found[0]); showToast(win,'参加登録が完了しました'); routeTeam(doc,state); }
      }catch(e){ console.error(e); error.classList.remove('hidden'); error.textContent='参加登録に失敗しました。'; }
    }

    async function patchedShowFinal(win){
      try{
        await runTransaction(roomRef,state=>{ if(!state) return state; state.game=state.game||{}; state.game.showFinal=true; state.game.status='judged'; state.meta=state.meta||{}; state.meta.updatedAt=Date.now(); return state; });
        showToast(win,'最終結果を表示しました');
      }catch(e){ console.error(e); }
    }

    function bindButtons(doc,win){
      const teamBtn=doc.getElementById('team-register-btn');
      if(teamBtn && !teamBtn.dataset.v69){ teamBtn.dataset.v69='1'; teamBtn.addEventListener('click',e=>{ e.preventDefault(); e.stopImmediatePropagation(); patchedRegister(doc,win); }, true); }
      const finalBtn=doc.getElementById('host-show-final');
      if(finalBtn && !finalBtn.dataset.v69){ finalBtn.dataset.v69='1'; finalBtn.addEventListener('click',e=>{ e.preventDefault(); e.stopImmediatePropagation(); patchedShowFinal(win); }, true); }
    }

    function applyAll(doc,win,state){
      ensureStyle(doc);
      latestState=state;
      maybeFreeze(state);
      bindButtons(doc,win);
      if(selectedMode==='host') showOnly(doc,'screen-host');
      if(selectedMode==='team') routeTeam(doc,state);
      renderHostAnswerGrid(doc,state);
      const displayScreen=doc.getElementById('screen-display'); if(displayScreen) displayScreen.remove();
    }

    viewer.addEventListener('load',()=>{
      const win=viewer.contentWindow; const doc=viewer.contentDocument; if(!doc) return;
      onValue(roomRef,snapshot=>{ const state=snapshot.val()||{}; applyAll(doc,win,state); });
      const observer=new MutationObserver(()=>{ if(latestState) applyAll(doc,win,latestState); });
      observer.observe(doc.body,{childList:true,subtree:true,characterData:true});
    });
  </script>
</body>
</html>
