<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>もし君が市長なら？</title><style>*{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;background:#f4f1ea;color:#222}.wrap{max-width:900px;margin:0 auto;padding:20px}.card{background:#fff;border:3px solid #222;border-radius:18px;padding:22px;box-shadow:6px 6px 0 #222;margin-bottom:18px}h1,h2,h3{margin-top:0}h1{font-size:30px}p{line-height:1.7}button{width:100%;border:3px solid #222;background:#fff;color:#222;border-radius:14px;padding:16px;margin:8px 0;font-size:17px;font-weight:700;cursor:pointer;box-shadow:4px 4px 0 #222;text-align:left}button:active{transform:translate(3px,3px);box-shadow:1px 1px 0 #222}.mainbtn{background:#ffe35b;text-align:center;font-size:18px}.subbtn{background:#dff2ff;text-align:center}.danger{background:#ffd6d6;text-align:center}.hidden{display:none}.meterBox{margin:12px 0}.meterLabel{display:flex;justify-content:space-between;font-weight:700;margin-bottom:4px}.meter{height:18px;border:2px solid #222;border-radius:999px;overflow:hidden;background:#eee}.bar{height:100%;width:50%;background:#ffe35b}.choiceResult{background:#f8f8f8;border:2px solid #222;border-radius:12px;padding:14px;margin-top:12px}.small{font-size:14px;color:#444}textarea,input{width:100%;border:2px solid #222;border-radius:10px;padding:10px;font-size:15px;margin:4px 0 10px;font-family:inherit}@media(max-width:640px){.wrap{padding:12px}.card{padding:16px;box-shadow:4px 4px 0 #222}h1{font-size:24px}button{font-size:16px;padding:14px}}</style></head><body><div class="wrap"><div id="home" class="card"><h1>もし君が市長なら？</h1><p>あなたは今日から市長です。限られた予算の中で、街をよくする判断をしてください。</p><p class="small">正解・不正解はありません。大切なのは「何を優先したか」です。</p><button class="mainbtn" onclick="startGame()">生徒としてプレイ</button><button class="subbtn" onclick="showDashboard()">教員用ダッシュボード</button></div><div id="game" class="card hidden"><p id="qCount" class="small"></p><h2 id="qText"></h2><div id="choices"></div><div id="result" class="choiceResult hidden"></div><button id="nextBtn" class="mainbtn hidden" onclick="nextQuestion()">次へ</button><button class="subbtn" onclick="backHome()">トップに戻る</button></div><div id="final" class="card hidden"><h2>最終結果</h2><h3 id="finalTitle"></h3><p id="finalText"></p><div id="finalMeters"></div><button class="mainbtn" onclick="submitClassResult()">クラス集計に送信</button><button class="subbtn" onclick="startGame()">もう一度プレイ</button><button class="subbtn" onclick="backHome()">トップに戻る</button></div><div id="dashboard" class="card hidden"><h2>教員用ダッシュボード</h2><p class="small">この簡易版は、同じ端末内に送信された結果を集計します。</p><div id="dashContent"></div><button class="danger" onclick="resetClassData()">集計をリセット</button><button class="subbtn" onclick="backHome()">トップに戻る</button></div></div><script>var questions=[{q:"市の予算に少し余裕が出ました。何に使いますか？",c:[{t:"学校の設備をよくする",r:"若者や子育て世帯の満足度が上がりました。ただし、すぐに効果が見えにくいという声もあります。",voice:"高校生：自習室や設備がよくなるのはありがたい。",s:{young:15,elder:-3,child:10,money:-10,safety:0,fair:5}},{t:"高齢者支援を増やす",r:"高齢者の安心感が上がりました。一方で、若い世代からは自分たちへの支援も必要という声が出ました。",voice:"高齢者：生活の不安が少し減った。",s:{young:-6,elder:18,child:0,money:-10,safety:2,fair:5}},{t:"防災対策を強化する",r:"災害への備えが進みました。普段は目立ちませんが、街全体の安心につながります。",voice:"住民：すぐ楽しくはならないけど、必要なことだと思う。",s:{young:0,elder:5,child:5,money:-12,safety:20,fair:6}},{t:"税金を下げる",r:"市民の負担は軽くなりました。ただし、使える予算が減り、将来のサービス低下が心配されています。",voice:"会社員：手元のお金が増えるのは助かる。",s:{young:3,elder:0,child:0,money:12,safety:-5,fair:-4}}]},{q:"若者の投票率が低いです。どうしますか？",c:[{t:"SNSで選挙情報を発信する",r:"若者に情報が届きやすくなりました。ただし、短い情報だけで判断してしまう危険もあります。",voice:"高校生：SNSなら見るかもしれない。",s:{young:14,elder:-2,child:0,money:-4,safety:0,fair:2}},{t:"学校で模擬選挙を行う",r:"政治を体験する機会が増えました。準備には先生や学校の負担もあります。",voice:"先生：準備は大変だけど、学びは大きい。",s:{young:10,elder:0,child:6,money:-6,safety:0,fair:7}},{t:"駅前に投票所を増やす",r:"投票しやすくなりました。便利になる一方で、運営費がかかります。",voice:"住民：駅前で投票できるなら行きやすい。",s:{young:8,elder:5,child:0,money:-8,safety:0,fair:6}},{t:"特に対策しない",r:"予算は使わずに済みましたが、若者の声が政治に届きにくい状態が続きました。",voice:"高校生：どうせ自分たちは見られてない気がする。",s:{young:-12,elder:2,child:0,money:6,safety:0,fair:-8}}]},{q:"学校のスマホルールを変えたいという声が出ました。どうしますか？",c:[{t:"すぐ自由化する",r:"生徒の自由度は上がりました。ただし、授業中の使い方を心配する声も出ました。",voice:"生徒：信じてもらえるのはうれしい。",s:{young:18,elder:-5,child:0,money:0,safety:-4,fair:-2}},{t:"一部の時間だけ認める",r:"自由と秩序のバランスを取りました。ただし、もっと自由にしてほしいという声もあります。",voice:"生徒：少しでも使えるなら前よりいい。",s:{young:10,elder:2,child:0,money:0,safety:2,fair:5}},{t:"生徒・先生・保護者で話し合う",r:"決定まで時間はかかりましたが、納得感のあるルールづくりにつながりました。",voice:"保護者：話し合って決めるなら安心できる。",s:{young:8,elder:5,child:4,money:-2,safety:3,fair:15}},{t:"今のルールを維持する",r:"混乱は避けられました。一方で、生徒からは意見を聞いてもらえないという不満が出ました。",voice:"生徒：結局、何も変わらないんだと思った。",s:{young:-14,elder:5,child:0,money:3,safety:5,fair:-8}}]},{q:"駅前に大型商業施設を誘致する案があります。どうしますか？",c:[{t:"すぐ進める",r:"街のにぎわいと税収が増えました。ただし、地元商店街から不安の声が出ています。",voice:"商店街：大型店にお客さんを取られないか不安。",s:{young:15,elder:-5,child:5,money:12,safety:-2,fair:-8}},{t:"地元商店街の意見を聞く",r:"進行は遅くなりましたが、地域の納得感は高まりました。",voice:"店主：最初から話を聞いてくれるなら考えたい。",s:{young:3,elder:8,child:0,money:3,safety:0,fair:12}},{t:"環境への影響を調べる",r:"慎重な判断ができるようになりました。ただし、調査費と時間がかかります。",voice:"住民：あとで後悔しないために調査は必要。",s:{young:0,elder:4,child:4,money:-5,safety:6,fair:8}},{t:"反対する",r:"静かな環境は守られましたが、経済成長の機会を逃したという意見も出ました。",voice:"若者：遊ぶ場所が増えると思ったのに残念。",s:{young:-10,elder:8,child:0,money:-8,safety:4,fair:0}}]},{q:"多数の市民はイベント開催に賛成していますが、近隣住民から騒音への不安が出ています。どうしますか？",c:[{t:"多数派が賛成なので開催する",r:"イベントは盛り上がりました。ただし、近隣住民の不満が強まりました。",voice:"近隣住民：少数派の声は無視されるのか。",s:{young:12,elder:-10,child:5,money:6,safety:-5,fair:-15}},{t:"中止する",r:"騒音問題は避けられました。ただし、楽しみにしていた人から不満が出ました。",voice:"高校生：せっかく楽しみにしていたのに。",s:{young:-12,elder:8,child:-3,money:-5,safety:5,fair:-2}},{t:"時間や音量のルールを決めて開催する",r:"賛成派と不安を持つ人の両方に配慮しました。完全な満足ではありませんが、納得は広がりました。",voice:"住民：ルールがあるなら受け入れやすい。",s:{young:8,elder:5,child:5,money:3,safety:4,fair:16}},{t:"近隣住民だけに補助金を出す",r:"一部の不満は減りましたが、お金で解決するのは公平なのかという疑問も出ました。",voice:"市民：なぜ一部の人だけ補助されるの？",s:{young:3,elder:3,child:0,money:-10,safety:0,fair:-6}}]}];var index=0,score={young:50,elder:50,child:50,money:50,safety:50,fair:50},lastType="";function hideAll(){["home","game","final","dashboard"].forEach(function(id){document.getElementById(id).classList.add("hidden")})}function backHome(){hideAll();document.getElementById("home").classList.remove("hidden")}function clamp(n){return Math.max(0,Math.min(100,n))}function startGame(){index=0;score={young:50,elder:50,child:50,money:50,safety:50,fair:50};hideAll();document.getElementById("game").classList.remove("hidden");renderQuestion()}function renderQuestion(){var q=questions[index];document.getElementById("qCount").textContent="第"+(index+1)+"問 / "+questions.length+"問";document.getElementById("qText").textContent=q.q;document.getElementById("result").classList.add("hidden");document.getElementById("nextBtn").classList.add("hidden");var box=document.getElementById("choices");box.innerHTML="";for(var i=0;i<q.c.length;i++){var btn=document.createElement("button");btn.textContent=["A：","B：","C：","D："][i]+q.c[i].t;btn.setAttribute("onclick","chooseAnswer("+i+")");box.appendChild(btn)}}function chooseAnswer(i){var item=questions[index].c[i];Object.keys(item.s).forEach(function(k){score[k]=clamp(score[k]+item.s[k])});document.getElementById("choices").innerHTML="";document.getElementById("result").classList.remove("hidden");document.getElementById("result").innerHTML="<h3>結果</h3><p>"+item.r+"</p><h3>市民の声</h3><p>"+item.voice+"</p>"+makeMeters(score);document.getElementById("nextBtn").classList.remove("hidden")}function nextQuestion(){index++;if(index>=questions.length){showFinal()}else{renderQuestion()}}function makeMeters(obj){var names={young:"若者満足度",elder:"高齢者満足度",child:"子育て満足度",money:"財政",safety:"安全・防災",fair:"公平性"};var html="";Object.keys(names).forEach(function(k){html+='<div class="meterBox"><div class="meterLabel"><span>'+names[k]+'</span><span>'+obj[k]+'</span></div><div class="meter"><div class="bar" style="width:'+obj[k]+'%"></div></div></div>'});return html}function getType(){if(score.young>=68)return["若者チャレンジ都市","若者の声を重視し、新しい取り組みに積極的な街です。勢いはありますが、他世代への配慮も課題です。"];if(score.elder>=68)return["安心福祉都市","高齢者や生活の安心を重視する街です。安定感はありますが、若い世代の満足度にも注意が必要です。"];if(score.safety>=68)return["防災重視都市","災害や安全への備えを重視する街です。派手さはありませんが、暮らしの土台が強い街です。"];if(score.money>=68)return["財政再建都市","お金の使い方に慎重な街です。将来への備えは強い一方、今困っている人への支援が弱くなる場合があります。"];if(score.fair>=68)return["合意形成都市","話し合いと納得感を重視する街です。時間はかかりますが、少数意見を大切にできます。"];return["バランス都市","大きな偏りなく街を運営しました。突出した強みは少ない一方で、多くの立場に配慮できています。"]}function showFinal(){hideAll();document.getElementById("final").classList.remove("hidden");var t=getType();lastType=t[0];document.getElementById("finalTitle").textContent=t[0];document.getElementById("finalText").textContent=t[1];document.getElementById("finalMeters").innerHTML=makeMeters(score)}function submitClassResult(){var data=JSON.parse(localStorage.getItem("mayor_class_data")||"[]");data.push({type:lastType,score:score,time:new Date().toISOString()});localStorage.setItem("mayor_class_data",JSON.stringify(data));alert("送信しました。教員用ダッシュボードで確認できます。")}function showDashboard(){hideAll();document.getElementById("dashboard").classList.remove("hidden");var data=JSON.parse(localStorage.getItem("mayor_class_data")||"[]");var html="<p>送信数："+data.length+"件</p>";if(data.length===0){html+="<p>まだ集計データがありません。</p>"}else{var count={};data.forEach(function(d){count[d.type]=(count[d.type]||0)+1});html+="<h3>街タイプ集計</h3>";Object.keys(count).forEach(function(k){var pct=Math.round(count[k]/data.length*100);html+='<div class="meterBox"><div class="meterLabel"><span>'+k+'</span><span>'+count[k]+'人 / '+pct+'%</span></div><div class="meter"><div class="bar" style="width:'+pct+'%"></div></div></div>'});var avg={young:0,elder:0,child:0,money:0,safety:0,fair:0};data.forEach(function(d){Object.keys(avg).forEach(function(k){avg[k]+=d.score[k]})});Object.keys(avg).forEach(function(k){avg[k]=Math.round(avg[k]/data.length)});html+="<h3>クラス平均</h3>"+makeMeters(avg)}document.getElementById("dashContent").innerHTML=html}function resetClassData(){if(confirm("集計データをリセットしますか？")){localStorage.removeItem("mayor_class_data");showDashboard()}}</script></body></html>
