<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>ルネ高進路対策navi v11</title>
<style>
:root{--panel:#fff;--line:#d7e3f3;--text:#233249;--muted:#62738a;--brand:#2f6fd0;--brand2:#6aa9ff;--chip:#eef4ff;--shadow:0 12px 28px rgba(51,102,184,.13);--radius:16px;--w:390px;--warn:#b7791f;--ok:#2d7a51;--danger:#b44}*{box-sizing:border-box}html,body{margin:0;padding:0}body{background:linear-gradient(180deg,#e7f1ff 0,#f7fbff 180px,#f7fbff 100%);color:var(--text);font-family:"BIZ UDPGothic","Hiragino Sans","Yu Gothic","Meiryo",sans-serif}button,input,select,textarea{font:inherit}button{cursor:pointer}h1,h2,h3,h4,p{margin:0}a{color:inherit}.app{width:min(100vw,var(--w));margin:0 auto;min-height:100vh;padding-bottom:24px}.header{padding:14px 14px 10px;background:linear-gradient(135deg,var(--brand),var(--brand2));color:#fff;box-shadow:0 8px 24px rgba(47,111,208,.22)}.brand-small{font-size:11px;font-weight:700;opacity:.92;letter-spacing:.04em}.brand-row{display:flex;justify-content:space-between;gap:10px;align-items:flex-end;margin-top:5px}.brand{font-size:22px;line-height:1.1;font-weight:800;letter-spacing:.01em}.role-badge{font-size:12px;font-weight:700;padding:6px 10px;border-radius:999px;background:rgba(255,255,255,.18);white-space:nowrap}.header-tools{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}.segment{display:flex;gap:6px;padding:5px;border-radius:999px;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.18)}.segment button{border:none;border-radius:999px;padding:8px 12px;background:transparent;color:#fff;font-weight:700;font-size:12px}.segment button.active{background:#fff;color:var(--brand)}.wrap{padding:12px}.mode-tabs,.nav{display:grid;gap:8px;margin-bottom:12px}.mode-tabs{grid-template-columns:repeat(3,1fr)}.nav.student{grid-template-columns:repeat(5,1fr)}.nav.teacher{grid-template-columns:repeat(4,1fr)}.mode-tabs button,.nav button{border:1px solid var(--line);border-radius:14px;background:linear-gradient(180deg,#fff,#f7fbff);min-height:54px;padding:8px 4px;font-size:11px;font-weight:700;color:var(--text)}.mode-tabs button.active,.nav button.active{background:linear-gradient(135deg,#edf5ff,#dfeeff);color:var(--brand);border-color:#bed3ef;box-shadow:0 8px 18px rgba(106,169,255,.16)}.panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;margin-bottom:12px}.panel-head{padding:12px 14px;border-bottom:1px solid var(--line);background:linear-gradient(180deg,#fff,#f6faff);display:flex;align-items:center;justify-content:space-between;gap:8px}.panel-title{font-size:15px;font-weight:800;color:var(--brand)}.panel-body{padding:12px 14px}.compact{font-size:12px;line-height:1.65;color:var(--muted)}.row{display:flex;align-items:center;justify-content:space-between;gap:8px}.help-inline{display:flex;align-items:center;gap:6px;min-width:0;flex-wrap:wrap}.help-btn{flex:0 0 auto;width:22px;height:22px;border:none;border-radius:999px;background:linear-gradient(135deg,#ecf4ff,#d8e8ff);color:var(--brand);font-size:12px;font-weight:800;box-shadow:0 4px 10px rgba(106,169,255,.18)}.chip{display:inline-flex;align-items:center;padding:5px 8px;border-radius:999px;background:var(--chip);font-size:11px;font-weight:700;color:#334155}.chip.warn{background:#fff4df;color:#8a5b00}.chip.ok{background:#eaf7ef;color:#175f38}.chip.draft{background:#f1f3f7;color:#4b5563}.filters,.form-grid,.list,.action-list,.compare-grid,.detail-grid{display:grid;gap:8px}.item{border:1px solid var(--line);border-radius:14px;padding:10px;background:linear-gradient(180deg,#fff,#f9fbff)}.item-title{font-size:13px;font-weight:700}.item-sub{font-size:12px;color:var(--muted);line-height:1.6;margin-top:4px}.small-btn{border:1px solid #bdd0ea;background:#fff;border-radius:10px;padding:7px 9px;font-size:12px;font-weight:700;color:#334155}.small-btn.primary{background:linear-gradient(135deg,var(--brand),var(--brand2));border-color:var(--brand);color:#fff}.small-btn.danger{color:var(--danger)}.note{border:1px solid #d7e6f6;background:linear-gradient(135deg,#f3f8ff,#eef7ff);border-radius:14px;padding:11px 12px;font-size:12px;line-height:1.7;color:#3c5878}.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.stat{background:linear-gradient(180deg,#fff,#f8fbff);border:1px solid var(--line);border-radius:14px;padding:10px}.stat .label{font-size:11px;color:var(--muted)}.stat .value{font-size:18px;font-weight:800;color:var(--brand);margin-top:4px}input,select,textarea{width:100%;border:1px solid #bfd1ea;background:#fff;border-radius:12px;padding:9px 10px;color:var(--text)}textarea{min-height:84px;resize:vertical}.field{display:grid;gap:5px}.field label{font-size:12px;font-weight:700;color:#334155}.linkline{font-size:12px;color:var(--brand);text-decoration:underline;word-break:break-all}.compare-grid{grid-template-columns:1fr}.compare-card{border:1px solid var(--line);border-radius:14px;padding:10px;background:#fff}.compare-card .head{display:flex;justify-content:space-between;gap:8px;align-items:flex-start}.compare-table .line{padding:7px 0;border-top:1px solid #eef2f7;font-size:12px;line-height:1.6}.compare-table .label{font-weight:700;color:#40536d;display:block}.detail-grid .line{padding:8px 0;border-top:1px solid #eef2f7;font-size:12px;line-height:1.7}.detail-grid .label{font-weight:700;color:#40536d;display:block}.help-sheet{position:fixed;left:50%;bottom:max(10px, env(safe-area-inset-bottom));transform:translateX(-50%);width:min(calc(100vw - 16px), 358px);background:#fff;border:1px solid #cfe0f7;border-radius:18px;box-shadow:0 18px 40px rgba(46,92,168,.22);padding:12px 14px 14px;z-index:60;display:none}.help-sheet.show{display:block}.help-sheet-top{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:8px}.help-sheet h3{font-size:14px;color:var(--brand)}.help-sheet p{font-size:12px;line-height:1.75;color:#334155;white-space:pre-wrap}.overlay{position:fixed;inset:0;background:rgba(21,38,67,.16);z-index:50;display:none}.overlay.show{display:block}.close-x{border:none;background:#eef4ff;color:var(--brand);border-radius:999px;width:24px;height:24px;font-weight:800}hr.sep{border:none;border-top:1px solid var(--line);margin:10px 0}@media (min-width:391px){.app{box-shadow:0 0 0 1px rgba(207,224,247,.7)}}
</style>
</head>
<body>
<div id="app"></div>
<div id="overlay" class="overlay" onclick="closeHelp()"></div>
<div id="helpSheet" class="help-sheet" aria-live="polite"><div class="help-sheet-top"><h3>説明</h3><button class="close-x" onclick="closeHelp()">×</button></div><p id="helpText"></p></div>
<script>
const STORAGE_KEY='rene_navi_public_v11';const MODES={sougou:'総合型',suisen:'推薦',general:'一般',senmon:'専門',job:'就職'};const YEARS=['2026','2027','2028'];const MODE_HELP={sougou:'活動・探究・志望理由・面接準備を軸に進める方式です。自分の経験や学びをどう語るかが重要になります。',suisen:'評定・欠席・校内締切・推薦条件の確認が中心になる方式です。条件確認を先に行う必要があります。',general:'科目学習・模試・出願日程・併願戦略を中心に進める方式です。学力と日程整理が中心です。',senmon:'学校比較・学費・体験入学・出願準備が中心です。学校ごとの差を比較しやすくすることが重要です。',job:'求人比較・履歴書・面接・会社研究が中心です。仕事内容や雇用形態の違いを整理して見る使い方を想定しています。'};const PAGE_HELP={student_top:'学校側が整理した公開情報の入口です。まず方式を選び、次に検索や比較へ進む想定です。',student_search:'公開されている学校・企業情報を条件で絞り込みます。個人情報は保存しません。',student_compare:'比較に追加した学校や企業を並べて見比べるページです。最大3件まで比較できます。',student_detail:'選択した学校や企業の公開情報を詳しく見るページです。最後は必ず公式ページも確認してください。',student_guide:'まずは受験方式の違いを理解するための説明ページです。',student_news:'この年度に更新された公開情報や学校からのお知らせを確認するページです。',teacher_dashboard:'公開件数、下書き件数、要確認件数を見て更新状況を把握します。',teacher_items:'学校情報の追加・修正・公開切替を行う画面です。情報源URLと更新日はできるだけ入力してください。',teacher_import:'CSV貼り付けまたはCSVファイルから一括取込を行う画面です。取り込んだデータは下書き扱いになります。',teacher_news:'生徒向けのお知らせを年度・方式ごとに管理する画面です。'};const FIELD_HELP={name:'学校名または企業名です。正式名称で入れると検索しやすくなります。',faculty:'大学の学部名です。ない場合は空欄で構いません。',department:'大学の学科名です。ない場合は空欄で構いません。',area:'地域名です。関西、大阪、京都など、学校内で表記をそろえると検索しやすくなります。',method:'入試方式の補足です。総合型A日程など、学校内で分かる表現にします。',ratingReq:'評定平均などの条件です。例: 3.8以上、不問。',englishReq:'英語資格条件です。例: 英検2級以上、不要。',exclusive:'専願か併願可かを入れます。',interview:'面接の有無や形式を入れます。例: 個人面接あり。',essay:'小論文の有無や字数を入れます。',applyPeriod:'出願時期や出願期間です。例: 9/1〜9/10。',examDate:'試験日です。複数ある場合は代表日か補足を入れます。',sourceUrl:'公式サイトや募集要項のURLです。公開前の確認元として重要です。',notes:'補足メモです。生徒に見せてもよい内容だけを入れます。',absenceReq:'欠席日数などの条件です。例: 3年間20日以内。',schoolDeadline:'校内締切です。学校内運用用の補足欄です。',subjects:'受験科目です。例: 英語・国語・日本史。',level:'難易度や目安です。例: 標準、やや高め。',course:'専門学校の学科・コース名です。',tuition:'学費の目安です。例: 初年度120万円。',trial:'体験入学やオープンキャンパス情報です。',jobType:'職種名です。例: 事務、販売、製造。',employment:'雇用形態です。例: 正社員、契約社員。',exam:'選考内容です。例: 書類・面接2回。',updatedAt:'その情報を最後に確認した日です。',published:'生徒向けに見せるかどうかの状態です。'};const CSV_HEADER_JA={name:'学校名・企業名',faculty:'学部',department:'学科',area:'地域',method:'方式',ratingReq:'評定条件',englishReq:'英語条件',exclusive:'専願/併願',interview:'面接',essay:'小論文',applyPeriod:'出願時期',examDate:'試験日',sourceUrl:'情報源URL',notes:'備考',absenceReq:'欠席条件',schoolDeadline:'校内締切',subjects:'受験科目',level:'目安',course:'学科・コース',tuition:'学費',trial:'体験入学',jobType:'職種',employment:'雇用形態',exam:'選考内容'};const CSV_HEADER_EN_BY_JA=Object.fromEntries(Object.entries(CSV_HEADER_JA).map(([en,ja])=>[ja,en]));const MODE_FIELDS={sougou:['name','faculty','department','area','method','ratingReq','englishReq','exclusive','interview','essay','applyPeriod','examDate','sourceUrl','notes'],suisen:['name','faculty','department','area','ratingReq','absenceReq','exclusive','schoolDeadline','interview','essay','applyPeriod','examDate','sourceUrl','notes'],general:['name','faculty','department','area','subjects','level','applyPeriod','examDate','sourceUrl','notes'],senmon:['name','course','area','tuition','trial','applyPeriod','sourceUrl','notes'],job:['name','jobType','area','employment','exam','applyPeriod','sourceUrl','notes']};const FIELD_LABELS={name:'学校名・企業名',faculty:'学部',department:'学科',area:'地域',method:'方式',ratingReq:'評定条件',englishReq:'英語条件',exclusive:'専願/併願',interview:'面接',essay:'小論文',applyPeriod:'出願時期',examDate:'試験日',sourceUrl:'情報源URL',notes:'備考',absenceReq:'欠席条件',schoolDeadline:'校内締切',subjects:'受験科目',level:'目安',course:'学科・コース',tuition:'学費',trial:'体験入学',jobType:'職種',employment:'雇用形態',exam:'選考内容'};const defaultData={year:'2026',modes:{sougou:{guide:'活動・探究・志望理由・面接準備を軸に進める方式です。',items:[]},suisen:{guide:'評定・欠席・校内締切・推薦条件の確認が中心になる方式です。',items:[]},general:{guide:'科目学習・模試・出願日程・併願戦略を中心に進める方式です。',items:[]},senmon:{guide:'学校比較・学費・体験入学・出願準備が中心です。',items:[]},job:{guide:'求人比較・履歴書・面接・会社研究が中心です。',items:[]}},announcements:[{id:'a1',year:'2026',mode:'sougou',title:'まずは方式理解から始める',body:'このアプリは個人情報を保存しません。学校側が整理した公開情報を見て、自分に合う方式や学校を探す前提です。',published:true,updatedAt:'2026-04-22'}]};let db=loadData();let state={role:'student',mode:'sougou',page:'top',year:db.year||'2026',search:'',area:'すべて',status:'published',editingId:null,csvText:'',detailId:null,compareIds:[]};function clone(v){return JSON.parse(JSON.stringify(v))}function loadData(){try{const v=JSON.parse(localStorage.getItem(STORAGE_KEY));if(v&&v.modes)return v}catch(e){}return clone(defaultData)}function saveData(){db.year=state.year;localStorage.setItem(STORAGE_KEY,JSON.stringify(db));const msg=document.getElementById('saveMsg');if(msg){msg.textContent='保存しました';msg.style.visibility='visible';clearTimeout(window.__timer);window.__timer=setTimeout(()=>msg.style.visibility='hidden',1500)}}function esc(v){return String(v??'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;')}function showHelp(text){document.getElementById('helpText').textContent=text||'';document.getElementById('helpSheet').classList.add('show');document.getElementById('overlay').classList.add('show')}function closeHelp(){document.getElementById('helpSheet').classList.remove('show');document.getElementById('overlay').classList.remove('show')}function helpBtn(text){return `<button class="help-btn" type="button" title="${esc(text)}" onclick="showHelp(${JSON.stringify(text)})">?</button>`}function setRole(role){state.role=role;state.page=role==='student'?'top':'dashboard';render()}function setMode(mode){state.mode=mode;state.page=state.role==='student'?'top':'dashboard';state.editingId=currentItems()[0]?.id||null;state.detailId=null;state.compareIds=[];render()}function setPage(page){state.page=page;render()}function setYear(year){state.year=year;render()}function currentItems(){return db.modes[state.mode].items.filter(x=>String(x.year||'')===String(state.year))}function currentItemById(id){return currentItems().find(x=>x.id===id)}function publishedItems(){return currentItems().filter(x=>!!x.published)}function filteredStudentItems(){return publishedItems().filter(x=>{const s=(state.search||'').trim().toLowerCase();const joined=Object.values(x).join(' ').toLowerCase();if(s&&!joined.includes(s))return false;if(state.area!=='すべて'&&(x.area||'')!==state.area)return false;return true})}function uniqueAreas(){return ['すべて',...new Set(publishedItems().map(x=>x.area).filter(Boolean))]}function header(){return `<div class="header"><div class="brand-small">個人情報を持たない進路情報配信アプリ</div><div class="brand-row"><div class="brand">ルネ高進路対策navi</div><div class="role-badge">${state.role==='student'?'生徒用':'教員用'}</div></div><div class="header-tools"><div class="segment"><button class="${state.role==='student'?'active':''}" onclick="setRole('student')">生徒用</button><button class="${state.role==='teacher'?'active':''}" onclick="setRole('teacher')">教員用</button></div></div></div>`}function modeTabs(){const order=['sougou','suisen','general','senmon','job'];return `<div class="mode-tabs">${order.map(k=>`<button class="${state.mode===k?'active':''}" onclick="setMode('${k}')">${MODES[k]}</button>`).join('')}</div>`}function navTabs(){if(state.role==='student'){return `<div class="nav student"><button class="${state.page==='top'?'active':''}" onclick="setPage('top')">トップ</button><button class="${state.page==='search'?'active':''}" onclick="setPage('search')">検索</button><button class="${state.page==='compare'?'active':''}" onclick="setPage('compare')">比較</button><button class="${state.page==='guide'?'active':''}" onclick="setPage('guide')">ガイド</button><button class="${state.page==='news'?'active':''}" onclick="setPage('news')">更新</button></div>`}return `<div class="nav teacher"><button class="${state.page==='dashboard'?'active':''}" onclick="setPage('dashboard')">管理</button><button class="${state.page==='items'?'active':''}" onclick="setPage('items')">データ</button><button class="${state.page==='import'?'active':''}" onclick="setPage('import')">CSV取込</button><button class="${state.page==='newsEdit'?'active':''}" onclick="setPage('newsEdit')">お知らせ</button></div>`}function yearSelect(){return `<select onchange="setYear(this.value)">${YEARS.map(y=>`<option value="${y}" ${state.year===y?'selected':''}>${y}年度</option>`).join('')}</select>`}function statusChip(v){return v?'<span class="chip ok">公開中</span>':'<span class="chip draft">下書き</span>'}function daysSince(dateStr){if(!dateStr)return null;const dt=new Date(dateStr);if(isNaN(dt))return null;return Math.floor((Date.now()-dt.getTime())/86400000)}function updateAgeChip(item){const days=daysSince(item.updatedAt);if(days===null)return '<span class="chip warn">日付未入力</span>';if(days>90)return '<span class="chip warn">要確認</span>';return '<span class="chip ok">確認済み目安</span>'}function summaryLine(item){const parts=[item.ratingReq,item.englishReq,item.exclusive,item.absenceReq,item.schoolDeadline,item.applyPeriod,item.examDate,item.tuition,item.employment,item.level].filter(Boolean);return parts.join(' / ')||'公開情報を確認してください'}function entitySubText(item){return [item.faculty,item.department,item.course,item.jobType,item.area,item.method,item.subjects].filter(Boolean).join(' / ')||'補足情報なし'}function compareContains(id){return state.compareIds.includes(id)}function toggleCompare(id){if(compareContains(id)){state.compareIds=state.compareIds.filter(x=>x!==id)}else{if(state.compareIds.length>=3){alert('比較は3件までです。');return;}state.compareIds.push(id)}render()}function openDetail(id){state.detailId=id;state.page='detail';render()}function backFromDetail(){state.page='search';render()}function itemCard(item,teacher){const url=item.sourceUrl?`<a class="linkline" href="${esc(item.sourceUrl)}" target="_blank" rel="noopener noreferrer">情報源を見る</a>`:'<div class="item-sub">情報源URL未登録</div>';return `<div class="item"><div class="row"><div class="item-title">${esc(item.name||'名称未入力')}</div>${teacher?statusChip(item.published):updateAgeChip(item)}</div><div class="item-sub">${esc(entitySubText(item))}</div><div class="item-sub">${esc(summaryLine(item))}</div><div style="margin-top:6px">${url}</div>${teacher?`<div style="margin-top:8px" class="row"><button class="small-btn ${state.editingId===item.id?'primary':''}" onclick="editItem('${item.id}')">編集</button><button class="small-btn danger" onclick="removeItem('${item.id}')">削除</button></div>`:`<div style="margin-top:8px" class="row"><button class="small-btn" onclick="openDetail('${item.id}')">詳細</button><button class="small-btn ${compareContains(item.id)?'primary':''}" onclick="toggleCompare('${item.id}')">${compareContains(item.id)?'比較中':'比較へ'}</button></div>`}</div>`}function studentTop(){const items=publishedItems().slice(0,4);const news=(db.announcements||[]).filter(x=>x.published&&x.year===state.year&&x.mode===state.mode).slice(0,3);return `<div class="panel"><div class="panel-head"><div class="help-inline"><div class="panel-title">${MODES[state.mode]}</div>${helpBtn(PAGE_HELP.student_top)}</div>${yearSelect()}</div><div class="panel-body"><div class="compact">学校側が整理した公開情報だけを表示します。個人情報は保存しません。</div><div class="stat-grid" style="margin-top:10px"><div class="stat"><div class="label">公開件数</div><div class="value">${publishedItems().length}</div></div><div class="stat"><div class="label">地域数</div><div class="value">${uniqueAreas().length-1}</div></div><div class="stat"><div class="label">比較中</div><div class="value">${state.compareIds.length}</div></div></div><div class="note" style="margin-top:10px">${MODE_HELP[state.mode]}</div></div></div><div class="panel"><div class="panel-head"><div class="panel-title">注目情報</div><button class="small-btn" onclick="setPage('search')">検索へ</button></div><div class="panel-body"><div class="list">${items.length?items.map(item=>itemCard(item,false)).join(''):'<div class="note">まだ公開データがありません。</div>'}</div></div></div><div class="panel"><div class="panel-head"><div class="panel-title">最近のお知らせ</div><button class="small-btn" onclick="setPage('news')">一覧へ</button></div><div class="panel-body"><div class="list">${news.length?news.map(n=>`<div class="item"><div class="item-title">${esc(n.title)}</div><div class="item-sub">${esc(n.body)}</div></div>`).join(''):'<div class="note">この年度の公開お知らせはありません。</div>'}</div></div></div>`}function guidePage(){const modeExamples={sougou:'活動・探究・志望理由・面接を見比べる使い方が中心です。',suisen:'評定条件・欠席条件・校内締切の確認を優先します。',general:'受験科目・目安・出願時期の整理を優先します。',senmon:'学科・学費・体験入学・出願時期の比較を優先します。',job:'職種・勤務地・雇用形態・選考内容の比較を優先します。'};return `<div class="panel"><div class="panel-head"><div class="help-inline"><div class="panel-title">方式ガイド</div>${helpBtn(PAGE_HELP.student_guide)}</div>${yearSelect()}</div><div class="panel-body"><div class="item"><div class="item-title">${MODES[state.mode]}</div><div class="item-sub">${esc(MODE_HELP[state.mode])}</div></div><div class="note" style="margin-top:8px">${modeExamples[state.mode]}</div><div class="note" style="margin-top:8px">このアプリでは、学校側が整理した公開情報だけを掲載します。出願前は必ず情報源URLの公式ページも確認してください。</div></div></div>`}function searchPage(){const items=filteredStudentItems();return `<div class="panel"><div class="panel-head"><div class="help-inline"><div class="panel-title">学校検索</div>${helpBtn(PAGE_HELP.student_search)}</div>${yearSelect()}</div><div class="panel-body"><div class="filters"><input placeholder="学校名・学部・条件などで検索" value="${esc(state.search)}" oninput="state.search=this.value; render()"><select onchange="state.area=this.value; render()">${uniqueAreas().map(a=>`<option value="${a}" ${state.area===a?'selected':''}>${a}</option>`).join('')}</select></div><hr class="sep"><div class="list">${items.length?items.map(item=>itemCard(item,false)).join(''):'<div class="note">条件に合う公開情報がありません。</div>'}</div></div></div>`}function comparePage(){const items=state.compareIds.map(id=>currentItemById(id)).filter(Boolean);const compareKeys=MODE_FIELDS[state.mode].filter(k=>!['sourceUrl','notes'].includes(k));return `<div class="panel"><div class="panel-head"><div class="help-inline"><div class="panel-title">比較</div>${helpBtn(PAGE_HELP.student_compare)}</div><div class="row"><span class="chip">${items.length}件</span><button class="small-btn" onclick="state.compareIds=[]; render()">クリア</button></div></div><div class="panel-body">${items.length?`<div class="compare-grid">${items.map(item=>`<div class="compare-card"><div class="head"><div><div class="item-title">${esc(item.name||'名称未入力')}</div><div class="item-sub">${esc(entitySubText(item))}</div></div><button class="small-btn danger" onclick="toggleCompare('${item.id}')">外す</button></div><div class="compare-table" style="margin-top:8px">${compareKeys.map(k=>item[k]?`<div class="line"><span class="label">${FIELD_LABELS[k]||k}</span>${esc(item[k])}</div>`:'').join('')||'<div class="line">比較できる項目がありません。</div>'}<div class="line"><span class="label">情報源URL</span>${item.sourceUrl?`<a class="linkline" href="${esc(item.sourceUrl)}" target="_blank" rel="noopener noreferrer">公式ページを見る</a>`:'未登録'}</div></div></div>`).join('')}</div>`:'<div class="note">検索画面から比較したい学校や企業を追加してください。</div>'}</div></div>`}function detailPage(){const item=currentItemById(state.detailId);if(!item)return `<div class="panel"><div class="panel-head"><div class="panel-title">詳細</div><button class="small-btn" onclick="backFromDetail()">戻る</button></div><div class="panel-body"><div class="note">表示するデータが見つかりません。</div></div></div>`;const keys=MODE_FIELDS[state.mode];return `<div class="panel"><div class="panel-head"><div class="help-inline"><div class="panel-title">詳細</div>${helpBtn(PAGE_HELP.student_detail)}</div><button class="small-btn" onclick="backFromDetail()">戻る</button></div><div class="panel-body"><div class="item"><div class="row"><div class="item-title">${esc(item.name||'名称未入力')}</div>${updateAgeChip(item)}</div><div class="item-sub">${esc(entitySubText(item))}</div></div><div class="detail-grid" style="margin-top:10px">${keys.map(k=>item[k]?`<div class="line"><span class="label">${FIELD_LABELS[k]||k}</span>${k==='sourceUrl'?`<a class="linkline" href="${esc(item[k])}" target="_blank" rel="noopener noreferrer">${esc(item[k])}</a>`:esc(item[k])}</div>`:'').join('')||'<div class="note">表示できる詳細情報がありません。</div>'}</div><div class="row" style="margin-top:10px"><button class="small-btn ${compareContains(item.id)?'primary':''}" onclick="toggleCompare('${item.id}')">${compareContains(item.id)?'比較中':'比較へ追加'}</button>${item.sourceUrl?`<a class="small-btn" href="${esc(item.sourceUrl)}" target="_blank" rel="noopener noreferrer">公式ページ</a>`:''}</div></div></div>`}function newsPage(){const news=(db.announcements||[]).filter(x=>x.published&&x.year===state.year&&x.mode===state.mode);return `<div class="panel"><div class="panel-head"><div class="help-inline"><div class="panel-title">更新情報</div>${helpBtn(PAGE_HELP.student_news)}</div>${yearSelect()}</div><div class="panel-body"><div class="list">${news.length?news.map(n=>`<div class="item"><div class="row"><div class="item-title">${esc(n.title)}</div><span class="chip">${esc(n.updatedAt||'')}</span></div><div class="item-sub">${esc(n.body)}</div></div>`).join(''):'<div class="note">公開中のお知らせはありません。</div>'}</div></div></div>`}function teacherDashboard(){const items=currentItems();const drafts=items.filter(x=>!x.published).length;const published=items.filter(x=>x.published).length;const stale=items.filter(x=>{const d=daysSince(x.updatedAt);return d===null||d>90}).length;const noUrl=items.filter(x=>!x.sourceUrl).length;return `<div class="panel"><div class="panel-head"><div class="help-inline"><div class="panel-title">管理ダッシュボード</div>${helpBtn(PAGE_HELP.teacher_dashboard)}</div>${yearSelect()}</div><div class="panel-body"><div class="stat-grid"><div class="stat"><div class="label">公開中</div><div class="value">${published}</div></div><div class="stat"><div class="label">下書き</div><div class="value">${drafts}</div></div><div class="stat"><div class="label">要確認</div><div class="value">${stale}</div></div></div><div class="stat-grid" style="margin-top:8px"><div class="stat"><div class="label">URL未登録</div><div class="value">${noUrl}</div></div><div class="stat"><div class="label">年度</div><div class="value">${state.year.slice(2)}</div></div><div class="stat"><div class="label">方式</div><div class="value">${MODES[state.mode]}</div></div></div><div class="note" style="margin-top:10px">更新日と情報源URLをできるだけ残してください。出願条件や締切は年度更新で変わるため、古いデータの再確認が必要です。</div></div></div><div class="panel"><div class="panel-head"><div class="panel-title">最近のデータ</div><button class="small-btn" onclick="setPage('items')">一覧へ</button></div><div class="panel-body"><div class="list">${items.slice(0,4).length?items.slice(0,4).map(x=>itemCard(x,true)).join(''):'<div class="note">この年度のデータはありません。</div>'}</div></div></div>`}function teacherItems(){const items=currentItems();const visible=items.filter(x=>state.status==='all'||(state.status==='published'?x.published:!x.published));const current=items.find(x=>x.id===state.editingId)||items[0]||null;return `<div class="panel"><div class="panel-head"><div class="help-inline"><div class="panel-title">データ管理</div>${helpBtn(PAGE_HELP.teacher_items)}</div><div class="row"><button class="small-btn" onclick="addItem()">新規追加</button>${yearSelect()}</div></div><div class="panel-body"><div class="filters"><select onchange="state.status=this.value; render()"><option value="all" ${state.status==='all'?'selected':''}>公開状態すべて</option><option value="published" ${state.status==='published'?'selected':''}>公開中</option><option value="draft" ${state.status==='draft'?'selected':''}>下書き</option></select></div><hr class="sep"><div class="list">${visible.length?visible.map(x=>itemCard(x,true)).join(''):'<div class="note">条件に合うデータがありません。</div>'}</div>${current?editForm(current):''}</div></div>`}function editForm(item){return `<div class="panel" style="margin-top:10px;box-shadow:none"><div class="panel-head"><div class="panel-title">入力フォーム</div></div><div class="panel-body"><div class="form-grid">${MODE_FIELDS[state.mode].map(key=>fieldFor(item,key)).join('')}<div class="field"><label><span class="help-inline"><span>更新日</span>${helpBtn(FIELD_HELP.updatedAt)}</span></label><input type="date" value="${esc(item.updatedAt||'')}" onchange="updateItemField('${item.id}','updatedAt',this.value)"></div><div class="field"><label><span class="help-inline"><span>公開状態</span>${helpBtn(FIELD_HELP.published)}</span></label><select onchange="updateItemField('${item.id}','published',this.value==='true')"><option value="true" ${item.published?'selected':''}>公開中</option><option value="false" ${!item.published?'selected':''}>下書き</option></select></div></div><div class="save-row"><span id="saveMsg" style="visibility:hidden" class="small-btn">保存しました</span><span></span></div></div></div>`}function fieldFor(item,key){const label=FIELD_LABELS[key]||key;const value=item[key]||'';const textarea=key==='notes';const help=FIELD_HELP[key]||'この項目の説明です。';return `<div class="field"><label><span class="help-inline"><span>${label}</span>${helpBtn(help)}</span></label>${textarea?`<textarea onchange="updateItemField('${item.id}','${key}',this.value)">${esc(value)}</textarea>`:`<input value="${esc(value)}" onchange="updateItemField('${item.id}','${key}',this.value)">`}</div>`}function teacherImport(){return `<div class="panel"><div class="panel-head"><div class="help-inline"><div class="panel-title">CSV取込</div>${helpBtn(PAGE_HELP.teacher_import)}</div>${yearSelect()}</div><div class="panel-body"><div class="note">対象方式: ${MODES[state.mode]} / 年度: ${state.year}<br>列名は日本語見出しで使えます。例: 学校名・企業名,学部,学科,地域,情報源URL。英語見出しでも取り込めます。未知の列は無視します。</div><div class="field" style="margin-top:8px"><label>CSV貼り付け</label><textarea placeholder="1行目に日本語見出し、2行目以降にデータ" oninput="state.csvText=this.value">${esc(state.csvText||'')}</textarea></div><div class="row" style="margin-top:8px"><button class="small-btn primary" onclick="importCsvText()">貼り付けCSVを取り込む</button><button class="small-btn" onclick="downloadTemplate()">CSV見本を保存</button></div><div class="field" style="margin-top:8px"><label>CSVファイル選択</label><input type="file" accept=".csv,text/csv" onchange="readCsvFile(event)"></div><div class="note" style="margin-top:8px">取込時は初期状態を下書きにします。確認後に公開へ切り替えてください。</div><div class="panel" style="margin-top:10px;box-shadow:none"><div class="panel-head"><div class="panel-title">現在の列見本</div></div><div class="panel-body"><div class="item-sub">${MODE_FIELDS[state.mode].map(k=>CSV_HEADER_JA[k]||k).join(' / ')}</div></div></div></div></div>`}function teacherNews(){const list=(db.announcements||[]).filter(x=>x.year===state.year&&x.mode===state.mode);return `<div class="panel"><div class="panel-head"><div class="help-inline"><div class="panel-title">お知らせ管理</div>${helpBtn(PAGE_HELP.teacher_news)}</div><div class="row"><button class="small-btn" onclick="addNews()">追加</button>${yearSelect()}</div></div><div class="panel-body"><div class="list">${list.length?list.map(n=>`<div class="item"><div class="field"><label>見出し</label><input value="${esc(n.title)}" onchange="updateNews('${n.id}','title',this.value)"></div><div class="field" style="margin-top:8px"><label>本文</label><textarea onchange="updateNews('${n.id}','body',this.value)">${esc(n.body)}</textarea></div><div class="row" style="margin-top:8px"><select onchange="updateNews('${n.id}','published',this.value==='true')"><option value="true" ${n.published?'selected':''}>公開中</option><option value="false" ${!n.published?'selected':''}>下書き</option></select><input type="date" value="${esc(n.updatedAt||'')}" onchange="updateNews('${n.id}','updatedAt',this.value)"></div><div style="margin-top:8px"><button class="small-btn danger" onclick="removeNews('${n.id}')">削除</button></div></div>`).join(''):'<div class="note">この年度・方式のお知らせはまだありません。</div>'}</div><div class="save-row"><span id="saveMsg" style="visibility:hidden" class="small-btn">保存しました</span><span></span></div></div></div>`}function render(){const main=state.role==='student'?(state.page==='search'?searchPage():state.page==='compare'?comparePage():state.page==='guide'?guidePage():state.page==='news'?newsPage():state.page==='detail'?detailPage():studentTop()):(state.page==='items'?teacherItems():state.page==='import'?teacherImport():state.page==='newsEdit'?teacherNews():teacherDashboard());document.getElementById('app').innerHTML=`<div class="app">${header()}<div class="wrap">${modeTabs()}${navTabs()}${main}</div></div>`}function addItem(){const obj={id:'i-'+Date.now(),year:state.year,published:false,updatedAt:new Date().toISOString().slice(0,10)};MODE_FIELDS[state.mode].forEach(k=>obj[k]='');db.modes[state.mode].items.unshift(obj);state.editingId=obj.id;saveData();render()}function editItem(id){state.editingId=id;render()}function updateItemField(id,key,value){const item=currentItems().find(x=>x.id===id);if(!item)return;item[key]=value;saveData()}function removeItem(id){if(!confirm('このデータを削除しますか。'))return;db.modes[state.mode].items=db.modes[state.mode].items.filter(x=>x.id!==id);state.compareIds=state.compareIds.filter(x=>x!==id);if(state.editingId===id)state.editingId=currentItems()[0]?.id||null;saveData();render()}function parseCsv(csv){const lines=csv.replace(/\r/g,'').split('\n').filter(v=>v.trim());if(lines.length<2)return [];const rawHeaders=splitCsvLine(lines[0]).map(h=>h.trim());const headers=rawHeaders.map(h=>CSV_HEADER_EN_BY_JA[h]||h);return lines.slice(1).map(line=>{const cols=splitCsvLine(line);const row={};headers.forEach((h,i)=>row[h]=cols[i]??'');return row})}function splitCsvLine(line){const out=[];let cur='';let q=false;for(let i=0;i<line.length;i++){const c=line[i];if(c==='"'){if(q&&line[i+1]==='"'){cur+='"';i++;}else q=!q;}else if(c===','&&!q){out.push(cur);cur='';}else cur+=c;}out.push(cur);return out}function importCsvText(){const rows=parseCsv(state.csvText||'');if(!rows.length){alert('CSVが読み取れません。');return;}let count=0;rows.forEach(r=>{const obj={id:'i-'+Date.now()+'-'+Math.random().toString(36).slice(2,6),year:state.year,published:false,updatedAt:new Date().toISOString().slice(0,10)};MODE_FIELDS[state.mode].forEach(k=>obj[k]=r[k]??'');db.modes[state.mode].items.unshift(obj);count++;});saveData();render();alert(count+'件を下書きで取り込みました。')}function readCsvFile(event){const file=event.target.files?.[0];if(!file)return;const reader=new FileReader();reader.onload=()=>{state.csvText=String(reader.result||'');render();};reader.readAsText(file,'utf-8')}function sampleForMode(mode){const map={sougou:{name:'関西サンプル大学',faculty:'文学部',department:'総合人文学科',area:'大阪',method:'総合型A日程',ratingReq:'3.8以上',englishReq:'英検2級以上',exclusive:'併願可',interview:'個人面接',essay:'800字',applyPeriod:'9/1〜9/10',examDate:'9/21',sourceUrl:'https://example.com',notes:'学校整理用メモ'},suisen:{name:'推薦サンプル大学',faculty:'経済学部',department:'経済学科',area:'京都',ratingReq:'4.0以上',absenceReq:'20日以内',exclusive:'専願',schoolDeadline:'8/20',interview:'個人面接',essay:'なし',applyPeriod:'9/5〜9/12',examDate:'10/1',sourceUrl:'https://example.com',notes:'学校整理用メモ'},general:{name:'一般サンプル大学',faculty:'法学部',department:'法学科',area:'兵庫',subjects:'英語・国語・日本史',level:'標準',applyPeriod:'1/4〜1/18',examDate:'2/3',sourceUrl:'https://example.com',notes:'学校整理用メモ'},senmon:{name:'専門サンプル学校',course:'看護学科',area:'大阪',tuition:'初年度120万円',trial:'6/15体験入学',applyPeriod:'10/1〜',sourceUrl:'https://example.com',notes:'学校整理用メモ'},job:{name:'就職サンプル企業',jobType:'事務',area:'大阪市',employment:'正社員',exam:'書類・面接2回',applyPeriod:'9月開始',sourceUrl:'https://example.com',notes:'学校整理用メモ'}};return map[mode]||{}}function downloadTemplate(){const headers=MODE_FIELDS[state.mode].map(k=>CSV_HEADER_JA[k]||k).join(',');const sampleObj=sampleForMode(state.mode);const sample=MODE_FIELDS[state.mode].map(k=>sampleObj[k]||'').join(',');const blob=new Blob([headers+'\n'+sample+'\n'],{type:'text/csv;charset=utf-8;'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`template_${state.mode}_${state.year}_ja.csv`;a.click();URL.revokeObjectURL(a.href)}function addNews(){db.announcements.unshift({id:'n-'+Date.now(),year:state.year,mode:state.mode,title:'新しいお知らせ',body:'本文を入力してください。',published:false,updatedAt:new Date().toISOString().slice(0,10)});saveData();render()}function updateNews(id,key,value){const n=(db.announcements||[]).find(x=>x.id===id);if(!n)return;n[key]=value;saveData()}function removeNews(id){if(!confirm('このお知らせを削除しますか。'))return;db.announcements=(db.announcements||[]).filter(x=>x.id!==id);saveData();render()}render();
</script>
