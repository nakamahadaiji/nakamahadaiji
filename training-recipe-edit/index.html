<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>研修おもしろ設計アプリ</title>
  <style>
    :root {
      --blue: #1657b8;
      --blue-deep: #0d4aa3;
      --aqua: #52d1dd;
      --orange: #f5873a;
      --text: #142132;
      --muted: #607084;
      --line: rgba(20, 33, 50, 0.12);
      --shadow: 0 14px 36px rgba(4, 24, 51, 0.18);
      --bg: #122746;
      --card: #ffffff;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: "Hiragino Sans", "Yu Gothic", "Meiryo", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(82,209,221,.16), transparent 28%),
        radial-gradient(circle at bottom right, rgba(245,135,58,.12), transparent 22%),
        linear-gradient(180deg, #18335c 0%, #102340 100%);
    }

    .app {
      width: 100%;
      max-width: 1100px;
      margin: 0 auto;
      padding: 14px 12px 26px;
    }

    .topbar {
      display: grid;
      gap: 12px;
      margin-bottom: 12px;
    }

    .brand-pill {
      display: block;
      width: 100%;
      padding: 14px 18px;
      border-radius: 999px;
      background: var(--aqua);
      color: #fff;
      font-weight: 800;
      font-size: 16px;
      border: 3px solid rgba(18, 33, 50, 0.75);
      box-shadow: var(--shadow);
    }

    .top-actions {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    button {
      border: none;
      cursor: pointer;
      font: inherit;
      transition: transform .16s ease, background .16s ease, opacity .16s ease;
    }

    button:hover { transform: translateY(-1px); }

    .ghost-btn,
    .primary-btn,
    .edit-btn {
      min-height: 58px;
      padding: 12px 10px;
      border-radius: 18px;
      font-weight: 800;
      box-shadow: var(--shadow);
      line-height: 1.3;
      word-break: break-word;
    }

    .ghost-btn {
      background: rgba(255,255,255,.96);
      color: var(--text);
    }

    .primary-btn {
      background: var(--orange);
      color: #fff;
    }

    .edit-btn {
      min-height: auto;
      padding: 9px 12px;
      border-radius: 12px;
      background: rgba(255,255,255,.94);
      color: var(--blue-deep);
      box-shadow: none;
      border: 1px solid rgba(21,87,184,.18);
      font-size: 13px;
      font-weight: 800;
    }

    .layout {
      display: grid;
      gap: 12px;
    }

    .nav {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      order: 1;
    }

    .nav-btn {
      min-height: 48px;
      padding: 10px 8px;
      border-radius: 999px;
      background: rgba(255,255,255,.95);
      border: 2px solid rgba(20,33,50,.75);
      text-align: center;
      font-weight: 800;
      font-size: 13px;
      color: #6a5f55;
      box-shadow: var(--shadow);
    }

    .nav-btn.active {
      background: var(--orange);
      color: #fff;
    }

    .panel {
      order: 2;
      background: rgba(255,255,255,.98);
      border-radius: 24px;
      overflow: hidden;
      box-shadow: var(--shadow);
      border: 3px solid rgba(255,255,255,.7);
    }

    .hero {
      background: linear-gradient(135deg, var(--blue), #0d4aa3 62%, #1c66cb 100%);
      color: #fff;
      padding: 18px 16px;
      display: grid;
      gap: 12px;
    }

    .hero h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1.15;
      letter-spacing: -.02em;
    }

    .hero p {
      margin: 0;
      font-size: 14px;
      line-height: 1.7;
      color: rgba(255,255,255,.92);
    }

    .hero-points {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .hero-point {
      background: rgba(255,255,255,.12);
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 16px;
      padding: 12px;
    }

    .hero-point strong {
      display: block;
      margin-bottom: 4px;
      font-size: 18px;
    }

    .hero-point span {
      display: block;
      font-size: 12px;
      line-height: 1.6;
      color: rgba(255,255,255,.86);
    }

    .content {
      padding: 16px 12px 18px;
      background: #f7f9fc;
    }

    .section { display: none; }
    .section.active { display: block; }

    .section-head {
      display: grid;
      gap: 8px;
      margin-bottom: 12px;
    }

    .section-head h2 {
      margin: 0;
      font-size: 20px;
      line-height: 1.3;
    }

    .section-head p {
      margin: 0;
      font-size: 13px;
      line-height: 1.6;
      color: var(--muted);
    }

    .status {
      justify-self: start;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(82,209,221,.12);
      border: 1px solid rgba(82,209,221,.3);
      color: #0b6d76;
      font-size: 12px;
      font-weight: 800;
    }

    .cards {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 14px;
      box-shadow: 0 8px 22px rgba(17,35,63,.06);
    }

    .card-top {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .card-number {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: #b3bac5;
      color: #fff;
      display: grid;
      place-items: center;
      font-size: 15px;
      font-weight: 800;
      flex: 0 0 auto;
    }

    .card-label-row {
      display: grid;
      gap: 8px;
      width: 100%;
    }

    .label-input,
    .desc-input,
    textarea {
      width: 100%;
      border: 1px solid rgba(20,33,50,.12);
      border-radius: 12px;
      padding: 12px 13px;
      font: inherit;
      color: var(--text);
      background: #fff;
      outline: none;
    }

    .label-input:focus,
    .desc-input:focus,
    textarea:focus {
      border-color: rgba(21,87,184,.45);
      box-shadow: 0 0 0 4px rgba(21,87,184,.10);
    }

    .label-input {
      font-size: 18px;
      font-weight: 800;
    }

    .desc-input {
      font-size: 13px;
      color: var(--muted);
    }

    .card textarea {
      min-height: 108px;
      resize: vertical;
      line-height: 1.7;
      margin-top: 10px;
    }

    .mini-note {
      margin-top: 12px;
      padding: 12px 14px;
      background: rgba(245,135,58,.1);
      border: 1px solid rgba(245,135,58,.22);
      border-radius: 14px;
      color: #8b562d;
      font-size: 13px;
      line-height: 1.7;
    }

    .idea-list {
      display: grid;
      gap: 10px;
    }

    .idea-item {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 8px 22px rgba(17,35,63,.06);
    }

    .idea-toggle {
      width: 100%;
      background: #fff;
      padding: 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      text-align: left;
      font-size: 17px;
      font-weight: 800;
      color: var(--text);
    }

    .idea-toggle span:last-child {
      color: var(--blue);
      font-size: 22px;
    }

    .idea-body {
      display: none;
      padding: 0 14px 14px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.8;
    }

    .idea-item.open .idea-body { display: block; }

    .copy-wrap {
      display: grid;
      gap: 12px;
    }

    .output-box,
    .preview-box {
      background: #fff;
      border: 1px solid rgba(21,87,184,.12);
      border-radius: 18px;
      padding: 14px;
    }

    .output-box h3,
    .preview-box h3 {
      margin: 0 0 10px;
      font-size: 17px;
    }

    .output-area {
      width: 100%;
      min-height: 240px;
      resize: vertical;
      line-height: 1.7;
      background: #fff;
    }

    .preview-card {
      background: linear-gradient(135deg, var(--blue), #0d4aa3 66%);
      color: #fff;
      border-radius: 16px;
      padding: 14px;
    }

    .preview-card h4 {
      margin: 0 0 10px;
      font-size: 17px;
    }

    .preview-grid {
      display: grid;
      gap: 10px;
    }

    .preview-item {
      background: rgba(255,255,255,.12);
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 12px;
      padding: 12px;
    }

    .preview-item strong {
      display: block;
      margin-bottom: 4px;
      font-size: 15px;
    }

    .preview-sub {
      display: block;
      margin-bottom: 6px;
      font-size: 12px;
      line-height: 1.5;
      color: rgba(255,255,255,.78);
    }

    .preview-item p {
      margin: 0 0 8px;
      font-size: 13px;
      line-height: 1.7;
      color: rgba(255,255,255,.95);
      white-space: pre-wrap;
      word-break: break-word;
    }

    .footer {
      margin-top: 12px;
      text-align: center;
      font-size: 12px;
      color: rgba(255,255,255,.78);
    }

    @media (min-width: 768px) {
      .app { padding: 20px 18px 34px; }
      .layout { grid-template-columns: minmax(0, 1fr) 200px; align-items: start; }
      .nav { order: 2; grid-template-columns: 1fr; position: sticky; top: 18px; }
      .panel { order: 1; }
      .topbar { grid-template-columns: minmax(0, 1fr) auto; align-items: center; }
      .top-actions { display: flex; }
      .hero { grid-template-columns: 1.2fr .8fr; padding: 22px 22px 20px; }
      .hero h1 { font-size: 40px; }
      .hero p { font-size: 15px; }
      .content { padding: 18px; }
      .section-head { grid-template-columns: 1fr auto; align-items: end; }
      .cards { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .copy-wrap { grid-template-columns: 1.05fr .95fr; }
    }

    @media (min-width: 1024px) {
      .cards { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="brand-pill">おもしろい研修のレシピ</div>
      <div class="top-actions">
        <button type="button" class="ghost-btn" id="fillSampleBtn">見本を入れる</button>
        <button type="button" class="ghost-btn" id="resetBtn">リセット</button>
        <button type="button" class="primary-btn" id="copyBtn">一気にコピー</button>
      </div>
    </div>

    <div class="layout">
      <nav class="nav">
        <button type="button" class="nav-btn active" data-target="section-elements">5要素</button>
        <button type="button" class="nav-btn" data-target="section-ideas">考え方3つ</button>
        <button type="button" class="nav-btn" data-target="section-copy">レシピ</button>
      </nav>

      <div class="panel">
        <div class="hero">
          <div>
            <h1>資料を作るな、<br>体験を作れ</h1>
            <p>研修をあとで使える形に整えるためのメモです。5要素を入れて、最後にまとめてコピーできます。</p>
          </div>
          <div class="hero-points">
            <div class="hero-point">
              <strong>5要素</strong>
              <span>要素名・説明・内容を編集できます。</span>
            </div>
            <div class="hero-point">
              <strong>考え方3つ</strong>
              <span>迷ったときの確認用です。</span>
            </div>
          </div>
        </div>

        <div class="content">
          <section class="section active" id="section-elements">
            <div class="section-head">
              <div>
                <h2>研修を面白くする5要素</h2>
                <p>必要なところだけ短く書けば大丈夫です。</p>
              </div>
              <div class="status" id="statusText">入力数 0 / 5</div>
            </div>
            <div class="cards" id="cards"></div>
            <div class="mini-note">要素名も説明文も内容も、あとから何度でも直せます。</div>
          </section>

          <section class="section" id="section-ideas">
            <div class="section-head">
              <div>
                <h2>迷ったときの考え方3つ</h2>
                <p>判断に迷ったときだけ見返す使い方で大丈夫です。</p>
              </div>
            </div>
            <div class="idea-list" id="ideaList"></div>
          </section>

          <section class="section" id="section-copy">
            <div class="section-head">
              <div>
                <h2>コピー用まとめ</h2>
                <p>企画メモとしてそのまま使えます。</p>
              </div>
              <button type="button" class="primary-btn" id="copyBtnSecondary">この内容をコピー</button>
            </div>
            <div class="copy-wrap">
              <div class="output-box">
                <h3>出力テキスト</h3>
                <textarea class="output-area" id="outputText" readonly></textarea>
              </div>
              <div class="preview-box">
                <h3>見た目の確認</h3>
                <div class="preview-card">
                  <h4>5要素の要約</h4>
                  <div id="previewList" class="preview-grid"></div>
                </div>
              </div>
            </div>
          </section>
        </div>
      </div>
    </div>

    <div class="footer">入力内容はこの端末の中だけに保存されます。</div>
  </div>

  <script>
    var defaultElements = [
      { key: 'purpose', number: '1', title: '目的がわかる', description: '最初にねらいが伝わるか' },
      { key: 'empathy', number: '2', title: '共感できる', description: '自分事として入れるか' },
      { key: 'surprise', number: '3', title: '裏切りがある', description: '少し意外さがあるか' },
      { key: 'useful', number: '4', title: '活用できる', description: 'あとで使える形か' },
      { key: 'direction', number: '5', title: '演出がよい', description: '流れや見せ方がよいか' }
    ];

    var ideas = [
      { title: '資料を作るな、体験を作れ', body: '資料を整える前に、参加者にどんな感覚を持ち帰ってほしいかを先に決める。資料はそのための道具として使う。' },
      { title: '“正しさ”よりも“なるほど感”', body: '説明が完璧でも、相手が使えないと意味が薄い。「なるほど」「それなら使えそう」と思える形を優先する。' },
      { title: '誰もちゃんと見ていない', body: '全部を伝えようとしすぎず、相手に残したい要点を絞る。細かさより、残る一言の方が強い。' }
    ];

    var storageKey = 'training-ui-five-elements-v4';
    var cards = document.getElementById('cards');
    var ideaList = document.getElementById('ideaList');
    var outputText = document.getElementById('outputText');
    var previewList = document.getElementById('previewList');
    var statusText = document.getElementById('statusText');

    function escapeHtml(text) {
      return String(text)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/\"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function getSaved() {
      try { return JSON.parse(localStorage.getItem(storageKey)) || {}; }
      catch (error) { return {}; }
    }

    function save(data) {
      localStorage.setItem(storageKey, JSON.stringify(data));
    }

    function getElementMeta(item, saved) {
      return {
        title: saved[item.key + '_title'] || item.title,
        description: saved[item.key + '_description'] || item.description,
        content: saved[item.key] || ''
      };
    }

    function switchSection(targetId) {
      var buttons = document.querySelectorAll('.nav-btn');
      var sections = document.querySelectorAll('.section');
      for (var i = 0; i < buttons.length; i += 1) {
        buttons[i].classList.remove('active');
        if (buttons[i].getAttribute('data-target') === targetId) {
          buttons[i].classList.add('active');
        }
      }
      for (var j = 0; j < sections.length; j += 1) {
        sections[j].classList.remove('active');
      }
      document.getElementById(targetId).classList.add('active');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function renderCards() {
      var saved = getSaved();
      var html = '';
      for (var i = 0; i < defaultElements.length; i += 1) {
        var item = defaultElements[i];
        var meta = getElementMeta(item, saved);
        html += '<article class="card">'
          + '<div class="card-top">'
          + '<div class="card-number">' + item.number + '</div>'
          + '<div class="card-label-row">'
          + '<input class="label-input" type="text" data-role="title" data-key="' + item.key + '" value="' + escapeHtml(meta.title) + '">'
          + '<input class="desc-input" type="text" data-role="description" data-key="' + item.key + '" value="' + escapeHtml(meta.description) + '">'
          + '</div>'
          + '</div>'
          + '<textarea data-role="content" data-key="' + item.key + '">' + escapeHtml(meta.content) + '</textarea>'
          + '</article>';
      }
      cards.innerHTML = html;

      var fields = cards.querySelectorAll('[data-key]');
      for (var j = 0; j < fields.length; j += 1) {
        fields[j].addEventListener('input', function(event) {
          var current = getSaved();
          var key = event.target.getAttribute('data-key');
          var role = event.target.getAttribute('data-role');
          if (role === 'title') {
            current[key + '_title'] = event.target.value;
          } else if (role === 'description') {
            current[key + '_description'] = event.target.value;
          } else {
            current[key] = event.target.value;
          }
          save(current);
          buildOutput();
        });
      }
    }

    function renderIdeas() {
      var html = '';
      for (var i = 0; i < ideas.length; i += 1) {
        var sign = i === 0 ? '−' : '＋';
        var openClass = i === 0 ? ' open' : '';
        html += '<div class="idea-item' + openClass + '">'
          + '<button type="button" class="idea-toggle"><span>' + ideas[i].title + '</span><span>' + sign + '</span></button>'
          + '<div class="idea-body">' + ideas[i].body + '</div>'
          + '</div>';
      }
      ideaList.innerHTML = html;

      var boxes = ideaList.querySelectorAll('.idea-item');
      for (var j = 0; j < boxes.length; j += 1) {
        (function(box) {
          var button = box.querySelector('.idea-toggle');
          var signNode = button.querySelector('span:last-child');
          button.addEventListener('click', function() {
            box.classList.toggle('open');
            signNode.textContent = box.classList.contains('open') ? '−' : '＋';
          });
        })(boxes[j]);
      }
    }

    function buildOutput() {
      var saved = getSaved();
      var filled = 0;
      var lines = ['【研修を面白くする5要素】'];
      var previewHtml = '';

      for (var i = 0; i < defaultElements.length; i += 1) {
        var item = defaultElements[i];
        var meta = getElementMeta(item, saved);
        var title = meta.title.replace(/^\s+|\s+$/g, '') || item.title;
        var description = meta.description.replace(/^\s+|\s+$/g, '');
        var content = meta.content.replace(/^\s+|\s+$/g, '');
        if (content) { filled += 1; }
        var displayValue = content || '未入力';

        lines.push(item.number + '. ' + title + (description ? '（' + description + '）' : '') + '\n' + displayValue);

        previewHtml += '<div class="preview-item">'
          + '<strong>' + escapeHtml(title) + '</strong>'
          + (description ? '<span class="preview-sub">' + escapeHtml(description) + '</span>' : '')
          + '<p>' + escapeHtml(displayValue) + '</p>'
          + '<button type="button" class="edit-btn" data-edit-key="' + item.key + '">この項目を編集</button>'
          + '</div>';
      }

      lines.push('');
      lines.push('【考え方3つ】');
      for (var j = 0; j < ideas.length; j += 1) {
        lines.push((j + 1) + '. ' + ideas[j].title + '\n' + ideas[j].body);
      }

      statusText.textContent = '入力数 ' + filled + ' / 5';
      outputText.value = lines.join('\n\n');
      previewList.innerHTML = previewHtml;

      var editButtons = previewList.querySelectorAll('.edit-btn');
      for (var k = 0; k < editButtons.length; k += 1) {
        editButtons[k].addEventListener('click', function(event) {
          var key = event.target.getAttribute('data-edit-key');
          switchSection('section-elements');
          setTimeout(function() {
            var target = document.querySelector('[data-role="content"][data-key="' + key + '"]');
            if (target) {
              target.focus();
              target.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
          }, 80);
        });
      }
    }

    function flashCopy(text) {
      var buttons = [document.getElementById('copyBtn'), document.getElementById('copyBtnSecondary')];
      for (var i = 0; i < buttons.length; i += 1) {
        (function(btn) {
          var original = btn.textContent;
          btn.textContent = text;
          setTimeout(function() { btn.textContent = original; }, 1200);
        })(buttons[i]);
      }
    }

    function fallbackCopy(text) {
      outputText.removeAttribute('readonly');
      outputText.value = text;
      outputText.select();
      try { document.execCommand('copy'); } catch (error) {}
      outputText.setAttribute('readonly', 'readonly');
    }

    function copyOutput() {
      buildOutput();
      var text = outputText.value;
      if (navigator.clipboard && window.isSecureContext) {
        navigator.clipboard.writeText(text).then(function() {
          flashCopy('コピーしました');
        }).catch(function() {
          fallbackCopy(text);
          flashCopy('コピーしました');
        });
      } else {
        fallbackCopy(text);
        flashCopy('コピーしました');
      }
    }

    function fillSample() {
      var sample = {
        purpose_title: '目的がわかる',
        purpose_description: '最初にねらいが伝わるか',
        purpose: 'この研修で何を持ち帰ってほしいかを最初に伝える。',
        empathy_title: '共感できる',
        empathy_description: '自分事として入れるか',
        empathy: 'よくある失敗例から入って、自分にもあると感じてもらう。',
        surprise_title: '裏切りがある',
        surprise_description: '少し意外さがあるか',
        surprise: 'うまく話すことより、順番の方が大事だと気づかせる。',
        useful_title: '活用できる',
        useful_description: 'あとで使える形か',
        useful: '明日すぐ使える問いや言い換えを残す。',
        direction_title: '演出がよい',
        direction_description: '流れや見せ方がよいか',
        direction: '導入→共感→発見→持ち帰りの順で組み立てる。'
      };
      save(sample);
      renderCards();
      buildOutput();
      switchSection('section-elements');
    }

    function resetAll() {
      if (!window.confirm('入力内容をすべて消します。よろしいですか。')) {
        return;
      }
      localStorage.removeItem(storageKey);
      renderCards();
      buildOutput();
      switchSection('section-elements');
    }

    function setupNav() {
      var buttons = document.querySelectorAll('.nav-btn');
      for (var i = 0; i < buttons.length; i += 1) {
        buttons[i].addEventListener('click', function(event) {
          var targetId = event.currentTarget.getAttribute('data-target');
          switchSection(targetId);
        });
      }
    }

    document.getElementById('copyBtn').addEventListener('click', copyOutput);
    document.getElementById('copyBtnSecondary').addEventListener('click', copyOutput);
    document.getElementById('fillSampleBtn').addEventListener('click', fillSample);
    document.getElementById('resetBtn').addEventListener('click', resetAll);

    renderCards();
    renderIdeas();
    buildOutput();
    setupNav();
  </script>
</body>
