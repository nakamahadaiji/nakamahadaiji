<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>トロッコ問題ゲーム</title>
<style>
:root{--ink:#222;--paper:#fffdf7}*{box-sizing:border-box}body{margin:0;background:#eee;font-family:system-ui,-apple-system,"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;color:var(--ink);padding:12px}.game{width:375px;min-width:375px;margin:auto;background:var(--paper);border:3px solid var(--ink);border-radius:18px;overflow:hidden;box-shadow:7px 7px 0 #ccc}header{display:flex;justify-content:space-between;align-items:center;padding:13px 14px;border-bottom:3px solid var(--ink)}h1{font-size:21px;margin:0}.level{font-weight:700;font-size:12px;background:white;border:2px solid var(--ink);padding:6px 8px;border-radius:999px}.stage{position:relative;height:380px;overflow:hidden;background:repeating-linear-gradient(0deg,#fffdf7 0 31px,#f8f4eb 32px 33px)}.caption{position:absolute;z-index:3;left:16px;top:14px;max-width:220px;font-weight:800;font-size:15px;line-height:1.55;margin:0}svg{width:100%;height:100%;display:block}.track{fill:none;stroke:#222;stroke-width:16;stroke-linecap:round;stroke-linejoin:round}.inner{fill:none;stroke:#fffdf7;stroke-width:6;stroke-linecap:round}.person circle,.person path{stroke:#222;stroke-width:4;fill:#fffdf7;stroke-linecap:round;stroke-linejoin:round}.person .shirt{fill:#fff}.label{font-size:16px;font-weight:800;fill:#222}.train{position:absolute;left:-160px;top:173px;width:145px;height:84px;z-index:5;transition:left 1.8s cubic-bezier(.22,.61,.36,1),top 1.8s cubic-bezier(.22,.61,.36,1),transform 1.8s cubic-bezier(.22,.61,.36,1);transform:scale(.78);transform-origin:left top}.body{position:absolute;inset:13px 0 0;background:#f8e3a5;border:4px solid #222;border-radius:10px 14px 8px 8px}.roof{position:absolute;left:3px;top:0;width:126px;height:28px;border:4px solid #222;border-bottom:none;border-radius:52% 52% 0 0;background:#fffdf7}.window{position:absolute;top:31px;width:21px;height:19px;border:3px solid #222;border-radius:4px;background:#fff}.w1{left:22px}.w2{left:54px}.w3{left:86px}.light{position:absolute;right:8px;top:43px;width:12px;height:12px;border:3px solid #222;border-radius:50%;background:#ffe96a}.wheel{position:absolute;bottom:-11px;width:22px;height:22px;border:4px solid #222;border-radius:50%;background:#fffdf7}.wh1{left:26px}.wh2{right:23px}.choices{padding:15px 14px 18px;border-top:3px solid var(--ink);display:grid;gap:12px}.question{margin:0;font-weight:800;font-size:17px;line-height:1.6}.buttons{display:grid;gap:12px}button{border:3px solid var(--ink);border-radius:12px;padding:14px 16px;font-weight:900;font-size:16px;cursor:pointer;box-shadow:4px 4px 0 #222}button:disabled{opacity:.55;cursor:not-allowed}.oneBtn{background:#cfe8ff}.fiveBtn{background:#ffd6d2}.history{border:3px solid var(--ink);border-radius:12px;padding:14px;background:#fff;font-weight:900}.hidden{display:none}.majority{margin:0 0 10px;font-size:14px;line-height:1.5}.head{display:flex;justify-content:space-between;align-items:baseline;gap:8px;margin-bottom:12px}.head span{font-size:15px}.head strong{font-size:18px;white-space:nowrap}.row{display:grid;grid-template-columns:102px 1fr 40px;gap:7px;align-items:center;margin:9px 0;font-size:12px}.bar{height:15px;border:2px solid #222;border-radius:999px;overflow:hidden;background:#fffdf7}.fill{height:100%;transition:width .35s ease}.blue{background:#8ec5ee}.red{background:#f5a79f}.note,.status,.result{margin:0;font-size:13px;font-weight:700}.note{color:#555}.result{font-size:15px;min-height:24px}
</style>
</head>
<body><main class="game"><header><h1>トロッコ問題ゲーム</h1><div class="level">Level 1</div></header><section class="stage"><p class="caption">あなたが選んだ方の線路に、電車が走ります。</p><svg viewBox="0 0 940 420" preserveAspectRatio="none" aria-hidden="true"><path class="track" d="M0 215 C190 215 285 220 430 215 C520 210 580 175 705 110 C800 60 870 55 940 55"/><path class="inner" d="M0 215 C190 215 285 220 430 215 C520 210 580 175 705 110 C800 60 870 55 940 55"/><path class="track" d="M0 215 C190 215 285 220 430 215 C520 220 595 260 705 314 C800 362 875 365 940 365"/><path class="inner" d="M0 215 C190 215 285 220 430 215 C520 220 595 260 705 314 C800 362 875 365 940 365"/><line x1="444" y1="165" x2="468" y2="219" stroke="#222" stroke-width="7" stroke-linecap="round"/><circle cx="444" cy="165" r="10" fill="#f06a63" stroke="#222" stroke-width="4"/><circle cx="468" cy="219" r="8" fill="#fff" stroke="#222" stroke-width="4"/><text x="385" y="153" class="label">レバー</text><g class="person" transform="translate(760 18) translate(20 0) scale(2.3 1) translate(-20 0)"><circle cx="20" cy="16" r="10"/><path class="shirt" d="M20 26 L9 55 L20 74 L31 55 Z"/><path d="M14 68 L5 90 M26 68 L35 90 M10 42 L0 51 M30 42 L40 51"/></g><text x="882" y="36" class="label">1人</text><g class="person" transform="translate(600 255) translate(20 0) scale(2.3 1) translate(-20 0)"><circle cx="20" cy="16" r="10"/><path class="shirt" d="M20 26 L9 55 L20 74 L31 55 Z"/><path d="M14 68 L5 90 M26 68 L35 90 M10 42 L0 51 M30 42 L40 51"/></g><g class="person" transform="translate(705 255) translate(20 0) scale(2.3 1) translate(-20 0)"><circle cx="20" cy="16" r="10"/><path class="shirt" d="M20 26 L9 55 L20 74 L31 55 Z"/><path d="M14 68 L5 90 M26 68 L35 90 M10 42 L0 51 M30 42 L40 51"/></g><g class="person" transform="translate(810 255) translate(20 0) scale(2.3 1) translate(-20 0)"><circle cx="20" cy="16" r="10"/><path class="shirt" d="M20 26 L9 55 L20 74 L31 55 Z"/><path d="M14 68 L5 90 M26 68 L35 90 M10 42 L0 51 M30 42 L40 51"/></g><g class="person" transform="translate(652 320) translate(20 0) scale(2.3 1) translate(-20 0)"><circle cx="20" cy="16" r="10"/><path class="shirt" d="M20 26 L9 55 L20 74 L31 55 Z"/><path d="M14 68 L5 90 M26 68 L35 90 M10 42 L0 51 M30 42 L40 51"/></g><g class="person" transform="translate(757 320) translate(20 0) scale(2.3 1) translate(-20 0)"><circle cx="20" cy="16" r="10"/><path class="shirt" d="M20 26 L9 55 L20 74 L31 55 Z"/><path d="M14 68 L5 90 M26 68 L35 90 M10 42 L0 51 M30 42 L40 51"/></g><text x="886" y="245" class="label">5人</text></svg><div class="train" id="train"><div class="roof"></div><div class="body"></div><span class="window w1"></span><span class="window w2"></span><span class="window w3"></span><span class="light"></span><span class="wheel wh1"></span><span class="wheel wh2"></span></div></section><section class="choices"><p class="question">どちらの線路に電車を走らせますか？</p><div class="buttons"><button class="oneBtn" id="oneBtn">上の線路へ（1人）</button><button class="fiveBtn" id="fiveBtn">下の線路へ（5人）</button></div><section class="history hidden" id="history"><p class="majority" id="majority"></p><div class="head"><span>過去の選択</span><strong>累計 <span id="total">0</span>人</strong></div><div class="row"><span>上の線路（1人）</span><div class="bar"><div class="fill blue" id="oneBar" style="width:50%"></div></div><strong id="onePct">--%</strong></div><div class="row"><span>下の線路（5人）</span><div class="bar"><div class="fill red" id="fiveBar" style="width:50%"></div></div><strong id="fivePct">--%</strong></div></section><p class="note hidden" id="note">※過去にこの問題へ回答した人の累計です。現在この場にいる人数ではありません。</p><p class="status" id="status">過去の記録を読み込んでいます…</p><p class="result" id="result"></p></section></main><script>
const DB='https://rinri-ac8b5-default-rtdb.firebaseio.com',ID='trolley-level-1',URL=`${DB}/games/${ID}.json`,oneBtn=document.getElementById('oneBtn'),fiveBtn=document.getElementById('fiveBtn'),train=document.getElementById('train'),history=document.getElementById('history'),note=document.getElementById('note'),result=document.getElementById('result'),status=document.getElementById('status'),key=`trolley-voter-${ID}`;let voter=localStorage.getItem(key);if(!voter){voter=crypto.randomUUID?crypto.randomUUID():`${Date.now()}-${Math.random()}`;localStorage.setItem(key,voter)}
function draw(t={}){const one=+t.one||0,five=+t.five||0,total=one+five,a=total?Math.round(one/total*100):50,b=total?100-a:50;document.getElementById('total').textContent=total.toLocaleString('ja-JP');document.getElementById('onePct').textContent=total?`${a}%`:'--%';document.getElementById('fivePct').textContent=total?`${b}%`:'--%';document.getElementById('oneBar').style.width=`${a}%`;document.getElementById('fiveBar').style.width=`${b}%`;document.getElementById('majority').innerHTML=!total?'まだ過去の回答はありません。あなたが最初の回答者です。':a===b?'過去の回答は、どちらも同じ割合です。':`過去の回答では、<strong>${a>b?'上の線路（1人）':'下の線路（5人）'}</strong>を選んだ人が多いです（${Math.max(a,b)}%）。`}
async function read(etag=false){const r=await fetch(URL,{headers:etag?{'X-Firebase-ETag':'true'}:{}});if(!r.ok)throw Error();return{data:await r.json(),etag:r.headers.get('etag')}}
async function vote(route){for(let i=0;i<5;i++){const{data,etag}=await read(true),g=data||{};g.voters=g.voters||{};g.totals=g.totals||{one:0,five:0};if(g.voters[voter])return{added:false,totals:g.totals};g.voters[voter]=route;g.totals[route]=(+g.totals[route]||0)+1;const r=await fetch(URL,{method:'PUT',headers:{'Content-Type':'application/json','if-match':etag||'*'},body:JSON.stringify(g)});if(r.ok)return{added:true,totals:g.totals};if(r.status!==412)throw Error()}throw Error()}
function show(route){oneBtn.disabled=fiveBtn.disabled=true;history.classList.remove('hidden');note.classList.remove('hidden');if(route==='one'){train.style.left='calc(100% - 150px)';train.style.top='42px';train.style.transform='scale(.78) rotate(-18deg)';result.textContent='上の線路を選びました。電車が1人のいる方へ走ります。'}else{train.style.left='calc(100% - 155px)';train.style.top='300px';train.style.transform='scale(.78) rotate(17deg)';result.textContent='下の線路を選びました。電車が5人のいる方へ走ります。'}}
async function choose(route){if(oneBtn.disabled)return;oneBtn.disabled=fiveBtn.disabled=true;try{const x=await vote(route);draw(x.totals);show(route);if(!x.added)result.textContent+='（この端末の回答はすでに集計済みです）'}catch(e){oneBtn.disabled=fiveBtn.disabled=false;result.textContent='投票を記録できませんでした。Firebaseのルールを確認してください。'}}
oneBtn.onclick=()=>choose('one');fiveBtn.onclick=()=>choose('five');async function refresh(){try{const{data}=await read();draw((data||{}).totals||{});status.textContent='選択後に、過去の回答結果を表示します。'}catch(e){status.textContent='過去の記録を読み込めませんでした。Firebaseのルールを確認してください。'}}refresh();setInterval(refresh,5000);
</script></body></html>
